<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pexeso">
<title>Pexeso</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f5f4ef;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1rem;
  }

  #game {
    width: 100%;
    max-width: 480px;
  }

  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 10px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a18;
    letter-spacing: -0.5px;
  }

  #stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .stat {
    background: #fff;
    border: 1px solid #e0dfd8;
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 13px;
    color: #666;
  }

  .stat span {
    font-weight: 600;
    color: #1a1a18;
  }

  #btn-new {
    background: #1a1a18;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 16px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }

  #btn-new:hover { background: #333; }

  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .card {
    aspect-ratio: 1;
    cursor: pointer;
    perspective: 700px;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.38s cubic-bezier(.4,0,.2,1);
    border-radius: 12px;
  }

  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }

  .card-front,
  .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-front {
    background: #fff;
    border: 1px solid #dddcd6;
    user-select: none;
  }

  .card-front::after {
    content: '?';
    font-size: 28px;
    font-weight: 700;
    color: #c8c7c0;
  }

  .card-back {
    background: #fff;
    border: 1px solid #dddcd6;
    transform: rotateY(180deg);
    font-size: 2.4rem;
  }

  .card.matched .card-back {
    background: #eaf3de;
    border-color: #b8dda0;
  }

  #message {
    text-align: center;
    margin-top: 1.2rem;
    font-size: 14px;
    color: #888;
    min-height: 20px;
  }

  #win-banner {
    display: none;
    text-align: center;
    padding: 2rem 1.5rem;
    background: #fff;
    border: 1px solid #e0dfd8;
    border-radius: 14px;
    margin-top: 1rem;
  }

  #win-banner h2 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a18;
    margin-bottom: 8px;
  }

  #win-banner p {
    color: #666;
    font-size: 14px;
    margin-bottom: 1.2rem;
  }

  #btn-again {
    background: #1a1a18;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 22px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }

  #btn-again:hover { background: #333; }

  #install-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: #fff;
    border: 1px solid #e0dfd8;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 1rem;
    font-size: 13px;
    color: #444;
  }

  #install-banner button {
    background: #1a1a18;
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
  }

  #install-close {
    background: none !important;
    color: #aaa !important;
    padding: 4px 8px !important;
    font-size: 16px !important;
  }
</style>
</head>
<body>
<div id="game">

  <div id="install-banner">
    <span>📲 Nainštalovať Pexeso na plochu?</span>
    <div style="display:flex;gap:8px">
      <button id="btn-install">Inštalovať</button>
      <button id="install-close">✕</button>
    </div>
  </div>

  <div id="header">
    <h1>Pexeso</h1>
    <div id="stats">
      <div class="stat">Ťahy: <span id="moves">0</span></div>
      <div class="stat">Páry: <span id="pairs">0</span>/8</div>
      <div class="stat">Čas: <span id="timer">0s</span></div>
    </div>
    <button id="btn-new" onclick="startGame()">Nová hra</button>
  </div>

  <div id="grid"></div>
  <div id="message">Otočte dve kartičky a nájdite zhodu!</div>

  <div id="win-banner">
    <h2>Výborne! 🎉</h2>
    <p id="win-text"></p>
    <button id="btn-again" onclick="startGame()">Hrať znova</button>
  </div>
</div>

<script>
  // --- Service Worker ---
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(console.error);
  }

  // --- Install banner ---
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'flex';
  });

  document.getElementById('btn-install').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('install-banner').style.display = 'none';
  });

  document.getElementById('install-close').addEventListener('click', () => {
    document.getElementById('install-banner').style.display = 'none';
  });

  window.addEventListener('appinstalled', () => {
    document.getElementById('install-banner').style.display = 'none';
  });

  // --- Game logic ---
  const emojis = ['🐶','🐱','🐭','🦊','🐻','🐼','🦁','🐯'];
  let flipped = [], matched = 0, moves = 0, lock = false;
  let timerInterval, seconds = 0, started = false;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startGame() {
    clearInterval(timerInterval);
    flipped = []; matched = 0; moves = 0; lock = false; seconds = 0; started = false;
    document.getElementById('moves').textContent = 0;
    document.getElementById('pairs').textContent = '0';
    document.getElementById('timer').textContent = '0s';
    document.getElementById('message').textContent = 'Otočte dve kartičky a nájdite zhodu!';
    document.getElementById('win-banner').style.display = 'none';
    document.getElementById('grid').style.display = 'grid';

    const deck = shuffle([...emojis, ...emojis]);
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    deck.forEach(emoji => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.emoji = emoji;
      card.innerHTML = `<div class="card-inner"><div class="card-front"></div><div class="card-back">${emoji}</div></div>`;
      card.addEventListener('click', () => flipCard(card));
      grid.appendChild(card);
    });
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById('timer').textContent = seconds + 's';
    }, 1000);
  }

  function flipCard(card) {
    if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
    if (!started) { started = true; startTimer(); }

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length === 2) {
      moves++;
      document.getElementById('moves').textContent = moves;
      lock = true;
      const [a, b] = flipped;

      if (a.dataset.emoji === b.dataset.emoji) {
        a.classList.add('matched');
        b.classList.add('matched');
        matched++;
        document.getElementById('pairs').textContent = matched;
        flipped = [];
        lock = false;
        document.getElementById('message').textContent = matched < 8 ? '✓ Zhoda! Pokračujte...' : '';
        if (matched === 8) endGame();
      } else {
        document.getElementById('message').textContent = 'Žiadna zhoda, skúste znova.';
        setTimeout(() => {
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          flipped = [];
          lock = false;
          document.getElementById('message').textContent = 'Otočte dve kartičky a nájdite zhodu!';
        }, 950);
      }
    }
  }

  function endGame() {
    clearInterval(timerInterval);
    document.getElementById('grid').style.display = 'none';
    document.getElementById('win-banner').style.display = 'block';
    document.getElementById('win-text').textContent =
      `Dokončili ste hru za ${moves} ťahov a ${seconds} sekúnd. Skvelý výkon!`;
  }

  startGame();
</script>
</body>
</html>
