<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Click Rush">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="Klikacia hra – klikni čo najviac za čas!">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="icon" href="icon-192.svg" type="image/svg+xml">
<title>Click Rush</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --accent: #e8ff3c;
    --text: #f0f0f0;
    --muted: #555566;
    --danger: #ff4c4c;
    --success: #3cff8f;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html {
    height: 100%;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-y: auto;
    overflow-x: hidden;
    user-select: none;
    padding: calc(var(--safe-top) + 1rem) 1rem calc(var(--safe-bottom) + 1rem);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 7vw, 4rem);
    letter-spacing: 0.12em;
    color: var(--accent);
    text-align: center;
    line-height: 1;
    margin-bottom: 0.1rem;
  }

  .subtitle {
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 0.3rem;
  }

  .version {
    font-size: 0.65rem;
    color: #ff4c4c;
    letter-spacing: 0.2em;
    text-align: center;
    margin-bottom: 1rem;
    font-weight: 700;
  }

  .stats {
    display: flex;
    gap: 2rem;
    margin-bottom: 0.8rem;
    align-items: flex-end;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .stat-label {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 6vw, 2.4rem);
    line-height: 1;
    color: var(--text);
    transition: color 0.15s;
  }

  .stat-value.big { font-size: clamp(2.2rem, 8vw, 3.2rem); color: var(--accent); }
  #timer-value.urgent { color: var(--danger); }

  .timer-bar-wrap {
    width: min(400px, 90vw);
    height: 4px;
    background: #1e1e2e;
    border-radius: 2px;
    margin-bottom: 0.8rem;
    overflow: hidden;
  }

  #timer-bar {
    height: 100%;
    width: 100%;
    background: var(--accent);
    transform-origin: left center;
    transition: transform 0.1s linear, background 0.3s;
    border-radius: 2px;
  }

  #timer-bar.urgent { background: var(--danger); }

  .arena {
    width: min(400px, 88vw, 55vh);
    height: min(400px, 88vw, 55vh);
    background: var(--surface);
    border: 1px solid #22223a;
    border-radius: 18px;
    position: relative;
    overflow: hidden;
    cursor: crosshair;
    touch-action: none;
  }

  .arena::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(232,255,60,0.03) 0%, transparent 70%);
    pointer-events: none;
  }

  .target {
    position: absolute;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transform: translate(-50%, -50%) scale(0);
    transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
    touch-action: manipulation;
  }

  .target.visible {
    transform: translate(-50%, -50%) scale(1);
    animation: pulse 0.8s ease-in-out infinite alternate;
  }

  .target.clicked {
    transform: translate(-50%, -50%) scale(1.4);
    opacity: 0;
    transition: transform 0.15s, opacity 0.15s;
  }

  @keyframes pulse {
    from { box-shadow: 0 0 0 0 rgba(232, 255, 60, 0.4); }
    to   { box-shadow: 0 0 0 14px rgba(232, 255, 60, 0); }
  }

  .miss-ripple {
    position: absolute;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid var(--danger);
    transform: translate(-50%, -50%) scale(0);
    animation: ripple 0.4s ease-out forwards;
    pointer-events: none;
  }

  @keyframes ripple {
    to { transform: translate(-50%, -50%) scale(2); opacity: 0; }
  }

  .score-pop {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--accent);
    pointer-events: none;
    animation: float-up 0.6s ease-out forwards;
    white-space: nowrap;
  }

  @keyframes float-up {
    0%   { opacity: 1; transform: translate(-50%, -50%); }
    100% { opacity: 0; transform: translate(-50%, -180%); }
  }

  .idle-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
  }

  .idle-text p { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.15em; }
  .idle-text .big-prompt {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: 0.15em;
  }

  .controls {
    margin-top: 0.8rem;
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.55rem 1.2rem;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 44px;
  }

  button:hover, button:active { background: var(--accent); color: #0a0a0f; }

  button.secondary { border-color: var(--muted); color: var(--muted); }
  button.secondary:hover, button.secondary:active { background: var(--muted); color: #0a0a0f; }

  .difficulty-row {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.4rem;
    justify-content: center;
    flex-wrap: wrap;
    padding-bottom: 0.5rem;
  }

  .diff-btn {
    font-size: 0.58rem;
    padding: 0.3rem 0.8rem;
    border-color: var(--muted);
    color: var(--muted);
  }

  .diff-btn.active { border-color: var(--accent); color: var(--accent); }

  /* Install banner */
  #install-banner {
    position: fixed;
    bottom: calc(1rem + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid #22223a;
    border-radius: 12px;
    padding: 0.8rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    z-index: 20;
    white-space: nowrap;
    display: none;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  #install-banner.show { display: flex; }
  #install-banner button { font-size: 0.62rem; padding: 0.35rem 0.8rem; }
  #install-banner .dismiss { border: none; color: var(--muted); font-size: 0.9rem; padding: 0.2rem 0.4rem; background: transparent; cursor: pointer; }

  /* Results overlay */
  .results-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.94);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1.5rem 1rem;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .results-overlay.show { display: flex; }

  .results-card {
    background: var(--surface);
    border: 1px solid #22223a;
    border-radius: 24px;
    padding: 1.6rem 1.8rem;
    text-align: center;
    min-width: 240px;
    max-width: 340px;
    width: 100%;
    animation: pop-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    margin: auto;
  }

  @keyframes pop-in {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .results-card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin-bottom: 0.4rem;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin: 1.2rem 0;
  }

  .result-item { display: flex; flex-direction: column; gap: 3px; }
  .result-item .label { font-size: 0.55rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
  .result-item .val { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--text); }
  .result-item .val.accent { color: var(--accent); }

  .new-best {
    font-size: 0.65rem;
    color: var(--success);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  /* Offline badge */
  #offline-badge {
    position: fixed;
    top: calc(0.6rem + var(--safe-top));
    right: 0.8rem;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    display: none;
  }
  #offline-badge.show { display: block; }
</style>
</head>
<body>

<div id="offline-badge">● OFFLINE</div>

<h1>Click Rush</h1>
<p class="subtitle">Klikni čo najviac za čas</p>
<p class="version">v1.2.0</p>

<div class="stats">
  <div class="stat">
    <span class="stat-label">Skóre</span>
    <span class="stat-value big" id="score-display">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Čas</span>
    <span class="stat-value" id="timer-value">30</span>
  </div>
  <div class="stat">
    <span class="stat-label">Rekord</span>
    <span class="stat-value" id="best-display">0</span>
  </div>
</div>

<div class="timer-bar-wrap">
  <div id="timer-bar"></div>
</div>

<div class="arena" id="arena">
  <div class="idle-text" id="idle-text">
    <p class="big-prompt">Klikni sem pre štart</p>
    <p>— alebo zvoľ obtiažnosť nižšie —</p>
  </div>
  <div class="target" id="target"></div>
</div>

<div class="controls">
  <button id="start-btn">Spustiť hru</button>
  <button class="secondary" id="reset-btn">Reset</button>
</div>

<div class="difficulty-row">
  <button class="diff-btn active" data-diff="easy">Ľahká</button>
  <button class="diff-btn" data-diff="medium">Stredná</button>
  <button class="diff-btn" data-diff="hard">Ťažká</button>
  <button class="diff-btn" data-diff="insane">Šialená</button>
</div>

<!-- PWA install banner -->
<div id="install-banner">
  <span>Nainštalovať ako appku?</span>
  <button id="install-btn">Inštalovať</button>
  <button class="dismiss" id="dismiss-banner">✕</button>
</div>

<!-- Results -->
<div class="results-overlay" id="results-overlay">
  <div class="results-card">
    <h2>Výsledok</h2>
    <div id="new-best-msg" class="new-best" style="display:none">🏆 Nový rekord!</div>
    <div class="result-grid">
      <div class="result-item">
        <span class="label">Skóre</span>
        <span class="val accent" id="res-score">0</span>
      </div>
      <div class="result-item">
        <span class="label">Rekord</span>
        <span class="val" id="res-best">0</span>
      </div>
      <div class="result-item">
        <span class="label">Klik/s</span>
        <span class="val" id="res-cps">0.0</span>
      </div>
      <div class="result-item">
        <span class="label">Missy</span>
        <span class="val" id="res-miss">0</span>
      </div>
    </div>
    <div style="display:flex;gap:0.8rem;justify-content:center;margin-top:0.5rem;">
      <button id="play-again-btn">Znova hrať</button>
      <button class="secondary" id="close-results-btn">Zatvoriť</button>
    </div>
  </div>
</div>

<script>
// ── Service Worker ──────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('SW registered:', reg.scope);
  }).catch(err => console.warn('SW error:', err));
}

// ── Offline indicator ──────────────────────────────────────
const offlineBadge = document.getElementById('offline-badge');
function updateOnline() {
  offlineBadge.classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online', updateOnline);
window.addEventListener('offline', updateOnline);
updateOnline();

// ── PWA Install prompt ─────────────────────────────────────
let deferredPrompt = null;
const installBanner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const dismissBtn = document.getElementById('dismiss-banner');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const dismissed = localStorage.getItem('pwa_dismissed');
  if (!dismissed) installBanner.classList.add('show');
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBanner.classList.remove('show');
});

dismissBtn.addEventListener('click', () => {
  installBanner.classList.remove('show');
  localStorage.setItem('pwa_dismissed', '1');
});

window.addEventListener('appinstalled', () => {
  installBanner.classList.remove('show');
  deferredPrompt = null;
});

// ── Game logic ─────────────────────────────────────────────
const DIFFICULTIES = {
  easy:   { duration: 30, targetSize: 64, moveInterval: 1400 },
  medium: { duration: 30, targetSize: 52, moveInterval: 900 },
  hard:   { duration: 20, targetSize: 40, moveInterval: 600 },
  insane: { duration: 15, targetSize: 28, moveInterval: 350 },
};

let difficulty = 'easy';
let score = 0, misses = 0;
let best = parseInt(localStorage.getItem('clickrush_best') || '0');
let running = false;
let timeLeft = 30, totalTime = 30;
let timerInterval = null, moveInterval = null;

const arena = document.getElementById('arena');
const target = document.getElementById('target');
const idleText = document.getElementById('idle-text');
const scoreDisplay = document.getElementById('score-display');
const timerValueEl = document.getElementById('timer-value');
const timerBar = document.getElementById('timer-bar');
const bestDisplay = document.getElementById('best-display');
const startBtn = document.getElementById('start-btn');
const resetBtn = document.getElementById('reset-btn');
const overlay = document.getElementById('results-overlay');

bestDisplay.textContent = best;

function rand(min, max) { return Math.random() * (max - min) + min; }

function placeTarget() {
  const cfg = DIFFICULTIES[difficulty];
  const sz = cfg.targetSize;
  const rect = arena.getBoundingClientRect();
  const pad = sz / 2 + 8;
  const x = rand(pad, rect.width - pad);
  const y = rand(pad, rect.height - pad);
  target.style.left = x + 'px';
  target.style.top = y + 'px';
  target.style.width = sz + 'px';
  target.style.height = sz + 'px';
  target.classList.remove('clicked');
  target.classList.add('visible');
}

function startGame() {
  if (running) return;
  const cfg = DIFFICULTIES[difficulty];
  score = 0; misses = 0;
  timeLeft = cfg.duration;
  totalTime = cfg.duration;
  running = true;
  idleText.style.display = 'none';
  scoreDisplay.textContent = 0;
  timerValueEl.textContent = cfg.duration;
  timerBar.style.transform = 'scaleX(1)';
  timerBar.classList.remove('urgent');
  timerValueEl.classList.remove('urgent');
  startBtn.textContent = 'V hre...';
  startBtn.disabled = true;

  placeTarget();

  timerInterval = setInterval(() => {
    timeLeft--;
    timerValueEl.textContent = timeLeft;
    timerBar.style.transform = `scaleX(${timeLeft / totalTime})`;
    if (timeLeft <= 5) {
      timerBar.classList.add('urgent');
      timerValueEl.classList.add('urgent');
    }
    if (timeLeft <= 0) endGame();
  }, 1000);

  moveInterval = setInterval(placeTarget, cfg.moveInterval);
}

function endGame() {
  clearInterval(timerInterval);
  clearInterval(moveInterval);
  running = false;
  target.classList.remove('visible', 'clicked');
  idleText.style.display = 'flex';
  startBtn.textContent = 'Spustiť hru';
  startBtn.disabled = false;

  const isNew = score > best;
  if (isNew) {
    best = score;
    localStorage.setItem('clickrush_best', best);
    bestDisplay.textContent = best;
  }

  document.getElementById('res-score').textContent = score;
  document.getElementById('res-best').textContent = best;
  document.getElementById('res-cps').textContent = (score / totalTime).toFixed(1);
  document.getElementById('res-miss').textContent = misses;
  document.getElementById('new-best-msg').style.display = isNew ? 'block' : 'none';
  overlay.classList.add('show');
}

function resetGame() {
  clearInterval(timerInterval);
  clearInterval(moveInterval);
  running = false; score = 0; misses = 0;
  scoreDisplay.textContent = 0;
  const cfg = DIFFICULTIES[difficulty];
  timerValueEl.textContent = cfg.duration;
  timerBar.style.transform = 'scaleX(1)';
  timerBar.classList.remove('urgent');
  timerValueEl.classList.remove('urgent');
  target.classList.remove('visible', 'clicked');
  idleText.style.display = 'flex';
  startBtn.textContent = 'Spustiť hru';
  startBtn.disabled = false;
}

// Touch & click support
function handleTargetHit(e) {
  if (!running) return;
  e.stopPropagation();
  score++;
  scoreDisplay.textContent = score;
  target.classList.remove('visible');
  target.classList.add('clicked');

  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = '+1';
  pop.style.left = target.style.left;
  pop.style.top = target.style.top;
  arena.appendChild(pop);
  setTimeout(() => pop.remove(), 650);

  clearInterval(moveInterval);
  setTimeout(() => {
    placeTarget();
    moveInterval = setInterval(placeTarget, DIFFICULTIES[difficulty].moveInterval);
  }, 80);
}

function handleArenaMiss(e) {
  if (e.target === target) return;
  if (!running) { startGame(); return; }
  misses++;
  const ripple = document.createElement('div');
  ripple.className = 'miss-ripple';
  const rect = arena.getBoundingClientRect();
  ripple.style.left = (e.clientX - rect.left) + 'px';
  ripple.style.top = (e.clientY - rect.top) + 'px';
  arena.appendChild(ripple);
  setTimeout(() => ripple.remove(), 450);
}

target.addEventListener('click', handleTargetHit);
arena.addEventListener('click', handleArenaMiss);

startBtn.addEventListener('click', startGame);
resetBtn.addEventListener('click', resetGame);

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (running) return;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
    resetGame();
  });
});

document.getElementById('play-again-btn').addEventListener('click', () => {
  overlay.classList.remove('show');
  setTimeout(startGame, 150);
});

document.getElementById('close-results-btn').addEventListener('click', () => {
  overlay.classList.remove('show');
});
</script>
</body>
</html>
