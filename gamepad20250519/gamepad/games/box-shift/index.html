<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Box Shift · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050507;--bg1:#0c0c10;--bg2:#111116;--bg3:#18181f;
  --text:#f0eeff;--muted:rgba(240,238,255,.42);--dim:rgba(240,238,255,.2);
  --border:rgba(255,255,255,.08);--border-h:rgba(255,255,255,.16);
  --gold:#ffd166;--green:#55f0a0;--blue:#65d6ff;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;touch-action:none;user-select:none}
body::before{content:"";position:fixed;right:-180px;bottom:-260px;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(255,209,102,.08),transparent 66%);pointer-events:none}
body::after{content:"";position:fixed;left:-170px;top:-220px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(101,214,255,.07),transparent 66%);pointer-events:none}
#back-btn{position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:all .18s}
#back-btn:hover{border-color:var(--border-h);color:var(--text)}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;padding:64px 14px 18px}
.game-title{font-family:'Syne',sans-serif;font-size:clamp(25px,7vw,38px);font-weight:800;letter-spacing:0;background:linear-gradient(135deg,#fff 25%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hud{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;max-width:560px}
.pill,.ctrl-btn{height:32px;border-radius:100px;border:1px solid var(--border);background:var(--bg2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500}
.pill{display:flex;align-items:center;gap:6px;color:var(--muted);padding:0 12px;white-space:nowrap}
.pill span{color:var(--gold);font-variant-numeric:tabular-nums}
.ctrl-btn{color:var(--muted);padding:0 13px;cursor:pointer;transition:all .18s}
.ctrl-btn:hover,.ctrl-btn:focus-visible{border-color:var(--border-h);color:var(--text);outline:none}
.ctrl-btn:disabled{opacity:.35;cursor:default}
#board-wrap{position:relative;border:1px solid var(--border);border-radius:16px;background:linear-gradient(180deg,var(--bg2),var(--bg1));padding:8px;box-shadow:0 22px 80px rgba(0,0,0,.35)}
#board{display:grid;gap:4px}
.cell{position:relative;width:var(--cell);height:var(--cell);border-radius:7px;background:#121218;overflow:hidden}
.floor{background:linear-gradient(135deg,#16161d,#0f0f14)}
.wall{background:linear-gradient(135deg,#282837,#171720);border:1px solid rgba(255,255,255,.06)}
.goal::before{content:"";position:absolute;inset:21%;border-radius:50%;background:rgba(85,240,160,.18);border:2px solid rgba(85,240,160,.58);box-shadow:0 0 18px rgba(85,240,160,.22)}
.box::after{content:"";position:absolute;inset:12%;border-radius:7px;background:linear-gradient(135deg,#f0b447,#9d6422);border:1px solid rgba(255,255,255,.18);box-shadow:inset 0 2px rgba(255,255,255,.22),0 8px 18px rgba(0,0,0,.28)}
.box::before{content:"";position:absolute;z-index:2;left:28%;right:28%;top:14%;bottom:14%;border-left:2px solid rgba(70,38,14,.38);border-right:2px solid rgba(70,38,14,.38)}
.box.on-goal::after{background:linear-gradient(135deg,#86f4ad,#2b9b65);box-shadow:0 0 18px rgba(85,240,160,.2),inset 0 2px rgba(255,255,255,.24)}
.player::after{content:"";position:absolute;z-index:3;inset:17%;border-radius:50% 50% 42% 42%;background:linear-gradient(135deg,#f9f7ff,#9dc9ff);border:1px solid rgba(255,255,255,.34);box-shadow:0 8px 18px rgba(0,0,0,.32)}
.player::before{content:"";position:absolute;z-index:4;width:18%;height:18%;left:32%;top:30%;border-radius:50%;background:#182033;box-shadow:calc(var(--cell) * .18) 0 #182033}
#overlay{position:absolute;z-index:20;inset:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:rgba(5,5,7,.93);backdrop-filter:blur(14px);border-radius:12px;text-align:center;padding:18px}
#overlay.hidden{display:none}
.ov-icon{font-size:42px;line-height:1}
#overlay h2{font-family:'Syne',sans-serif;font-size:25px;font-weight:800;letter-spacing:0}
.hint{max-width:290px;color:var(--muted);font-size:12px;line-height:1.5}
.play-btn{position:relative;z-index:21;min-width:118px;height:40px;border-radius:100px;border:1px solid rgba(255,209,102,.48);background:rgba(255,209,102,.18);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:0 28px;cursor:pointer;box-shadow:0 10px 28px rgba(0,0,0,.34)}
.dpad{display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(2,38px);gap:7px;margin-top:2px}
.dpad button{border:1px solid var(--border);border-radius:11px;background:var(--bg2);color:var(--muted);font-size:18px}
.dpad button:active{border-color:var(--border-h);color:var(--text);background:var(--bg3)}
.dpad .up{grid-column:2}.dpad .left{grid-column:1}.dpad .down{grid-column:2}.dpad .right{grid-column:3}
@media (max-height:680px){.page{gap:9px}.game-title{font-size:24px}.pill,.ctrl-btn{height:29px}.dpad{grid-template-columns:repeat(3,40px);grid-template-rows:repeat(2,34px)}}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>

<main class="page">
  <h1 class="game-title" id="lbl-title"></h1>
  <div class="hud">
    <div class="pill"><span id="lbl-level"></span>&nbsp;<span id="hud-level">1</span></div>
    <div class="pill"><span id="lbl-moves"></span>&nbsp;<span id="hud-moves">0</span></div>
    <div class="pill"><span id="lbl-best"></span>&nbsp;<span id="hud-best">-</span></div>
    <button class="ctrl-btn" id="btn-undo"></button>
    <button class="ctrl-btn" id="btn-reset"></button>
    <button class="ctrl-btn" id="btn-next"></button>
  </div>
  <div id="board-wrap">
    <div id="board"></div>
    <div id="overlay">
      <div class="ov-icon">📦</div>
      <h2 id="ov-title"></h2>
      <p class="hint" id="ov-hint"></p>
      <button class="play-btn" id="ov-btn"></button>
    </div>
  </div>
  <div class="dpad" aria-label="Move controls">
    <button class="up" data-dir="up">↑</button>
    <button class="left" data-dir="left">←</button>
    <button class="down" data-dir="down">↓</button>
    <button class="right" data-dir="right">→</button>
  </div>
</main>

<script>
const LEVELS = [
  ["#######","#..G..#","#..B..#","#..P..#","#.....#","#######"],
  ["########","#..G...#","#..B#..#","#..P...#","#......#","########"],
  ["########","#..G.G.#","#..BB..#","#..P...#","#......#","########"],
  ["#########","#...G...#","#.#B#...#","#...B.G.#","#..P....#","#########"],
  ["#########","#..G.G..#","#..#B#..#","#...B...#","#..P....#","#########"],
  ["##########","#..G..G..#","#..B..B..#","#..##....#","#....P...#","##########"],
  ["##########","#...G....#","#.#.B.#G.#","#...B....#","#..P..#..#","#........#","##########"],
  ["##########","#..G..G..#","#..B..B..#","#....#...#","#..#P....#","#........#","##########"],
  ["###########","#..G...G..#","#..B.#.B..#","#.........#","#..#.P.#..#","#.........#","###########"],
  ["###########","#..G.G.G..#","#..B.B.B..#","#....#....#","#....P....#","#.........#","###########"],
  ["###########","#...G.G...#","#.#.B.B.#.#","#.........#","#..B...G..#","#....P....#","###########"],
  ["############","#..G....G..#","#..B.##.B..#","#..........#","#..G.B.....#","#.....P....#","############"]
];

const DIRS = {up:{r:-1,c:0},down:{r:1,c:0},left:{r:0,c:-1},right:{r:0,c:1}};
const KEY_DIR = {ArrowUp:'up',KeyW:'up',ArrowDown:'down',KeyS:'down',ArrowLeft:'left',KeyA:'left',ArrowRight:'right',KeyD:'right'};
const STORAGE = 'box_shift_best_';
let levelIndex = 0, walls = new Set(), goals = new Set(), boxes = new Set();
let player = {r:0,c:0}, moves = 0, history = [], won = false, rows = 0, cols = 0;

const board = document.getElementById('board');
const overlay = document.getElementById('overlay');
const hudLevel = document.getElementById('hud-level');
const hudMoves = document.getElementById('hud-moves');
const hudBest = document.getElementById('hud-best');
const btnUndo = document.getElementById('btn-undo');
const btnReset = document.getElementById('btn-reset');
const btnNext = document.getElementById('btn-next');

function key(r,c){return r + ',' + c}
function snapshot(){return {player:{...player}, boxes:[...boxes], moves}}

function applyLabels(){
  document.getElementById('lbl-back').textContent = t('back');
  document.getElementById('lbl-title').textContent = t('boxShiftTitle');
  document.getElementById('lbl-level').textContent = t('boxShiftLevel');
  document.getElementById('lbl-moves').textContent = t('boxShiftMoves');
  document.getElementById('lbl-best').textContent = t('boxShiftBest');
  btnUndo.textContent = t('boxShiftUndo');
  btnReset.textContent = t('boxShiftReset');
  btnNext.textContent = t('boxShiftNext');
  document.getElementById('ov-title').textContent = t('boxShiftTitle');
  document.getElementById('ov-hint').textContent = t('boxShiftHint');
  document.getElementById('ov-btn').textContent = t('boxShiftPlay');
}

function loadLevel(index){
  const raw = LEVELS[index];
  walls = new Set(); goals = new Set(); boxes = new Set(); history = [];
  rows = raw.length;
  cols = Math.max(...raw.map(row => row.length));
  raw.forEach((line,r) => {
    for(let c=0;c<cols;c++){
      const ch = line[c] || '#';
      if(ch === '#') walls.add(key(r,c));
      if(ch === 'G') goals.add(key(r,c));
      if(ch === 'B') boxes.add(key(r,c));
      if(ch === 'P') player = {r,c};
      if(ch === '*'){goals.add(key(r,c)); boxes.add(key(r,c))}
      if(ch === '+'){goals.add(key(r,c)); player = {r,c}}
    }
  });
  moves = 0;
  won = false;
  overlay.classList.add('hidden');
  sizeBoard();
  render();
}

function sizeBoard(){
  const maxW = Math.min(window.innerWidth - 44, 560);
  const maxH = Math.max(240, window.innerHeight - 260);
  const cell = Math.floor(Math.min(maxW / cols, maxH / rows));
  document.documentElement.style.setProperty('--cell', Math.max(28, cell) + 'px');
  board.style.gridTemplateColumns = `repeat(${cols}, var(--cell))`;
}

function bestForLevel(){return localStorage.getItem(STORAGE + levelIndex)}

function render(){
  hudLevel.textContent = `${levelIndex + 1}/${LEVELS.length}`;
  hudMoves.textContent = moves;
  hudBest.textContent = bestForLevel() || '-';
  btnUndo.disabled = !history.length || won;
  btnNext.disabled = levelIndex >= LEVELS.length - 1 && !won;
  board.innerHTML = '';
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const k = key(r,c);
      const cell = document.createElement('div');
      cell.className = 'cell ' + (walls.has(k) ? 'wall' : 'floor');
      if(goals.has(k)) cell.classList.add('goal');
      if(boxes.has(k)) cell.classList.add('box');
      if(boxes.has(k) && goals.has(k)) cell.classList.add('on-goal');
      if(player.r === r && player.c === c) cell.classList.add('player');
      board.appendChild(cell);
    }
  }
}

function restore(state){
  player = {...state.player};
  boxes = new Set(state.boxes);
  moves = state.moves;
  won = false;
  overlay.classList.add('hidden');
  render();
}

function move(dirName){
  if(won || overlay.classList.contains('hidden') === false) return;
  const d = DIRS[dirName];
  const nr = player.r + d.r, nc = player.c + d.c, nk = key(nr,nc);
  if(walls.has(nk)) return;
  if(boxes.has(nk)){
    const bk = key(nr + d.r, nc + d.c);
    if(walls.has(bk) || boxes.has(bk)) return;
    history.push(snapshot());
    boxes.delete(nk);
    boxes.add(bk);
  } else {
    history.push(snapshot());
  }
  player = {r:nr,c:nc};
  moves++;
  checkWin();
  render();
}

function checkWin(){
  if(![...boxes].every(k => goals.has(k))) return;
  won = true;
  const oldBest = Number(bestForLevel() || 0);
  if(!oldBest || moves < oldBest) localStorage.setItem(STORAGE + levelIndex, String(moves));
  setTimeout(showWin, 120);
}

function showWin(){
  document.getElementById('ov-title').textContent = t('boxShiftWin');
  document.getElementById('ov-hint').textContent = `${t('boxShiftMoves')}: ${moves} · ${t('boxShiftBest')}: ${bestForLevel()}`;
  document.getElementById('ov-btn').textContent = levelIndex < LEVELS.length - 1 ? t('boxShiftNext') : t('boxShiftAgain');
  overlay.classList.remove('hidden');
  render();
}

function resetLevel(){loadLevel(levelIndex)}
function undo(){const prev = history.pop(); if(prev) restore(prev)}
function nextLevel(){levelIndex = (levelIndex + 1) % LEVELS.length; loadLevel(levelIndex)}

document.getElementById('ov-btn').addEventListener('click', () => won ? nextLevel() : loadLevel(levelIndex));
btnUndo.addEventListener('click', undo);
btnReset.addEventListener('click', resetLevel);
btnNext.addEventListener('click', nextLevel);
document.querySelector('.dpad').addEventListener('click', e => {
  const btn = e.target.closest('button[data-dir]');
  if(btn) move(btn.dataset.dir);
});
window.addEventListener('keydown', e => {
  const dir = KEY_DIR[e.code];
  if(!dir) return;
  e.preventDefault();
  move(dir);
});

let touchStart = null;
window.addEventListener('touchstart', e => {
  const t0 = e.changedTouches[0];
  touchStart = {x:t0.clientX,y:t0.clientY};
}, {passive:false});
window.addEventListener('touchend', e => {
  if(!touchStart) return;
  const t0 = e.changedTouches[0], dx = t0.clientX - touchStart.x, dy = t0.clientY - touchStart.y;
  touchStart = null;
  if(Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
  move(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
}, {passive:false});
window.addEventListener('resize', () => {sizeBoard(); render()});

applyLabels();
loadLevel(0);
overlay.classList.remove('hidden');
</script>
</body>
</html>
