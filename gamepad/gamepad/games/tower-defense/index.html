<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower Defense · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#050507;--bg1:#0c0c10;--bg2:#111116;--bg3:#18181f;--text:#f0eeff;--muted:rgba(240,238,255,0.38);--border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);--c:#4dc9ff;--cdim:rgba(77,201,255,0.14);}
html,body{background:var(--bg);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;user-select:none;}
body::before{content:'';position:fixed;width:500px;height:500px;top:-100px;right:-150px;background:radial-gradient(circle,rgba(77,201,255,0.07) 0%,transparent 65%);border-radius:50%;pointer-events:none;z-index:0;}
#back-btn{position:fixed;top:16px;left:16px;z-index:20;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:all .18s;}
#back-btn:hover{border-color:var(--border-h);color:var(--text);}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:52px 12px 20px;gap:10px;}
.hud{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;max-width:500px;}
.stat-pill{background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:5px;white-space:nowrap;}
.stat-pill span{color:var(--c);font-variant-numeric:tabular-nums;min-width:20px;}
.hud-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all .18s;white-space:nowrap;}
.hud-btn:hover{border-color:var(--border-h);color:var(--text);}
.hud-btn.active{border-color:var(--c);color:var(--c);background:var(--cdim);}
#canvas-wrap{position:relative;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
canvas{display:block;}
.tower-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;max-width:500px;}
.tower-btn{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--muted);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px;}
.tower-btn:hover{border-color:var(--border-h);color:var(--text);}
.tower-btn.selected{border-color:var(--c);color:var(--c);background:var(--cdim);}
.tower-btn .cost{color:#ffd166;font-size:10px;}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(5,5,7,.9);backdrop-filter:blur(10px);z-index:30;}
#overlay h2{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;}
.score-big{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:var(--c);letter-spacing:-2px;line-height:1;}
.hint{font-size:12px;color:var(--muted);text-align:center;padding:0 16px;}
.play-btn{margin-top:4px;background:var(--cdim);border:1px solid rgba(77,201,255,.3);color:var(--c);padding:10px 28px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .18s;}
.play-btn:hover{background:rgba(77,201,255,.25);}
.diff-row{display:flex;gap:8px;}
.diff-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .18s;}
.diff-btn:hover,.diff-btn.active{border-color:var(--border-h);color:var(--text);background:rgba(255,255,255,0.08);}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>
<div id="overlay">
  <div style="font-size:44px">🏰</div>
  <h2 id="ov-title"></h2>
  <div class="hint" id="ov-hint"></div>
  <div class="diff-row" id="diff-row"></div>
  <button class="play-btn" id="ov-play" onclick="startGame()"></button>
</div>
<div class="page">
  <div class="hud">
    <div class="stat-pill">❤️ <span id="hud-lives">20</span></div>
    <div class="stat-pill">💰 <span id="hud-gold">150</span></div>
    <div class="stat-pill"><span id="lbl-wave-txt"></span> <span id="hud-wave">0</span></div>
    <div class="stat-pill"><span id="lbl-score-txt"></span> <span id="hud-score">0</span></div>
    <button class="hud-btn" id="btn-wave" onclick="sendWave()"></button>
  </div>
  <div id="canvas-wrap"><canvas id="c"></canvas></div>
  <div class="tower-bar" id="tower-bar"></div>
</div>
<script>
// i18n
document.getElementById('lbl-back').textContent=t('back');
document.getElementById('lbl-wave-txt').textContent=t('tdWave');
document.getElementById('lbl-score-txt').textContent=t('tdScore');
document.getElementById('ov-title').textContent=t('tdTitle');
document.getElementById('ov-hint').textContent=t('tdHint');
document.getElementById('ov-play').textContent=t('tdPlay');
document.getElementById('btn-wave').textContent=t('tdSendWave');

// difficulty
const DIFFS=[
  {key:'easy', lives:30,gold:200,speed:1.0,hp:1.0,reward:1.2},
  {key:'medium',lives:20,gold:150,speed:1.3,hp:1.5,reward:1.0},
  {key:'hard', lives:10,gold:100,speed:1.6,hp:2.5,reward:0.8},
];
let diffIdx=1;
const dr=document.getElementById('diff-row');
DIFFS.forEach((d,i)=>{
  const btn=document.createElement('button');
  btn.className='diff-btn'+(i===1?' active':'');
  btn.textContent=t('diff'+d.key.charAt(0).toUpperCase()+d.key.slice(1));
  btn.onclick=()=>{diffIdx=i;dr.querySelectorAll('.diff-btn').forEach((b,j)=>b.classList.toggle('active',j===i));};
  dr.appendChild(btn);
});

const C=document.getElementById('c'),ctx=C.getContext('2d');
const COLS=14,ROWS=10,SZ=36;
C.width=COLS*SZ; C.height=ROWS*SZ;

// Path: sequence of [col,row]
const PATH=[[0,4],[1,4],[2,4],[2,3],[2,2],[3,2],[4,2],[5,2],[5,3],[5,4],[5,5],[5,6],[6,6],[7,6],[8,6],[8,5],[8,4],[8,3],[9,3],[10,3],[11,3],[11,4],[11,5],[11,6],[12,6],[13,6]];
const PATH_SET=new Set(PATH.map(([c,r])=>`${c},${r}`));

const TOWER_TYPES=[
  {id:'arrow',emoji:'🏹',color:'#54a0ff',range:3,dmg:8,rate:60,cost:60,  label:'tdTArrow'},
  {id:'cannon',emoji:'💣',color:'#ff9f43',range:2.5,dmg:30,rate:120,cost:120,label:'tdTCannon'},
  {id:'laser',emoji:'⚡',color:'#a78bfa',range:4,dmg:4,rate:20,cost:200,label:'tdTLaser'},
  {id:'ice',emoji:'❄️',color:'#00d4ff',range:2.5,dmg:2,rate:80,cost:90,slow:0.4,label:'tdTIce'},
];

let towers,enemies,projectiles,particles,gold,lives,score,wave,waveActive,spawning,spawnTimer,spawnCount,animId,running;
let selectedTower=null;

function buildTowerBar(){
  const bar=document.getElementById('tower-bar');
  bar.innerHTML='';
  TOWER_TYPES.forEach(tt=>{
    const btn=document.createElement('button');
    btn.className='tower-btn';
    btn.id='tbtn-'+tt.id;
    btn.innerHTML=`${tt.emoji} <span>${t(tt.label)}</span> <span class="cost">💰${tt.cost}</span>`;
    btn.onclick=()=>selectTower(tt.id);
    bar.appendChild(btn);
  });
}

function selectTower(id){
  selectedTower=id===selectedTower?null:id;
  document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
  if(selectedTower)document.getElementById('tbtn-'+selectedTower)?.classList.add('selected');
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  const d=DIFFS[diffIdx];
  towers=[];enemies=[];projectiles=[];particles=[];
  gold=d.gold;lives=d.lives;score=0;wave=0;waveActive=false;running=true;
  selectedTower=null;
  updateHUD();buildTowerBar();
  cancelAnimationFrame(animId);loop();
}

function updateHUD(){
  document.getElementById('hud-lives').textContent=lives;
  document.getElementById('hud-gold').textContent=gold;
  document.getElementById('hud-wave').textContent=wave;
  document.getElementById('hud-score').textContent=score;
}

function sendWave(){
  if(!running||waveActive)return;
  wave++;waveActive=true;spawning=true;
  const d=DIFFS[diffIdx];
  const count=5+wave*3;
  const hp=Math.floor((40+wave*20)*d.hp);
  spawnCount=count;spawnTimer=0;
  window._waveHP=hp;window._waveSpeed=(0.8+wave*0.12)*d.speed;
  updateHUD();
}

function spawnEnemy(){
  const hp=window._waveHP,sp=window._waveSpeed;
  enemies.push({pathIdx:0,progress:0,x:PATH[0][0]*SZ+SZ/2,y:PATH[0][1]*SZ+SZ/2,hp,maxHp:hp,speed:sp,slow:0,slowTimer:0,dead:false,reached:false});
}

function loop(){
  if(!running)return;
  update();draw();animId=requestAnimationFrame(loop);
}

function update(){
  const d=DIFFS[diffIdx];
  // spawn
  if(spawning){
    spawnTimer++;
    if(spawnTimer%28===0){spawnEnemy();spawnCount--;if(spawnCount<=0)spawning=false;}
  }
  // enemies
  enemies.forEach(e=>{
    if(e.dead||e.reached)return;
    if(e.slowTimer>0){e.slowTimer--;} else{e.slow=0;}
    const spd=e.speed*(1-e.slow);
    e.progress+=spd;
    const idx=Math.floor(e.progress);
    const frac=e.progress-idx;
    if(idx>=PATH.length-1){e.reached=true;lives--;updateHUD();if(lives<=0){gameOver();return;}return;}
    const [c1,r1]=PATH[idx],[c2,r2]=PATH[idx+1]||PATH[idx];
    e.x=(c1+(c2-c1)*frac)*SZ+SZ/2;
    e.y=(r1+(r2-r1)*frac)*SZ+SZ/2;
  });
  enemies=enemies.filter(e=>!e.dead&&!e.reached);
  // towers shoot
  towers.forEach(tw=>{
    const tt=TOWER_TYPES.find(x=>x.id===tw.type);
    tw.cooldown=(tw.cooldown||0)-1;
    if(tw.cooldown>0)return;
    const range=tt.range*SZ;
    const target=enemies.find(e=>Math.hypot(e.x-(tw.c*SZ+SZ/2),e.y-(tw.r*SZ+SZ/2))<range);
    if(!target)return;
    tw.cooldown=tt.rate;
    projectiles.push({x:tw.c*SZ+SZ/2,y:tw.r*SZ+SZ/2,tx:target,dmg:tt.dmg,color:tt.color,slow:tt.slow||0,speed:6,id:tt.id});
  });
  // projectiles
  projectiles=projectiles.filter(p=>p.alive!==false);
  projectiles.forEach(p=>{
    const dx=p.tx.x-p.x,dy=p.tx.y-p.y,dist=Math.hypot(dx,dy);
    if(dist<p.speed||p.tx.dead||p.tx.reached){
      if(!p.tx.dead&&!p.tx.reached){
        p.tx.hp-=p.dmg;
        if(p.slow){p.tx.slow=p.slow;p.tx.slowTimer=80;}
        if(p.tx.hp<=0){
          p.tx.dead=true;
          const d2=DIFFS[diffIdx];
          gold+=Math.round(8*d2.reward);score+=10;
          for(let i=0;i<6;i++)particles.push({x:p.tx.x,y:p.tx.y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:20,color:p.color});
          updateHUD();
        }
      }
      p.alive=false;return;
    }
    p.x+=dx/dist*p.speed;p.y+=dy/dist*p.speed;
  });
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  if(waveActive&&!spawning&&enemies.length===0){
    waveActive=false;
    gold+=20+wave*5;updateHUD();
    if(wave>=10){gameWin();return;}
  }
}

function draw(){
  ctx.fillStyle='#0a0d0f';ctx.fillRect(0,0,C.width,C.height);
  // grid
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const isPath=PATH_SET.has(`${c},${r}`);
    ctx.fillStyle=isPath?'#1a1f18':'#0e110d';
    ctx.fillRect(c*SZ,r*SZ,SZ,SZ);
    if(!isPath){ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.strokeRect(c*SZ,r*SZ,SZ,SZ);}
  }
  // path arrows
  for(let i=0;i<PATH.length-1;i++){
    const [c1,r1]=PATH[i],[c2,r2]=PATH[i+1];
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
    ctx.setLineDash([4,8]);
    ctx.beginPath();ctx.moveTo(c1*SZ+SZ/2,r1*SZ+SZ/2);ctx.lineTo(c2*SZ+SZ/2,r2*SZ+SZ/2);ctx.stroke();
    ctx.setLineDash([]);
  }
  // start/end markers
  const [sc,sr]=PATH[0],[ec,er]=PATH[PATH.length-1];
  ctx.fillStyle='rgba(77,255,145,0.3)';ctx.fillRect(sc*SZ,sr*SZ,SZ,SZ);
  ctx.fillStyle='rgba(255,107,107,0.3)';ctx.fillRect(ec*SZ,er*SZ,SZ,SZ);

  // towers
  towers.forEach(tw=>{
    const tt=TOWER_TYPES.find(x=>x.id===tw.type);
    ctx.fillStyle=tt.color+'22';ctx.fillRect(tw.c*SZ,tw.r*SZ,SZ,SZ);
    ctx.font=`${SZ*0.6}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(tt.emoji,tw.c*SZ+SZ/2,tw.r*SZ+SZ/2);
  });
  // enemies
  enemies.forEach(e=>{
    const r=10,hbw=24,hbh=4;
    ctx.fillStyle=e.slow>0?'#aaddff':'#ff6b6b';
    ctx.shadowColor=e.slow>0?'#00d4ff':'#ff6b6b';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(e.x,e.y,r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // hp bar
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(e.x-hbw/2,e.y-r-8,hbw,hbh);
    ctx.fillStyle='#4dff91';ctx.fillRect(e.x-hbw/2,e.y-r-8,hbw*(e.hp/e.maxHp),hbh);
  });
  // projectiles
  projectiles.forEach(p=>{
    ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  });
  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/20;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;
  // hover highlight
  if(selectedTower&&hoverCell){
    const {c,r}=hoverCell;
    if(!PATH_SET.has(`${c},${r}`)&&!towers.find(tw=>tw.c===c&&tw.r===r)){
      ctx.fillStyle='rgba(77,201,255,0.15)';ctx.fillRect(c*SZ,r*SZ,SZ,SZ);
      ctx.strokeStyle='rgba(77,201,255,0.4)';ctx.lineWidth=2;ctx.strokeRect(c*SZ,r*SZ,SZ,SZ);
      const tt=TOWER_TYPES.find(x=>x.id===selectedTower);
      ctx.strokeStyle=tt.color+'44';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(c*SZ+SZ/2,r*SZ+SZ/2,tt.range*SZ,0,Math.PI*2);ctx.stroke();
    }
  }
}

let hoverCell=null;
C.addEventListener('mousemove',e=>{
  const rect=C.getBoundingClientRect();
  const sx=C.width/rect.width,sy=C.height/rect.height;
  hoverCell={c:Math.floor((e.clientX-rect.left)*sx/SZ),r:Math.floor((e.clientY-rect.top)*sy/SZ)};
});
C.addEventListener('mouseleave',()=>hoverCell=null);
C.addEventListener('click',e=>{
  if(!selectedTower||!running)return;
  const rect=C.getBoundingClientRect();
  const sx=C.width/rect.width,sy=C.height/rect.height;
  const c=Math.floor((e.clientX-rect.left)*sx/SZ);
  const r=Math.floor((e.clientY-rect.top)*sy/SZ);
  if(c<0||c>=COLS||r<0||r>=ROWS)return;
  if(PATH_SET.has(`${c},${r}`))return;
  if(towers.find(tw=>tw.c===c&&tw.r===r))return;
  const tt=TOWER_TYPES.find(x=>x.id===selectedTower);
  if(gold<tt.cost)return;
  gold-=tt.cost;towers.push({c,r,type:selectedTower,cooldown:0});
  updateHUD();
});
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(!selectedTower||!running)return;
  const rect=C.getBoundingClientRect();
  const sx=C.width/rect.width,sy=C.height/rect.height;
  const c=Math.floor((e.touches[0].clientX-rect.left)*sx/SZ);
  const r=Math.floor((e.touches[0].clientY-rect.top)*sy/SZ);
  if(c<0||c>=COLS||r<0||r>=ROWS)return;
  if(PATH_SET.has(`${c},${r}`))return;
  if(towers.find(tw=>tw.c===c&&tw.r===r))return;
  const tt=TOWER_TYPES.find(x=>x.id===selectedTower);
  if(gold<tt.cost)return;
  gold-=tt.cost;towers.push({c,r,type:selectedTower,cooldown:0});
  updateHUD();
},{passive:false});

function gameOver(){
  cancelAnimationFrame(animId);running=false;
  showEnd(false);
}
function gameWin(){
  cancelAnimationFrame(animId);running=false;
  showEnd(true);
}
function showEnd(win){
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div style="font-size:44px">${win?'🏆':'💀'}</div>
    <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:26px">${win?t('tdWin'):t('tdOver')}</h2>
    <div style="font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:var(--c);letter-spacing:-2px">${score}</div>
    <div style="font-size:12px;color:var(--muted)">${t('tdWave')} ${wave}</div>
    <div class="diff-row" id="diff-row2"></div>
    <button class="play-btn" onclick="restartGame()" style="margin-top:4px">${t('tdAgain')}</button>`;
  ov.style.display='flex';
  // rebuild diff selector
  const dr2=document.getElementById('diff-row2');
  DIFFS.forEach((d,i)=>{
    const btn=document.createElement('button');
    btn.className='diff-btn'+(i===diffIdx?' active':'');
    btn.textContent=t('diff'+d.key.charAt(0).toUpperCase()+d.key.slice(1));
    btn.onclick=()=>{diffIdx=i;dr2.querySelectorAll('.diff-btn').forEach((b,j)=>b.classList.toggle('active',j===i));};
    dr2.appendChild(btn);
  });
}
function restartGame(){
  document.getElementById('overlay').style.display='none';
  startGame();
}
draw();
</script>
</body>
</html>
