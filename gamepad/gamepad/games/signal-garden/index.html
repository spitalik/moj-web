<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Signal Garden · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050507;--bg1:#0c0c10;--bg2:#111116;--text:#f0eeff;--muted:rgba(240,238,255,.42);
  --border:rgba(255,255,255,.08);--border-h:rgba(255,255,255,.16);--green:#55f0a0;--cyan:#65d6ff;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;user-select:none;touch-action:none}
body::before{content:"";position:fixed;right:-180px;top:-220px;width:540px;height:540px;border-radius:50%;background:radial-gradient(circle,rgba(85,240,160,.08),transparent 66%);pointer-events:none}
body::after{content:"";position:fixed;left:-200px;bottom:-250px;width:580px;height:580px;border-radius:50%;background:radial-gradient(circle,rgba(101,214,255,.06),transparent 66%);pointer-events:none}
#back-btn{position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:all .18s}
#back-btn:hover{border-color:var(--border-h);color:var(--text)}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;padding:64px 14px 18px}
.game-title{font-family:'Syne',sans-serif;font-size:clamp(25px,7vw,38px);font-weight:800;letter-spacing:0;background:linear-gradient(135deg,#fff 25%,var(--green) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hud{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;max-width:760px}
.pill,.ctrl-btn{height:32px;border-radius:100px;border:1px solid var(--border);background:var(--bg2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500}
.pill{display:flex;align-items:center;gap:6px;color:var(--muted);padding:0 12px;white-space:nowrap}
.pill span{color:var(--green);font-variant-numeric:tabular-nums}
.ctrl-btn{color:var(--muted);padding:0 13px;cursor:pointer;transition:all .18s}
.ctrl-btn:hover,.ctrl-btn:focus-visible{border-color:var(--border-h);color:var(--text);outline:none}
#game-wrap{position:relative;border:1px solid var(--border);border-radius:16px;background:linear-gradient(180deg,var(--bg2),var(--bg1));padding:8px;box-shadow:0 22px 80px rgba(0,0,0,.35)}
canvas{display:block;width:min(92vw,640px);height:auto;border-radius:11px;background:#07100d}
#overlay{position:absolute;z-index:20;inset:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:rgba(5,5,7,.91);backdrop-filter:blur(14px);border-radius:12px;text-align:center;padding:18px}
#overlay.hidden{display:none}
.ov-icon{font-size:42px;line-height:1}
#overlay h2{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:0}
.hint{max-width:360px;color:var(--muted);font-size:12px;line-height:1.5}
.play-btn{min-width:118px;height:40px;border-radius:100px;border:1px solid rgba(85,240,160,.42);background:rgba(85,240,160,.14);color:var(--green);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:0 28px;cursor:pointer;box-shadow:0 10px 28px rgba(0,0,0,.34)}
@media (max-height:690px){.page{gap:9px}.game-title{font-size:24px}.pill,.ctrl-btn{height:29px}}
@media (orientation: landscape) and (max-height: 560px) {
  .page { padding: 46px 10px 8px; gap: 6px; }
  #back-btn { top: 8px; left: 8px; padding: 5px 12px; font-size: 11px; }
  .game-title { font-size: 18px; }
  .pill,.ctrl-btn { height: 24px; font-size: 10px; }
  #game-wrap { padding: 5px; }
}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>

<main class="page">
  <h1 class="game-title" id="lbl-title"></h1>
  <div class="hud">
    <div class="pill"><span id="lbl-score"></span>&nbsp;<span id="hud-score">0</span></div>
    <div class="pill"><span id="lbl-lives"></span>&nbsp;<span id="hud-lives">5</span></div>
    <div class="pill"><span id="lbl-wave"></span>&nbsp;<span id="hud-wave">1</span></div>
    <button class="ctrl-btn" id="btn-pause"></button>
    <button class="ctrl-btn" id="btn-reset"></button>
  </div>
  <div id="game-wrap">
    <canvas id="c" width="640" height="430"></canvas>
    <div id="overlay">
      <div class="ov-icon">📡</div>
      <h2 id="ov-title"></h2>
      <p class="hint" id="ov-hint"></p>
      <button class="play-btn" id="ov-btn"></button>
    </div>
  </div>
</main>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

function fitCanvas(){
  const page = document.querySelector('.page');
  const title = document.querySelector('.game-title');
  const hud = document.querySelector('.hud');
  const wrap = document.getElementById('game-wrap');
  const pageCs = getComputedStyle(page);
  const gap = parseFloat(pageCs.rowGap || pageCs.gap) || 13;
  const padTop = parseFloat(pageCs.paddingTop) || 0;
  const padBottom = parseFloat(pageCs.paddingBottom) || 0;
  const wrapCs = getComputedStyle(wrap);
  const wrapExtra = (parseFloat(wrapCs.paddingTop)||0) + (parseFloat(wrapCs.paddingBottom)||0)
                   + (parseFloat(wrapCs.borderTopWidth)||0) + (parseFloat(wrapCs.borderBottomWidth)||0);
  const reservedH = title.offsetHeight + hud.offsetHeight + padTop + padBottom + gap*2 + wrapExtra;
  const availH = window.innerHeight - reservedH;
  const availW = Math.min(window.innerWidth * 0.92, 640);
  const ratio = W / H;
  const targetW = Math.max(160, Math.min(availW, availH * ratio));
  canvas.style.width = Math.floor(targetW) + 'px';
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', () => setTimeout(fitCanvas, 250));
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ov-title');
const ovHint = document.getElementById('ov-hint');
const ovBtn = document.getElementById('ov-btn');
const btnPause = document.getElementById('btn-pause');
const btnReset = document.getElementById('btn-reset');
const hudScore = document.getElementById('hud-score');
const hudLives = document.getElementById('hud-lives');
const hudWave = document.getElementById('hud-wave');
const DIRS = [{x:0,y:-1,a:-Math.PI/2,s:'↑'},{x:1,y:0,a:0,s:'→'},{x:0,y:1,a:Math.PI/2,s:'↓'},{x:-1,y:0,a:Math.PI,s:'←'}];
const COLORS = ['#55f0a0','#65d6ff','#ffd166','#ff86d1'];
let nodes = [];
let flowers = [];
let pulses = [];
let score = 0;
let lives = 5;
let wave = 1;
let running = false;
let paused = false;
let lastTime = 0;
let frameId = 0;
let spawnTimer = 0;
let message = '';
let messageColor = '#55f0a0';
let messageTimer = 0;
let pulseId = 0;

function applyLabels(){
  document.getElementById('lbl-back').textContent = t('back');
  document.getElementById('lbl-title').textContent = t('signalGardenTitle');
  document.getElementById('lbl-score').textContent = t('signalGardenScore');
  document.getElementById('lbl-lives').textContent = t('signalGardenLives');
  document.getElementById('lbl-wave').textContent = t('signalGardenWave');
  btnPause.textContent = t('signalGardenPause');
  btnReset.textContent = t('signalGardenReset');
  ovTitle.textContent = t('signalGardenTitle');
  ovHint.textContent = t('signalGardenHint');
  ovBtn.textContent = t('signalGardenStart');
}

function buildNetwork(){
  nodes = [];
  const xs = [170, 320, 470];
  const ys = [120, 215, 310];
  for(let r=0;r<3;r++){
    for(let c=0;c<3;c++){
      nodes.push({id:r*3+c, x:xs[c], y:ys[r], dir:(r+c+wave)%4, flash:0});
    }
  }
  flowers = [
    {x:320,y:54,color:COLORS[0],hit:0},
    {x:586,y:215,color:COLORS[1],hit:0},
    {x:320,y:376,color:COLORS[2],hit:0},
    {x:54,y:215,color:COLORS[3],hit:0}
  ];
}

function resetGame(){
  cancelAnimationFrame(frameId);
  score = 0;
  lives = 5;
  wave = 1;
  pulses = [];
  spawnTimer = .3;
  paused = false;
  running = true;
  message = '';
  messageTimer = 0;
  pulseId = 0;
  buildNetwork();
  updateHud();
  btnPause.textContent = t('signalGardenPause');
  overlay.classList.add('hidden');
  lastTime = performance.now();
  frameId = requestAnimationFrame(loop);
}

function loop(now){
  if(!running) return;
  const dt = Math.min(.033, (now - lastTime) / 1000 || 0);
  lastTime = now;
  if(!paused) update(dt);
  draw();
  if(running) frameId = requestAnimationFrame(loop);
}

function update(dt){
  spawnTimer -= dt;
  if(spawnTimer <= 0){
    spawnPulse();
    spawnTimer = Math.max(.62, 1.65 - wave * .08);
  }
  messageTimer = Math.max(0, messageTimer - dt);
  nodes.forEach(n => n.flash = Math.max(0, n.flash - dt));
  flowers.forEach(f => f.hit = Math.max(0, f.hit - dt));
  for(const pulse of pulses){
    pulse.x += pulse.vx * dt;
    pulse.y += pulse.vy * dt;
    pulse.life -= dt;
    for(const node of nodes){
      if(pulse.last === node.id) continue;
      if(Math.hypot(pulse.x-node.x,pulse.y-node.y) < 22){
        routePulse(pulse,node);
        break;
      }
    }
    for(let i=0;i<flowers.length;i++){
      const flower = flowers[i];
      if(Math.hypot(pulse.x-flower.x,pulse.y-flower.y) < 24){
        dockPulse(pulse,flower,i);
        break;
      }
    }
    if(pulse.x < -30 || pulse.x > W+30 || pulse.y < -30 || pulse.y > H+30 || pulse.life <= 0){
      pulse.dead = true;
      loseStability();
    }
  }
  pulses = pulses.filter(p => !p.dead);
  wave = 1 + Math.floor(score / 8);
  updateHud();
}

function spawnPulse(){
  const colorIndex = pulseId % COLORS.length;
  const entry = nodes[4];
  const dir = DIRS[(pulseId + wave) % 4];
  pulses.push({x:entry.x,y:entry.y,vx:dir.x * speed(),vy:dir.y * speed(),color:COLORS[colorIndex],target:colorIndex,last:entry.id,life:5});
  pulseId++;
}

function speed(){return 118 + wave * 7}

function routePulse(pulse,node){
  const dir = DIRS[node.dir];
  pulse.x = node.x;
  pulse.y = node.y;
  pulse.vx = dir.x * speed();
  pulse.vy = dir.y * speed();
  pulse.last = node.id;
  pulse.life = 5;
  node.flash = .22;
}

function dockPulse(pulse,flower,index){
  pulse.dead = true;
  flower.hit = .45;
  if(index === pulse.target){
    score++;
    flash(t('signalGardenWin'), flower.color);
  } else {
    loseStability();
  }
}

function loseStability(){
  lives--;
  flash(t('signalGardenOver'), '#ff6b6b');
  if(lives <= 0) gameOver();
}

function gameOver(){
  running = false;
  cancelAnimationFrame(frameId);
  ovTitle.textContent = t('signalGardenOver');
  ovHint.textContent = `${t('signalGardenScore')}: ${score}`;
  ovBtn.textContent = t('signalGardenStart');
  overlay.classList.remove('hidden');
}

function flash(text,color){
  message = text;
  messageColor = color;
  messageTimer = .75;
}

function updateHud(){
  hudScore.textContent = score;
  hudLives.textContent = lives;
  hudWave.textContent = wave;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#091611');
  bg.addColorStop(1,'#050806');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);
  drawLinks();
  drawFlowers();
  drawNodes();
  drawPulses();
  drawMessage();
}

function drawLinks(){
  ctx.strokeStyle = 'rgba(255,255,255,.075)';
  ctx.lineWidth = 2;
  for(const a of nodes){
    for(const b of nodes){
      if(a.id >= b.id) continue;
      if(Math.abs(a.x-b.x) + Math.abs(a.y-b.y) < 170){
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.stroke();
      }
    }
  }
  ctx.strokeStyle = 'rgba(85,240,160,.13)';
  flowers.forEach(f => {
    ctx.beginPath();
    ctx.moveTo(320,215);
    ctx.lineTo(f.x,f.y);
    ctx.stroke();
  });
}

function drawFlowers(){
  flowers.forEach((f,i) => {
    ctx.save();
    ctx.translate(f.x,f.y);
    ctx.fillStyle = f.color;
    ctx.shadowColor = f.color;
    ctx.shadowBlur = f.hit > 0 ? 24 : 10;
    for(let p=0;p<6;p++){
      ctx.rotate(Math.PI/3);
      ctx.beginPath();
      ctx.ellipse(0,-13,7,15,0,0,Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#07100d';
    ctx.beginPath();
    ctx.arc(0,0,7,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.9)';
    ctx.font = '700 11px DM Sans';
    ctx.textAlign = 'center';
    ctx.fillText(String(i+1),0,4);
    ctx.restore();
  });
}

function drawNodes(){
  nodes.forEach(node => {
    ctx.save();
    ctx.translate(node.x,node.y);
    ctx.fillStyle = node.flash > 0 ? 'rgba(85,240,160,.25)' : '#111b17';
    ctx.strokeStyle = node.flash > 0 ? '#55f0a0' : 'rgba(255,255,255,.17)';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#55f0a0';
    ctx.shadowBlur = node.flash > 0 ? 18 : 0;
    ctx.beginPath();
    ctx.arc(0,0,22,0,Math.PI*2);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;
    const d = DIRS[node.dir];
    ctx.strokeStyle = '#f0eeff';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-d.x*8,-d.y*8);
    ctx.lineTo(d.x*13,d.y*13);
    ctx.stroke();
    ctx.fillStyle = '#f0eeff';
    ctx.beginPath();
    ctx.arc(d.x*14,d.y*14,4,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function drawPulses(){
  pulses.forEach(pulse => {
    ctx.fillStyle = pulse.color;
    ctx.shadowColor = pulse.color;
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.arc(pulse.x,pulse.y,8,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function drawMessage(){
  if(messageTimer <= 0) return;
  ctx.save();
  ctx.globalAlpha = Math.min(1, messageTimer * 2);
  ctx.fillStyle = messageColor;
  ctx.font = '800 23px Syne';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,.7)';
  ctx.shadowBlur = 12;
  ctx.fillText(message, W/2, 44);
  ctx.restore();
}

function nodeFromPoint(clientX,clientY){
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left) * (W / rect.width);
  const y = (clientY - rect.top) * (H / rect.height);
  return nodes.find(n => Math.hypot(n.x-x,n.y-y) < 30);
}

canvas.addEventListener('pointerdown', e => {
  const node = nodeFromPoint(e.clientX,e.clientY);
  if(!node || !running || paused) return;
  node.dir = (node.dir + 1) % 4;
  node.flash = .18;
  draw();
});
btnReset.addEventListener('click', resetGame);
btnPause.addEventListener('click', () => {
  if(!running) return;
  paused = !paused;
  btnPause.textContent = paused ? t('signalGardenResume') : t('signalGardenPause');
  draw();
});
ovBtn.addEventListener('click', resetGame);

applyLabels();
fitCanvas();
buildNetwork();
draw();
</script>
</body>
</html>
