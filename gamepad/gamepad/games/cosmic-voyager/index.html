<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌌 Cosmic Voyager · GamePad</title>
    <script src="../../i18n.js"></script>
    <style>
        /* Reset & základ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Hlavný kontajner – plná obrazovka */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, #0d0d2b 0%, #050510 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Canvas – pokrýva celý kontajner */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
            touch-action: none;
            cursor: none;
        }

        /* UI overlay – body, skóre, ovládanie */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: clamp(20px, 4vw, 48px);
            font-weight: 700;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.4), 0 0 60px rgba(100, 200, 255, 0.2);
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 24px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            white-space: nowrap;
            pointer-events: none;
        }
        #score-display .score-label {
            font-weight: 300;
            font-size: 0.5em;
            opacity: 0.6;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        #score-display .score-value {
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #high-score {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(12px, 1.6vw, 20px);
            font-weight: 300;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            font-family: 'Segoe UI', sans-serif;
        }
        #high-score span {
            color: #ffd700;
            font-weight: 600;
        }

        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(11px, 1.4vw, 14px);
            font-weight: 500;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.35);
            padding: 6px 14px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: auto;
            transition: all 0.2s;
        }
        #back-btn:hover {
            color: #fff;
            border-color: rgba(100, 200, 255, 0.4);
        }
        @media (pointer: coarse) {
            #back-btn { top: 12px; left: 12px; padding: 5px 12px; }
        }
        @media (orientation: landscape) and (max-height: 500px) {
            #back-btn { top: 8px; left: 8px; padding: 4px 10px; font-size: 11px; }
        }

        /* Ovládacie tlačidlá (iba mobil) – šípky */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 20;
        }
        #controls button {
            pointer-events: auto;
            width: clamp(60px, 12vw, 90px);
            height: clamp(60px, 12vw, 90px);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            color: #fff;
            font-size: clamp(24px, 5vw, 40px);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.15s;
            touch-action: none;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }
        #controls button:active {
            transform: scale(0.88);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(100, 200, 255, 0.4);
        }
        #controls .ctrl-left {
            margin-right: auto;
        }
        #controls .ctrl-right {
            margin-left: auto;
        }
        #controls .ctrl-up {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 110px;
        }
        #controls .ctrl-up:active {
            transform: translateX(-50%) scale(0.88);
        }

        /* Game Over overlay */
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 30;
            pointer-events: auto;
            animation: fadeIn 0.5s ease-out;
        }
        #game-over .go-title {
            color: #ff4466;
            font-size: clamp(40px, 8vw, 90px);
            font-weight: 900;
            text-shadow: 0 0 40px rgba(255, 68, 102, 0.5);
            letter-spacing: 4px;
            margin-bottom: 10px;
            font-family: 'Segoe UI', sans-serif;
        }
        #game-over .go-score {
            color: #fff;
            font-size: clamp(24px, 4vw, 48px);
            font-weight: 300;
            margin-bottom: 6px;
            font-family: 'Segoe UI', sans-serif;
        }
        #game-over .go-score span {
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #game-over .go-high {
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(14px, 2vw, 24px);
            margin-bottom: 30px;
            font-family: 'Segoe UI', sans-serif;
        }
        #game-over .go-high span {
            color: #ffd700;
            font-weight: 600;
        }
        #restart-btn {
            pointer-events: auto;
            padding: 16px 50px;
            font-size: clamp(18px, 2.5vw, 30px);
            font-weight: 700;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 40px rgba(0, 212, 255, 0.3);
            transition: all 0.25s;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 1px;
            touch-action: manipulation;
        }
        #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 50px rgba(0, 212, 255, 0.5);
        }
        #restart-btn:active {
            transform: scale(0.92);
        }

        /* Start / Pause overlay */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 25;
            pointer-events: auto;
            animation: fadeIn 0.6s ease-out;
        }
        #start-screen .title {
            font-size: clamp(36px, 7vw, 80px);
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 8px;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 2px;
        }
        #start-screen .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(14px, 2vw, 24px);
            font-weight: 300;
            margin-bottom: 30px;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        #start-btn {
            pointer-events: auto;
            padding: 16px 50px;
            font-size: clamp(18px, 2.5vw, 30px);
            font-weight: 700;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 40px rgba(0, 212, 255, 0.3);
            transition: all 0.25s;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 1px;
            touch-action: manipulation;
        }
        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 50px rgba(0, 212, 255, 0.5);
        }
        #start-btn:active {
            transform: scale(0.92);
        }
        #start-screen .controls-info {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: clamp(11px, 1.2vw, 16px);
            font-weight: 300;
            text-align: center;
            line-height: 1.8;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 1px;
        }
        #start-screen .controls-info .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-weight: 400;
        }

        /* Animácie */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }

        /* Responzivita – mobilné ovládanie */
        @media (pointer: coarse) {
            #controls {
                display: flex !important;
            }
            #start-screen .controls-info .desktop-only {
                display: none;
            }
            #score-display {
                top: 12px;
                padding: 4px 16px;
                font-size: clamp(16px, 3.5vw, 28px);
            }
            #high-score {
                top: 12px;
                right: 12px;
                font-size: clamp(10px, 1.4vw, 16px);
                padding: 4px 12px;
            }
        }

        @media (pointer: fine) {
            #controls {
                display: none !important;
            }
            #start-screen .controls-info .mobile-only {
                display: none;
            }
        }

        /* Landscape špecifické úpravy */
        @media (orientation: landscape) and (max-height: 500px) {
            #score-display {
                top: 8px;
                padding: 4px 14px;
                font-size: clamp(14px, 2.5vw, 22px);
            }
            #high-score {
                top: 8px;
                right: 8px;
                font-size: clamp(10px, 1.2vw, 14px);
                padding: 3px 10px;
            }
            #controls button {
                width: clamp(44px, 8vw, 60px);
                height: clamp(44px, 8vw, 60px);
                font-size: clamp(18px, 3.5vw, 28px);
            }
            #controls .ctrl-up {
                bottom: 80px;
            }
            #controls {
                bottom: 14px;
                padding: 0 12px;
            }
            #game-over .go-title {
                font-size: clamp(28px, 5vw, 50px);
            }
            #game-over .go-score {
                font-size: clamp(18px, 2.5vw, 30px);
            }
            #start-screen .title {
                font-size: clamp(28px, 5vw, 50px);
            }
            #start-screen .subtitle {
                font-size: clamp(10px, 1.4vw, 16px);
                margin-bottom: 16px;
            }
            #restart-btn,
            #start-btn {
                padding: 10px 30px;
                font-size: clamp(14px, 1.8vw, 20px);
            }
        }

        @media (orientation: landscape) and (min-height: 501px) {
            #controls button {
                width: clamp(50px, 8vw, 70px);
                height: clamp(50px, 8vw, 70px);
            }
            #controls .ctrl-up {
                bottom: 100px;
            }
        }

        /* Malé obrazovky v landscape */
        @media (orientation: landscape) and (max-width: 800px) and (max-height: 450px) {
            #controls button {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
            #controls .ctrl-up {
                bottom: 64px;
            }
            #controls {
                bottom: 10px;
                padding: 0 10px;
            }
            #score-display {
                font-size: 14px;
                padding: 2px 12px;
                top: 6px;
            }
            #high-score {
                font-size: 10px;
                padding: 2px 8px;
                top: 6px;
                right: 6px;
            }
        }

        /* Skrytie scrollbarov */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Späť do GamePad menu -->
        <a href="../../index.html" id="back-btn">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            <span id="lbl-back"></span>
        </a>

        <!-- Canvas pre hru -->
        <canvas id="gameCanvas"></canvas>

        <!-- UI vrstva -->
        <div id="ui-overlay">
            <div id="score-display">
                <span class="score-label" id="lbl-score"></span><br>
                <span class="score-value" id="scoreText">0</span>
            </div>
            <div id="high-score">
                🏆 <span id="highScoreText">0</span>
            </div>
        </div>

        <!-- Mobilné ovládanie -->
        <div id="controls">
            <button class="ctrl-left" id="btnLeft">◀</button>
            <button class="ctrl-up" id="btnUp">▲</button>
            <button class="ctrl-right" id="btnRight">▶</button>
        </div>

        <!-- Start Screen -->
        <div id="start-screen">
            <div class="title">🚀 Cosmic Voyager</div>
            <div class="subtitle" id="lbl-subtitle"></div>
            <button id="start-btn"></button>
            <div class="controls-info">
                <span class="desktop-only" id="lbl-hint-desktop"></span>
                <span class="mobile-only" id="lbl-hint-mobile"></span>
                <br><span style="opacity:0.5; font-size:0.8em;" id="lbl-hint-goal"></span>
            </div>
        </div>

        <!-- Game Over -->
        <div id="game-over">
            <div class="go-title" id="lbl-gameover-title"></div>
            <div class="go-score"><span id="lbl-final-score"></span>: <span id="finalScore">0</span></div>
            <div class="go-high">🏆 <span id="lbl-final-best"></span>: <span id="finalHigh">0</span></div>
            <button id="restart-btn"></button>
        </div>
    </div>

    <script>
        // ────────────────────────────────────────────────────────────────
        //  COSMIC VOYAGER – kompletní hra
        // ────────────────────────────────────────────────────────────────

        document.getElementById('lbl-back').textContent           = t('back');
        document.getElementById('lbl-score').textContent          = t('voyagerScoreLabel');
        document.getElementById('lbl-subtitle').textContent       = t('voyagerSubtitle');
        document.getElementById('start-btn').textContent           = '✦ ' + t('voyagerStart').toUpperCase() + ' ✦';
        document.getElementById('lbl-hint-desktop').textContent   = t('voyagerHintDesktop');
        document.getElementById('lbl-hint-mobile').textContent    = t('voyagerHintMobile');
        document.getElementById('lbl-hint-goal').textContent      = t('voyagerHintGoal');
        document.getElementById('lbl-gameover-title').textContent = '💥 ' + t('voyagerGameOverTitle').toUpperCase();
        document.getElementById('lbl-final-score').textContent    = t('voyagerFinalScore');
        document.getElementById('lbl-final-best').textContent     = t('voyagerFinalBest');
        document.getElementById('restart-btn').textContent         = '⟳ ' + t('voyagerRestart').toUpperCase();

        (function() {
            'use strict';

            // --- DOM odkazy ---
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreText = document.getElementById('scoreText');
            const highScoreText = document.getElementById('highScoreText');
            const finalScore = document.getElementById('finalScore');
            const finalHigh = document.getElementById('finalHigh');
            const startScreen = document.getElementById('start-screen');
            const startBtn = document.getElementById('start-btn');
            const gameOverScreen = document.getElementById('game-over');
            const restartBtn = document.getElementById('restart-btn');
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnUp = document.getElementById('btnUp');

            // --- Premenné hry ---
            let W, H;
            let gameState = 'menu'; // 'menu' | 'playing' | 'gameover'
            let score = 0;
            let highScore = 0;
            try { highScore = parseInt(localStorage.getItem('cosmicVoyagerHigh')) || 0; } catch(e) {}
            let frameCount = 0;
            let difficulty = 1;
            let spawnTimer = 0;
            let orbSpawnTimer = 0;
            let particles = [];
            let stars = [];
            let asteroids = [];
            let orbs = [];
            let explosions = [];
            let trails = [];

            // --- Hráč ---
            const player = {
                x: 0,
                y: 0,
                radius: 18,
                targetX: 0,
                targetY: 0,
                speed: 0.12,
                angle: 0,
                thrust: 0,
                invincible: 0,
                alive: true
            };

            // --- Vstup ---
            const input = {
                active: false,
                x: 0,
                y: 0,
                keys: { left: false, right: false, up: false },
                touchId: null
            };

            // --- Audio kontext (jednoduché tóny) ---
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (_) { /* ticho */ }
                }
            }

            function playTone(freq, duration, type = 'sine', volume = 0.12) {
                try {
                    if (!audioCtx) return;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + duration);
                } catch (_) { /* ticho */ }
            }

            function playCollect() { playTone(880, 0.12, 'sine', 0.1);
                setTimeout(() => playTone(1100, 0.1, 'sine', 0.08), 80); }

            function playExplosion() { playTone(120, 0.4, 'sawtooth', 0.15);
                setTimeout(() => playTone(80, 0.3, 'sawtooth', 0.1), 100); }

            function playGameOver() { playTone(400, 0.3, 'square', 0.12);
                setTimeout(() => playTone(300, 0.3, 'square', 0.1), 200);
                setTimeout(() => playTone(200, 0.5, 'square', 0.12), 400); }

            // --- Rozmery canvasa ---
            function resize() {
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                W = canvas.width;
                H = canvas.height;
                // Umiestnenie hráča
                if (gameState === 'menu' || gameState === 'gameover') {
                    player.x = W / 2;
                    player.y = H / 2;
                    player.targetX = W / 2;
                    player.targetY = H / 2;
                } else {
                    player.targetX = Math.min(Math.max(player.targetX, player.radius), W - player.radius);
                    player.targetY = Math.min(Math.max(player.targetY, player.radius), H - player.radius);
                    player.x = Math.min(Math.max(player.x, player.radius), W - player.radius);
                    player.y = Math.min(Math.max(player.y, player.radius), H - player.radius);
                }
                // Generovanie hviezd
                if (stars.length === 0 || stars.length < 80) {
                    stars = [];
                    for (let i = 0; i < 120; i++) {
                        stars.push({
                            x: Math.random() * W,
                            y: Math.random() * H,
                            r: Math.random() * 2 + 0.5,
                            a: Math.random() * 0.8 + 0.2,
                            speed: Math.random() * 0.3 + 0.05
                        });
                    }
                }
            }

            // --- Inicializácia hviezd ---
            function initStars() {
                stars = [];
                for (let i = 0; i < 120; i++) {
                    stars.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        r: Math.random() * 2 + 0.5,
                        a: Math.random() * 0.8 + 0.2,
                        speed: Math.random() * 0.3 + 0.05
                    });
                }
            }

            // --- Herné entity ---

            function spawnAsteroid() {
                const size = 20 + Math.random() * 35 + (difficulty * 2);
                const side = Math.floor(Math.random() * 4);
                let x, y;
                const pad = 30;
                if (side === 0) { x = Math.random() * W;
                    y = -pad; } else if (side === 1) { x = W + pad;
                    y = Math.random() * H; } else if (side === 2) { x = Math.random() * W;
                    y = H + pad; } else { x = -pad;
                    y = Math.random() * H; }
                const speed = 1.2 + Math.random() * 0.8 + difficulty * 0.15;
                const angle = Math.atan2(H / 2 - y, W / 2 - x) + (Math.random() - 0.5) * 0.8;
                asteroids.push({
                    x,
                    y,
                    radius: size / 2,
                    speed: speed,
                    angle: angle,
                    rotation: Math.random() * 6,
                    rotSpeed: (Math.random() - 0.5) * 0.04,
                    color: `hsl(${Math.random() * 40 + 20}, 60%, ${40 + Math.random() * 30}%)`,
                    points: Math.floor(size / 4) + 2,
                    wobble: Math.random() * 100,
                    wobbleSpeed: 0.02 + Math.random() * 0.02
                });
            }

            function spawnOrb() {
                const x = player.radius + Math.random() * (W - player.radius * 2);
                const y = player.radius + Math.random() * (H - player.radius * 2);
                // Nespawnowať príliš blízko hráča
                const dx = x - player.x;
                const dy = y - player.y;
                if (Math.sqrt(dx * dx + dy * dy) < 120) return;
                const colors = ['#00d4ff', '#7b2ffc', '#ff6b9d', '#ffd700', '#00ff88'];
                orbs.push({
                    x,
                    y,
                    radius: 10 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    glow: 0,
                    pulse: Math.random() * Math.PI * 2,
                    value: 10 + Math.floor(Math.random() * 15)
                });
            }

            function spawnExplosion(x, y, color, count = 30) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1 + Math.random() * 4;
                    const size = 2 + Math.random() * 6;
                    const life = 30 + Math.random() * 40;
                    const hue = color ? parseInt(color.replace('#', ''), 16) : 0x00d4ff;
                    const r = (hue >> 16) & 255;
                    const g = (hue >> 8) & 255;
                    const b = hue & 255;
                    explosions.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: size,
                        life: life,
                        maxLife: life,
                        r: r + (Math.random() - 0.5) * 60,
                        g: g + (Math.random() - 0.5) * 60,
                        b: b + (Math.random() - 0.5) * 60,
                        decay: 0.96 + Math.random() * 0.02
                    });
                }
            }

            function spawnTrail(x, y, color) {
                const hue = color ? parseInt(color.replace('#', ''), 16) : 0x00d4ff;
                const r = (hue >> 16) & 255;
                const g = (hue >> 8) & 255;
                const b = hue & 255;
                trails.push({
                    x: x + (Math.random() - 0.5) * 8,
                    y: y + (Math.random() - 0.5) * 8,
                    radius: 2 + Math.random() * 5,
                    life: 20 + Math.random() * 20,
                    maxLife: 30,
                    r: r,
                    g: g,
                    b: b,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5
                });
            }

            // --- Kolízie ---
            function dist(a, b) {
                return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
            }

            function checkCollisions() {
                if (!player.alive || player.invincible > 0) return;

                // Asteroidy
                for (let i = asteroids.length - 1; i >= 0; i--) {
                    const a = asteroids[i];
                    if (dist(player, a) < player.radius + a.radius) {
                        // Zrážka!
                        player.alive = false;
                        spawnExplosion(player.x, player.y, '#00d4ff', 60);
                        spawnExplosion(a.x, a.y, a.color, 40);
                        playExplosion();
                        setTimeout(() => playGameOver(), 300);
                        gameOver();
                        return;
                    }
                }

                // Orby
                for (let i = orbs.length - 1; i >= 0; i--) {
                    const o = orbs[i];
                    if (dist(player, o) < player.radius + o.radius) {
                        score += o.value;
                        updateScore();
                        spawnExplosion(o.x, o.y, o.color, 20);
                        playCollect();
                        orbs.splice(i, 1);
                    }
                }
            }

            // --- Game over ---
            function gameOver() {
                gameState = 'gameover';
                if (score > highScore) {
                    highScore = score;
                    try { localStorage.setItem('cosmicVoyagerHigh', String(highScore)); } catch(e) {}
                }
                finalScore.textContent = score;
                finalHigh.textContent = highScore;
                highScoreText.textContent = highScore;
                gameOverScreen.style.display = 'flex';
            }

            // --- Update skóre ---
            function updateScore() {
                scoreText.textContent = score;
                highScoreText.textContent = highScore;
            }

            // --- Reset hry ---
            function resetGame() {
                score = 0;
                difficulty = 1;
                frameCount = 0;
                spawnTimer = 0;
                orbSpawnTimer = 0;
                asteroids = [];
                orbs = [];
                particles = [];
                explosions = [];
                trails = [];
                player.alive = true;
                player.invincible = 60;
                player.x = W / 2;
                player.y = H / 2;
                player.targetX = W / 2;
                player.targetY = H / 2;
                player.angle = 0;
                player.thrust = 0;
                updateScore();
                gameOverScreen.style.display = 'none';
                startScreen.style.display = 'none';
                gameState = 'playing';
            }

            // --- Update logika ---
            function update() {
                if (gameState !== 'playing') return;
                frameCount++;

                // Obtiažnosť
                difficulty = 1 + Math.floor(frameCount / 900) * 0.5; // každých 15s +0.5

                // Pohyb hráča – plynulé sledovanie cieľa
                const dx = player.targetX - player.x;
                const dy = player.targetY - player.y;
                const d = Math.sqrt(dx * dx + dy * dy);
                if (d > 1) {
                    const moveSpeed = Math.min(player.speed * (0.8 + difficulty * 0.04), 1);
                    player.x += dx * moveSpeed;
                    player.y += dy * moveSpeed;
                    player.angle = Math.atan2(dy, dx);
                    player.thrust = Math.min(d / 30, 1);
                } else {
                    player.thrust *= 0.9;
                }

                // Omezenie hráča
                player.x = Math.min(Math.max(player.x, player.radius), W - player.radius);
                player.y = Math.min(Math.max(player.y, player.radius), H - player.radius);
                player.targetX = Math.min(Math.max(player.targetX, player.radius), W - player.radius);
                player.targetY = Math.min(Math.max(player.targetY, player.radius), H - player.radius);

                // Invincibility
                if (player.invincible > 0) player.invincible--;

                // Spawn asteroidov
                spawnTimer++;
                const spawnRate = Math.max(15, 60 - difficulty * 3);
                if (spawnTimer > spawnRate) {
                    spawnTimer = 0;
                    const count = 1 + Math.floor(difficulty / 3);
                    for (let i = 0; i < count; i++) {
                        spawnAsteroid();
                    }
                }

                // Spawn orbov
                orbSpawnTimer++;
                if (orbSpawnTimer > 120 + Math.random() * 80) {
                    orbSpawnTimer = 0;
                    if (orbs.length < 8 + difficulty * 0.5) {
                        spawnOrb();
                    }
                }

                // Update asteroidov
                for (let i = asteroids.length - 1; i >= 0; i--) {
                    const a = asteroids[i];
                    a.x += Math.cos(a.angle) * a.speed;
                    a.y += Math.sin(a.angle) * a.speed;
                    a.rotation += a.rotSpeed;
                    a.wobble += a.wobbleSpeed;
                    a.x += Math.sin(a.wobble) * 0.15;
                    a.y += Math.cos(a.wobble * 0.7) * 0.15;

                    // Offscreen + mimo
                    const margin = 80;
                    if (a.x < -margin || a.x > W + margin || a.y < -margin || a.y > H + margin) {
                        asteroids.splice(i, 1);
                    }
                }

                // Update orbov
                for (let i = orbs.length - 1; i >= 0; i--) {
                    const o = orbs[i];
                    o.pulse += 0.04;
                    o.glow = Math.sin(o.pulse) * 0.3 + 0.7;
                    // Mierny pohyb
                    o.x += Math.sin(o.pulse * 0.5) * 0.2;
                    o.y += Math.cos(o.pulse * 0.7) * 0.2;
                    // Offscreen
                    if (o.x < -30 || o.x > W + 30 || o.y < -30 || o.y > H + 30) {
                        orbs.splice(i, 1);
                    }
                }

                // Update explózií
                for (let i = explosions.length - 1; i >= 0; i--) {
                    const e = explosions[i];
                    e.x += e.vx;
                    e.y += e.vy;
                    e.vx *= e.decay;
                    e.vy *= e.decay;
                    e.radius *= 0.98;
                    e.life--;
                    if (e.life <= 0 || e.radius < 0.3) {
                        explosions.splice(i, 1);
                    }
                }

                // Update trailov
                for (let i = trails.length - 1; i >= 0; i--) {
                    const t = trails[i];
                    t.x += t.vx;
                    t.y += t.vy;
                    t.radius *= 0.97;
                    t.life--;
                    if (t.life <= 0 || t.radius < 0.2) {
                        trails.splice(i, 1);
                    }
                }

                // Trail hráča
                if (player.alive && frameCount % 2 === 0) {
                    spawnTrail(
                        player.x - Math.cos(player.angle) * 14,
                        player.y - Math.sin(player.angle) * 14,
                        '#00d4ff'
                    );
                }

                // Update hviezd (pomalý pohyb)
                for (const s of stars) {
                    s.y += s.speed * 0.3;
                    if (s.y > H) { s.y = -2;
                        s.x = Math.random() * W; }
                }

                // Kolízie
                checkCollisions();

                // Skóre za prežitie
                if (frameCount % 30 === 0) {
                    score += 1;
                    updateScore();
                }
            }

            // --- Render ---
            function render() {
                ctx.clearRect(0, 0, W, H);

                // Pozadie – gradient
                const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.8);
                grad.addColorStop(0, '#141430');
                grad.addColorStop(0.5, '#0a0a1e');
                grad.addColorStop(1, '#03030a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                // Hviezdy
                for (const s of stars) {
                    ctx.globalAlpha = s.a * (0.6 + 0.4 * Math.sin(frameCount * 0.01 + s.x));
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // Trail
                for (const t of trails) {
                    const alpha = t.life / t.maxLife;
                    ctx.globalAlpha = alpha * 0.6;
                    ctx.fillStyle = `rgb(${t.r},${t.g},${t.b})`;
                    ctx.shadowColor = `rgb(${t.r},${t.g},${t.b})`;
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, t.radius * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;

                // Orby
                for (const o of orbs) {
                    const glow = o.glow;
                    ctx.shadowColor = o.color;
                    ctx.shadowBlur = 30 * glow;
                    ctx.fillStyle = o.color;
                    ctx.globalAlpha = 0.9;
                    ctx.beginPath();
                    ctx.arc(o.x, o.y, o.radius * (0.85 + 0.15 * glow), 0, Math.PI * 2);
                    ctx.fill();
                    // Vnútorný lesk
                    ctx.shadowBlur = 60 * glow;
                    ctx.globalAlpha = 0.5;
                    ctx.beginPath();
                    ctx.arc(o.x - o.radius * 0.2, o.y - o.radius * 0.2, o.radius * 0.3, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    // Hodnota
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 0.7;
                    ctx.fillStyle = '#fff';
                    ctx.font = `${o.radius * 0.7}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('✦', o.x, o.y + 1);
                }
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;

                // Asteroidy
                for (const a of asteroids) {
                    ctx.save();
                    ctx.translate(a.x, a.y);
                    ctx.rotate(a.rotation);
                    ctx.shadowColor = 'rgba(255,150,50,0.2)';
                    ctx.shadowBlur = 15;
                    // Telo
                    const gradA = ctx.createRadialGradient(-a.radius * 0.2, -a.radius * 0.2, 0, 0, 0, a.radius);
                    gradA.addColorStop(0, '#8a7a5a');
                    gradA.addColorStop(0.5, '#5a4a3a');
                    gradA.addColorStop(1, '#2a1a0a');
                    ctx.fillStyle = gradA;
                    ctx.beginPath();
                    const pts = 7 + Math.floor(Math.random() * 3);
                    for (let i = 0; i < pts; i++) {
                        const ang = (i / pts) * Math.PI * 2;
                        const r = a.radius * (0.7 + 0.3 * Math.sin(i * 3.7 + a.wobble));
                        if (i === 0) ctx.moveTo(Math.cos(ang) * r, Math.sin(ang) * r);
                        else ctx.lineTo(Math.cos(ang) * r, Math.sin(ang) * r);
                    }
                    ctx.closePath();
                    ctx.fill();
                    // Povrchové detaily
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(255,200,150,0.15)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    // Niekoľko kráterov
                    for (let i = 0; i < 3; i++) {
                        const cx = (Math.random() - 0.5) * a.radius * 1.2;
                        const cy = (Math.random() - 0.5) * a.radius * 1.2;
                        const cr = 2 + Math.random() * 5;
                        if (Math.sqrt(cx * cx + cy * cy) < a.radius * 0.8) {
                            ctx.fillStyle = 'rgba(0,0,0,0.2)';
                            ctx.beginPath();
                            ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                    ctx.restore();
                }

                // Explózie
                for (const e of explosions) {
                    const alpha = e.life / e.maxLife;
                    ctx.globalAlpha = alpha * 0.9;
                    ctx.fillStyle = `rgb(${e.r},${e.g},${e.b})`;
                    ctx.shadowColor = `rgb(${e.r},${e.g},${e.b})`;
                    ctx.shadowBlur = 20 * alpha;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;

                // Hráč
                if (player.alive) {
                    ctx.save();
                    ctx.translate(player.x, player.y);

                    // Invincibility blikanie
                    if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) {
                        ctx.globalAlpha = 0.4;
                    }

                    // Žiara
                    const glowSize = 50 + player.thrust * 20;
                    const gradP = ctx.createRadialGradient(0, 0, 0, 0, 0, glowSize);
                    gradP.addColorStop(0, 'rgba(0,212,255,0.15)');
                    gradP.addColorStop(0.5, 'rgba(0,212,255,0.05)');
                    gradP.addColorStop(1, 'rgba(0,212,255,0)');
                    ctx.fillStyle = gradP;
                    ctx.beginPath();
                    ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
                    ctx.fill();

                    // Trup lode
                    const angle = player.angle;
                    ctx.rotate(angle);

                    // Hlavný trup
                    ctx.shadowColor = '#00d4ff';
                    ctx.shadowBlur = 25;
                    ctx.fillStyle = '#0a0a2a';
                    ctx.strokeStyle = '#00d4ff';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(22, 0);
                    ctx.lineTo(-14, -14);
                    ctx.lineTo(-8, 0);
                    ctx.lineTo(-14, 14);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    // Vnútorný glow
                    ctx.shadowBlur = 40;
                    ctx.strokeStyle = 'rgba(0,212,255,0.3)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(18, 0);
                    ctx.lineTo(-10, -10);
                    ctx.lineTo(-6, 0);
                    ctx.lineTo(-10, 10);
                    ctx.closePath();
                    ctx.stroke();

                    // Motor (plameň)
                    if (player.thrust > 0.1) {
                        const flameLen = 8 + player.thrust * 20;
                        ctx.shadowBlur = 40;
                        ctx.shadowColor = '#ff6b35';
                        const gradF = ctx.createLinearGradient(-14, 0, -14 - flameLen, 0);
                        gradF.addColorStop(0, 'rgba(255,107,53,0.9)');
                        gradF.addColorStop(0.5, 'rgba(255,200,50,0.6)');
                        gradF.addColorStop(1, 'rgba(255,200,50,0)');
                        ctx.fillStyle = gradF;
                        ctx.beginPath();
                        ctx.moveTo(-14, -6);
                        ctx.lineTo(-14 - flameLen, 0);
                        ctx.lineTo(-14, 6);
                        ctx.closePath();
                        ctx.fill();
                        // Druhý menší plameň
                        ctx.shadowColor = '#00d4ff';
                        ctx.shadowBlur = 20;
                        ctx.fillStyle = 'rgba(0,212,255,0.3)';
                        ctx.beginPath();
                        ctx.moveTo(-14, -3);
                        ctx.lineTo(-14 - flameLen * 0.5, 0);
                        ctx.lineTo(-14, 3);
                        ctx.closePath();
                        ctx.fill();
                    }

                    // Kokpit
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00d4ff';
                    ctx.fillStyle = 'rgba(0,212,255,0.2)';
                    ctx.strokeStyle = 'rgba(0,212,255,0.6)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(8, 0, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    // Bod v kokpite
                    ctx.shadowBlur = 30;
                    ctx.fillStyle = 'rgba(0,212,255,0.8)';
                    ctx.beginPath();
                    ctx.arc(10, 0, 2, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                    ctx.restore();

                    // Štít (invincibility)
                    if (player.invincible > 0) {
                        ctx.save();
                        ctx.translate(player.x, player.y);
                        ctx.strokeStyle = `rgba(0,212,255,${0.2 + 0.3 * Math.sin(frameCount * 0.1)})`;
                        ctx.lineWidth = 2;
                        ctx.shadowColor = '#00d4ff';
                        ctx.shadowBlur = 30;
                        ctx.beginPath();
                        ctx.arc(0, 0, player.radius + 6, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                        ctx.restore();
                    }
                }

                // FPS / debug (voliteľné)
                // ctx.fillStyle = 'rgba(255,255,255,0.2)';
                // ctx.font = '12px monospace';
                // ctx.fillText(`A:${asteroids.length} O:${orbs.length} P:${particles.length} D:${difficulty.toFixed(1)}`, 10, 30);
            }

            // --- Hlavný herný cyklus ---
            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }

            // --- Vstup: Myš / Touch / Klávesnica ---

            function handlePointerMove(clientX, clientY) {
                if (gameState !== 'playing') return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (clientX - rect.left) * scaleX;
                const y = (clientY - rect.top) * scaleY;
                player.targetX = Math.min(Math.max(x, player.radius), W - player.radius);
                player.targetY = Math.min(Math.max(y, player.radius), H - player.radius);
                input.active = true;
            }

            // --- Myš ---
            canvas.addEventListener('mousemove', (e) => {
                e.preventDefault();
                if (gameState === 'playing') {
                    handlePointerMove(e.clientX, e.clientY);
                }
            });

            canvas.addEventListener('mouseleave', () => {
                // Necháme hráča zostať na mieste
            });

            // --- Touch ---
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                if (gameState === 'playing') {
                    const touch = e.touches[0];
                    if (touch) {
                        handlePointerMove(touch.clientX, touch.clientY);
                        input.touchId = touch.identifier;
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (gameState === 'playing') {
                    let touch = null;
                    if (input.touchId !== null) {
                        for (const t of e.touches) {
                            if (t.identifier === input.touchId) { touch = t; break; }
                        }
                    }
                    if (!touch && e.touches.length > 0) touch = e.touches[0];
                    if (touch) {
                        handlePointerMove(touch.clientX, touch.clientY);
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                input.touchId = null;
                input.active = false;
            }, { passive: false });

            canvas.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                input.touchId = null;
                input.active = false;
            }, { passive: false });

            // --- Klávesnica ---
            document.addEventListener('keydown', (e) => {
                const key = e.key;
                if (key === 'ArrowLeft' || key === 'a') {
                    e.preventDefault();
                    input.keys.left = true;
                }
                if (key === 'ArrowRight' || key === 'd') {
                    e.preventDefault();
                    input.keys.right = true;
                }
                if (key === 'ArrowUp' || key === 'w') {
                    e.preventDefault();
                    input.keys.up = true;
                }
                // Štart / reštart medzerou
                if (key === ' ' || key === 'Enter') {
                    e.preventDefault();
                    if (gameState === 'menu') { startBtn.click(); }
                    if (gameState === 'gameover') { restartBtn.click(); }
                }
            });

            document.addEventListener('keyup', (e) => {
                const key = e.key;
                if (key === 'ArrowLeft' || key === 'a') { e.preventDefault();
                    input.keys.left = false; }
                if (key === 'ArrowRight' || key === 'd') { e.preventDefault();
                    input.keys.right = false; }
                if (key === 'ArrowUp' || key === 'w') { e.preventDefault();
                    input.keys.up = false; }
            });

            // --- Klávesový update (volané v update) ---
            // Použijeme input.keys v update
            const originalUpdate = update;
            update = function() {
                if (gameState === 'playing') {
                    // Klávesové ovládanie – posun cieľa
                    const moveSpeed = 6 + difficulty * 0.5;
                    if (input.keys.left) player.targetX -= moveSpeed;
                    if (input.keys.right) player.targetX += moveSpeed;
                    if (input.keys.up) player.targetY -= moveSpeed;
                    // Dolný okraj – automaticky padáme, ale necháme hráča ovládať aj Y
                    // Obmedzenie
                    player.targetX = Math.min(Math.max(player.targetX, player.radius), W - player.radius);
                    player.targetY = Math.min(Math.max(player.targetY, player.radius), H - player.radius);
                }
                originalUpdate.call(this);
            };

            // --- Mobilné tlačidlá ---
            function setupMobileButton(btn, dx, dy) {
                let interval = null;
                const start = (e) => {
                    e.preventDefault();
                    if (gameState !== 'playing') return;
                    initAudio();
                    const step = 6;
                    interval = setInterval(() => {
                        player.targetX = Math.min(Math.max(player.targetX + dx * step, player.radius), W - player
                        .radius);
                        player.targetY = Math.min(Math.max(player.targetY + dy * step, player.radius), H - player
                        .radius);
                    }, 16);
                };
                const stop = (e) => {
                    e.preventDefault();
                    if (interval) { clearInterval(interval);
                        interval = null; }
                };
                btn.addEventListener('mousedown', start);
                btn.addEventListener('mouseup', stop);
                btn.addEventListener('mouseleave', stop);
                btn.addEventListener('touchstart', start, { passive: false });
                btn.addEventListener('touchend', stop, { passive: false });
                btn.addEventListener('touchcancel', stop, { passive: false });
            }

            setupMobileButton(btnLeft, -1, 0);
            setupMobileButton(btnRight, 1, 0);
            setupMobileButton(btnUp, 0, -1);

            // --- Štart / Reštart ---
            startBtn.addEventListener('click', () => {
                initAudio();
                resetGame();
                // Ak je audio pozastavené, obnoviť
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            });

            startBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                startBtn.click();
            });

            restartBtn.addEventListener('click', () => {
                resetGame();
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            });

            restartBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                restartBtn.click();
            });

            // --- Resize ---
            window.addEventListener('resize', () => {
                resize();
                // Po resize upraviť pozíciu hráča
                if (gameState === 'playing') {
                    player.targetX = Math.min(Math.max(player.targetX, player.radius), W - player.radius);
                    player.targetY = Math.min(Math.max(player.targetY, player.radius), H - player.radius);
                }
            });

            // Orientácia – detekcia zmeny
            window.addEventListener('orientationchange', () => {
                setTimeout(resize, 200);
            });

            // --- Inicializácia ---
            function init() {
                resize();
                initStars();
                highScoreText.textContent = highScore;
                player.x = W / 2;
                player.y = H / 2;
                player.targetX = W / 2;
                player.targetY = H / 2;
                gameState = 'menu';
                startScreen.style.display = 'flex';
                gameOverScreen.style.display = 'none';
                updateScore();
                gameLoop();
            }

            // Spustíme hru
            init();

            // Oprava pre iOS Safari – zabezpečiť, že canvas je správne veľký
            setTimeout(resize, 100);
            setTimeout(resize, 500);

        })();
    </script>

</body>
</html>
