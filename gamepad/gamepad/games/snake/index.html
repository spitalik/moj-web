<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake · GamePad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg:#050507; --bg1:#0c0c10; --bg2:#111116;
  --text:#f0eeff; --muted:rgba(240,238,255,0.38); --dim:rgba(240,238,255,0.18);
  --border:rgba(255,255,255,0.07); --border-h:rgba(255,255,255,0.14);
  --green:#4dff91; --green-dim:rgba(77,255,145,0.15);
}
html, body {
  background: var(--bg); min-height: 100vh;
  font-family: 'DM Sans', sans-serif; color: var(--text);
  -webkit-font-smoothing: antialiased; user-select: none; overflow: hidden;
}
body::before {
  content: ''; position: fixed; width: 500px; height: 500px;
  top: -150px; left: -100px;
  background: radial-gradient(circle, rgba(40,180,80,0.08) 0%, transparent 65%);
  border-radius: 50%; pointer-events: none; z-index: 0;
}
#back-btn {
  position: fixed; top: 20px; left: 20px; z-index: 10;
  display: flex; align-items: center; gap: 7px;
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--muted); padding: 7px 14px; border-radius: 100px;
  text-decoration: none; font-size: 12px; font-weight: 500;
  transition: border-color 0.18s, color 0.18s;
}
#back-btn:hover { border-color: var(--border-h); color: var(--text); }
.page {
  position: relative; z-index: 1; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 20px 30px; gap: 16px;
}
.top-bar { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 402px; }
.game-title {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 30%, var(--green) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; flex: 1;
}
.stat-pill {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 100px;
  padding: 5px 14px; font-size: 12px; font-weight: 500; color: var(--muted);
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
}
.stat-pill span { color: var(--green); font-variant-numeric: tabular-nums; min-width: 18px; }
.canvas-wrap {
  position: relative; border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; background: var(--bg1);
}
canvas { display: block; }
#overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  background: rgba(5,5,7,0.82); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
#overlay h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; letter-spacing: -0.5px; }
.hint { font-size: 12px; color: var(--muted); font-weight: 300; text-align: center; padding: 0 16px; }
.score-big { font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800; color: var(--green); letter-spacing: -2px; line-height: 1; }
.score-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.play-btn {
  margin-top: 6px; background: var(--green-dim);
  border: 1px solid rgba(77,255,145,0.3); color: var(--green);
  padding: 11px 32px; border-radius: 100px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background 0.18s, border-color 0.18s;
}
.play-btn:hover { background: rgba(77,255,145,0.22); border-color: rgba(77,255,145,0.45); }
.dpad {
  display: grid; grid-template-columns: repeat(3, 52px);
  grid-template-rows: repeat(2, 52px); gap: 5px;
}
.d {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  color: var(--muted); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.12s, border-color 0.12s, color 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.d:active, .d.pressed { background: var(--green-dim); border-color: rgba(77,255,145,0.3); color: var(--green); }
#d-up    { grid-column:2; grid-row:1; }
#d-left  { grid-column:1; grid-row:2; }
#d-down  { grid-column:2; grid-row:2; }
#d-right { grid-column:3; grid-row:2; }
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>

<div class="page">
  <div class="top-bar">
    <div class="game-title" id="lbl-title"></div>
    <div class="stat-pill"><span id="lbl-score"></span> <span id="score">0</span></div>
    <div class="stat-pill"><span id="lbl-record"></span> <span id="best">0</span></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="c" width="400" height="400"></canvas>
    <div id="overlay">
      <div style="font-size:44px;margin-bottom:4px">🐍</div>
      <h2 id="ov-title"></h2>
      <div class="hint" id="ov-hint"></div>
      <div class="diff-row" id="diff-row" style="display:flex;gap:8px;margin-top:2px;"></div>
      <button class="play-btn" id="ov-play" onclick="startGame()"></button>
    </div>
  </div>

  <div class="dpad">
    <button class="d" id="d-up"    onpointerdown="setDir(0,-1)">▲</button>
    <button class="d" id="d-left"  onpointerdown="setDir(-1,0)">◄</button>
    <button class="d" id="d-down"  onpointerdown="setDir(0,1)">▼</button>
    <button class="d" id="d-right" onpointerdown="setDir(1,0)">►</button>
  </div>
</div>

<script>
// Apply i18n
function applyLang() {
  document.getElementById('lbl-back').textContent   = t('back');
  document.getElementById('lbl-title').textContent  = t('snakeTitle');
  document.getElementById('lbl-score').textContent  = t('snakeScore');
  document.getElementById('lbl-record').textContent = t('snakeRecord');
  document.getElementById('ov-title').textContent   = t('snakeTitle');
  document.getElementById('ov-hint').textContent    = t('snakeHint');
  document.getElementById('ov-play').textContent    = t('snakePlay');
}
applyLang();

const DIFFS=[
  {key:'easy',  speed:150,label:'diffEasy'},
  {key:'medium',speed:115,label:'diffMedium'},
  {key:'hard',  speed:75, label:'diffHard'},
];
let diffIdx=1;
function buildDiffRow(containerId){
  const dr=document.getElementById(containerId);if(!dr)return;
  dr.innerHTML='';
  DIFFS.forEach((d,i)=>{
    const btn=document.createElement('button');
    btn.style.cssText='background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:rgba(240,238,255,0.38);padding:6px 14px;border-radius:100px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .18s;';
    if(i===diffIdx)Object.assign(btn.style,{borderColor:'rgba(77,255,145,0.4)',color:'#4dff91',background:'rgba(77,255,145,0.1)'});
    btn.textContent=t(d.label);
    btn.onclick=()=>{diffIdx=i;buildDiffRow(containerId);};
    dr.appendChild(btn);
  });
}
buildDiffRow('diff-row');

// Game
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const GRID = 20, COLS = 20, ROWS = 20;
let snake, dir, nextDir, food, score, best = 0, interval, running = false;

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; running = true;
  document.getElementById('score').textContent = 0;
  spawnFood();
  clearInterval(interval);
  interval = setInterval(tick, DIFFS[diffIdx].speed);
}

function spawnFood() {
  do { food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===food.x && s.y===food.y));
}

function tick() {
  dir = {...nextDir};
  const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameOver(); return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++;
    document.getElementById('score').textContent = score;
    spawnFood();
  } else { snake.pop(); }
  draw();
}

function draw() {
  ctx.clearRect(0,0,400,400);
  ctx.fillStyle = '#0c0c10'; ctx.fillRect(0,0,400,400);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*GRID,0);ctx.lineTo(x*GRID,400);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*GRID);ctx.lineTo(400,y*GRID);ctx.stroke();}
  ctx.fillStyle = '#ff6b6b'; ctx.shadowColor = '#ff6b6b'; ctx.shadowBlur = 18;
  ctx.beginPath(); ctx.arc(food.x*GRID+GRID/2, food.y*GRID+GRID/2, GRID/2-3, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  snake.forEach((s, i) => {
    const t2 = 1 - i/snake.length;
    if (i===0) { ctx.fillStyle='#ffffff'; ctx.shadowColor='rgba(255,255,255,0.4)'; ctx.shadowBlur=8; }
    else { ctx.fillStyle=`rgba(77,255,145,${0.25+t2*0.75})`; ctx.shadowBlur=0; }
    ctx.beginPath(); ctx.roundRect(s.x*GRID+2, s.y*GRID+2, GRID-4, GRID-4, i===0?4:3); ctx.fill();
    ctx.shadowBlur=0;
  });
}

function setDir(x, y) {
  if (!running) return;
  if (x===1&&dir.x===-1) return; if (x===-1&&dir.x===1) return;
  if (y===1&&dir.y===-1) return; if (y===-1&&dir.y===1) return;
  nextDir = {x, y};
  const map = {'0,-1':'d-up','-1,0':'d-left','0,1':'d-down','1,0':'d-right'};
  const el = document.getElementById(map[`${x},${y}`]);
  if (el) { el.classList.add('pressed'); setTimeout(()=>el.classList.remove('pressed'),150); }
}

function gameOver() {
  clearInterval(interval); running = false;
  const isNew = score > best && score > 0;
  if (isNew) { best = score; document.getElementById('best').textContent = best; }
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <div class="score-label">${t('snakeScore')}</div>
    <div class="score-big">${score}</div>
    ${isNew ? `<div style="font-size:12px;color:#ffd166;margin-top:-4px">${t('snakeNew')}</div>`
            : `<div class="hint">${t('snakeRecord')}: ${best}</div>`}
    <button class="play-btn" onclick="startGame()" style="margin-top:10px">${t('snakeAgain')}</button>
  `;
  ov.style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if (!running) { if(e.code==='Space'||e.code==='Enter') startGame(); return; }
  if (e.code==='ArrowUp'   ||e.code==='KeyW') { e.preventDefault(); setDir(0,-1); }
  if (e.code==='ArrowDown' ||e.code==='KeyS') { e.preventDefault(); setDir(0,1);  }
  if (e.code==='ArrowLeft' ||e.code==='KeyA') { e.preventDefault(); setDir(-1,0); }
  if (e.code==='ArrowRight'||e.code==='KeyD') { e.preventDefault(); setDir(1,0);  }
});
let tx=0,ty=0;
C.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
C.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
},{passive:true});
draw();
</script>
</body>
</html>
