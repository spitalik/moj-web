<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Fluxgall · GamePad</title>
  <script src="../../i18n.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --ink: #eef6ff;
      --muted: #9db1c7;
      --panel: rgba(8, 15, 25, 0.78);
      --line: rgba(190, 221, 255, 0.18);
      --good: #49e4a2;
      --bad: #ff5d73;
      --blue: #57a9ff;
      --yellow: #ffd166;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #06090f;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }

    body {
      display: grid;
      place-items: stretch;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background:
        radial-gradient(circle at 18% 16%, rgba(73, 228, 162, 0.16), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(87, 169, 255, 0.16), transparent 30%),
        linear-gradient(145deg, #06090f 0%, #0b111a 48%, #091018 100%);
    }

    .hud {
      position: fixed;
      inset: max(56px, calc(env(safe-area-inset-top) + 56px)) max(12px, env(safe-area-inset-right)) auto max(12px, env(safe-area-inset-left));
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      pointer-events: none;
    }

    .brand,
    .stats,
    .overlay,
    .controls {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(16px);
    }

    .brand {
      max-width: min(430px, calc(100vw - 132px));
      padding: 10px 12px;
      border-radius: 8px;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 0 0 4px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1;
    }

    .mark {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--bad), var(--yellow), var(--good), var(--blue), var(--bad));
      box-shadow: 0 0 22px rgba(87, 169, 255, 0.7);
      flex: 0 0 auto;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .stats {
      min-width: 112px;
      padding: 9px 10px;
      border-radius: 8px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .statline {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .statline strong {
      color: var(--ink);
      font-size: 13px;
    }

    .energy {
      width: 100%;
      height: 6px;
      margin-top: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .energy > i {
      display: block;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--good), var(--yellow), var(--bad));
      transform-origin: left center;
    }

    .controls {
      position: fixed;
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      display: flex;
      gap: 8px;
      padding: 8px;
      border-radius: 8px;
    }

    #back-btn {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      padding: 7px 14px;
      border-radius: 100px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      backdrop-filter: blur(16px);
      transition: all .18s;
    }
    #back-btn:hover, #back-btn:active {
      color: var(--ink);
      border-color: var(--blue);
    }
    @media (max-width: 680px) {
      #back-btn { font-size: 11px; padding: 6px 12px; }
    }

    button {
      appearance: none;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(224, 241, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      font: 800 18px/1 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
      background: rgba(255, 255, 255, 0.16);
    }

    .overlay {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(420px, calc(100vw - 28px));
      transform: translate(-50%, -50%);
      padding: 18px;
      border-radius: 8px;
      text-align: center;
    }

    .overlay[hidden] {
      display: none;
    }

    .overlay h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1;
      letter-spacing: 0;
    }

    .overlay p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .overlay .wide {
      width: auto;
      min-width: 130px;
      padding: 0 16px;
      font-size: 14px;
    }

    @media (max-width: 680px) {
      .hud {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .brand {
        max-width: calc(100vw - 24px);
      }

      .stats {
        width: min(220px, calc(100vw - 24px));
        text-align: left;
      }

      .controls {
        left: max(12px, env(safe-area-inset-left));
        right: max(12px, env(safe-area-inset-right));
        justify-content: flex-end;
      }

      .hint {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Fluxgall game board"></canvas>

  <a href="../../index.html" id="back-btn">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    <span id="lbl-back"></span>
  </a>

  <section class="hud" aria-live="polite">
    <div class="brand">
      <h1 class="title"><span class="mark"></span>Fluxgall</h1>
      <p class="hint" id="lbl-hint"></p>
    </div>
    <div class="stats">
      <div class="statline"><span id="lbl-level"></span><strong id="levelText">1</strong></div>
      <div class="statline"><span id="lbl-time"></span><strong id="timeText">0.0</strong></div>
      <div class="statline"><span id="lbl-moves"></span><strong id="moveText">0</strong></div>
      <div class="energy"><i id="energyBar"></i></div>
    </div>
  </section>

  <nav class="controls" aria-label="Herné ovládanie" id="lbl-controls-nav">
    <button id="pauseBtn" title="Pauza alebo pokračovať" aria-label="Pauza alebo pokračovať">Ⅱ</button>
    <button id="restartBtn" title="Reštart levelu" aria-label="Reštart levelu">↻</button>
  </nav>

  <div id="overlay" class="overlay">
    <h1 id="overlayTitle">Fluxgall</h1>
    <p id="overlayText">Prepínaj červené a modré magnety. Červená odpudzuje, modrá priťahuje. Vyhni sa iskriacim hranám.</p>
    <button id="startBtn" class="wide">Štart</button>
  </div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const levelText = document.getElementById("levelText");
      const timeText = document.getElementById("timeText");
      const moveText = document.getElementById("moveText");
      const energyBar = document.getElementById("energyBar");
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayText = document.getElementById("overlayText");
      const startBtn = document.getElementById("startBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const restartBtn = document.getElementById("restartBtn");

      document.getElementById('lbl-back').textContent = t('back');
      document.getElementById('lbl-hint').textContent = t('fluxHint');
      document.getElementById('lbl-level').textContent = t('fluxLevel');
      document.getElementById('lbl-time').textContent = t('fluxTime');
      document.getElementById('lbl-moves').textContent = t('fluxMoves');
      document.getElementById('lbl-controls-nav').setAttribute('aria-label', t('fluxControlsAria'));
      pauseBtn.title = t('fluxPauseTitle');
      pauseBtn.setAttribute('aria-label', t('fluxPauseTitle'));
      restartBtn.title = t('fluxRestartTitle');
      restartBtn.setAttribute('aria-label', t('fluxRestartTitle'));

      const levels = [
        {
          start: [0.16, 0.76],
          goal: [0.84, 0.22],
          energy: 26,
          magnets: [
            [0.26, 0.28, -1],
            [0.52, 0.68, 1],
            [0.76, 0.46, -1]
          ],
          walls: [
            [0.10, 0.52, 0.45, 0.55],
            [0.55, 0.32, 0.90, 0.35]
          ],
          sparks: [
            [0.46, 0.52, 0.54, 0.55]
          ]
        },
        {
          start: [0.12, 0.18],
          goal: [0.86, 0.82],
          energy: 32,
          magnets: [
            [0.22, 0.68, 1],
            [0.48, 0.30, -1],
            [0.70, 0.58, 1],
            [0.84, 0.22, -1]
          ],
          walls: [
            [0.28, 0.08, 0.31, 0.58],
            [0.46, 0.42, 0.49, 0.92],
            [0.64, 0.08, 0.67, 0.58]
          ],
          sparks: [
            [0.31, 0.56, 0.46, 0.59],
            [0.67, 0.40, 0.88, 0.43]
          ]
        },
        {
          start: [0.50, 0.86],
          goal: [0.50, 0.12],
          energy: 38,
          magnets: [
            [0.18, 0.22, -1],
            [0.82, 0.22, -1],
            [0.22, 0.72, 1],
            [0.78, 0.72, 1],
            [0.50, 0.50, -1]
          ],
          walls: [
            [0.08, 0.34, 0.40, 0.37],
            [0.60, 0.34, 0.92, 0.37],
            [0.08, 0.62, 0.40, 0.65],
            [0.60, 0.62, 0.92, 0.65]
          ],
          sparks: [
            [0.47, 0.30, 0.53, 0.70]
          ]
        },
        {
          start: [0.12, 0.50],
          goal: [0.88, 0.50],
          energy: 44,
          magnets: [
            [0.20, 0.22, 1],
            [0.20, 0.78, -1],
            [0.50, 0.20, -1],
            [0.50, 0.80, 1],
            [0.80, 0.22, 1],
            [0.80, 0.78, -1]
          ],
          walls: [
            [0.34, 0.12, 0.37, 0.42],
            [0.34, 0.58, 0.37, 0.88],
            [0.63, 0.12, 0.66, 0.42],
            [0.63, 0.58, 0.66, 0.88]
          ],
          sparks: [
            [0.38, 0.48, 0.62, 0.52]
          ]
        }
      ];

      let dpr = 1;
      let bounds = { x: 0, y: 0, w: 1, h: 1, s: 1 };
      let levelIndex = 0;
      let ball;
      let magnets;
      let walls;
      let sparks;
      let goal;
      let energyMax = 1;
      let energy = 1;
      let moves = 0;
      let elapsed = 0;
      let state = "intro";
      let lastTime = performance.now();
      let pulse = 0;

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const pad = Math.max(20, Math.min(window.innerWidth, window.innerHeight) * 0.035);
        const topPad = window.innerWidth < 680 ? 206 : 132;
        const bottomPad = 76;
        const usableW = window.innerWidth - pad * 2;
        const usableH = window.innerHeight - topPad - bottomPad;
        const s = Math.max(240, Math.min(usableW, usableH));
        bounds = {
          w: s,
          h: s,
          x: Math.round((window.innerWidth - s) / 2),
          y: Math.round(topPad + Math.max(0, usableH - s) / 2),
          s
        };
        loadLevel(levelIndex, true);
      }

      function world(point) {
        return {
          x: bounds.x + point[0] * bounds.w,
          y: bounds.y + point[1] * bounds.h
        };
      }

      function rectWorld(rect) {
        return {
          x: bounds.x + rect[0] * bounds.w,
          y: bounds.y + rect[1] * bounds.h,
          w: (rect[2] - rect[0]) * bounds.w,
          h: (rect[3] - rect[1]) * bounds.h
        };
      }

      function loadLevel(index, keepState = false) {
        levelIndex = (index + levels.length) % levels.length;
        const data = levels[levelIndex];
        const start = world(data.start);
        ball = {
          x: start.x,
          y: start.y,
          vx: bounds.s * 0.035,
          vy: -bounds.s * 0.012,
          r: Math.max(9, bounds.s * 0.022)
        };
        goal = { ...world(data.goal), r: Math.max(18, bounds.s * 0.046) };
        magnets = data.magnets.map((m, i) => ({
          id: i,
          ...world(m),
          polarity: m[2],
          r: Math.max(22, bounds.s * 0.052),
          active: false
        }));
        walls = data.walls.map(rectWorld);
        sparks = data.sparks.map(rectWorld);
        energyMax = data.energy;
        energy = data.energy;
        moves = 0;
        elapsed = 0;
        levelText.textContent = String(levelIndex + 1);
        updateHud();
        if (!keepState || state !== "intro") {
          state = "playing";
          overlay.hidden = true;
        }
      }

      function updateHud() {
        timeText.textContent = elapsed.toFixed(1);
        moveText.textContent = String(moves);
        energyBar.style.transform = `scaleX(${Math.max(0, energy / energyMax)})`;
      }

      function setOverlay(title, text, button) {
        overlayTitle.textContent = title;
        overlayText.textContent = text;
        startBtn.textContent = button;
        overlay.hidden = false;
      }

      function toggleMagnet(magnet) {
        magnet.polarity *= -1;
        magnet.active = true;
        moves += 1;
        energy = Math.max(0, energy - 0.55);
        setTimeout(() => {
          magnet.active = false;
        }, 150);
      }

      function nearestMagnet(x, y) {
        let best = null;
        let bestDist = Infinity;
        for (const m of magnets) {
          const dx = x - m.x;
          const dy = y - m.y;
          const dist = Math.hypot(dx, dy);
          if (dist < m.r * 1.45 && dist < bestDist) {
            best = m;
            bestDist = dist;
          }
        }
        return best;
      }

      function handlePointer(e) {
        e.preventDefault();
        if (state === "intro" || state === "won" || state === "lost") {
          startOrContinue();
          return;
        }
        if (state !== "playing") return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const magnet = nearestMagnet(x, y);
        if (magnet) toggleMagnet(magnet);
      }

      function startOrContinue() {
        if (state === "intro") {
          loadLevel(levelIndex);
        } else if (state === "won") {
          loadLevel(levelIndex + 1);
        } else if (state === "lost") {
          loadLevel(levelIndex);
        } else if (state === "paused") {
          state = "playing";
          overlay.hidden = true;
        }
      }

      function restart() {
        loadLevel(levelIndex);
      }

      function togglePause() {
        if (state === "playing") {
          state = "paused";
          setOverlay(t('fluxPauseOverlayTitle'), t('fluxPauseOverlayText'), t('fluxResume'));
        } else if (state === "paused") {
          state = "playing";
          overlay.hidden = true;
        }
      }

      function collideRect(circle, rect) {
        const cx = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
        const cy = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
        const dx = circle.x - cx;
        const dy = circle.y - cy;
        if (dx * dx + dy * dy > circle.r * circle.r) return false;

        const left = Math.abs(circle.x - rect.x);
        const right = Math.abs(circle.x - (rect.x + rect.w));
        const top = Math.abs(circle.y - rect.y);
        const bottom = Math.abs(circle.y - (rect.y + rect.h));
        const min = Math.min(left, right, top, bottom);
        if (min === left) {
          circle.x = rect.x - circle.r;
          circle.vx = -Math.abs(circle.vx) * 0.76;
        } else if (min === right) {
          circle.x = rect.x + rect.w + circle.r;
          circle.vx = Math.abs(circle.vx) * 0.76;
        } else if (min === top) {
          circle.y = rect.y - circle.r;
          circle.vy = -Math.abs(circle.vy) * 0.76;
        } else {
          circle.y = rect.y + rect.h + circle.r;
          circle.vy = Math.abs(circle.vy) * 0.76;
        }
        return true;
      }

      function update(dt) {
        if (state !== "playing") return;
        elapsed += dt;
        energy -= dt * 0.32;
        pulse += dt;

        let ax = 0;
        let ay = 0;
        for (const m of magnets) {
          const dx = m.x - ball.x;
          const dy = m.y - ball.y;
          const distSq = Math.max(900, dx * dx + dy * dy);
          const dist = Math.sqrt(distSq);
          const force = m.polarity * bounds.s * 58 / distSq;
          ax += (dx / dist) * force;
          ay += (dy / dist) * force;
        }

        ball.vx += ax * dt * bounds.s;
        ball.vy += ay * dt * bounds.s;
        ball.vx *= Math.pow(0.992, dt * 60);
        ball.vy *= Math.pow(0.992, dt * 60);

        const maxSpeed = bounds.s * 0.62;
        const speed = Math.hypot(ball.vx, ball.vy);
        if (speed > maxSpeed) {
          ball.vx = (ball.vx / speed) * maxSpeed;
          ball.vy = (ball.vy / speed) * maxSpeed;
        }

        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        if (ball.x < bounds.x + ball.r) {
          ball.x = bounds.x + ball.r;
          ball.vx = Math.abs(ball.vx) * 0.78;
        }
        if (ball.x > bounds.x + bounds.w - ball.r) {
          ball.x = bounds.x + bounds.w - ball.r;
          ball.vx = -Math.abs(ball.vx) * 0.78;
        }
        if (ball.y < bounds.y + ball.r) {
          ball.y = bounds.y + ball.r;
          ball.vy = Math.abs(ball.vy) * 0.78;
        }
        if (ball.y > bounds.y + bounds.h - ball.r) {
          ball.y = bounds.y + bounds.h - ball.r;
          ball.vy = -Math.abs(ball.vy) * 0.78;
        }

        for (const wall of walls) collideRect(ball, wall);
        for (const spark of sparks) {
          if (collideRect(ball, spark)) {
            energy -= 4;
            ball.vx *= -0.7;
            ball.vy *= -0.7;
          }
        }

        if (Math.hypot(ball.x - goal.x, ball.y - goal.y) < goal.r * 0.72) {
          state = "won";
          const stars = energy / energyMax > 0.58 ? "★★★" : energy / energyMax > 0.28 ? "★★☆" : "★☆☆";
          setOverlay(t('fluxWonTitle'), t('fluxWonText', { stars, time: elapsed.toFixed(1), moves }), levelIndex === levels.length - 1 ? t('fluxAgain') : t('fluxNext'));
        } else if (energy <= 0) {
          state = "lost";
          setOverlay(t('fluxLostTitle'), t('fluxLostText'), t('fluxRestart'));
        }

        updateHud();
      }

      function drawGrid() {
        ctx.save();
        ctx.strokeStyle = "rgba(180, 220, 255, 0.075)";
        ctx.lineWidth = 1;
        const step = bounds.s / 12;
        for (let i = 0; i <= 12; i += 1) {
          const x = bounds.x + i * step;
          const y = bounds.y + i * step;
          ctx.beginPath();
          ctx.moveTo(x, bounds.y);
          ctx.lineTo(x, bounds.y + bounds.h);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(bounds.x, y);
          ctx.lineTo(bounds.x + bounds.w, y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function roundedRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r);
      }

      function drawBoard() {
        ctx.save();
        roundedRect(bounds.x, bounds.y, bounds.w, bounds.h, 12);
        ctx.fillStyle = "rgba(7, 13, 22, 0.72)";
        ctx.fill();
        ctx.strokeStyle = "rgba(220, 242, 255, 0.22)";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.clip();
        drawGrid();
        ctx.restore();
      }

      function drawGoal() {
        const ring = 1 + Math.sin(pulse * 4) * 0.05;
        ctx.save();
        ctx.translate(goal.x, goal.y);
        const grad = ctx.createRadialGradient(0, 0, goal.r * 0.05, 0, 0, goal.r * 1.25);
        grad.addColorStop(0, "rgba(73, 228, 162, 0.96)");
        grad.addColorStop(0.5, "rgba(73, 228, 162, 0.25)");
        grad.addColorStop(1, "rgba(73, 228, 162, 0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, goal.r * 1.25 * ring, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#49e4a2";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, goal.r * 0.7 * ring, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function drawRect(rect, color, glow) {
        ctx.save();
        ctx.shadowColor = glow;
        ctx.shadowBlur = 12;
        roundedRect(rect.x, rect.y, rect.w, rect.h, Math.min(8, rect.w, rect.h));
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
      }

      function drawMagnet(m) {
        const attract = m.polarity > 0;
        const color = attract ? "#57a9ff" : "#ff5d73";
        const label = attract ? "+" : "-";
        const halo = m.r * (1.25 + Math.sin(pulse * 3 + m.id) * 0.05);
        ctx.save();
        ctx.translate(m.x, m.y);
        ctx.strokeStyle = attract ? "rgba(87, 169, 255, 0.22)" : "rgba(255, 93, 115, 0.22)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, halo, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowColor = color;
        ctx.shadowBlur = m.active ? 26 : 14;
        ctx.fillStyle = "rgba(10, 18, 29, 0.96)";
        ctx.beginPath();
        ctx.arc(0, 0, m.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = color;
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = color;
        ctx.font = `800 ${Math.max(18, m.r * 0.72)}px ui-sans-serif, system-ui`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(label, 0, -1);
        ctx.restore();
      }

      function drawBall() {
        ctx.save();
        const grad = ctx.createRadialGradient(ball.x - ball.r * 0.35, ball.y - ball.r * 0.45, ball.r * 0.1, ball.x, ball.y, ball.r * 1.2);
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(0.32, "#dff3ff");
        grad.addColorStop(1, "#5cd4ff");
        ctx.shadowColor = "rgba(92, 212, 255, 0.72)";
        ctx.shadowBlur = 20;
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        drawBoard();
        drawGoal();
        for (const wall of walls) drawRect(wall, "rgba(210, 230, 248, 0.16)", "rgba(87, 169, 255, 0.18)");
        for (const spark of sparks) drawRect(spark, "rgba(255, 93, 115, 0.72)", "rgba(255, 93, 115, 0.8)");
        for (const m of magnets) drawMagnet(m);
        drawBall();
      }

      function loop(now) {
        const dt = Math.min(0.033, (now - lastTime) / 1000 || 0);
        lastTime = now;
        update(dt);
        pulse += dt * 0.4;
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener("resize", resize);
      canvas.addEventListener("pointerdown", handlePointer, { passive: false });
      startBtn.addEventListener("click", startOrContinue);
      pauseBtn.addEventListener("click", togglePause);
      restartBtn.addEventListener("click", restart);
      window.addEventListener("keydown", (e) => {
        if (e.key === " " || e.key === "Enter") {
          e.preventDefault();
          startOrContinue();
        }
        if (e.key.toLowerCase() === "p") togglePause();
        if (e.key.toLowerCase() === "r") restart();
        const numeric = Number(e.key);
        if (numeric >= 1 && numeric <= magnets.length && state === "playing") {
          toggleMagnet(magnets[numeric - 1]);
        }
      });

      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
          const radius = Math.min(r, w / 2, h / 2);
          this.beginPath();
          this.moveTo(x + radius, y);
          this.arcTo(x + w, y, x + w, y + h, radius);
          this.arcTo(x + w, y + h, x, y + h, radius);
          this.arcTo(x, y + h, x, y, radius);
          this.arcTo(x, y, x + w, y, radius);
          this.closePath();
        };
      }

      resize();
      setOverlay(t('fluxTitle'), t('fluxIntroText'), t('fluxStart'));
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
