<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>GeoStack · GamePad</title>
<script src="../../i18n.js"></script>
<style>
:root{
  --bg:#07070f;--panel:#10111e;--line:#1c1d32;--text:#e8eaf6;--muted:#5c6080;
  --accent:#7c83d4;--good:#4caf93;--bad:#e05565;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;touch-action:none;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* ── header ── */
#header{
  position:fixed;top:0;left:0;right:0;height:44px;
  display:flex;align-items:center;justify-content:space-between;padding:0 12px;
  background:rgba(7,7,15,.9);border-bottom:1px solid var(--line);z-index:30;
  backdrop-filter:blur(6px);
}
#back-btn{
  display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;
  font-size:12px;font-weight:600;padding:6px 12px;border-radius:100px;
  border:1px solid var(--line);background:rgba(7,7,15,.6);transition:all .18s;
}
#back-btn:hover{color:var(--text);border-color:var(--accent);}
.brand{font-weight:900;letter-spacing:.12em;font-size:15px;color:var(--text);}
.brand span{color:var(--accent);}
#pauseBtn{
  appearance:none;border:1px solid var(--line);background:transparent;color:var(--muted);
  padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;
}
#pauseBtn:hover{color:var(--text);border-color:var(--accent);}

/* ── main layout ── */
#arena{
  display:flex;align-items:flex-start;justify-content:center;
  gap:0;padding-top:44px;
  width:100%;height:100%;overflow:hidden;
}
.side-panel{
  display:flex;flex-direction:column;gap:8px;padding:6px 4px;flex-shrink:0;
}
.panel-box{
  background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px;
}
.panel-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px;text-align:center;}
.panel-val{font-size:18px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums;color:var(--text);}
.panel-val.accent{color:var(--accent);}
#gameCanvas{display:block;image-rendering:pixelated;}

/* ── overlay ── */
#overlay{
  position:fixed;inset:0;background:rgba(4,4,10,.88);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:50;
}
#overlay.hidden{display:none;}
.modal{
  background:#0e0f1e;border:1px solid var(--line);border-radius:20px;
  padding:28px 24px;text-align:center;max-width:320px;width:88vw;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
}
.modal h2{font-size:22px;font-weight:900;margin-bottom:6px;}
.modal .sub{color:var(--muted);font-size:13px;margin-bottom:18px;}
.modal .big{font-size:48px;font-weight:900;line-height:1;color:var(--accent);margin-bottom:4px;font-variant-numeric:tabular-nums;}
.modal .stats-row{display:flex;justify-content:center;gap:18px;margin-bottom:18px;}
.modal .stat{text-align:center;}
.modal .stat .v{font-size:20px;font-weight:800;color:var(--text);}
.modal .stat .k{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.modal .best{font-size:12px;color:var(--accent);margin-bottom:16px;}
.start-btn{
  appearance:none;border:none;background:linear-gradient(135deg,var(--accent),#5c63b8);
  color:#fff;font-size:15px;font-weight:800;padding:13px 32px;border-radius:12px;
  cursor:pointer;width:100%;letter-spacing:.04em;transition:transform .1s,filter .1s;
}
.start-btn:active{transform:scale(.97);filter:brightness(.9);}
.hint{font-size:11px;color:var(--muted);margin-top:10px;}

/* ── mobile controls ── */
#controls{
  position:fixed;bottom:max(10px,env(safe-area-inset-bottom));left:0;right:0;
  display:flex;justify-content:center;gap:8px;padding:0 12px;z-index:20;
}
.ctrl-btn{
  appearance:none;border:1px solid var(--line);background:rgba(16,17,30,.85);
  color:var(--text);border-radius:14px;width:52px;height:52px;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .1s,transform .08s;backdrop-filter:blur(4px);touch-action:none;
}
.ctrl-btn:active,.ctrl-btn.pressed{background:rgba(124,131,212,.25);transform:scale(.92);}
.ctrl-btn.drop-btn{background:rgba(76,175,147,.15);border-color:var(--good);color:var(--good);}
.ctrl-btn.rotate-btn{background:rgba(124,131,212,.15);border-color:var(--accent);color:var(--accent);}
@media(pointer:fine){#controls{display:none;}}
@media(max-height:560px) and (orientation:landscape){
  #controls{flex-direction:column;right:10px;left:auto;bottom:10px;width:48px;gap:5px;}
  .ctrl-btn{width:44px;height:44px;font-size:16px;}
}
</style>
</head>
<body>

<div id="header">
  <a href="../../index.html" id="back-btn">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    <span id="lbl-back"></span>
  </a>
  <div class="brand">GEO<span>STACK</span></div>
  <button id="pauseBtn" id="lbl-pause"></button>
</div>

<div id="arena">
  <!-- left panel: hold + level + lines -->
  <div class="side-panel" id="leftPanel">
    <div class="panel-box">
      <div class="panel-label" id="lbl-hold"></div>
      <canvas id="holdCanvas"></canvas>
    </div>
    <div class="panel-box">
      <div class="panel-label" id="lbl-level"></div>
      <div class="panel-val accent" id="levelVal">1</div>
    </div>
    <div class="panel-box">
      <div class="panel-label" id="lbl-lines"></div>
      <div class="panel-val" id="linesVal">0</div>
    </div>
  </div>

  <!-- main game canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- right panel: score + next previews -->
  <div class="side-panel" id="rightPanel">
    <div class="panel-box">
      <div class="panel-label" id="lbl-score"></div>
      <div class="panel-val accent" id="scoreVal">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label" id="lbl-best"></div>
      <div class="panel-val" id="bestVal">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label" id="lbl-next"></div>
      <canvas id="next1Canvas"></canvas>
      <canvas id="next2Canvas" style="margin-top:5px"></canvas>
    </div>
  </div>
</div>

<!-- mobile d-pad -->
<div id="controls">
  <button class="ctrl-btn" id="btnLeft">◀</button>
  <button class="ctrl-btn" id="btnDown">▼</button>
  <button class="ctrl-btn" id="btnRight">▶</button>
  <button class="ctrl-btn rotate-btn" id="btnRotate">↻</button>
  <button class="ctrl-btn drop-btn" id="btnDrop">⬇</button>
</div>

<!-- overlay (start / pause / game-over) -->
<div id="overlay">
  <div class="modal" id="modal">
    <h2 id="ov-title">GeoStack</h2>
    <div class="sub" id="ov-sub"></div>
    <div class="big" id="ov-score" style="display:none">0</div>
    <div class="stats-row" id="ov-stats" style="display:none">
      <div class="stat"><div class="v" id="ov-level">1</div><div class="k" id="lbl-ov-level"></div></div>
      <div class="stat"><div class="v" id="ov-lines">0</div><div class="k" id="lbl-ov-lines"></div></div>
    </div>
    <div class="best" id="ov-best" style="display:none"></div>
    <button class="start-btn" id="startBtn"></button>
    <div class="hint" id="ov-hint"></div>
  </div>
</div>

<script>
(function(){
"use strict";

/* ── i18n ── */
document.getElementById('lbl-back').textContent    = t('back');
document.getElementById('pauseBtn').textContent    = t('gstPause');
document.getElementById('lbl-hold').textContent    = t('gstHold');
document.getElementById('lbl-level').textContent   = t('gstLevel');
document.getElementById('lbl-lines').textContent   = t('gstLines');
document.getElementById('lbl-score').textContent   = t('gstScore');
document.getElementById('lbl-best').textContent    = t('gstBest');
document.getElementById('lbl-next').textContent    = t('gstNext');
document.getElementById('lbl-ov-level').textContent = t('gstLevel');
document.getElementById('lbl-ov-lines').textContent = t('gstLines');

/* ── canvas refs ── */
const gc   = document.getElementById('gameCanvas');
const gctx = gc.getContext('2d');
const hc   = document.getElementById('holdCanvas');
const hctx = hc.getContext('2d');
const n1c  = document.getElementById('next1Canvas');
const n1ctx= n1c.getContext('2d');
const n2c  = document.getElementById('next2Canvas');
const n2ctx= n2c.getContext('2d');

/* ── grid constants ── */
const COLS = 10, ROWS = 22, VISIBLE = 20; // top 2 rows hidden (spawn buffer)

/* ── piece definitions ── */
const PIECES = [
  { name:'BAR',   color:'#00e5ff', glow:'#00acc1', cells:[[0,0],[0,1],[0,2],[0,3]] },
  { name:'BOX',   color:'#ffd740', glow:'#ffab00', cells:[[0,0],[0,1],[1,0],[1,1]] },
  { name:'LHOOK', color:'#ff6e40', glow:'#bf360c', cells:[[0,0],[1,0],[2,0],[2,1]] },
  { name:'JHOOK', color:'#448aff', glow:'#1565c0', cells:[[0,1],[1,1],[2,1],[2,0]] },
  { name:'TEE',   color:'#ea80fc', glow:'#7b1fa2', cells:[[0,0],[0,1],[0,2],[1,1]] },
  { name:'SKEW',  color:'#69f0ae', glow:'#00695c', cells:[[0,1],[0,2],[1,0],[1,1]] },
  { name:'ZSKEW', color:'#ff5252', glow:'#b71c1c', cells:[[0,0],[0,1],[1,1],[1,2]] },
];

/* Rotate cells 90° CW using rotation matrix [r,c]→[c,-r], then normalise */
function rotateCW(cells){
  let r = cells.map(([row,col])=>[col,-row]);
  const minR=Math.min(...r.map(([x])=>x)), minC=Math.min(...r.map(([,y])=>y));
  return r.map(([x,y])=>[x-minR,y-minC]);
}
function rotatePiece(cells,times){
  let c=cells;
  for(let i=0;i<((times%4)+4)%4;i++) c=rotateCW(c);
  return c;
}

/* ── sizing ── */
let CELL=28;
function calcCell(){
  const avW=window.innerWidth;
  const avH=window.innerHeight-44; // minus header
  const hasCtrl=(window.matchMedia('(pointer:coarse)').matches)||(window.innerWidth<700);
  const ctrlH=hasCtrl?70:0;
  const sidePanelW=80;
  const usableW=avW-sidePanelW*2-16;
  const usableH=avH-ctrlH-8;
  const byW=Math.floor(usableW/COLS);
  const byH=Math.floor(usableH/VISIBLE);
  CELL=Math.max(18,Math.min(36,byW,byH));
}

function setSizes(){
  calcCell();
  const gw=COLS*CELL, gh=VISIBLE*CELL;
  gc.width=gw; gc.height=gh; gc.style.width=gw+'px'; gc.style.height=gh+'px';
  const pw=Math.floor(CELL*4.2), ph=CELL*3;
  [hc,n1c,n2c].forEach(c=>{c.width=pw;c.height=ph;c.style.width=pw+'px';c.style.height=ph+'px';});
  // side panel widths
  document.getElementById('leftPanel').style.width  = (pw+12)+'px';
  document.getElementById('rightPanel').style.width = (pw+12)+'px';
}
window.addEventListener('resize',()=>{ setSizes(); if(state!=='idle') redraw(); });

/* ── Web Audio ── */
let actx=null;
function getActx(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}
function beep(freq,dur,type='square',vol=0.18,decay=0.85){
  try{
    const ctx=getActx();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.setValueAtTime(freq,ctx.currentTime);
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}
const snd={
  move:  ()=>beep(220,.06,'square',.08),
  rotate:()=>beep(330,.08,'sine',.12),
  lock:  ()=>beep(180,.12,'sawtooth',.15),
  clear1:()=>beep(523,.18,'sine',.2),
  clear2:()=>{ beep(523,.12,'sine',.18); setTimeout(()=>beep(659,.12,'sine',.18),80); },
  clear3:()=>{ beep(523,.1,'sine',.18); setTimeout(()=>beep(659,.1,'sine',.18),60); setTimeout(()=>beep(784,.14,'sine',.2),120); },
  clear4:()=>{ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.18,'sine',.22),i*60)); },
  over:  ()=>{ [440,370,311,262].forEach((f,i)=>setTimeout(()=>beep(f,.2,'sawtooth',.15),i*100)); },
  hold:  ()=>beep(440,.08,'sine',.1),
};

/* ── best score ── */
const BEST_KEY='gamepad_geostack_best';
let best=0;
try{best=parseInt(localStorage.getItem(BEST_KEY),10)||0;}catch(e){}
function saveBest(v){try{localStorage.setItem(BEST_KEY,String(v));}catch(e){}}
document.getElementById('bestVal').textContent=best;

/* ── bag randomiser ── */
let bag=[];
function nextBag(){
  if(!bag.length){ bag=[...Array(PIECES.length).keys()];for(let i=bag.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[bag[i],bag[j]]=[bag[j],bag[i]];} }
  return bag.pop();
}

/* ── game state ── */
let state='idle'; // idle | playing | paused | over
let grid=[], cur=null, next=[], hold=null, canHold=true;
let score=0,level=1,lines=0;
let lockTimer=null,lockMoves=0;
let particles=[];
let clearAnim=null; // {rows,phase,t}

function dropInterval(){ return Math.max(50, 900 - (level-1)*80); }

function newGrid(){ return Array.from({length:ROWS},()=>Array(COLS).fill(null)); }

function spawnPiece(idx){
  const p=PIECES[idx];
  const cells=p.cells.map(([r,c])=>[r,c]);
  const maxC=Math.max(...cells.map(([,c])=>c));
  const colOffset=Math.floor((COLS-maxC-1)/2);
  return{ idx, cells:cells.map(([r,c])=>[r,c+colOffset]), rot:0 };
}

function startGame(){
  grid=newGrid(); next=[nextBag(),nextBag()]; hold=null; canHold=true;
  score=0;level=1;lines=0;particles=[];clearAnim=null;
  updateHud();
  cur=spawnPiece(nextBag());
  next.push(nextBag());
  state='playing';
  lastDrop=performance.now();
  document.getElementById('overlay').classList.add('hidden');
  requestAnimationFrame(loop);
}

/* ── collision ── */
function valid(cells){
  return cells.every(([r,c])=> r>=0 && r<ROWS && c>=0 && c<COLS && !grid[r][c]);
}

/* ── ghost ── */
function ghostCells(){
  let cells=cur.cells;
  for(;;){
    const moved=cells.map(([r,c])=>[r+1,c]);
    if(!valid(moved)) return cells;
    cells=moved;
  }
}

/* ── move/rotate/drop ── */
function tryMove(dr,dc){
  const moved=cur.cells.map(([r,c])=>[r+dr,c+dc]);
  if(valid(moved)){ cur.cells=moved; resetLock(); snd.move(); return true; }
  return false;
}
function tryRotate(){
  const rot=(cur.rot+1)%4;
  const base=rotatePiece(PIECES[cur.idx].cells,rot);
  const cr=Math.min(...cur.cells.map(([r])=>r));
  const cc=Math.min(...cur.cells.map(([,c])=>c));
  // align rotation bounding box to piece position
  const srcMinR=Math.min(...cur.cells.map(([r])=>r));
  const srcMinC=Math.min(...cur.cells.map(([,c])=>c));
  const rotCells=base.map(([r,c])=>[r+srcMinR,c+srcMinC]);
  // wall-kick offsets
  const kicks=[[0,0],[0,-1],[0,1],[0,-2],[0,2],[-1,0],[-2,0]];
  for(const [dr,dc] of kicks){
    const test=rotCells.map(([r,c])=>[r+dr,c+dc]);
    if(valid(test)){ cur.cells=test; cur.rot=rot; resetLock(); snd.rotate(); return true; }
  }
  return false;
}
function hardDrop(){
  const gc_=ghostCells();
  const dr=gc_[0][0]-cur.cells[0][0];
  score+=dr*2;
  cur.cells=gc_;
  lockPiece();
}
function holdPiece(){
  if(!canHold) return;
  snd.hold();
  const prev=hold;
  hold=cur.idx; canHold=false;
  cur=prev!==null?spawnPiece(prev):spawnPiece(next.shift());
  if(prev===null) next.push(nextBag());
  if(!valid(cur.cells)){ gameOver(); return; }
  resetLock();
}

/* ── lock delay ── */
const LOCK_DELAY=500, MAX_LOCK_MOVES=15;
function resetLock(){ lockTimer=null; lockMoves=0; }
function isLanded(){ return !valid(cur.cells.map(([r,c])=>[r+1,c])); }

function lockPiece(){
  lockTimer=null;
  cur.cells.forEach(([r,c])=>{ if(r>=0&&r<ROWS&&c>=0&&c<COLS) grid[r][c]=PIECES[cur.idx].color; });
  snd.lock();
  checkLines();
  cur=spawnPiece(next.shift());
  next.push(nextBag());
  canHold=true;
  if(!valid(cur.cells)){ gameOver(); return; }
}

/* ── line clear ── */
function checkLines(){
  const full=[];
  for(let r=0;r<ROWS;r++) if(grid[r].every(c=>c)) full.push(r);
  if(!full.length) return;
  clearAnim={rows:full,phase:0};
  setTimeout(()=>{ doCollapse(full); clearAnim=null; }, 280);
  const n=full.length;
  const pts=[0,100,300,500,800][n]*level;
  score+=pts; lines+=n;
  level=Math.floor(lines/10)+1;
  if(n===1) snd.clear1(); else if(n===2) snd.clear2(); else if(n===3) snd.clear3(); else snd.clear4();
  spawnParticles(full);
  updateHud();
  if(score>best){ best=score; saveBest(best); document.getElementById('bestVal').textContent=best; }
}
function doCollapse(rows){
  const set=new Set(rows);
  const kept=grid.filter((_,i)=>!set.has(i));
  while(kept.length<ROWS) kept.unshift(Array(COLS).fill(null));
  grid=kept;
}

/* ── particles ── */
function spawnParticles(rows){
  rows.forEach(r=>{
    for(let c=0;c<COLS;c++){
      const color=grid[r][c]||'#ffffff';
      for(let i=0;i<3;i++) particles.push({
        x:(c+.5)*CELL, y:(r-2+.5)*CELL,
        vx:(Math.random()-.5)*6, vy:-(Math.random()*5+2),
        life:1, color
      });
    }
  });
}

/* ── hud ── */
function updateHud(){
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('levelVal').textContent=level;
  document.getElementById('linesVal').textContent=lines;
}

/* ── game over ── */
function gameOver(){
  state='over'; snd.over();
  document.getElementById('ov-title').textContent = t('gstGameOver');
  document.getElementById('ov-sub').textContent   = '';
  document.getElementById('ov-score').style.display='';
  document.getElementById('ov-score').textContent =score;
  document.getElementById('ov-stats').style.display='';
  document.getElementById('ov-level').textContent =level;
  document.getElementById('ov-lines').textContent =lines;
  document.getElementById('ov-best').style.display='';
  document.getElementById('ov-best').textContent  ='🏆 '+t('gstBest')+': '+best;
  document.getElementById('startBtn').textContent =t('gstRestart');
  document.getElementById('ov-hint').textContent  ='';
  document.getElementById('overlay').classList.remove('hidden');
}

/* ── rendering ── */
function drawCell(ctx,r,c,color,alpha,glow,S){
  S=S||CELL;
  ctx.save();
  ctx.globalAlpha=alpha===undefined?1:alpha;
  const x=c*S,y=r*S;
  // shadow/glow
  if(glow){ctx.shadowColor=color;ctx.shadowBlur=S*.3;}
  // fill
  const grad=ctx.createLinearGradient(x,y,x+S,y+S);
  grad.addColorStop(0,color+'dd');grad.addColorStop(1,color+'88');
  ctx.fillStyle=grad;
  const rr=Math.max(2,S*.1);
  ctx.beginPath();
  ctx.roundRect(x+1,y+1,S-2,S-2,rr);
  ctx.fill();
  // highlight
  ctx.shadowBlur=0;
  ctx.globalAlpha=(alpha||1)*.35;
  ctx.fillStyle='#ffffff';
  ctx.beginPath();
  ctx.roundRect(x+2,y+2,S-4,(S-4)*.35,rr);
  ctx.fill();
  ctx.restore();
}

function drawGrid(){
  gctx.clearRect(0,0,gc.width,gc.height);
  // background
  gctx.fillStyle='#0a0b14';
  gctx.fillRect(0,0,gc.width,gc.height);
  // grid lines
  gctx.strokeStyle='rgba(30,32,55,.8)';
  gctx.lineWidth=.5;
  for(let r=0;r<=VISIBLE;r++){ gctx.beginPath();gctx.moveTo(0,r*CELL);gctx.lineTo(COLS*CELL,r*CELL);gctx.stroke(); }
  for(let c=0;c<=COLS;c++){ gctx.beginPath();gctx.moveTo(c*CELL,0);gctx.lineTo(c*CELL,VISIBLE*CELL);gctx.stroke(); }
  // placed pieces
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]&&r>=2) drawCell(gctx,r-2,c,grid[r][c]);
    }
  }
  // clear animation flash
  if(clearAnim){
    clearAnim.phase=Math.min(1,(performance.now()-(clearAnim.t||=(performance.now())))/280);
    const alpha=Math.sin(clearAnim.phase*Math.PI)*.85;
    gctx.globalAlpha=alpha;
    gctx.fillStyle='#ffffff';
    clearAnim.rows.forEach(r=>{ if(r>=2) gctx.fillRect(0,(r-2)*CELL,gc.width,CELL); });
    gctx.globalAlpha=1;
  }
  // ghost piece
  if(cur&&state==='playing'){
    const gh=ghostCells();
    const col=PIECES[cur.idx].color;
    gh.forEach(([r,c])=>{ if(r>=2) drawCell(gctx,r-2,c,col,.22); });
    // active piece
    cur.cells.forEach(([r,c])=>{ if(r>=2) drawCell(gctx,r-2,c,col,1,true); });
  }
  // particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    gctx.save();
    gctx.globalAlpha=p.life;
    gctx.fillStyle=p.color;
    const s=CELL*.22*p.life;
    gctx.beginPath();
    gctx.arc(p.x,p.y,s,0,Math.PI*2);
    gctx.fill();
    gctx.restore();
    p.x+=p.vx; p.y+=p.vy; p.vy+=.35; p.life-=.035;
  });
}

function drawPreview(ctx,canvas,idx){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(idx===null||idx===undefined) return;
  const p=PIECES[idx];
  const cells=p.cells;
  const S=Math.floor(canvas.width/4.2);
  const maxR=Math.max(...cells.map(([r])=>r))+1;
  const maxC=Math.max(...cells.map(([,c])=>c))+1;
  const offR=Math.floor((canvas.height/S-maxR)/2);
  const offC=Math.floor((canvas.width/S-maxC)/2);
  cells.forEach(([r,c])=>drawCell(ctx,r+offR,c+offC,p.color,1,true,S));
}

function redraw(){
  drawGrid();
  drawPreview(hctx,hc,hold);
  drawPreview(n1ctx,n1c,next[0]);
  drawPreview(n2ctx,n2c,next[1]);
}

/* ── game loop ── */
let lastDrop=0,rafId=null;
function loop(ts){
  if(state!=='playing'){ rafId=null; return; }
  // update particles even when not dropping
  if(ts-lastDrop >= dropInterval()){
    if(!valid(cur.cells.map(([r,c])=>[r+1,c]))){
      // landed
      if(!lockTimer){ lockTimer=ts; lockMoves=0; }
      else if(ts-lockTimer>=LOCK_DELAY||lockMoves>=MAX_LOCK_MOVES){ lockPiece(); }
    } else {
      cur.cells=cur.cells.map(([r,c])=>[r+1,c]);
      if(isLanded()&&!lockTimer) lockTimer=ts;
    }
    lastDrop=ts;
  }
  redraw();
  rafId=requestAnimationFrame(loop);
}

/* ── DAS (Delayed Auto Shift) ── */
const dasState={};
const DAS_DELAY=160, DAS_REPEAT=50;
function dasPress(action){
  action();
  dasState[action]={timer:setTimeout(()=>{dasState[action].interval=setInterval(action,DAS_REPEAT);},DAS_DELAY)};
}
function dasRelease(action){
  if(dasState[action]){
    clearTimeout(dasState[action].timer);
    clearInterval(dasState[action].interval);
    delete dasState[action];
  }
}

/* ── keyboard ── */
const keyMap={};
window.addEventListener('keydown',e=>{
  if(state==='over'||(state==='idle')) return;
  if(e.repeat) return;
  const k=e.key;
  if(k==='p'||k==='Escape'){togglePause();return;}
  if(state!=='playing') return;
  if(k==='ArrowLeft')  {e.preventDefault();dasPress(()=>tryMove(0,-1));}
  if(k==='ArrowRight') {e.preventDefault();dasPress(()=>tryMove(0,1));}
  if(k==='ArrowDown')  {e.preventDefault();dasPress(()=>{if(tryMove(1,0)){score++;updateHud();}});}
  if(k==='ArrowUp'||k==='x'||k==='X'){e.preventDefault();tryRotate();}
  if(k===' '){e.preventDefault();hardDrop();}
  if(k==='c'||k==='C'){e.preventDefault();holdPiece();}
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft')  dasRelease(()=>tryMove(0,-1));
  if(e.key==='ArrowRight') dasRelease(()=>tryMove(0,1));
  if(e.key==='ArrowDown')  dasRelease(()=>{if(tryMove(1,0)){score++;updateHud();}});
});

/* ── mobile buttons ── */
function mobileBtn(id,action,useDAS){
  const btn=document.getElementById(id);
  btn.addEventListener('pointerdown',e=>{
    e.preventDefault(); btn.classList.add('pressed');
    if(state!=='playing') return;
    if(useDAS) dasPress(action); else action();
  });
  btn.addEventListener('pointerup',()=>{ btn.classList.remove('pressed'); if(useDAS) dasRelease(action); });
  btn.addEventListener('pointerleave',()=>{ btn.classList.remove('pressed'); if(useDAS) dasRelease(action); });
}
const softDown=()=>{if(tryMove(1,0)){score++;updateHud();}};
mobileBtn('btnLeft', ()=>tryMove(0,-1), true);
mobileBtn('btnRight',()=>tryMove(0,1),  true);
mobileBtn('btnDown', softDown,          true);
mobileBtn('btnRotate',tryRotate,        false);
mobileBtn('btnDrop',  hardDrop,         false);

/* ── swipe on game canvas ── */
let swipeStart=null;
gc.addEventListener('pointerdown',e=>{
  if(state!=='playing') return;
  swipeStart={x:e.clientX,y:e.clientY,t:Date.now()};
  gc.setPointerCapture(e.pointerId);
},{passive:true});
gc.addEventListener('pointerup',e=>{
  if(!swipeStart||state!=='playing') return;
  const dx=e.clientX-swipeStart.x, dy=e.clientY-swipeStart.y;
  const dt=Date.now()-swipeStart.t;
  const absDx=Math.abs(dx),absDy=Math.abs(dy);
  if(dt<300){
    if(absDx<12&&absDy<12){ tryRotate(); } // tap = rotate
    else if(absDy>absDx*1.5&&dy<-40){ /* swipe up = hard drop */ hardDrop(); }
    else if(absDy>absDx*1.5&&dy>40){ /* swipe down = hard drop */ hardDrop(); }
  }
  swipeStart=null;
});
gc.addEventListener('pointermove',e=>{
  if(!swipeStart||state!=='playing') return;
  const dx=e.clientX-swipeStart.x;
  if(Math.abs(dx)>CELL*.8){
    tryMove(0,dx>0?1:-1);
    swipeStart.x=e.clientX;
  }
},{passive:true});

/* ── pause ── */
function togglePause(){
  if(state==='playing'){
    state='paused';
    document.getElementById('ov-title').textContent=t('gstPaused');
    document.getElementById('ov-sub').textContent=t('gstPausedSub');
    document.getElementById('ov-score').style.display='none';
    document.getElementById('ov-stats').style.display='none';
    document.getElementById('ov-best').style.display='none';
    document.getElementById('startBtn').textContent=t('gstResume');
    document.getElementById('ov-hint').textContent='';
    document.getElementById('overlay').classList.remove('hidden');
  } else if(state==='paused'){
    state='playing';
    document.getElementById('overlay').classList.add('hidden');
    lastDrop=performance.now();
    rafId=requestAnimationFrame(loop);
  }
}
document.getElementById('pauseBtn').addEventListener('click',togglePause);

/* ── start button ── */
document.getElementById('startBtn').addEventListener('click',()=>{
  if(state==='paused'){ togglePause(); return; }
  startGame();
});

/* ── intro overlay ── */
function showIntro(){
  state='idle';
  document.getElementById('ov-title').textContent =t('gstTitle');
  document.getElementById('ov-sub').textContent   =t('gstIntroSub');
  document.getElementById('ov-score').style.display='none';
  document.getElementById('ov-stats').style.display='none';
  document.getElementById('ov-best').style.display='none';
  document.getElementById('startBtn').textContent =t('gstStart');
  const isMobile=window.matchMedia('(pointer:coarse)').matches;
  document.getElementById('ov-hint').textContent  =isMobile?t('gstHintMobile'):t('gstHintDesktop');
  document.getElementById('overlay').classList.remove('hidden');
  setSizes();
  // draw empty grid
  gctx.fillStyle='#0a0b14'; gctx.fillRect(0,0,gc.width,gc.height);
}

setSizes();
showIntro();
})();
