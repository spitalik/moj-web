<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Neon Lane · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050507;--bg1:#0c0c10;--bg2:#111116;--text:#f0eeff;--muted:rgba(240,238,255,.42);
  --border:rgba(255,255,255,.08);--border-h:rgba(255,255,255,.16);--cyan:#65d6ff;--pink:#ff86d1;--gold:#ffd166;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;user-select:none;touch-action:none}
body::before{content:"";position:fixed;right:-190px;top:-230px;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(101,214,255,.08),transparent 66%);pointer-events:none}
body::after{content:"";position:fixed;left:-210px;bottom:-260px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(255,134,209,.055),transparent 66%);pointer-events:none}
#back-btn{position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:all .18s}
#back-btn:hover{border-color:var(--border-h);color:var(--text)}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;padding:64px 14px 18px}
.game-title{font-family:'Syne',sans-serif;font-size:clamp(25px,7vw,38px);font-weight:800;letter-spacing:0;background:linear-gradient(135deg,#fff 25%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hud{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;max-width:760px}
.pill,.ctrl-btn{height:32px;border-radius:100px;border:1px solid var(--border);background:var(--bg2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500}
.pill{display:flex;align-items:center;gap:6px;color:var(--muted);padding:0 12px;white-space:nowrap}
.pill span{color:var(--cyan);font-variant-numeric:tabular-nums}
.ctrl-btn{color:var(--muted);padding:0 13px;cursor:pointer;transition:all .18s}
.ctrl-btn:hover,.ctrl-btn:focus-visible{border-color:var(--border-h);color:var(--text);outline:none}
#game-wrap{position:relative;border:1px solid var(--border);border-radius:16px;background:linear-gradient(180deg,var(--bg2),var(--bg1));padding:8px;box-shadow:0 22px 80px rgba(0,0,0,.35)}
canvas{display:block;width:min(92vw,560px);height:auto;border-radius:11px;background:#070b10}
#overlay{position:absolute;z-index:20;inset:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:rgba(5,5,7,.91);backdrop-filter:blur(14px);border-radius:12px;text-align:center;padding:18px}
#overlay.hidden{display:none}
.ov-icon{font-size:42px;line-height:1}
#overlay h2{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:0}
.hint{max-width:390px;color:var(--muted);font-size:12px;line-height:1.5}
.play-btn{min-width:118px;height:40px;border-radius:100px;border:1px solid rgba(101,214,255,.46);background:rgba(101,214,255,.15);color:var(--cyan);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:0 28px;cursor:pointer;box-shadow:0 10px 28px rgba(0,0,0,.34)}
.touch-controls{display:flex;gap:8px;margin-top:2px}
.touch-controls button{width:58px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-size:16px}
.touch-controls button:active{border-color:var(--border-h);color:var(--text)}
@media (max-height:700px){.page{gap:9px}.game-title{font-size:24px}.pill,.ctrl-btn{height:29px}.touch-controls button{height:34px}}
@media (orientation: landscape) and (max-height: 560px) {
  .page { padding: 46px 10px 8px; gap: 6px; }
  #back-btn { top: 8px; left: 8px; padding: 5px 12px; font-size: 11px; }
  .game-title { font-size: 18px; }
  .pill,.ctrl-btn { height: 24px; font-size: 10px; }
  .touch-controls { gap: 5px; margin-top: 0; }
  .touch-controls button { width: 44px; height: 28px; font-size: 13px; }
}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>

<main class="page">
  <h1 class="game-title" id="lbl-title"></h1>
  <div class="hud">
    <div class="pill"><span id="lbl-score"></span>&nbsp;<span id="hud-score">0</span></div>
    <div class="pill"><span id="lbl-speed"></span>&nbsp;<span id="hud-speed">0</span></div>
    <div class="pill"><span id="lbl-boost"></span>&nbsp;<span id="hud-boost">0</span></div>
    <div class="pill"><span id="lbl-best"></span>&nbsp;<span id="hud-best">0</span></div>
    <button class="ctrl-btn" id="btn-pause"></button>
    <button class="ctrl-btn" id="btn-reset"></button>
  </div>
  <div id="game-wrap">
    <canvas id="c" width="560" height="520"></canvas>
    <div id="overlay">
      <div class="ov-icon">🏎️</div>
      <h2 id="ov-title"></h2>
      <p class="hint" id="ov-hint"></p>
      <button class="play-btn" id="ov-btn"></button>
    </div>
  </div>
  <div class="touch-controls">
    <button id="touch-left">◀</button>
    <button id="touch-boost">◆</button>
    <button id="touch-right">▶</button>
  </div>
</main>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

function fitCanvas(){
  const page = document.querySelector('.page');
  const title = document.querySelector('.game-title');
  const hud = document.querySelector('.hud');
  const wrap = document.getElementById('game-wrap');
  const touch = document.querySelector('.touch-controls');
  const pageCs = getComputedStyle(page);
  const gap = parseFloat(pageCs.rowGap || pageCs.gap) || 13;
  const padTop = parseFloat(pageCs.paddingTop) || 0;
  const padBottom = parseFloat(pageCs.paddingBottom) || 0;
  const wrapCs = getComputedStyle(wrap);
  const wrapExtra = (parseFloat(wrapCs.paddingTop)||0) + (parseFloat(wrapCs.paddingBottom)||0)
                   + (parseFloat(wrapCs.borderTopWidth)||0) + (parseFloat(wrapCs.borderBottomWidth)||0);
  const touchH = (touch && touch.offsetParent !== null) ? touch.offsetHeight : 0;
  const reservedH = title.offsetHeight + hud.offsetHeight + touchH + padTop + padBottom + gap*3 + wrapExtra;
  const availH = window.innerHeight - reservedH;
  const availW = Math.min(window.innerWidth * 0.92, 560);
  const ratio = W / H;
  const targetW = Math.max(140, Math.min(availW, availH * ratio));
  canvas.style.width = Math.floor(targetW) + 'px';
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', () => setTimeout(fitCanvas, 250));
fitCanvas();
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ov-title');
const ovHint = document.getElementById('ov-hint');
const ovBtn = document.getElementById('ov-btn');
const btnPause = document.getElementById('btn-pause');
const btnReset = document.getElementById('btn-reset');
const hudScore = document.getElementById('hud-score');
const hudSpeed = document.getElementById('hud-speed');
const hudBoost = document.getElementById('hud-boost');
const hudBest = document.getElementById('hud-best');
const keys = {};
const STORAGE = 'neon_lane_best';
const lanes = [170, 245, 315, 390];
let player, traffic, boosts, sparks;
let lane = 1, targetLane = 1;
let speed = 220, score = 0, boost = 45, road = 0;
let running = false, paused = false, lastTime = 0, frameId = 0, spawnTimer = 0, boostTimer = 2.2;
let message = '', messageTimer = 0;

function applyLabels(){
  document.getElementById('lbl-back').textContent = t('back');
  document.getElementById('lbl-title').textContent = t('neonLaneTitle');
  document.getElementById('lbl-score').textContent = t('neonLaneScore');
  document.getElementById('lbl-speed').textContent = t('neonLaneSpeed');
  document.getElementById('lbl-boost').textContent = t('neonLaneBoost');
  document.getElementById('lbl-best').textContent = t('neonLaneBest');
  btnPause.textContent = t('neonLanePause');
  btnReset.textContent = t('neonLaneReset');
  ovTitle.textContent = t('neonLaneTitle');
  ovHint.textContent = t('neonLaneHint');
  ovBtn.textContent = t('neonLaneStart');
}

function resetGame(){
  cancelAnimationFrame(frameId);
  lane = 1; targetLane = 1;
  player = {x:lanes[lane], y:H-82, w:34, h:58};
  traffic = []; boosts = []; sparks = [];
  speed = 220; score = 0; boost = 45; road = 0;
  spawnTimer = .4; boostTimer = 2.2;
  running = true; paused = false; message = ''; messageTimer = 0;
  btnPause.textContent = t('neonLanePause');
  overlay.classList.add('hidden');
  updateHud();
  lastTime = performance.now();
  frameId = requestAnimationFrame(loop);
}

function loop(now){
  if(!running) return;
  const dt = Math.min(.033, (now - lastTime) / 1000 || 0);
  lastTime = now;
  if(!paused) update(dt);
  draw();
  if(running) frameId = requestAnimationFrame(loop);
}

function update(dt){
  const boosting = (keys.KeyW || keys.ArrowUp || keys.Boost) && boost > 0;
  const braking = keys.KeyS || keys.ArrowDown;
  speed += (boosting ? 185 : braking ? -130 : 18) * dt;
  speed = clamp(speed, 160, 520);
  if(boosting) boost = Math.max(0, boost - 32 * dt);
  else boost = Math.min(100, boost + 8 * dt);
  player.x += (lanes[targetLane] - player.x) * Math.min(1, dt * 12);
  road = (road + speed * dt) % 80;
  score += speed * dt * .045;
  spawnTimer -= dt;
  boostTimer -= dt;
  if(spawnTimer <= 0){
    spawnTraffic();
    spawnTimer = Math.max(.42, 1.15 - score / 1800);
  }
  if(boostTimer <= 0){
    boosts.push({x:lanes[Math.floor(Math.random()*lanes.length)], y:-30, r:11});
    boostTimer = 3.1 + Math.random() * 2;
  }
  for(const car of traffic){
    car.y += (speed - car.speed) * dt;
    if(rects(player, car)) crash();
  }
  for(const item of boosts){
    item.y += speed * dt;
    if(Math.hypot(player.x-item.x, player.y-item.y) < 34){
      item.dead = true;
      boost = Math.min(100, boost + 35);
      flash('+ ' + t('neonLaneBoost'));
    }
  }
  traffic = traffic.filter(c => c.y < H + 80);
  boosts = boosts.filter(b => !b.dead && b.y < H + 40);
  sparks.forEach(s => {s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=dt;});
  sparks = sparks.filter(s => s.life > 0);
  messageTimer = Math.max(0, messageTimer - dt);
  updateHud();
}

function spawnTraffic(){
  const used = new Set();
  const count = Math.random() < .28 ? 2 : 1;
  for(let i=0;i<count;i++){
    let l = Math.floor(Math.random() * lanes.length);
    if(used.has(l)) l = (l + 1) % lanes.length;
    used.add(l);
    traffic.push({x:lanes[l], y:-70 - i*45, w:34, h:58, speed:70 + Math.random()*120, color:['#ff6b6b','#ffd166','#a78bfa','#55f0a0'][Math.floor(Math.random()*4)]});
  }
}

function changeLane(dir){
  if(!running){resetGame();return;}
  targetLane = clamp(targetLane + dir, 0, lanes.length - 1);
}

function crash(){
  burst(player.x, player.y);
  const best = Number(localStorage.getItem(STORAGE) || 0);
  if(Math.floor(score) > best) localStorage.setItem(STORAGE, String(Math.floor(score)));
  running = false;
  cancelAnimationFrame(frameId);
  ovTitle.textContent = t('neonLaneOver');
  ovHint.textContent = `${t('neonLaneScore')}: ${Math.floor(score)}`;
  ovBtn.textContent = t('neonLaneStart');
  overlay.classList.remove('hidden');
  updateHud();
}

function burst(x,y){
  for(let i=0;i<24;i++){
    const a = Math.random()*Math.PI*2, s = 70 + Math.random()*180;
    sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.35+Math.random()*.35});
  }
}

function rects(a,b){return Math.abs(a.x-b.x)<(a.w+b.w)/2-4 && Math.abs(a.y-b.y)<(a.h+b.h)/2-5}
function flash(text){message=text;messageTimer=.9}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function updateHud(){
  hudScore.textContent = Math.floor(score);
  hudSpeed.textContent = Math.floor(speed);
  hudBoost.textContent = Math.floor(boost);
  hudBest.textContent = localStorage.getItem(STORAGE) || '0';
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#08131a'); bg.addColorStop(1,'#050709');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  drawRoad(); drawBoosts(); drawTraffic(); drawPlayer(); drawSparks(); drawMessage();
}

function drawRoad(){
  ctx.fillStyle = '#10161d';
  roundRect(120,0,320,H,0,true,false);
  ctx.strokeStyle = 'rgba(101,214,255,.28)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(120,0); ctx.lineTo(120,H); ctx.moveTo(440,0); ctx.lineTo(440,H); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,.18)';
  ctx.lineWidth = 2;
  for(let i=1;i<lanes.length;i++){
    const x = (lanes[i-1] + lanes[i]) / 2;
    for(let y=-80+road;y<H;y+=80){
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+38); ctx.stroke();
    }
  }
  ctx.fillStyle = 'rgba(255,134,209,.05)';
  for(let y=-60+road;y<H;y+=120){ctx.fillRect(80,y,28,50);ctx.fillRect(452,y+40,28,50);}
}

function drawCar(car, isPlayer=false){
  ctx.save(); ctx.translate(car.x, car.y);
  ctx.fillStyle = isPlayer ? '#65d6ff' : car.color;
  ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = isPlayer ? 18 : 10;
  roundRect(-car.w/2,-car.h/2,car.w,car.h,8,true,false);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,.8)';
  ctx.fillRect(-car.w/2+6,-car.h/2+8,car.w-12,8);
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  ctx.fillRect(-car.w/2+6,car.h/2-15,car.w-12,6);
  if(isPlayer){
    ctx.fillStyle = '#ffd166';
    ctx.fillRect(-car.w/2+5,car.h/2,7,10);
    ctx.fillRect(car.w/2-12,car.h/2,7,10);
  }
  ctx.restore();
}

function drawTraffic(){traffic.forEach(c => drawCar(c));}
function drawPlayer(){drawCar({...player}, true);}
function drawBoosts(){
  for(const b of boosts){
    ctx.fillStyle = '#ffd166'; ctx.shadowColor = '#ffd166'; ctx.shadowBlur = 18;
    ctx.beginPath(); ctx.moveTo(b.x,b.y-13); ctx.lineTo(b.x+12,b.y); ctx.lineTo(b.x,b.y+13); ctx.lineTo(b.x-12,b.y); ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
  }
}
function drawSparks(){ctx.fillStyle='#ffd166';for(const s of sparks){ctx.globalAlpha=Math.max(0,s.life*2);ctx.fillRect(s.x,s.y,4,4);}ctx.globalAlpha=1;}
function drawMessage(){if(messageTimer<=0)return;ctx.save();ctx.globalAlpha=Math.min(1,messageTimer*2);ctx.fillStyle='#ffd166';ctx.font='800 24px Syne';ctx.textAlign='center';ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=12;ctx.fillText(message,W/2,45);ctx.restore();}
function roundRect(x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);if(fill)ctx.fill();if(stroke)ctx.stroke();}

window.addEventListener('keydown', e => {
  if(keys[e.code]) return;
  keys[e.code] = true;
  if(e.code === 'ArrowLeft' || e.code === 'KeyA') changeLane(-1);
  if(e.code === 'ArrowRight' || e.code === 'KeyD') changeLane(1);
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('pointerdown', e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  changeLane(x < rect.width / 2 ? -1 : 1);
});
document.getElementById('touch-left').addEventListener('click', () => changeLane(-1));
document.getElementById('touch-right').addEventListener('click', () => changeLane(1));
document.getElementById('touch-boost').addEventListener('pointerdown', () => {keys.Boost = true;});
document.getElementById('touch-boost').addEventListener('pointerup', () => {keys.Boost = false;});
document.getElementById('touch-boost').addEventListener('pointerleave', () => {keys.Boost = false;});
btnReset.addEventListener('click', resetGame);
btnPause.addEventListener('click', () => {if(!running)return;paused=!paused;btnPause.textContent=paused?t('neonLaneResume'):t('neonLanePause');draw();});
ovBtn.addEventListener('click', resetGame);

applyLabels();
player = {x:lanes[1], y:H-82, w:34, h:58}; traffic=[]; boosts=[]; sparks=[];
draw();
</script>
</body>
</html>
