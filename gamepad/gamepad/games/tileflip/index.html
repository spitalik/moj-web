<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tile Flip</title>
  <script src="../../i18n.js"></script>
  <style>
    :root{--bg:#0b0b10;--card:#0f1720;--accent:#3b82f6;--muted:#9ca3af}
    body{font-family:system-ui,Arial,Helvetica;background:var(--bg);color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:24px}
    .board-wrap{background:var(--card);padding:18px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.6)}
    .controls{display:flex;gap:8px;align-items:center;margin-bottom:12px}
    select,button{padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit}
    #moves{margin-left:8px;color:var(--muted)}
    .grid{display:grid;gap:6px;background:transparent}
    .tile{width:56px;height:56px;background:#111;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:transform .12s,background .12s}
    .tile.on{background:var(--accent);transform:scale(1.04)}
    h1{font-size:20px;margin-bottom:12px}
    .footer{margin-top:12px;color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <h1 id="title">Tile Flip</h1>
  <div class="board-wrap">
    <div class="controls">
      <label for="size">Size:</label>
      <select id="size"><option value="3">3×3</option><option value="5" selected>5×5</option><option value="7">7×7</option></select>
      <button id="btn-new">New</button>
      <div id="moves">0</div>
    </div>
    <div id="grid" class="grid" aria-label="Tile grid"></div>
  </div>
  <div class="footer" id="footer">Click a tile to flip it and its neighbours. Get all tiles on.</div>

  <script>
    const gridEl = document.getElementById('grid');
    const sizeSel = document.getElementById('size');
    const btnNew = document.getElementById('btn-new');
    const movesEl = document.getElementById('moves');
    const titleEl = document.getElementById('title');
    const footerEl = document.getElementById('footer');

    let size = parseInt(sizeSel.value,10);
    let board = [];
    let moves = 0;

    function randBool(){return Math.random() < 0.5}

    function makeBoard(n){
      size = n; board = Array.from({length:n},()=>Array.from({length:n},()=>randBool()));
      moves = 0; render();
    }

    function render(){
      gridEl.style.gridTemplateColumns = `repeat(${size}, 56px)`;
      gridEl.innerHTML = '';
      for(let r=0;r<size;r++){
        for(let c=0;c<size;c++){
          const btn = document.createElement('div'); btn.className='tile';
          if(board[r][c]) btn.classList.add('on');
          btn.dataset.r = r; btn.dataset.c = c;
          btn.addEventListener('click', onTileClick);
          gridEl.appendChild(btn);
        }
      }
      movesEl.textContent = t('tileflipMoves',{n:moves});
    }

    function flip(r,c){
      if(r<0||c<0||r>=size||c>=size) return;
      board[r][c] = !board[r][c];
    }

    function onTileClick(e){
      const r = Number(e.currentTarget.dataset.r);
      const c = Number(e.currentTarget.dataset.c);
      flip(r,c); flip(r-1,c); flip(r+1,c); flip(r,c-1); flip(r,c+1);
      moves++; render(); checkWin();
    }

    function checkWin(){
      const ok = board.every(row=>row.every(v=>v));
      if(ok){ setTimeout(()=>{ alert(t('tileflipWin')); },120); }
    }

    sizeSel.addEventListener('change', ()=>{ makeBoard(parseInt(sizeSel.value,10)) });
    btnNew.addEventListener('click', ()=>{ makeBoard(size) });

    function applyLangLocal(){
      titleEl.textContent = t('tileflipTitle');
      btnNew.textContent = t('tileflipNew');
      footerEl.textContent = t('tileflipDesc');
      movesEl.textContent = t('tileflipMoves',{n:moves});
    }

    window.addEventListener('storage',(e)=>{ if(e.key==='gamepad_lang') applyLangLocal(); });
    applyLangLocal(); makeBoard(size);

    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  </script>
</body>
</html>
