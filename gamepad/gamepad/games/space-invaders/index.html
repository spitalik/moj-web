<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Invaders · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#050507;--bg2:#111116;--text:#f0eeff;--muted:rgba(240,238,255,0.38);--border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);--c:#a78bfa;}
html,body{background:var(--bg);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;user-select:none;overflow:hidden;}
#back-btn{position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:all .18s;}
#back-btn:hover{border-color:var(--border-h);color:var(--text);}
.hud{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;}
.stat-pill{background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;white-space:nowrap;}
.stat-pill span{color:var(--c);}
canvas{display:block;position:fixed;inset:0;width:100%;height:100%;}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(5,5,7,.9);backdrop-filter:blur(10px);z-index:20;}
#overlay h2{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;}
.score-big{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--c);letter-spacing:-2px;}
.hint{font-size:12px;color:var(--muted);text-align:center;padding:0 20px;}
.play-btn{background:rgba(167,139,250,0.14);border:1px solid rgba(167,139,250,.3);color:var(--c);padding:10px 30px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
.diff-row{display:flex;gap:6px;}
.diff-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .18s;}
.diff-btn:hover,.diff-btn.active{border-color:rgba(167,139,250,.4);color:var(--c);background:rgba(167,139,250,0.1);}
#ctrl-area{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10;}
.ctrl-btn{width:64px;height:64px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;color:var(--muted);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .12s;}
.ctrl-btn:active,.ctrl-btn.pressed{background:rgba(167,139,250,0.14);border-color:rgba(167,139,250,.3);color:var(--c);}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>
<div class="hud">
  <div class="stat-pill"><span id="lbl-score-txt"></span>&nbsp;<span id="hud-score">0</span></div>
  <div class="stat-pill">❤️&nbsp;<span id="hud-lives">3</span></div>
  <div class="stat-pill"><span id="lbl-wave-txt"></span>&nbsp;<span id="hud-wave">1</span></div>
</div>
<canvas id="c"></canvas>
<div id="ctrl-area">
  <button class="ctrl-btn" id="btn-left"  onpointerdown="keys.left=true"  onpointerup="keys.left=false"  onpointerleave="keys.left=false">◄</button>
  <button class="ctrl-btn" id="btn-fire"  onpointerdown="fire()">🔥</button>
  <button class="ctrl-btn" id="btn-right" onpointerdown="keys.right=true" onpointerup="keys.right=false" onpointerleave="keys.right=false">►</button>
</div>
<div id="overlay">
  <div style="font-size:44px">🚀</div>
  <h2 id="ov-title"></h2>
  <div class="diff-row" id="diff-row"></div>
  <div class="hint" id="ov-hint"></div>
  <button class="play-btn" id="ov-btn" onclick="startGame()"></button>
</div>
<script>
document.getElementById('lbl-back').textContent      = t('back');
document.getElementById('lbl-score-txt').textContent = t('siScore');
document.getElementById('lbl-wave-txt').textContent  = t('siWave');
document.getElementById('ov-title').textContent      = t('siTitle');
document.getElementById('ov-hint').textContent       = t('siHint');
document.getElementById('ov-btn').textContent        = t('siPlay');

const DIFFS=[{key:'easy',alienSpeed:0.5,fireRate:90,alienFire:0.0008},{key:'medium',alienSpeed:1.0,fireRate:60,alienFire:0.0015},{key:'hard',alienSpeed:1.6,fireRate:40,alienFire:0.003}];
let diffIdx=1;
const dr=document.getElementById('diff-row');
DIFFS.forEach((d,i)=>{
  const btn=document.createElement('button');btn.className='diff-btn'+(i===diffIdx?' active':'');
  btn.textContent=t('diff'+d.key[0].toUpperCase()+d.key.slice(1));
  btn.onclick=()=>{diffIdx=i;dr.querySelectorAll('.diff-btn').forEach((b,j)=>b.classList.toggle('active',j===i));};
  dr.appendChild(btn);
});

const C=document.getElementById('c'),ctx=C.getContext('2d');
let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

const keys={left:false,right:false,fire:false};
let player,aliens,bullets,alienBullets,particles,score,lives,wave,animId,running,alienDir,alienDropTimer,fireCooldown,frameCount;

const ALIEN_ROWS=4,ALIEN_COLS=10,ALIEN_W=36,ALIEN_H=28,ALIEN_GAP=12;
const EMOJIS=['👾','👽','🛸','🤖'];

function startGame(){
  document.getElementById('overlay').style.display='none';
  score=0;lives=3;wave=1;
  spawnWave();
  running=true;fireCooldown=0;frameCount=0;
  cancelAnimationFrame(animId);loop();
  updateHUD();
}

function spawnWave(){
  const d=DIFFS[diffIdx];
  const totalW=ALIEN_COLS*(ALIEN_W+ALIEN_GAP);
  const startX=(W-totalW)/2;
  aliens=[];
  for(let r=0;r<ALIEN_ROWS;r++)for(let c=0;c<ALIEN_COLS;c++){
    aliens.push({x:startX+c*(ALIEN_W+ALIEN_GAP),y:60+r*(ALIEN_H+ALIEN_GAP),w:ALIEN_W,h:ALIEN_H,row:r,alive:true});
  }
  alienDir=1;alienDropTimer=0;
  player={x:W/2-20,y:H-100,w:40,h:28};
  bullets=[];alienBullets=[];particles=[];
}

function updateHUD(){
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-lives').textContent=lives;
  document.getElementById('hud-wave').textContent=wave;
}

function loop(){if(!running)return;update();draw();animId=requestAnimationFrame(loop);}

function fire(){
  if(!running||fireCooldown>0)return;
  bullets.push({x:player.x+player.w/2,y:player.y,w:3,h:14,speed:10});
  fireCooldown=DIFFS[diffIdx].fireRate;
}

function update(){
  frameCount++;
  if(fireCooldown>0)fireCooldown--;
  const d=DIFFS[diffIdx];
  const spd=d.alienSpeed*(1+(wave-1)*0.3);

  // Player move
  if(keys.left)player.x=Math.max(0,player.x-5);
  if(keys.right)player.x=Math.min(W-player.w,player.x+5);
  if(keys.fire)fire();

  // Aliens move
  let hitEdge=false;
  const liveAliens=aliens.filter(a=>a.alive);
  if(!liveAliens.length){wave++;spawnWave();updateHUD();return;}

  liveAliens.forEach(a=>{a.x+=alienDir*spd;});
  const leftmost=Math.min(...liveAliens.map(a=>a.x));
  const rightmost=Math.max(...liveAliens.map(a=>a.x+a.w));
  if(rightmost>=W-10||leftmost<=10){
    alienDir*=-1;
    liveAliens.forEach(a=>a.y+=20);
  }

  // Alien fire
  liveAliens.forEach(a=>{
    if(Math.random()<d.alienFire)alienBullets.push({x:a.x+a.w/2,y:a.y+a.h,w:3,h:12,speed:4+wave*0.3});
  });

  // Move bullets
  bullets=bullets.filter(b=>b.y>-20);
  bullets.forEach(b=>b.y-=b.speed);
  alienBullets=alienBullets.filter(b=>b.y<H+20);
  alienBullets.forEach(b=>b.y+=b.speed);

  // Bullet-alien collision
  bullets.forEach(b=>{
    aliens.forEach(a=>{
      if(!a.alive)return;
      if(b.x>a.x&&b.x<a.x+a.w&&b.y>a.y&&b.y<a.y+a.h){
        a.alive=false;b.y=-999;
        score+=10*(ALIEN_ROWS-a.row);updateHUD();
        for(let i=0;i<8;i++)particles.push({x:a.x+a.w/2,y:a.y+a.h/2,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:20,color:'#a78bfa'});
      }
    });
  });

  // Alien bullet hits player
  alienBullets.forEach(b=>{
    if(b.x>player.x&&b.x<player.x+player.w&&b.y>player.y&&b.y<player.y+player.h){
      b.y=H+999;lives--;updateHUD();
      for(let i=0;i<12;i++)particles.push({x:player.x+player.w/2,y:player.y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:30,color:'#ffd166'});
      if(lives<=0){gameOver();return;}
    }
  });

  // Aliens reach bottom
  if(liveAliens.some(a=>a.y+a.h>H-120)){gameOver();return;}

  // Particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
}

function gameOver(){
  running=false;cancelAnimationFrame(animId);
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div style="font-size:44px">💥</div>
    <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:26px">${t('siOver')}</h2>
    <div class="score-big">${score}</div>
    <div style="font-size:12px;color:var(--muted)">${t('siWave')} ${wave}</div>
    <div class="diff-row" id="dr2" style="margin-top:4px"></div>
    <button class="play-btn" onclick="startGame()" style="margin-top:4px">${t('siAgain')}</button>`;
  ov.style.display='flex';
  const dr2=document.getElementById('dr2');
  DIFFS.forEach((d,i)=>{const btn=document.createElement('button');btn.className='diff-btn'+(i===diffIdx?' active':'');btn.textContent=t('diff'+d.key[0].toUpperCase()+d.key.slice(1));btn.onclick=()=>{diffIdx=i;dr2.querySelectorAll('.diff-btn').forEach((b,j)=>b.classList.toggle('active',j===i));};dr2.appendChild(btn);});
}

function draw(){
  ctx.fillStyle='#050507';ctx.fillRect(0,0,W,H);
  // Stars
  ctx.fillStyle='rgba(255,255,255,0.2)';
  for(let i=0;i<60;i++){ctx.fillRect((i*137+frameCount*0.1)%W,(i*97)%H,1,1);}

  // Aliens
  ctx.font=`${ALIEN_H*0.9}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  aliens.forEach(a=>{
    if(!a.alive)return;
    ctx.globalAlpha=1;
    ctx.fillText(EMOJIS[a.row%EMOJIS.length],a.x+a.w/2,a.y+a.h/2);
  });ctx.globalAlpha=1;

  // Bullets
  ctx.fillStyle='#ffd166';ctx.shadowColor='#ffd166';ctx.shadowBlur=8;
  bullets.forEach(b=>{ctx.fillRect(b.x-b.w/2,b.y,b.w,b.h);});
  ctx.fillStyle='#ff6b6b';ctx.shadowColor='#ff6b6b';
  alienBullets.forEach(b=>{ctx.fillRect(b.x-b.w/2,b.y,b.w,b.h);});
  ctx.shadowBlur=0;

  // Player ship
  const px=player.x,py=player.y,pw=player.w,ph=player.h;
  ctx.fillStyle='#a78bfa';ctx.shadowColor='rgba(167,139,250,0.5)';ctx.shadowBlur=12;
  ctx.beginPath();ctx.moveTo(px+pw/2,py);ctx.lineTo(px+pw,py+ph);ctx.lineTo(px,py+ph);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.moveTo(px+pw/2,py+4);ctx.lineTo(px+pw/2+8,py+ph-4);ctx.lineTo(px+pw/2-8,py+ph-4);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/30;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;

  // Ground line
  ctx.strokeStyle='rgba(167,139,250,0.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,H-80);ctx.lineTo(W,H-80);ctx.stroke();
}

document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.left=true;
  if(e.code==='ArrowRight'||e.code==='KeyD')keys.right=true;
  if(e.code==='Space'||e.code==='KeyF'){e.preventDefault();fire();}
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD')keys.right=false;
});
</script>
</body>
</html>
