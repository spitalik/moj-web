<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Binary Grid · GamePad</title>
    <script src="../../i18n.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1e2b3c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 12px;
            margin: 0;
        }
        .game-container {
            background: #2c3e50;
            max-width: 700px;
            width: 100%;
            padding: 22px 18px 28px;
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6), inset 0 1px 4px rgba(255,255,255,0.08);
            transition: all 0.2s;
            position: relative;
            margin-top: 36px;
        }
        #back-btn {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(15, 26, 36, 0.85);
            border: 1px solid #3e5a6b;
            color: #aac3d4;
            padding: 7px 14px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            backdrop-filter: blur(4px);
            transition: all .18s;
        }
        #back-btn:hover, #back-btn:active {
            border-color: #6f9bb0;
            color: #f0f9ff;
        }
        h1 {
            text-align: center;
            font-weight: 400;
            letter-spacing: 1px;
            font-size: 1.9rem;
            color: #ecf0f1;
            text-shadow: 0 4px 8px #0f1a24;
            margin-top: -6px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        h1 small {
            font-size: 1rem;
            background: #3e5a6b;
            padding: 0 14px;
            border-radius: 40px;
            color: #d0e1ed;
            font-weight: 300;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f3342;
            padding: 10px 18px;
            border-radius: 60px;
            margin: 12px 0 18px;
            color: #bdd6e6;
            font-weight: 500;
            font-size: 1rem;
            box-shadow: inset 0 2px 6px #0d1a24;
            flex-wrap: wrap;
            gap: 6px 12px;
        }
        .status-bar span {
            background: #0f202b;
            padding: 4px 16px;
            border-radius: 40px;
            color: #b3d9f0;
        }
        .grid-wrapper {
            background: #1d3140;
            padding: 16px 12px;
            border-radius: 40px;
            box-shadow: inset 0 6px 12px #0a171f;
            margin: 8px 0 16px;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            aspect-ratio: 6 / 6;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }
        .cell {
            background: #314f62;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 600;
            color: #f0f9ff;
            text-shadow: 0 3px 0 #0f1f2b;
            box-shadow: 0 6px 0 #16232e, inset 0 -2px 4px rgba(0,0,0,0.3);
            transition: 0.08s linear;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            width: 100%;
            height: auto;
            touch-action: manipulation;
            will-change: transform;
        }
        .cell:active {
            transform: scale(0.92);
            box-shadow: 0 2px 0 #16232e;
        }
        .cell[data-value="0"] {
            background: #3d6a82;
        }
        .cell[data-value="1"] {
            background: #4d8aa8;
        }
        .cell.empty {
            background: #223b4a;
            box-shadow: inset 0 0 0 2px #3f5f72;
            color: #627e8f;
        }
        .cell.fixed {
            cursor: default;
            opacity: 0.9;
            border: 2px solid #d4e9ff;
            box-shadow: 0 4px 0 #16232e, inset 0 0 0 1px #c4dcec;
        }
        .cell.fixed:active {
            transform: none;
        }
        .button-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 18px 0 6px;
        }
        .btn {
            background: #2f5068;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #eaf2f9;
            box-shadow: 0 8px 0 #15232e, 0 4px 10px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: 0.07s ease;
            flex: 1 1 auto;
            min-width: 90px;
            letter-spacing: 0.4px;
            touch-action: manipulation;
            text-align: center;
        }
        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #15232e;
        }
        .btn.reset {
            background: #5d4e4e;
        }
        .btn.check {
            background: #2d6b5c;
        }
        .btn.hint {
            background: #7a5f3b;
        }
        .btn.info {
            background: #4a6a7a;
        }
        .message {
            background: #182a35;
            padding: 10px 18px;
            border-radius: 50px;
            text-align: center;
            font-size: 1rem;
            font-weight: 400;
            color: #c7deec;
            margin: 14px 0 0;
            min-height: 3.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            border-left: 4px solid #4f8aa8;
        }
        .message.win {
            background: #1f4d3f;
            color: #d5f0e6;
            border-left-color: #7fe0b0;
        }
        .message.error {
            background: #5f323b;
            color: #ffcfcf;
            border-left-color: #d97a7a;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #2c3e50;
            max-width: 500px;
            width: 100%;
            padding: 32px 28px;
            border-radius: 40px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.8);
            border: 1px solid #4a6a7a;
            animation: modalFade 0.25s ease;
        }
        @keyframes modalFade {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal h2 {
            color: #ecf0f1;
            font-weight: 400;
            font-size: 1.8rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal h2 small {
            font-size: 1rem;
            background: #3e5a6b;
            padding: 0 14px;
            border-radius: 40px;
            color: #d0e1ed;
            font-weight: 300;
        }
        .modal p {
            color: #d5e6f0;
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 16px 0;
            padding: 0 4px;
        }
        .modal ul {
            color: #c7deec;
            font-size: 1rem;
            line-height: 1.7;
            padding-left: 24px;
            margin: 12px 0 20px;
        }
        .modal ul li {
            margin-bottom: 6px;
        }
        .modal .btn-close {
            background: #4a6a7a;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #eaf2f9;
            box-shadow: 0 6px 0 #1f3342;
            cursor: pointer;
            transition: 0.07s ease;
            width: 100%;
            margin-top: 8px;
            touch-action: manipulation;
        }
        .modal .btn-close:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1f3342;
        }

        /* Landscape / mobile */
        @media (orientation: landscape) and (max-height: 500px) {
            .game-container {
                padding: 12px 16px 16px;
                border-radius: 28px;
                margin-top: 8px;
            }
            #back-btn { top: 8px; left: 8px; font-size: 11px; padding: 5px 11px; }
            h1 { font-size: 1.4rem; margin: 0; }
            .status-bar { font-size: 0.8rem; padding: 4px 12px; margin: 4px 0 8px; }
            .grid-wrapper { padding: 8px; }
            #grid { gap: 5px; }
            .cell { font-size: 1.4rem; border-radius: 12px; }
            .btn { padding: 8px 12px; font-size: 0.85rem; min-width: 70px; }
            .message { font-size: 0.8rem; min-height: 2.2rem; padding: 4px 12px; }
            .modal { padding: 20px; }
            .modal h2 { font-size: 1.4rem; }
        }
        @media (max-width: 460px) {
            .cell { font-size: 1.8rem; }
            .btn { padding: 12px 14px; font-size: 0.95rem; }
        }
        @media (max-width: 380px) {
            #grid { gap: 4px; }
            .cell { font-size: 1.3rem; border-radius: 10px; }
        }
    </style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>
<div class="game-container" role="main">
    <h1>⚫⚪ <small>6×6</small></h1>
    <div class="status-bar">
        <span id="rowStatus">⬜ 0/6</span>
        <span id="cellStatus">🧩 0</span>
    </div>
    <div class="grid-wrapper">
        <div id="grid" role="grid"></div>
    </div>
    <div class="button-row">
        <button class="btn check" id="checkBtn"></button>
        <button class="btn hint" id="hintBtn"></button>
        <button class="btn reset" id="resetBtn"></button>
        <button class="btn info" id="infoBtn"></button>
    </div>
    <div id="message" class="message" aria-live="polite"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-labelledby="modalTitle">
        <h2 id="modalTitle">📖 <span id="lbl-modal-title"></span> <small>Binary Grid</small></h2>
        <p><strong id="lbl-modal-intro"></strong></p>
        <ul>
            <li>✅ <span id="lbl-rule1"></span></li>
            <li>✅ <span id="lbl-rule2"></span></li>
            <li>✅ <span id="lbl-rule3"></span></li>
        </ul>
        <p style="font-size: 0.95rem; color: #aac3d4; margin-top: 6px;" id="lbl-modal-note"></p>
        <button class="btn-close" id="modalCloseBtn"></button>
    </div>
</div>

<script>
    (function(){
        const SIZE = 6;
        const TOTAL = SIZE * SIZE;
        let grid = [];
        let fixedMask = [];
        let solutionGrid = [];
        let gameOver = false;
        let hintCount = 0;

        const gridEl = document.getElementById('grid');
        const rowStatusEl = document.getElementById('rowStatus');
        const cellStatusEl = document.getElementById('cellStatus');
        const messageEl = document.getElementById('message');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalCloseBtn = document.getElementById('modalCloseBtn');
        const infoBtn = document.getElementById('infoBtn');

        document.getElementById('lbl-back').textContent = t('back');

        const checkBtn = document.getElementById('checkBtn');
        const hintBtn = document.getElementById('hintBtn');
        const resetBtn = document.getElementById('resetBtn');
        checkBtn.textContent = t('binaryBtnCheck');
        checkBtn.setAttribute('aria-label', t('binaryAriaCheck'));
        hintBtn.textContent = t('binaryBtnHint');
        hintBtn.setAttribute('aria-label', t('binaryAriaHint'));
        resetBtn.textContent = t('binaryBtnReset');
        resetBtn.setAttribute('aria-label', t('binaryAriaReset'));
        infoBtn.textContent = t('binaryBtnInfo');
        infoBtn.setAttribute('aria-label', t('binaryAriaInfo'));

        document.getElementById('lbl-modal-title').textContent = t('binaryModalTitle');
        document.getElementById('lbl-modal-intro').textContent = t('binaryModalIntro');
        document.getElementById('lbl-rule1').textContent = t('binaryRule1');
        document.getElementById('lbl-rule2').textContent = t('binaryRule2');
        document.getElementById('lbl-rule3').textContent = t('binaryRule3');
        document.getElementById('lbl-modal-note').innerHTML = t('binaryModalNote');
        document.getElementById('modalCloseBtn').textContent = t('binaryModalClose');

        // ---------- modal ----------
        function openModal() {
            modalOverlay.classList.add('active');
        }
        function closeModal() {
            modalOverlay.classList.remove('active');
        }
        infoBtn.addEventListener('click', openModal);
        modalCloseBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) closeModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // ---------- pomocné funkcie ----------
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateSolution() {
            function randomRow() {
                let row = [];
                while (true) {
                    row = [];
                    for (let i = 0; i < SIZE; i++) row.push(Math.random() < 0.5 ? 0 : 1);
                    if (row.filter(v => v === 0).length !== 3) continue;
                    let ok = true;
                    for (let i = 0; i < SIZE-2; i++) {
                        if (row[i] === row[i+1] && row[i] === row[i+2]) { ok = false; break; }
                    }
                    if (ok) return row;
                }
            }

            let rows = [];
            let usedRows = new Set();
            let attempts = 0;
            while (rows.length < SIZE && attempts < 3000) {
                attempts++;
                const candidate = randomRow();
                const key = candidate.join('');
                if (!usedRows.has(key)) {
                    usedRows.add(key);
                    rows.push(candidate);
                }
            }
            while (rows.length < SIZE) {
                const fallback = [];
                for (let i = 0; i < SIZE; i++) fallback.push(i < 3 ? 0 : 1);
                shuffleArray(fallback);
                const key = fallback.join('');
                if (!usedRows.has(key)) {
                    usedRows.add(key);
                    rows.push(fallback);
                } else {
                    for (let i = 0; i < SIZE; i++) fallback[i] = fallback[i] === 0 ? 1 : 0;
                    const key2 = fallback.join('');
                    if (!usedRows.has(key2)) {
                        usedRows.add(key2);
                        rows.push(fallback);
                    }
                }
            }

            for (let col = 0; col < SIZE; col++) {
                let fixed = false;
                for (let row = 0; row < SIZE-2; row++) {
                    if (rows[row][col] === rows[row+1][col] && rows[row][col] === rows[row+2][col]) {
                        fixed = true;
                        break;
                    }
                }
                if (fixed) {
                    for (let r1 = 0; r1 < SIZE && fixed; r1++) {
                        for (let r2 = r1+1; r2 < SIZE && fixed; r2++) {
                            const row1 = rows[r1];
                            const row2 = rows[r2];
                            rows[r1] = row2;
                            rows[r2] = row1;
                            let colOk = true;
                            for (let c = 0; c < SIZE; c++) {
                                for (let r = 0; r < SIZE-2; r++) {
                                    if (rows[r][c] === rows[r+1][c] && rows[r][c] === rows[r+2][c]) { colOk = false; break; }
                                }
                                if (!colOk) break;
                            }
                            if (colOk) { fixed = false; break; }
                            else {
                                rows[r1] = row1;
                                rows[r2] = row2;
                            }
                        }
                    }
                }
            }
            return rows.flat();
        }

        function initGame() {
            solutionGrid = generateSolution();
            grid = new Array(TOTAL).fill(null);
            fixedMask = new Array(TOTAL).fill(false);
            const indices = Array.from({length: TOTAL}, (_, i) => i);
            shuffleArray(indices);
            const fixedCount = Math.floor(Math.random() * 4) + 12;
            for (let i = 0; i < Math.min(fixedCount, TOTAL); i++) {
                const idx = indices[i];
                fixedMask[idx] = true;
                grid[idx] = solutionGrid[idx];
            }
            gameOver = false;
            hintCount = 0;
            render();
            messageEl.textContent = t('binaryMsgIntro');
            messageEl.className = 'message';
        }

        function render() {
            gridEl.innerHTML = '';
            let filled = 0;
            for (let i = 0; i < TOTAL; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const val = grid[i];
                if (val === 0 || val === 1) {
                    cell.setAttribute('data-value', val);
                    cell.textContent = val;
                    filled++;
                } else {
                    cell.classList.add('empty');
                    cell.textContent = '·';
                }
                if (fixedMask[i]) {
                    cell.classList.add('fixed');
                }
                cell.addEventListener('click', (function(index) {
                    return function(e) {
                        e.preventDefault();
                        handleCellClick(index);
                    };
                })(i));
                cell.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                }, { passive: false });

                gridEl.appendChild(cell);
            }

            rowStatusEl.textContent = `⬜ ${countCompletedRows()}/${SIZE}`;
            cellStatusEl.textContent = `🧩 ${filled}/${TOTAL}`;
        }

        function handleCellClick(index) {
            if (gameOver) {
                messageEl.textContent = t('binaryMsgGameOverClick');
                messageEl.className = 'message';
                return;
            }
            if (fixedMask[index]) {
                messageEl.textContent = t('binaryMsgFixedCell');
                messageEl.className = 'message';
                return;
            }
            const current = grid[index];
            let newVal;
            if (current === 0) newVal = 1;
            else if (current === 1) newVal = null;
            else newVal = 0;

            grid[index] = newVal;
            render();
            const filled = grid.filter(v => v === 0 || v === 1).length;
            if (filled === TOTAL) {
                if (checkAllRules()) {
                    gameOver = true;
                    messageEl.textContent = t('binaryMsgWin');
                    messageEl.className = 'message win';
                } else {
                    messageEl.textContent = t('binaryMsgInvalidFull');
                    messageEl.className = 'message error';
                }
            } else {
                messageEl.textContent = t('binaryMsgCellChanged', { filled, total: TOTAL });
                messageEl.className = 'message';
            }
        }

        function countCompletedRows() {
            let count = 0;
            for (let r = 0; r < SIZE; r++) {
                const row = grid.slice(r*SIZE, r*SIZE+SIZE);
                if (row.every(v => v === 0 || v === 1)) count++;
            }
            return count;
        }

        function checkAllRules() {
            if (grid.some(v => v !== 0 && v !== 1)) return false;
            for (let r = 0; r < SIZE; r++) {
                const row = grid.slice(r*SIZE, r*SIZE+SIZE);
                if (row.filter(v => v === 0).length !== 3) return false;
            }
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE-2; c++) {
                    const idx = r*SIZE + c;
                    if (grid[idx] === grid[idx+1] && grid[idx] === grid[idx+2]) return false;
                }
            }
            for (let c = 0; c < SIZE; c++) {
                for (let r = 0; r < SIZE-2; r++) {
                    const idx = r*SIZE + c;
                    if (grid[idx] === grid[idx+SIZE] && grid[idx] === grid[idx+2*SIZE]) return false;
                }
            }
            const rowSet = new Set();
            for (let r = 0; r < SIZE; r++) {
                const row = grid.slice(r*SIZE, r*SIZE+SIZE).join('');
                if (rowSet.has(row)) return false;
                rowSet.add(row);
            }
            return true;
        }

        function resetGame() {
            initGame();
        }

        function checkGame() {
            if (grid.some(v => v !== 0 && v !== 1)) {
                messageEl.textContent = t('binaryMsgIncomplete');
                messageEl.className = 'message error';
                return;
            }
            if (checkAllRules()) {
                gameOver = true;
                messageEl.textContent = t('binaryMsgPerfect');
                messageEl.className = 'message win';
                render();
            } else {
                messageEl.textContent = t('binaryMsgRulesBroken');
                messageEl.className = 'message error';
            }
        }

        function giveHint() {
            if (gameOver) {
                messageEl.textContent = t('binaryMsgAlreadyWon');
                messageEl.className = 'message';
                return;
            }
            const emptyIndices = [];
            for (let i = 0; i < TOTAL; i++) {
                if (grid[i] !== 0 && grid[i] !== 1) emptyIndices.push(i);
            }
            if (emptyIndices.length === 0) {
                messageEl.textContent = t('binaryMsgFullCheckRules');
                messageEl.className = 'message';
                return;
            }

            const idx = emptyIndices[0];
            grid[idx] = solutionGrid[idx];
            hintCount++;
            render();
            messageEl.textContent = t('binaryMsgHint', { n: hintCount, row: Math.floor(idx/SIZE)+1, col: (idx%SIZE)+1, value: grid[idx] });
            messageEl.className = 'message';

            const filled = grid.filter(v => v === 0 || v === 1).length;
            if (filled === TOTAL && checkAllRules()) {
                gameOver = true;
                messageEl.textContent = t('binaryMsgWinAfterHint');
                messageEl.className = 'message win';
                render();
            }
        }

        // ---------- štart ----------
        initGame();

        document.getElementById('resetBtn').addEventListener('click', resetGame);
        document.getElementById('checkBtn').addEventListener('click', checkGame);
        document.getElementById('hintBtn').addEventListener('click', giveHint);
    })();
</script>
</body>
</html>
