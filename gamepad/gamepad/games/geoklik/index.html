<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GeoKlik · GamePad</title>
<script src="../../i18n.js"></script>
<style>
  :root{
    --bg:#080c16;
    --bg-2:#0d1322;
    --panel:#121a2c;
    --panel-2:#16203570;
    --line:#22304a;
    --text:#eef1f8;
    --muted:#8893ad;
    --europe:#3fd6c3;
    --asia:#3fcf7f;
    --africa:#f15f6f;
    --namerica:#f5a93f;
    --samerica:#f0d23f;
    --oceania:#5a8ef0;
    --neutral:#28324a;
    --accent:#b58cff;
    --good:#3fcf7f;
    --bad:#f15f6f;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, #16213a 0%, transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
    touch-action:manipulation;
  }
  .wrap{
    width:100%;
    max-width:980px;
    padding:14px 14px 28px;
    display:flex;
    flex-direction:column;
    gap:12px;
    min-height:100vh;
  }

  #back-btn{
    position:fixed;
    top:14px;
    left:14px;
    z-index:60;
    display:flex;
    align-items:center;
    gap:7px;
    background:rgba(8,12,22,0.85);
    border:1px solid var(--line);
    color:var(--muted);
    padding:7px 14px;
    border-radius:100px;
    text-decoration:none;
    font-size:12px;
    font-weight:600;
    backdrop-filter:blur(4px);
    transition:all .18s;
  }
  #back-btn:hover, #back-btn:active{
    border-color:var(--accent);
    color:var(--text);
  }
  @media (max-width:480px){
    .wrap{ padding-top:52px; }
    .stat-group{ gap:8px; }
    .best-box .score-value{ font-size:14px; }
  }
  @media (min-width:481px){
    .wrap{ padding-top:14px; margin-top:40px; }
  }

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    position:relative;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:9px;
    font-weight:800;
    font-size:15px;
    letter-spacing:0.5px;
  }
  .brand .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 14px 3px var(--accent);
  }
  .stat-group{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .hearts{
    display:flex;
    gap:4px;
    font-size:18px;
    letter-spacing:1px;
  }
  .heart{
    transition:transform .25s ease, opacity .25s ease;
  }
  .heart.lost{
    opacity:.25;
    transform:scale(.8);
    filter:grayscale(1);
  }
  .score-box{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    line-height:1.05;
  }
  .score-label{
    font-size:10px;
    letter-spacing:1.5px;
    color:var(--muted);
    text-transform:uppercase;
  }
  .score-value{
    font-size:20px;
    font-weight:800;
    font-variant-numeric:tabular-nums;
  }
  .best-box .score-value{
    font-size:16px;
    color:var(--muted);
  }

  /* ---------- Prompt card ---------- */
  .prompt-card{
    background:linear-gradient(180deg,var(--panel),#0f1626);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 18px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .prompt-label{
    font-size:11px;
    letter-spacing:1.6px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:4px;
  }
  .prompt-name{
    font-size:clamp(22px,5.5vw,32px);
    font-weight:800;
    letter-spacing:0.3px;
  }
  .prompt-name span{
    background:linear-gradient(90deg,#fff,#c9d4f5);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .feedback-msg{
    margin-top:6px;
    font-size:13px;
    font-weight:700;
    min-height:18px;
    transition:opacity .2s ease;
  }
  .feedback-msg.ok{color:var(--good);}
  .feedback-msg.bad{color:var(--bad);}

  /* ---------- Mode switch ---------- */
  .mode-switch{
    display:flex;
    gap:6px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:4px;
  }
  .mode-btn{
    flex:1;
    appearance:none;
    border:none;
    background:transparent;
    color:var(--muted);
    font-size:12.5px;
    font-weight:700;
    padding:9px 6px;
    border-radius:10px;
    cursor:pointer;
    transition:background .15s ease, color .15s ease;
  }
  .mode-btn.active{
    background:linear-gradient(180deg,var(--accent),#8d63e8);
    color:#0d0a18;
  }

  /* ---------- Map ---------- */
  .map-shell{
    position:relative;
    background:
      radial-gradient(ellipse 700px 420px at 50% 40%, #142036 0%, #0a0f1c 75%);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:6px;
    overflow:hidden;
  }
  .map-shell.shake{
    animation:shake .38s ease;
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(5px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(3px);}
  }
  svg#map{
    width:100%;
    height:auto;
    display:block;
    cursor:grab;
    user-select:none;
    touch-action:none;
  }
  svg#map.panning{
    cursor:grabbing;
  }
  .country{
    stroke:rgba(5,8,16,0.55);
    stroke-width:0.6;
    vector-effect:non-scaling-stroke;
    transition:filter .15s ease, opacity .15s ease;
  }
  .country:hover{
    filter:brightness(1.18);
  }
  .country.flash-good{
    animation:flashGood 0.9s ease;
  }
  .country.flash-bad{
    animation:flashBad 0.9s ease;
  }
  @keyframes flashGood{
    0%{filter:brightness(2.2) saturate(1.4);}
    100%{filter:brightness(1) saturate(1);}
  }
  @keyframes flashBad{
    0%{filter:brightness(0.35) saturate(0.3);}
    100%{filter:brightness(1) saturate(1);}
  }
  .country-label{
    fill:#fff;
    font-weight:800;
    text-shadow:0 1px 3px rgba(0,0,0,.6);
    pointer-events:none;
    paint-order:stroke;
    stroke:rgba(0,0,0,.35);
    stroke-width:2px;
  }

  .marker{
    pointer-events:none;
  }
  .marker-ring{
    fill:none;
    stroke:var(--accent);
    stroke-width:2;
    opacity:0;
    transform-box:fill-box;
    transform-origin:center;
  }
  .marker-pin{
    fill:var(--accent);
    stroke:#fff;
    stroke-width:1.4;
    opacity:0;
    transform-box:fill-box;
    transform-origin:center;
  }
  .marker-tag-bg{
    fill:#0d1322;
    stroke:var(--accent);
    stroke-width:1;
    opacity:0;
    rx:5;
  }
  .marker-tag-text{
    fill:#fff;
    font-weight:700;
    opacity:0;
    pointer-events:none;
  }
  .marker.show .marker-pin,
  .marker.show .marker-tag-bg,
  .marker.show .marker-tag-text{
    opacity:1;
    transition:opacity .25s ease;
  }
  .marker.show .marker-ring{
    animation:pingRing 1.4s ease-out infinite;
  }
  @keyframes pingRing{
    0%{ opacity:.9; transform:scale(0.2);}
    80%{opacity:0; transform:scale(2.6);}
    100%{opacity:0; transform:scale(2.6);}
  }

  /* ---------- Zoom controls ---------- */
  .zoom-controls{
    position:absolute;
    right:10px;
    bottom:10px;
    display:flex;
    flex-direction:column;
    gap:7px;
    z-index:8;
  }
  .zoom-btn{
    width:36px;
    height:36px;
    border-radius:10px;
    border:1px solid var(--line);
    background:rgba(13,19,34,0.85);
    backdrop-filter:blur(4px);
    color:var(--text);
    font-size:17px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    line-height:1;
    user-select:none;
  }
  .zoom-btn:active{
    background:rgba(181,140,255,0.25);
    border-color:var(--accent);
  }
  .zoom-btn.reset{
    font-size:14px;
  }

  /* ---------- Legend ---------- */
  .legend{
    display:flex;
    flex-wrap:wrap;
    gap:8px 14px;
    justify-content:center;
    padding:4px 4px 0;
  }
  .legend-item{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:11.5px;
    color:var(--muted);
  }
  .legend-swatch{
    width:11px;height:11px;border-radius:3px;
    flex:none;
  }

  /* ---------- Float popups (+1/-1) ---------- */
  .pop{
    position:absolute;
    font-weight:800;
    font-size:20px;
    pointer-events:none;
    animation:popFloat 0.9s ease forwards;
    z-index:5;
  }
  .pop.good{color:var(--good);}
  .pop.bad{color:var(--bad);}
  @keyframes popFloat{
    0%{opacity:0; transform:translateY(6px) scale(.8);}
    25%{opacity:1; transform:translateY(-4px) scale(1.05);}
    100%{opacity:0; transform:translateY(-34px) scale(1);}
  }

  /* ---------- Game over modal ---------- */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(5,8,15,0.72);
    backdrop-filter:blur(6px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:50;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
    padding:18px;
  }
  .overlay.active{
    opacity:1;
    pointer-events:auto;
  }
  .modal{
    background:linear-gradient(180deg,#161f34,#0d1322);
    border:1px solid var(--line);
    border-radius:20px;
    padding:28px 26px 24px;
    width:100%;
    max-width:340px;
    text-align:center;
    transform:translateY(10px) scale(.96);
    transition:transform .25s ease;
  }
  .overlay.active .modal{
    transform:translateY(0) scale(1);
  }
  .modal h2{
    margin:0 0 4px;
    font-size:22px;
    font-weight:800;
  }
  .modal .sub{
    color:var(--muted);
    font-size:13px;
    margin-bottom:18px;
  }
  .modal .big-score{
    font-size:46px;
    font-weight:800;
    line-height:1;
    margin-bottom:4px;
    font-variant-numeric:tabular-nums;
  }
  .modal .acc{
    color:var(--muted);
    font-size:13px;
    margin-bottom:20px;
  }
  .btn{
    appearance:none;
    border:none;
    border-radius:12px;
    padding:13px 22px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    width:100%;
    background:linear-gradient(180deg,var(--accent),#8d63e8);
    color:#0d0a18;
    box-shadow:0 6px 18px -4px rgba(181,140,255,.5);
    transition:transform .12s ease;
  }
  .btn:active{transform:scale(.97);}

  .footnote{
    text-align:center;
    color:var(--muted);
    font-size:11px;
    margin-top:2px;
  }

  /* ---------- Landscape mobile (rotated phone) ---------- */
  /* Stacking everything in one column (default layout) is taller than a
     rotated phone's viewport, forcing users to scroll past the map to reach
     the mode switch / zoom controls — it then looks "broken". Below this
     breakpoint we switch to a two-column layout (map left, compact info
     column right) sized to fit a single screen with no scrolling. */
  @media (orientation:landscape) and (max-height:560px){
    body{ min-height:100dvh; }
    .wrap{
      width:100%;
      max-width:100%;
      height:100dvh;
      height:100svh;
      min-height:0;
      margin-top:0;
      padding:8px 10px 8px 8px;
      gap:8px;
      display:grid;
      grid-template-columns:minmax(0,1fr) min(36vw,230px);
      grid-template-rows:auto auto auto minmax(0,1fr);
      grid-template-areas:
        "map topbar"
        "map mode"
        "map prompt"
        "map legend";
      overflow:hidden;
    }
    #back-btn{
      top:8px; left:8px; padding:5px 10px; font-size:11px;
    }
    .topbar{ grid-area:topbar; justify-content:flex-end; }
    .brand{ display:none; }
    .stat-group{ gap:10px; }
    .mode-switch{ grid-area:mode; }
    .mode-btn{ font-size:11px; padding:7px 4px; }
    .prompt-card{ grid-area:prompt; padding:8px 10px; overflow-y:auto; }
    .prompt-label{ font-size:10px; margin-bottom:2px; }
    .prompt-name{ font-size:clamp(15px,3.4vw,20px); }
    .feedback-msg{ font-size:11px; min-height:14px; margin-top:3px; }
    .map-shell{
      grid-area:map;
      height:100%;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:4px;
    }
    svg#map{
      width:auto;
      height:100%;
      max-width:100%;
      max-height:100%;
    }
    .legend{
      grid-area:legend;
      justify-content:flex-start;
      gap:5px 10px;
      overflow-y:auto;
      max-height:100%;
      padding:0;
    }
    .legend-item{ font-size:10.5px; }
    .footnote{ display:none; }
    .overlay{ padding:10px; }
    .modal{
      padding:16px 18px 14px;
      max-height:94dvh;
      max-height:94vh;
      overflow-y:auto;
    }
    .modal h2{ font-size:17px; }
    .modal .sub{ margin-bottom:8px; }
    .modal .big-score{ font-size:32px; margin-bottom:2px; }
    .modal .acc{ margin-bottom:4px; }
    #finalBest{ margin-bottom:10px; }
    .btn{ padding:10px 18px; font-size:14px; }
  }
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>
<div class="wrap">

  <div class="topbar">
    <div class="brand"><span class="dot"></span>GEOKLIK</div>
    <div class="stat-group">
      <div class="hearts" id="hearts"></div>
      <div class="score-box best-box">
        <div class="score-label" id="lbl-best"></div>
        <div class="score-value" id="bestValue">0</div>
      </div>
      <div class="score-box">
        <div class="score-label" id="lbl-score"></div>
        <div class="score-value" id="scoreValue">0</div>
      </div>
    </div>
  </div>

  <div class="mode-switch" id="modeSwitch">
    <button class="mode-btn active" data-mode="continent" type="button" id="modeBtnContinent"></button>
    <button class="mode-btn" data-mode="exact" type="button" id="modeBtnExact"></button>
  </div>

  <div class="prompt-card" id="promptCard">
    <div class="prompt-label" id="promptLabel"></div>
    <div class="prompt-name" id="promptName"><span>—</span></div>
    <div class="feedback-msg" id="feedbackMsg"></div>
  </div>

  <div class="map-shell" id="mapShell">
    <svg id="map" viewBox="0 0 1000 520" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomIn" type="button">+</button>
      <button class="zoom-btn" id="zoomOut" type="button">−</button>
      <button class="zoom-btn reset" id="zoomReset" type="button">⤢</button>
    </div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="footnote" id="footnote"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="lbl-gameover-title"></h2>
    <div class="sub" id="lbl-gameover-sub"></div>
    <div class="big-score" id="finalScore">0</div>
    <div class="acc" id="finalAcc">0</div>
    <div class="acc" id="finalBest" style="opacity:.7;"></div>
    <button class="btn" id="restartBtn"></button>
  </div>
</div>

<script>
const CONTINENT_COLORS = {
  europe:   getComputedStyle(document.documentElement).getPropertyValue('--europe').trim(),
  asia:     getComputedStyle(document.documentElement).getPropertyValue('--asia').trim(),
  africa:   getComputedStyle(document.documentElement).getPropertyValue('--africa').trim(),
  namerica: getComputedStyle(document.documentElement).getPropertyValue('--namerica').trim(),
  samerica: getComputedStyle(document.documentElement).getPropertyValue('--samerica').trim(),
  oceania:  getComputedStyle(document.documentElement).getPropertyValue('--oceania').trim()
};
const CONTINENT_LABELS = {
  europe: t('geoContinentEurope'), asia: t('geoContinentAsia'), africa: t('geoContinentAfrica'),
  namerica: t('geoContinentNAmerica'), samerica: t('geoContinentSAmerica'), oceania: t('geoContinentOceania')
};

// Grammatical case ("in Europe" -> locative/prepositional) is needed for some
// Slavic languages; everyone else can safely reuse the plain nominative name.
const CONT_LOCATIVE = {
  sk: { europe:'Európe', asia:'Ázii', africa:'Afrike', namerica:'Severnej Amerike', samerica:'Južnej Amerike', oceania:'Oceánii' },
  ru: { europe:'Европе', asia:'Азии', africa:'Африке', namerica:'Северной Америке', samerica:'Южной Америке', oceania:'Океании' },
};
function labelGenitive(c){
  const lang = getLang();
  return (CONT_LOCATIVE[lang] && CONT_LOCATIVE[lang][c]) || CONTINENT_LABELS[c];
}

// Country display name: Slovak keeps its hand-translated name, every other
// language falls back to the English name already present in the dataset
// (translating ~90 country names into 12 languages is out of scope here).
function countryName(c){
  return getLang() === 'sk' ? c.s : c.n;

let mode = 'continent'; // 'continent' | 'exact'
let score = 0;
let lives = 3;
let locked = false;
let pendingAdvanceTimer = null;
let queue = [];
let qIndex = 0;
let current = null;
let totalAnswered = 0;
let totalCorrect = 0;

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildLegend(){
  Object.keys(CONTINENT_LABELS).forEach(key=>{
    const item = document.createElement('div');
    item.className='legend-item';
    const sw = document.createElement('span');
    sw.className='legend-swatch';
    sw.style.background = CONTINENT_COLORS[key];
    const txt = document.createElement('span');
    txt.textContent = CONTINENT_LABELS[key];
    item.appendChild(sw);
    item.appendChild(txt);
    legendEl.appendChild(item);
  });
}

function buildMap(){
  DATA.forEach(c=>{
    const path = document.createElementNS(SVGNS,'path');
    path.setAttribute('d', c.d);
    path.setAttribute('class','country');
    path.setAttribute('fill', CONTINENT_COLORS[c.c] || '#2b3552');
    path.setAttribute('data-continent', c.c);
    path.setAttribute('data-name', c.n);
    path.setAttribute('data-namesk', countryName(c));
    path.setAttribute('data-x', c.x);
    path.setAttribute('data-y', c.y);
    svg.appendChild(path);
  });
  DATA.filter(c=>c.big).forEach(c=>{
    if(c.x===null||c.y===null) return;
    const t = document.createElementNS(SVGNS,'text');
    t.setAttribute('x', c.x);
    t.setAttribute('y', c.y);
    t.setAttribute('class','country-label');
    t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size', bigFontSize(c.n));
    t.textContent = countryName(c).toUpperCase();
    svg.appendChild(t);
  });

  // marker group (created last so it renders above everything)
  const marker = document.createElementNS(SVGNS,'g');
  marker.setAttribute('id','marker');
  marker.setAttribute('class','marker');
  marker.innerHTML = `
    <circle class="marker-ring" r="9"></circle>
    <circle class="marker-ring" r="9" style="animation-delay:.4s"></circle>
    <circle class="marker-pin" r="5"></circle>
    <rect class="marker-tag-bg" height="16"></rect>
    <text class="marker-tag-text" font-size="10"></text>
  `;
  svg.appendChild(marker);
}

function bigFontSize(name){
  if(name==='Russia') return 22;
  if(name==='Canada' || name==='United States of America') return 17;
  if(name==='China' || name==='Brazil' || name==='Australia') return 17;
  if(name==='India') return 13;
  if(name==='Greenland') return 12;
  return 14;
}

function placeMarker(x,y,label){
  const marker = document.getElementById('marker');
  if(x===null||y===null){ marker.classList.remove('show'); return; }
  marker.setAttribute('transform', `translate(${x},${y})`);
  const text = marker.querySelector('.marker-tag-text');
  text.textContent = label;
  // size tag background to fit text (approx width)
  requestAnimationFrame(()=>{
    const bbox = text.getBBox();
    const padX = 7;
    const rect = marker.querySelector('.marker-tag-bg');
    rect.setAttribute('width', bbox.width + padX*2);
    rect.setAttribute('x', -(bbox.width/2) - padX);
    rect.setAttribute('y', 10);
    text.setAttribute('x', 0);
    text.setAttribute('y', 21.5);
    text.setAttribute('text-anchor','middle');
  });
  marker.classList.add('show');
}

function hideMarker(){
  document.getElementById('marker').classList.remove('show');
}

function renderHearts(){
  hearts.innerHTML='';
  for(let i=0;i<3;i++){
    const span = document.createElement('span');
    span.className = 'heart' + (i < (3-lives) ? ' lost' : '');
    span.textContent = '♥';
    hearts.appendChild(span);
  }
}

function renderScore(){
  scoreValueEl.textContent = score;
  if(score > bestScore){
    bestScore = score;
    bestValueEl.textContent = bestScore;
    saveBest(bestScore);
  }
}

function popAt(text, good){
  const pop = document.createElement('div');
  pop.className = 'pop ' + (good?'good':'bad');
  pop.textContent = text;
  pop.style.position = 'absolute';
  pop.style.right = '70px';
  pop.style.top = '0px';
  document.querySelector('.topbar').appendChild(pop);
  setTimeout(()=>pop.remove(), 950);
}

function nextRound(){
  hideMarker();
  resetView(true);
  feedbackMsg.textContent = '';
  feedbackMsg.className = 'feedback-msg';
  if(qIndex >= queue.length){
    queue = shuffle(DATA);
    qIndex = 0;
  }
  current = queue[qIndex++];
  promptName.innerHTML = `<span>${countryName(current)}</span>`;
  locked = false;
}

// Same as nextRound(), but keeps the same `current` country — used when the
// player switches mode mid-question and should keep answering about the
// same country, just in the newly selected mode.
function refreshRound(){
  hideMarker();
  resetView(true);
  feedbackMsg.textContent = '';
  feedbackMsg.className = 'feedback-msg';
  promptName.innerHTML = `<span>${countryName(current)}</span>`;
  locked = false;
}

const POINTS = { continent: 1, exact: 10 };

function evaluateSelection(path){
  if(locked) return;
  locked = true;
  totalAnswered++;

  const correct = (mode === 'continent')
    ? path.getAttribute('data-continent') === current.c
    : path.getAttribute('data-name') === current.n;
  const points = POINTS[mode];

  // flash clicked region
  path.classList.add(correct ? 'flash-good' : 'flash-bad');
  setTimeout(()=>path.classList.remove(correct?'flash-good':'flash-bad'), 900);

  if(correct){
    totalCorrect++;
    score += points;
    feedbackMsg.textContent = mode === 'continent'
      ? t('geoCorrectContinent', { country: countryName(current), continent: CONTINENT_LABELS[current.c] })
      : t('geoCorrectExact', { country: countryName(current) });
    feedbackMsg.classList.add('ok');
    popAt('+' + points, true);
  } else {
    score -= points;
    lives -= 1;
    if(mode === 'continent'){
      feedbackMsg.textContent = t('geoIncorrectContinent', { country: countryName(current), continent: labelGenitive(current.c) });
    } else {
      const clickedName = path.getAttribute('data-namesk') || path.getAttribute('data-name');
      feedbackMsg.textContent = t('geoIncorrectExact', { clicked: clickedName, country: countryName(current) });
      // also highlight where the correct country actually was
      const targetPath = getPathByName(current.n);
      if(targetPath && targetPath !== path){
        targetPath.classList.add('flash-good');
        setTimeout(()=>targetPath.classList.remove('flash-good'), 900);
      }
    }
    feedbackMsg.classList.add('bad');
    popAt('−' + points, false);
    mapShell.classList.add('shake');
    setTimeout(()=>mapShell.classList.remove('shake'), 400);
  }
  renderScore();
  renderHearts();
  placeMarker(current.x, current.y, countryName(current));

  if(lives <= 0){
    setTimeout(showGameOver, 1100);
    return;
  }
  pendingAdvanceTimer = setTimeout(nextRound, correct ? 1300 : 1900);
}

function updateModeTexts(){
  if(mode === 'continent'){
    promptLabel.textContent = t('geoPromptContinent');
    footnote.textContent = t('geoFootnoteContinent');
  } else {
    promptLabel.textContent = t('geoPromptExact');
    footnote.textContent = t('geoFootnoteExact');
  }
}

function getPathByName(name){
  return Array.from(svg.querySelectorAll('path[data-continent]')).find(p=>p.getAttribute('data-name')===name);
}

/* ================= Pan & Zoom ================= */
const VB0 = {x:0,y:0,w:1000,h:520};
let vb = {x:0,y:0,w:1000,h:520};
const MIN_W = 15;
const MAX_W = 1000;
let zoomAnimFrame = null;

function applyViewBox(){
  svg.setAttribute('viewBox', vb.x.toFixed(2)+' '+vb.y.toFixed(2)+' '+vb.w.toFixed(2)+' '+vb.h.toFixed(2));
}

function clampViewBox(){
  vb.w = Math.min(MAX_W, Math.max(MIN_W, vb.w));
  vb.h = vb.w * (VB0.h/VB0.w);
  vb.x = Math.min(VB0.w - vb.w, Math.max(0, vb.x));
  vb.y = Math.min(VB0.h - vb.h, Math.max(0, vb.y));
}

function animateViewBoxTo(targetW, targetX, targetY, duration){
  if(zoomAnimFrame) cancelAnimationFrame(zoomAnimFrame);
  const fromW = vb.w, fromX = vb.x, fromY = vb.y, fromH = vb.h;
  const targetH = targetW * (VB0.h/VB0.w);
  const start = performance.now();
  function step(now){
    const t = Math.min(1, (now-start)/duration);
    const e = 1 - Math.pow(1-t, 3);
    vb.w = fromW + (targetW-fromW)*e;
    vb.h = fromH + (targetH-fromH)*e;
    vb.x = fromX + (targetX-fromX)*e;
    vb.y = fromY + (targetY-fromY)*e;
    applyViewBox();
    if(t<1) zoomAnimFrame = requestAnimationFrame(step);
  }
  zoomAnimFrame = requestAnimationFrame(step);
}

function resetView(animated){
  if(animated){
    animateViewBoxTo(VB0.w, VB0.x, VB0.y, 380);
  } else {
    vb = {x:VB0.x, y:VB0.y, w:VB0.w, h:VB0.h};
    applyViewBox();
  }
}

function clientToUser(clientX, clientY){
  const rect = svg.getBoundingClientRect();
  return {
    x: vb.x + (clientX-rect.left)/rect.width * vb.w,
    y: vb.y + (clientY-rect.top)/rect.height * vb.h
  };
}

function zoomAtClient(clientX, clientY, factor){
  const rect = svg.getBoundingClientRect();
  const ux = (clientX-rect.left)/rect.width;
  const uy = (clientY-rect.top)/rect.height;
  const before = clientToUser(clientX, clientY);
  let newW = Math.min(MAX_W, Math.max(MIN_W, vb.w/factor));
  const newH = newW * (VB0.h/VB0.w);
  vb.w = newW; vb.h = newH;
  vb.x = before.x - ux*vb.w;
  vb.y = before.y - uy*vb.h;
  clampViewBox();
  applyViewBox();
}

function zoomButtonStep(factor){
  const rect = svg.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const before = clientToUser(cx, cy);
  let newW = Math.min(MAX_W, Math.max(MIN_W, vb.w/factor));
  const newH = newW * (VB0.h/VB0.w);
  let newX = before.x - newW/2;
  let newY = before.y - newH/2;
  newX = Math.min(VB0.w-newW, Math.max(0,newX));
  newY = Math.min(VB0.h-newH, Math.max(0,newY));
  animateViewBoxTo(newW, newX, newY, 220);
}

function panByClientDelta(dxClient, dyClient){
  const rect = svg.getBoundingClientRect();
  vb.x -= dxClient/rect.width * vb.w;
  vb.y -= dyClient/rect.height * vb.h;
  clampViewBox();
  applyViewBox();
}

function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function mid(a,b){ return {x:(a.x+b.x)/2, y:(a.y+b.y)/2}; }

/* ---- pointer/touch gesture handling: tap-to-select, drag-to-pan, pinch-to-zoom ---- */
const activePointers = new Map();
let singleStart = null;
let dragMoved = false;
let pinchStartDist = null;
let pinchStartMid = null;
const DRAG_THRESHOLD = 7;

svg.addEventListener('pointerdown', e=>{
  svg.setPointerCapture(e.pointerId);
  activePointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(activePointers.size === 1){
    singleStart = {x:e.clientX, y:e.clientY, target:e.target};
    dragMoved = false;
  } else if(activePointers.size === 2){
    dragMoved = true; // cancel any pending tap once a 2nd finger joins
    const pts = Array.from(activePointers.values());
    pinchStartDist = dist(pts[0], pts[1]);
    pinchStartMid = mid(pts[0], pts[1]);
  }
});

svg.addEventListener('pointermove', e=>{
  if(!activePointers.has(e.pointerId)) return;
  const prev = activePointers.get(e.pointerId);
  activePointers.set(e.pointerId, {x:e.clientX, y:e.clientY});

  if(activePointers.size >= 2){
    const pts = Array.from(activePointers.values());
    const d = dist(pts[0], pts[1]);
    const m = mid(pts[0], pts[1]);
    if(pinchStartDist){
      panByClientDelta(m.x - pinchStartMid.x, m.y - pinchStartMid.y);
      zoomAtClient(m.x, m.y, d / pinchStartDist);
    }
    pinchStartDist = d;
    pinchStartMid = m;
    return;
  }

  if(activePointers.size === 1 && singleStart){
    const totalDx = e.clientX - singleStart.x;
    const totalDy = e.clientY - singleStart.y;
    if(!dragMoved && Math.hypot(totalDx, totalDy) > DRAG_THRESHOLD){
      dragMoved = true;
      svg.classList.add('panning');
    }
    if(dragMoved){
      panByClientDelta(e.clientX - prev.x, e.clientY - prev.y);
    }
  }
});

function endPointer(e){
  if(activePointers.size === 1 && singleStart && !dragMoved){
    const path = singleStart.target && singleStart.target.closest && singleStart.target.closest('path[data-continent]');
    if(path) evaluateSelection(path);
  }
  activePointers.delete(e.pointerId);
  if(activePointers.size < 2){ pinchStartDist = null; pinchStartMid = null; }
  if(activePointers.size === 0){
    singleStart = null;
    dragMoved = false;
    svg.classList.remove('panning');
  }
}
svg.addEventListener('pointerup', endPointer);
svg.addEventListener('pointercancel', endPointer);

svg.addEventListener('wheel', e=>{
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
  zoomAtClient(e.clientX, e.clientY, factor);
}, {passive:false});

function showGameOver(){
  finalScoreEl.textContent = score;
  document.getElementById('finalBest').textContent = '🏆 ' + t('geoBestLabel') + ': ' + bestScore;
  finalAccEl.textContent = t('geoFinalAccuracy', { correct: totalCorrect, total: totalAnswered });
  overlay.classList.add('active');
}

function resetGame(){
  score = 0; lives = 3; locked = false; totalAnswered = 0; totalCorrect = 0;
  queue = shuffle(DATA); qIndex = 0;
  resetView(false);
  renderScore(); renderHearts();
  overlay.classList.remove('active');
  nextRound();
}

document.getElementById('restartBtn').addEventListener('click', resetGame);

document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    if(btn.dataset.mode === mode) return;
    mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active', b===btn));
    updateModeTexts();
    if(pendingAdvanceTimer){ clearTimeout(pendingAdvanceTimer); pendingAdvanceTimer = null; }
    refreshRound();
  });
});

document.getElementById('zoomIn').addEventListener('click', ()=>zoomButtonStep(1.6));
document.getElementById('zoomOut').addEventListener('click', ()=>zoomButtonStep(1/1.6));
document.getElementById('zoomReset').addEventListener('click', ()=>resetView(true));

buildLegend();
buildMap();
updateModeTexts();
resetGame();
</script>
</body>
