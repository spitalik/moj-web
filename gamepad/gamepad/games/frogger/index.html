<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frogger · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#050507;--bg2:#111116;--text:#f0eeff;--muted:rgba(240,238,255,0.38);--border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);--c:#4dff91;}
html,body{background:var(--bg);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;user-select:none;overflow:hidden;}
#back-btn{position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:all .18s;}
#back-btn:hover{border-color:var(--border-h);color:var(--text);}
.hud{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;}
.stat-pill{background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;white-space:nowrap;}
.stat-pill span{color:var(--c);}
canvas{display:block;position:fixed;inset:0;width:100%;height:100%;}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(5,5,7,.9);backdrop-filter:blur(10px);z-index:20;}
#overlay h2{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;}
.score-big{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:var(--c);letter-spacing:-2px;}
.hint{font-size:12px;color:var(--muted);text-align:center;padding:0 20px;}
.play-btn{background:rgba(77,255,145,0.14);border:1px solid rgba(77,255,145,.3);color:var(--c);padding:10px 30px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
.diff-row{display:flex;gap:6px;}
.diff-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .18s;}
.diff-btn:hover,.diff-btn.active{border-color:rgba(77,255,145,.4);color:var(--c);background:rgba(77,255,145,0.1);}
#dpad{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(2,54px);gap:5px;z-index:10;}
.d{background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .12s;}
.d:active,.d.pressed{background:rgba(77,255,145,0.14);border-color:rgba(77,255,145,.3);color:var(--c);}
#d-up{grid-column:2;grid-row:1;}#d-left{grid-column:1;grid-row:2;}#d-down{grid-column:2;grid-row:2;}#d-right{grid-column:3;grid-row:2;}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>
<div class="hud">
  <div class="stat-pill"><span id="lbl-score-txt"></span>&nbsp;<span id="hud-score">0</span></div>
  <div class="stat-pill">❤️&nbsp;<span id="hud-lives">3</span></div>
  <div class="stat-pill"><span id="lbl-level-txt"></span>&nbsp;<span id="hud-level">1</span></div>
</div>
<canvas id="c"></canvas>
<div id="dpad">
  <button class="d" id="d-up"    onpointerdown="move(0,-1)">▲</button>
  <button class="d" id="d-left"  onpointerdown="move(-1,0)">◄</button>
  <button class="d" id="d-down"  onpointerdown="move(0,1)">▼</button>
  <button class="d" id="d-right" onpointerdown="move(1,0)">►</button>
</div>
<div id="overlay">
  <div style="font-size:44px">🐸</div>
  <h2 id="ov-title"></h2>
  <div class="diff-row" id="diff-row"></div>
  <div class="hint" id="ov-hint"></div>
  <button class="play-btn" id="ov-btn" onclick="startGame()"></button>
</div>
<script>
document.getElementById('lbl-back').textContent    = t('back');
document.getElementById('lbl-score-txt').textContent = t('frogScore');
document.getElementById('lbl-level-txt').textContent = t('frogLevel');
document.getElementById('ov-title').textContent    = t('frogTitle');
document.getElementById('ov-hint').textContent     = t('frogHint');
document.getElementById('ov-btn').textContent      = t('frogPlay');

const DIFFS=[{key:'easy',carSpeed:1.0,logSpeed:0.8},{key:'medium',carSpeed:1.6,logSpeed:1.2},{key:'hard',carSpeed:2.4,logSpeed:1.8}];
let diffIdx=1;
const dr=document.getElementById('diff-row');
DIFFS.forEach((d,i)=>{
  const btn=document.createElement('button');
  btn.className='diff-btn'+(i===diffIdx?' active':'');
  btn.textContent=t('diff'+d.key[0].toUpperCase()+d.key.slice(1));
  btn.onclick=()=>{diffIdx=i;dr.querySelectorAll('.diff-btn').forEach((b,j)=>b.classList.toggle('active',j===i));};
  dr.appendChild(btn);
});

const C=document.getElementById('c'),ctx=C.getContext('2d');
let W,H,ROWS=13,CELL,frog,cars,logs,score,lives,level,animId,running,safe,reached;

function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;CELL=Math.floor(Math.min(W/11,H/ROWS));}
resize();window.addEventListener('resize',()=>{resize();});

function rowY(r){return H/2-ROWS*CELL/2+r*CELL;}

function initRows(){
  const d=DIFFS[diffIdx];
  const spd=1+(level-1)*0.15;
  cars=[];logs=[];
  // Cars: rows 7-11 (from bottom safe zone)
  const carRows=[{row:7,dir:1},{row:8,dir:-1},{row:9,dir:1},{row:10,dir:-1},{row:11,dir:1}];
  carRows.forEach(({row,dir})=>{
    const n=2+Math.floor(Math.random()*2);
    const gap=W/n;
    for(let i=0;i<n;i++){
      cars.push({row,x:i*gap+Math.random()*gap*0.3,w:CELL*1.8,dir,speed:d.carSpeed*spd*(0.8+Math.random()*0.5)});
    }
  });
  // Logs: rows 1-5
  const logRows=[{row:1,dir:1},{row:2,dir:-1},{row:3,dir:1},{row:4,dir:-1},{row:5,dir:1}];
  logRows.forEach(({row,dir})=>{
    const n=2+Math.floor(Math.random()*2);
    const gap=W/n;
    for(let i=0;i<n;i++){
      logs.push({row,x:i*gap+Math.random()*gap*0.2,w:CELL*(2+Math.random()*2),dir,speed:d.logSpeed*spd*(0.7+Math.random()*0.4)});
    }
  });
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  score=0;lives=3;level=1;reached=new Set();
  frog={col:5,row:ROWS-1,onLog:null};
  initRows();
  updateHUD();
  running=true;
  cancelAnimationFrame(animId);
  loop();
}

function updateHUD(){
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-lives').textContent=lives;
  document.getElementById('hud-level').textContent=level;
}

function loop(){
  if(!running)return;
  update();draw();animId=requestAnimationFrame(loop);
}

function update(){
  // Move cars
  cars.forEach(car=>{
    car.x+=car.dir*car.speed;
    if(car.x>W+car.w)car.x=-car.w;
    if(car.x<-car.w)car.x=W+car.w;
  });
  // Move logs
  logs.forEach(log=>{
    log.x+=log.dir*log.speed;
    if(log.x>W+log.w)log.x=-log.w;
    if(log.x<-log.w)log.x=W+log.w;
  });

  const fr=frog.row;
  const fx=frog.col*CELL+rowY(0)*0-rowY(0)*0; // frog center x
  const frogX=frog.col*CELL+(W-11*CELL)/2;
  const frogCX=frogX+CELL/2;

  // River zone (rows 1-5): check if on log
  if(fr>=1&&fr<=5){
    let onAnyLog=false;
    for(const log of logs){
      if(log.row!==fr)continue;
      if(frogCX>=log.x&&frogCX<=log.x+log.w){
        onAnyLog=true;
        frog.col+=log.dir*log.speed/CELL;
        break;
      }
    }
    if(!onAnyLog){die();return;}
  }

  // Road zone (rows 7-11): check car collision
  if(fr>=7&&fr<=11){
    for(const car of cars){
      if(car.row!==fr)continue;
      const carRight=car.x+car.w,frogLeft=frogCX-CELL*0.3,frogRight=frogCX+CELL*0.3;
      if(frogRight>car.x&&frogLeft<carRight){die();return;}
    }
  }

  // Keep frog in bounds
  frog.col=Math.max(0,Math.min(10,frog.col));

  // Reached top (row 0)
  if(fr===0){
    const slot=Math.floor(frog.col/2.2);
    const key=Math.round(frog.col);
    if(!reached.has(key)){
      reached.add(key);score+=100+(level*10);updateHUD();
    }
    if(reached.size>=5){
      level++;score+=500;reached=new Set();
      frog={col:5,row:ROWS-1,onLog:null};
      initRows();updateHUD();
    } else {
      frog={col:5,row:ROWS-1,onLog:null};
    }
  }
}

function die(){
  lives--;updateHUD();
  if(lives<=0){gameOver();return;}
  frog={col:5,row:ROWS-1,onLog:null};
}

function gameOver(){
  running=false;cancelAnimationFrame(animId);
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div style="font-size:44px">💀</div>
    <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:26px">${t('frogOver')}</h2>
    <div class="score-big">${score}</div>
    <div class="diff-row" id="dr2" style="margin-top:4px"></div>
    <button class="play-btn" onclick="startGame()" style="margin-top:4px">${t('frogAgain')}</button>`;
  ov.style.display='flex';
  const dr2=document.getElementById('dr2');
  DIFFS.forEach((d,i)=>{const btn=document.createElement('button');btn.className='diff-btn'+(i===diffIdx?' active':'');btn.textContent=t('diff'+d.key[0].toUpperCase()+d.key.slice(1));btn.onclick=()=>{diffIdx=i;dr2.querySelectorAll('.diff-btn').forEach((b,j)=>b.classList.toggle('active',j===i));};dr2.appendChild(btn);});
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#050507';ctx.fillRect(0,0,W,H);
  const ox=(W-11*CELL)/2;
  const oy=H/2-ROWS*CELL/2;

  for(let r=0;r<ROWS;r++){
    const y=oy+r*CELL;
    let bg;
    if(r===0)bg='#0a2a0a';
    else if(r>=1&&r<=5)bg='#071525';
    else if(r===6||r===ROWS-1)bg='#1a1a0a';
    else bg='#1a0a0a';
    ctx.fillStyle=bg;ctx.fillRect(0,y,W,CELL);
  }

  // Logs
  logs.forEach(log=>{
    const y=oy+log.row*CELL;
    ctx.fillStyle='rgba(139,90,43,0.85)';
    ctx.beginPath();ctx.roundRect(log.x,y+4,log.w,CELL-8,6);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.stroke();
  });

  // Cars
  cars.forEach(car=>{
    const y=oy+car.row*CELL;
    const colors=['#ff6b6b','#ffd166','#a78bfa','#54a0ff','#4dff91'];
    const ci=cars.indexOf(car)%colors.length;
    ctx.fillStyle=colors[ci]+'cc';
    ctx.beginPath();ctx.roundRect(car.x,y+6,car.w,CELL-12,5);ctx.fill();
    // wheels
    ctx.fillStyle='#333';
    [car.x+8,car.x+car.w-16].forEach(wx=>{ctx.beginPath();ctx.arc(wx,y+CELL-4,5,0,Math.PI*2);ctx.fill();});
  });

  // Top safe zones
  const topY=oy;
  for(let i=0;i<5;i++){
    const sx=ox+i*2.2*CELL+CELL*0.2;
    ctx.fillStyle=reached.has(Math.round(i*2.2))? 'rgba(77,255,145,0.4)':'rgba(77,255,145,0.1)';
    ctx.beginPath();ctx.roundRect(sx,topY+4,CELL*1.4,CELL-8,6);ctx.fill();
    if(!reached.has(Math.round(i*2.2))){
      ctx.font=`${Math.floor(CELL*0.55)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🏁',sx+CELL*0.7,topY+CELL/2);
    }
  }

  // Frog
  const frogX=ox+frog.col*CELL;
  const frogY=oy+frog.row*CELL;
  const fcx=frogX+CELL/2, fcy=frogY+CELL/2, fr2=CELL*0.42;
  // Glow ring
  ctx.shadowColor='#4dff91';ctx.shadowBlur=20;
  ctx.strokeStyle='#4dff91';ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(fcx,fcy,fr2+4,0,Math.PI*2);ctx.stroke();
  ctx.shadowBlur=0;
  // Body
  ctx.fillStyle='#2ecc71';ctx.shadowColor='#4dff91';ctx.shadowBlur=14;
  ctx.beginPath();ctx.ellipse(fcx,fcy,fr2,fr2*0.85,0,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Belly
  ctx.fillStyle='#a8e6cf';
  ctx.beginPath();ctx.ellipse(fcx,fcy+fr2*0.1,fr2*0.55,fr2*0.5,0,0,Math.PI*2);ctx.fill();
  // Eyes
  const eyeOff=fr2*0.38;
  [fcx-eyeOff,fcx+eyeOff].forEach(ex=>{
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex,fcy-fr2*0.35,fr2*0.22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(ex,fcy-fr2*0.35,fr2*0.12,0,Math.PI*2);ctx.fill();
  });
  // Legs
  ctx.strokeStyle='#27ae60';ctx.lineWidth=Math.max(2,fr2*0.18);ctx.lineCap='round';
  const legAnim=Math.sin(Date.now()*0.015)*fr2*0.3;
  ctx.beginPath();ctx.moveTo(fcx-fr2*0.7,fcy+fr2*0.4);ctx.lineTo(fcx-fr2*1.1,fcy+fr2*0.9+legAnim);ctx.stroke();
  ctx.beginPath();ctx.moveTo(fcx+fr2*0.7,fcy+fr2*0.4);ctx.lineTo(fcx+fr2*1.1,fcy+fr2*0.9-legAnim);ctx.stroke();

  // Lane dividers
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let r=1;r<ROWS;r++){ctx.beginPath();ctx.moveTo(0,oy+r*CELL);ctx.lineTo(W,oy+r*CELL);ctx.stroke();}
}

function move(dx,dy){
  if(!running)return;
  frog.col=Math.max(0,Math.min(10,Math.round(frog.col)+dx));
  frog.row=Math.max(0,Math.min(ROWS-1,frog.row+dy));
  ['d-up','d-left','d-down','d-right'].forEach(id=>{
    const el=document.getElementById(id);
    const map={'d-up':[0,-1],'d-left':[-1,0],'d-down':[0,1],'d-right':[1,0]};
    if(JSON.stringify(map[id])===JSON.stringify([dx,dy])){el.classList.add('pressed');setTimeout(()=>el.classList.remove('pressed'),120);}
  });
}

document.addEventListener('keydown',e=>{
  const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],KeyW:[0,-1],KeyS:[0,1],KeyA:[-1,0],KeyD:[1,0]};
  if(map[e.code]){e.preventDefault();move(...map[e.code]);}
});
</script>
</body>
</html>
