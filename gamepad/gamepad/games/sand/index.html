<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sand · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#050507;--bg2:#111116;--text:#f0eeff;--muted:rgba(240,238,255,0.38);--border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);}
html,body{background:var(--bg);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;user-select:none;overflow:hidden;}
#back-btn{position:fixed;top:16px;left:16px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:all .18s;}
#back-btn:hover{border-color:var(--border-h);color:var(--text);}
.toolbar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:0 100px;}
.mat-btn{background:var(--bg2);border:2px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.mat-btn:hover{border-color:var(--border-h);color:var(--text);}
.mat-btn.active{color:#fff;}
.brush-row{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;align-items:center;}
.brush-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;}
.brush-btn:hover,.brush-btn.active{border-color:var(--border-h);color:var(--text);}
canvas{display:block;position:fixed;top:50px;left:0;right:0;bottom:50px;cursor:crosshair;}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>
<div class="toolbar" id="toolbar"></div>
<canvas id="c"></canvas>
<div class="brush-row">
  <span style="font-size:11px;color:var(--muted)" id="lbl-brush"></span>
  <button class="brush-btn active" onclick="setBrush(2)" id="bs-2">S</button>
  <button class="brush-btn" onclick="setBrush(4)" id="bs-4">M</button>
  <button class="brush-btn" onclick="setBrush(8)" id="bs-8">L</button>
  <button class="brush-btn" onclick="clearAll()" id="btn-clear" style="border-color:rgba(255,107,107,0.3);color:#ff6b6b;"></button>
</div>
<script>
document.getElementById('lbl-back').textContent  = t('back');
document.getElementById('lbl-brush').textContent = t('sandBrush');
document.getElementById('btn-clear').textContent = t('sandClear');

// Materials: 0=empty, 1=sand, 2=water, 3=wall, 4=fire, 5=smoke, 6=oil, 7=lava
const MATERIALS=[
  {id:0,name:'',color:null},
  {id:1,name:'sandSand',   colors:['#c8a96e','#d4b478','#b89558','#dab96e'],falls:true,  liquid:false,flammable:true},
  {id:2,name:'sandWater',  colors:['#2980b9','#3498db','#1f6f9e','#4aa3d4'],falls:true,  liquid:true, flammable:false},
  {id:3,name:'sandWall',   colors:['#555','#666','#4a4a4a','#5e5e5e'],         falls:false, liquid:false,flammable:false},
  {id:4,name:'sandFire',   colors:['#ff6b35','#ff4500','#ff8c00','#ffa500'],   falls:false, liquid:false,flammable:false,rising:true},
  {id:5,name:'sandSmoke',  colors:['#888','#999','#777','#9a9a9a'],             falls:false, liquid:false,flammable:false,rising:true},
  {id:6,name:'sandOil',    colors:['#8B4513','#7a3b0e','#9b5523','#6b3510'],   falls:true,  liquid:true, flammable:true},
  {id:7,name:'sandLava',   colors:['#ff4500','#cc3700','#ff6633','#dd4400'],    falls:true,  liquid:true, flammable:false},
  {id:8,name:'sandEraser', colors:null,falls:false,liquid:false},
];

const C=document.getElementById('c'),ctx=C.getContext('2d');
let W,H,COLS,ROWS,CELL=4;
let grid,colorGrid,animId,drawing=false,material=1,brushSize=2,mouseX=0,mouseY=0;

function resize(){
  W=C.width=window.innerWidth;
  H=C.height=window.innerHeight-100;
  COLS=Math.floor(W/CELL);
  ROWS=Math.floor(H/CELL);
  initGrid();
}

function initGrid(){
  grid=new Uint8Array(COLS*ROWS);
  colorGrid=new Uint8Array(COLS*ROWS);
}

function clearAll(){grid.fill(0);colorGrid.fill(0);}

function idx(c,r){return r*COLS+c;}
function get(c,r){if(c<0||c>=COLS||r<0||r>=ROWS)return -1;return grid[idx(c,r)];}
function set(c,r,m,col){if(c<0||c>=COLS||r<0||r>=ROWS)return;grid[idx(c,r)]=m;if(col!==undefined)colorGrid[idx(c,r)]=col;}

function placeMaterial(px,py){
  const c=Math.floor(px/CELL),r=Math.floor(py/CELL);
  for(let dr=-brushSize;dr<=brushSize;dr++)for(let dc=-brushSize;dc<=brushSize;dc++){
    if(dc*dc+dr*dr>brushSize*brushSize)continue;
    const nc=c+dc,nr=r+dr;
    if(material===8){set(nc,nr,0,0);continue;}
    if(get(nc,nr)===0){
      const m=MATERIALS[material];
      const colIdx=Math.floor(Math.random()*m.colors.length);
      set(nc,nr,material,colIdx);
    }
  }
}

function update(){
  // Process bottom to top for falling, top to bottom for rising
  for(let r=ROWS-1;r>=0;r--){
    for(let c=Math.random()<0.5?0:COLS-1;Math.random()<0.5?c<COLS:c>=0;Math.random()<0.5?c++:c--){
      const m=get(c,r);if(!m)continue;
      const mat=MATERIALS[m];

      // Fire logic
      if(m===4){
        // Spread upward as smoke
        if(r>0&&!get(c,r-1)&&Math.random()<0.1){set(c,r-1,5,Math.floor(Math.random()*4));}
        // Ignite flammable neighbors
        for(const[dc,dr]of[[-1,0],[1,0],[0,-1],[0,1]]){
          const n=get(c+dc,r+dr);
          if(n&&MATERIALS[n]?.flammable&&Math.random()<0.03){set(c+dc,r+dr,4,Math.floor(Math.random()*4));}
        }
        // Die out
        if(Math.random()<0.008){set(c,r,0,0);}
        continue;
      }

      // Smoke / rising
      if(m===5){
        if(r>0&&!get(c,r-1)){
          const dir=Math.random()<0.5?-1:1;
          if(!get(c,r-1)){set(c,r-1,5,colorGrid[idx(c,r)]);set(c,r,0,0);}
          else if(!get(c+dir,r)&&Math.random()<0.3){set(c+dir,r,5,colorGrid[idx(c,r)]);set(c,r,0,0);}
        }
        if(Math.random()<0.004)set(c,r,0,0);
        continue;
      }

      if(!mat.falls&&!mat.liquid)continue;

      // Fall down
      if(r<ROWS-1){
        const below=get(c,r+1);
        if(below===0){set(c,r+1,m,colorGrid[idx(c,r)]);set(c,r,0,0);continue;}
        // Liquid flows sideways
        if(mat.liquid&&below!==0){
          const dir=Math.random()<0.5?1:-1;
          if(!get(c+dir,r)){set(c+dir,r,m,colorGrid[idx(c,r)]);set(c,r,0,0);continue;}
          if(!get(c-dir,r)){set(c-dir,r,m,colorGrid[idx(c,r)]);set(c,r,0,0);continue;}
        }
        // Sand slides diagonally
        if(!mat.liquid){
          const dir=Math.random()<0.5?1:-1;
          if(!get(c+dir,r+1)){set(c+dir,r+1,m,colorGrid[idx(c,r)]);set(c,r,0,0);continue;}
          if(!get(c-dir,r+1)){set(c-dir,r+1,m,colorGrid[idx(c,r)]);set(c,r,0,0);continue;}
        }
      }

      // Lava interaction with water → wall
      if(m===7){
        for(const[dc,dr]of[[-1,0],[1,0],[0,-1],[0,1]]){
          if(get(c+dc,r+dr)===2){set(c,r,3,0);set(c+dc,r+dr,5,0);break;}
        }
      }
    }
  }
}

function draw(){
  const img=ctx.createImageData(W,H);
  const data=img.data;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const m=get(c,r);if(!m)continue;
      const mat=MATERIALS[m];
      if(!mat.colors)continue;
      const colHex=mat.colors[colorGrid[idx(c,r)]%mat.colors.length];
      const [r2,g2,b2]=hexToRgb(colHex);
      for(let dy=0;dy<CELL;dy++){
        for(let dx=0;dx<CELL;dx++){
          const px=(r*CELL+dy)*W*4+(c*CELL+dx)*4;
          data[px]=r2;data[px+1]=g2;data[px+2]=b2;data[px+3]=255;
        }
      }
    }
  }
  ctx.putImageData(img,0,0);
}

const hexCache={};
function hexToRgb(hex){
  if(hexCache[hex])return hexCache[hex];
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return hexCache[hex]=[r,g,b];
}

function loop(){update();draw();animId=requestAnimationFrame(loop);}

function setBrush(s){
  brushSize=s;
  ['bs-2','bs-4','bs-8'].forEach(id=>document.getElementById(id)?.classList.remove('active'));
  document.getElementById(`bs-${s}`)?.classList.add('active');
}

// Build toolbar
const toolbar=document.getElementById('toolbar');
MATERIALS.slice(1).forEach(mat=>{
  const btn=document.createElement('button');
  btn.className='mat-btn'+(mat.id===1?' active':'');
  const col=mat.colors?mat.colors[0]:'#666';
  btn.style.borderColor=col+'66';
  if(mat.id===material)btn.style.borderColor=col;
  btn.innerHTML=`<span style="width:10px;height:10px;border-radius:50%;background:${col};display:inline-block;flex-shrink:0"></span>${t(mat.name)}`;
  btn.onclick=()=>{
    material=mat.id;
    toolbar.querySelectorAll('.mat-btn').forEach(b=>{b.classList.remove('active');b.style.borderColor='var(--border)';});
    btn.classList.add('active');btn.style.borderColor=col;
  };
  toolbar.appendChild(btn);
});

// Mouse / touch
C.addEventListener('mousedown',e=>{drawing=true;const r=C.getBoundingClientRect();placeMaterial(e.clientX-r.left,e.clientY-r.top);});
C.addEventListener('mousemove',e=>{if(drawing){const r=C.getBoundingClientRect();placeMaterial(e.clientX-r.left,e.clientY-r.top);}});
C.addEventListener('mouseup',()=>drawing=false);
C.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const r=C.getBoundingClientRect();placeMaterial(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();if(drawing){const r=C.getBoundingClientRect();placeMaterial(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);}},{passive:false});
C.addEventListener('touchend',()=>drawing=false);

resize();
window.addEventListener('resize',resize);
loop();
</script>
</body>
</html>
