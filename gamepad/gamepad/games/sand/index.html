<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sand · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#050507;--bg2:#111116;--text:#f0eeff;--muted:rgba(240,238,255,0.38);--border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);}
html,body{background:var(--bg);height:100vh;overflow:hidden;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;user-select:none;}
#back-btn{position:fixed;top:10px;left:12px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:100px;text-decoration:none;font-size:11px;font-weight:500;transition:all .18s;}
#back-btn:hover{border-color:var(--border-h);color:var(--text);}
#toolbar{position:fixed;top:8px;left:0;right:0;z-index:9;display:flex;gap:5px;flex-wrap:wrap;justify-content:center;padding:0 120px 0 110px;}
.mat-btn{background:var(--bg2);border:2px solid rgba(255,255,255,0.08);color:var(--muted);padding:5px 10px;border-radius:100px;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.mat-btn.active{color:#fff;}
.mat-btn:active{transform:scale(0.95);}
#brush-row{position:fixed;bottom:8px;left:0;right:0;z-index:9;display:flex;gap:6px;justify-content:center;align-items:center;}
.brush-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:100px;font-size:11px;cursor:pointer;transition:all .15s;}
.brush-btn.active,.brush-btn:hover{border-color:rgba(255,255,255,0.2);color:var(--text);}
#clear-btn{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:#ff6b6b;padding:4px 12px;border-radius:100px;font-size:11px;cursor:pointer;}
#c{display:block;position:fixed;left:0;right:0;cursor:crosshair;touch-action:none;}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>
<div id="toolbar"></div>
<canvas id="c"></canvas>
<div id="brush-row">
  <span style="font-size:11px;color:var(--muted)" id="lbl-brush"></span>
  <button class="brush-btn active" onclick="setBrush(2)" id="bs-2">S</button>
  <button class="brush-btn" onclick="setBrush(5)" id="bs-5">M</button>
  <button class="brush-btn" onclick="setBrush(9)" id="bs-9">L</button>
  <button id="clear-btn" onclick="clearAll()"></button>
</div>

<script>
document.getElementById('lbl-back').textContent  = t('back');
document.getElementById('lbl-brush').textContent = t('sandBrush');
document.getElementById('clear-btn').textContent = t('sandClear');

const MATS = [
  {id:1, nameKey:'sandSand',  colors:['#c8a96e','#d4b478','#b89558','#dab96e'], falls:true,  liquid:false, flammable:true},
  {id:2, nameKey:'sandWater', colors:['#2980b9','#3498db','#1f6f9e','#4aa3d4'], falls:true,  liquid:true,  flammable:false},
  {id:3, nameKey:'sandWall',  colors:['#555','#666','#4a4a4a','#5e5e5e'],        falls:false, liquid:false, flammable:false},
  {id:4, nameKey:'sandFire',  colors:['#ff6b35','#ff4500','#ff8c00','#ffa500'],  falls:false, liquid:false, flammable:false, rising:true},
  {id:5, nameKey:'sandSmoke', colors:['#777','#888','#666','#999'],               falls:false, liquid:false, flammable:false, rising:true},
  {id:6, nameKey:'sandOil',   colors:['#8B4513','#7a3b0e','#9b5523','#6b3510'],  falls:true,  liquid:true,  flammable:true},
  {id:7, nameKey:'sandLava',  colors:['#ff4500','#cc3700','#ff6633','#dd4400'],   falls:true,  liquid:true,  flammable:false},
  {id:8, nameKey:'sandEraser',colors:null, falls:false, liquid:false},
];

const CELL = 4;
const TOP_H = 44;   // toolbar height
const BOT_H = 38;   // brushbar height

const C = document.getElementById('c');
const ctx = C.getContext('2d');
let COLS, ROWS, grid, colorGrid;
let drawing = false, material = 1, brushSize = 2, animId;

function resize() {
  const W = window.innerWidth;
  const H = window.innerHeight - TOP_H - BOT_H;
  C.width  = W;
  C.height = H;
  C.style.top    = TOP_H + 'px';
  C.style.bottom = BOT_H + 'px';
  COLS = Math.floor(W / CELL);
  ROWS = Math.floor(H / CELL);
  grid      = new Uint8Array(COLS * ROWS);
  colorGrid = new Uint8Array(COLS * ROWS);
}

function clearAll() {
  grid.fill(0); colorGrid.fill(0);
}

function idx(c, r) { return r * COLS + c; }
function get(c, r) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return -1;
  return grid[idx(c, r)];
}
function set(c, r, m, col) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return;
  grid[idx(c, r)] = m;
  if (col !== undefined) colorGrid[idx(c, r)] = col;
}

function place(px, py) {
  const c = Math.floor(px / CELL);
  const r = Math.floor(py / CELL);
  for (let dr = -brushSize; dr <= brushSize; dr++) {
    for (let dc = -brushSize; dc <= brushSize; dc++) {
      if (dc*dc + dr*dr > brushSize*brushSize) continue;
      if (material === 8) { set(c+dc, r+dr, 0, 0); continue; }
      if (get(c+dc, r+dr) === 0) {
        const mat = MATS[material - 1];
        set(c+dc, r+dr, material, Math.floor(Math.random() * mat.colors.length));
      }
    }
  }
}

function update() {
  for (let r = ROWS - 1; r >= 0; r--) {
    const leftToRight = Math.random() < 0.5;
    for (let ci = 0; ci < COLS; ci++) {
      const c = leftToRight ? ci : COLS - 1 - ci;
      const m = get(c, r); if (!m) continue;
      const mat = MATS[m - 1];

      // Fire
      if (m === 4) {
        if (r > 0 && !get(c, r-1) && Math.random() < 0.12) set(c, r-1, 5, Math.floor(Math.random()*4));
        for (const [dc,dr] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          const n = get(c+dc, r+dr);
          if (n && n !== 4 && n !== 5 && MATS[n-1]?.flammable && Math.random() < 0.03) set(c+dc, r+dr, 4, Math.floor(Math.random()*4));
        }
        if (Math.random() < 0.008) set(c, r, 0, 0);
        continue;
      }

      // Smoke
      if (m === 5) {
        if (r > 0 && !get(c, r-1)) { set(c, r-1, 5, colorGrid[idx(c,r)]); set(c, r, 0, 0); }
        else if (Math.random() < 0.004) set(c, r, 0, 0);
        continue;
      }

      if (!mat.falls && !mat.liquid) continue;

      if (r < ROWS - 1) {
        const below = get(c, r+1);
        if (below === 0) { set(c, r+1, m, colorGrid[idx(c,r)]); set(c, r, 0, 0); continue; }
        const dir = Math.random() < 0.5 ? 1 : -1;
        if (mat.liquid) {
          if (!get(c+dir, r)) { set(c+dir, r, m, colorGrid[idx(c,r)]); set(c, r, 0, 0); continue; }
          if (!get(c-dir, r)) { set(c-dir, r, m, colorGrid[idx(c,r)]); set(c, r, 0, 0); continue; }
        } else {
          if (!get(c+dir, r+1)) { set(c+dir, r+1, m, colorGrid[idx(c,r)]); set(c, r, 0, 0); continue; }
          if (!get(c-dir, r+1)) { set(c-dir, r+1, m, colorGrid[idx(c,r)]); set(c, r, 0, 0); continue; }
        }
      }

      // Lava + water → wall
      if (m === 7) {
        for (const [dc,dr] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          if (get(c+dc, r+dr) === 2) { set(c, r, 3, 0); set(c+dc, r+dr, 5, 0); break; }
        }
      }
    }
  }
}

const hexCache = {};
function hexRGB(hex) {
  if (hexCache[hex]) return hexCache[hex];
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return hexCache[hex] = [r, g, b];
}

function draw() {
  const W = C.width, H = C.height;
  const img = ctx.createImageData(W, H);
  const data = img.data;
  // Background
  for (let i = 0; i < data.length; i += 4) { data[i]=6; data[i+1]=6; data[i+2]=14; data[i+3]=255; }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const m = get(c, r); if (!m) continue;
      const mat = MATS[m-1]; if (!mat.colors) continue;
      const col = mat.colors[colorGrid[idx(c,r)] % mat.colors.length];
      const [R, G, B] = hexRGB(col);
      for (let dy = 0; dy < CELL; dy++) {
        for (let dx = 0; dx < CELL; dx++) {
          const p = ((r*CELL+dy)*W + (c*CELL+dx)) * 4;
          if (p < 0 || p >= data.length - 3) continue;
          data[p]=R; data[p+1]=G; data[p+2]=B; data[p+3]=255;
        }
      }
    }
  }
  ctx.putImageData(img, 0, 0);
}

function loop() { update(); draw(); animId = requestAnimationFrame(loop); }

function setBrush(s) {
  brushSize = s;
  ['bs-2','bs-5','bs-9'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  document.getElementById(`bs-${s}`)?.classList.add('active');
}

// Toolbar
const toolbar = document.getElementById('toolbar');
MATS.forEach(mat => {
  const btn = document.createElement('button');
  btn.className = 'mat-btn' + (mat.id === 1 ? ' active' : '');
  const col = mat.colors ? mat.colors[0] : '#888';
  btn.style.borderColor = mat.id === 1 ? col : 'rgba(255,255,255,0.08)';
  btn.innerHTML = mat.colors
    ? `<span style="width:9px;height:9px;border-radius:50%;background:${col};display:inline-block;flex-shrink:0"></span>${t(mat.nameKey)}`
    : `✕ ${t(mat.nameKey)}`;
  btn.onclick = () => {
    material = mat.id;
    toolbar.querySelectorAll('.mat-btn').forEach(b => { b.classList.remove('active'); b.style.borderColor='rgba(255,255,255,0.08)'; });
    btn.classList.add('active');
    btn.style.borderColor = col;
  };
  toolbar.appendChild(btn);
});

// Pointer events — use canvas-relative coords directly
function getPos(e) {
  const rect = C.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e.changedTouches ? e.changedTouches[0] : e;
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

C.addEventListener('mousedown',  e => { drawing = true;  const p = getPos(e); place(p.x, p.y); });
C.addEventListener('mousemove',  e => { if (drawing) { const p = getPos(e); place(p.x, p.y); } });
C.addEventListener('mouseup',    () => drawing = false);
C.addEventListener('mouseleave', () => drawing = false);
C.addEventListener('touchstart', e => { e.preventDefault(); drawing = true;  const p = getPos(e); place(p.x, p.y); }, {passive:false});
C.addEventListener('touchmove',  e => { e.preventDefault(); if (drawing) { const p = getPos(e); place(p.x, p.y); } }, {passive:false});
C.addEventListener('touchend',   e => { drawing = false; }, {passive:false});

resize();
window.addEventListener('resize', () => { cancelAnimationFrame(animId); resize(); loop(); });
loop();
</script>
</body>
</html>
