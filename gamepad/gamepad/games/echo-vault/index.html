<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Echo Vault · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050507;--bg1:#0c0c10;--bg2:#111116;--text:#f0eeff;--muted:rgba(240,238,255,.42);
  --border:rgba(255,255,255,.08);--border-h:rgba(255,255,255,.16);--violet:#a78bfa;--cyan:#65d6ff;--pink:#ff86d1;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;user-select:none;touch-action:none}
body::before{content:"";position:fixed;right:-180px;top:-220px;width:540px;height:540px;border-radius:50%;background:radial-gradient(circle,rgba(167,139,250,.09),transparent 66%);pointer-events:none}
body::after{content:"";position:fixed;left:-200px;bottom:-250px;width:580px;height:580px;border-radius:50%;background:radial-gradient(circle,rgba(101,214,255,.06),transparent 66%);pointer-events:none}
#back-btn{position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:all .18s}
#back-btn:hover{border-color:var(--border-h);color:var(--text)}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;padding:64px 14px 18px}
.game-title{font-family:'Syne',sans-serif;font-size:clamp(25px,7vw,38px);font-weight:800;letter-spacing:0;background:linear-gradient(135deg,#fff 25%,var(--violet) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hud{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;max-width:660px}
.pill,.ctrl-btn{height:32px;border-radius:100px;border:1px solid var(--border);background:var(--bg2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500}
.pill{display:flex;align-items:center;gap:6px;color:var(--muted);padding:0 12px;white-space:nowrap}
.pill span{color:var(--violet);font-variant-numeric:tabular-nums}
.ctrl-btn{color:var(--muted);padding:0 13px;cursor:pointer;transition:all .18s}
.ctrl-btn:hover,.ctrl-btn:focus-visible{border-color:var(--border-h);color:var(--text);outline:none}
#vault-wrap{position:relative;border:1px solid var(--border);border-radius:16px;background:linear-gradient(180deg,var(--bg2),var(--bg1));padding:9px;box-shadow:0 22px 80px rgba(0,0,0,.35)}
#vault{display:grid;grid-template-columns:repeat(4,var(--tile));gap:7px}
.tile{position:relative;width:var(--tile);height:var(--tile);border-radius:10px;border:1px solid rgba(255,255,255,.065);background:linear-gradient(135deg,#161321,#0d0c12);cursor:pointer;transition:transform .1s,border-color .16s,background .16s;overflow:hidden}
.tile::before{content:"";position:absolute;inset:22%;border-radius:8px;border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.025)}
.tile::after{content:attr(data-symbol);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(240,238,255,.28);font-family:'Syne',sans-serif;font-size:clamp(18px,6vw,34px);font-weight:800}
.tile:active{transform:scale(.97)}
.tile.lit{border-color:var(--tile-color);background:radial-gradient(circle,var(--tile-glow),#151321 62%);box-shadow:0 0 24px var(--tile-glow)}
.tile.lit::after{color:#fff;text-shadow:0 0 12px var(--tile-color)}
.tile.good{border-color:#55f0a0;box-shadow:0 0 18px rgba(85,240,160,.32)}
.tile.bad{border-color:#ff6b6b;box-shadow:0 0 18px rgba(255,107,107,.36)}
#overlay{position:absolute;z-index:20;inset:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:rgba(5,5,7,.91);backdrop-filter:blur(14px);border-radius:12px;text-align:center;padding:18px}
#overlay.hidden{display:none}
.ov-icon{font-size:42px;line-height:1}
#overlay h2{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:0}
.hint{max-width:340px;color:var(--muted);font-size:12px;line-height:1.5}
.play-btn{min-width:118px;height:40px;border-radius:100px;border:1px solid rgba(167,139,250,.46);background:rgba(167,139,250,.15);color:var(--violet);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:0 28px;cursor:pointer;box-shadow:0 10px 28px rgba(0,0,0,.34)}
@media (max-height:680px){.page{gap:9px}.game-title{font-size:24px}.pill,.ctrl-btn{height:29px}#vault{gap:5px}}
@media (orientation: landscape) and (max-height: 560px) {
  .page { padding: 46px 10px 8px; gap: 6px; }
  #back-btn { top: 8px; left: 8px; padding: 5px 12px; font-size: 11px; }
  .game-title { font-size: 18px; }
  .pill,.ctrl-btn { height: 24px; font-size: 10px; }
  #vault-wrap { padding: 6px; }
}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>

<main class="page">
  <h1 class="game-title" id="lbl-title"></h1>
  <div class="hud">
    <div class="pill"><span id="lbl-round"></span>&nbsp;<span id="hud-round">1</span></div>
    <div class="pill"><span id="lbl-score"></span>&nbsp;<span id="hud-score">0</span></div>
    <div class="pill"><span id="lbl-best"></span>&nbsp;<span id="hud-best">0</span></div>
    <div class="pill"><span id="hud-state"></span></div>
    <button class="ctrl-btn" id="btn-reset"></button>
  </div>
  <div id="vault-wrap">
    <div id="vault"></div>
    <div id="overlay">
      <div class="ov-icon">🔐</div>
      <h2 id="ov-title"></h2>
      <p class="hint" id="ov-hint"></p>
      <button class="play-btn" id="ov-btn"></button>
    </div>
  </div>
</main>

<script>
const COLORS = ['#65d6ff','#a78bfa','#ff86d1','#ffd166','#55f0a0','#ff6b6b','#7dd3fc','#c084fc'];
const SYMBOLS = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI'];
const STORAGE = 'echo_vault_best';
const vault = document.getElementById('vault');
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ov-title');
const ovHint = document.getElementById('ov-hint');
const ovBtn = document.getElementById('ov-btn');
const btnReset = document.getElementById('btn-reset');
const hudRound = document.getElementById('hud-round');
const hudScore = document.getElementById('hud-score');
const hudBest = document.getElementById('hud-best');
const hudState = document.getElementById('hud-state');
let sequence = [];
let inputIndex = 0;
let round = 1;
let score = 0;
let accepting = false;
let showing = false;
let timers = [];

function applyLabels(){
  document.getElementById('lbl-back').textContent = t('back');
  document.getElementById('lbl-title').textContent = t('echoVaultTitle');
  document.getElementById('lbl-round').textContent = t('echoVaultRound');
  document.getElementById('lbl-score').textContent = t('echoVaultScore');
  document.getElementById('lbl-best').textContent = t('echoVaultBest');
  btnReset.textContent = t('echoVaultAgain');
  ovTitle.textContent = t('echoVaultTitle');
  ovHint.textContent = t('echoVaultHint');
  ovBtn.textContent = t('echoVaultStart');
  hudState.textContent = t('echoVaultWatch');
}

function sizeVault(){
  const page = document.querySelector('.page');
  const title = document.querySelector('.game-title');
  const hud = document.querySelector('.hud');
  const wrap = document.getElementById('vault-wrap');
  const pageCs = getComputedStyle(page);
  const gap = parseFloat(pageCs.rowGap || pageCs.gap) || 13;
  const padTop = parseFloat(pageCs.paddingTop) || 0;
  const padBottom = parseFloat(pageCs.paddingBottom) || 0;
  const wrapCs = getComputedStyle(wrap);
  const wrapExtra = (parseFloat(wrapCs.paddingTop)||0) + (parseFloat(wrapCs.paddingBottom)||0)
                   + (parseFloat(wrapCs.borderTopWidth)||0) + (parseFloat(wrapCs.borderBottomWidth)||0);
  const reservedH = title.offsetHeight + hud.offsetHeight + padTop + padBottom + gap*2 + wrapExtra;
  const maxW = Math.min(window.innerWidth - 44, 540);
  const maxH = Math.max(140, window.innerHeight - reservedH);
  const tile = Math.floor(Math.min(maxW / 4, maxH / 4));
  document.documentElement.style.setProperty('--tile', Math.max(34, tile) + 'px');
}

function buildVault(){
  vault.innerHTML = '';
  for(let i=0;i<16;i++){
    const tile = document.createElement('button');
    tile.className = 'tile';
    tile.type = 'button';
    tile.dataset.index = i;
    tile.dataset.symbol = SYMBOLS[i];
    tile.style.setProperty('--tile-color', COLORS[i % COLORS.length]);
    tile.style.setProperty('--tile-glow', hexToRgba(COLORS[i % COLORS.length], .3));
    vault.appendChild(tile);
  }
}

function hexToRgba(hex, alpha){
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${alpha})`;
}

function clearTimers(){
  timers.forEach(id => clearTimeout(id));
  timers = [];
}

function resetGame(){
  clearTimers();
  sequence = [];
  round = 1;
  score = 0;
  accepting = false;
  showing = false;
  overlay.classList.add('hidden');
  addStep();
  updateHud();
  showSequence();
}

function addStep(){
  let next = Math.floor(Math.random() * 16);
  if(sequence.length && next === sequence[sequence.length - 1]) next = (next + 5) % 16;
  sequence.push(next);
}

function showSequence(){
  accepting = false;
  showing = true;
  inputIndex = 0;
  hudState.textContent = t('echoVaultWatch');
  clearTileStates();
  const pace = Math.max(250, 560 - round * 18);
  sequence.forEach((idx, i) => {
    timers.push(setTimeout(() => lightTile(idx, pace * .62), 420 + i * pace));
  });
  timers.push(setTimeout(() => {
    showing = false;
    accepting = true;
    hudState.textContent = t('echoVaultRepeat');
  }, 620 + sequence.length * pace));
}

function lightTile(idx, duration){
  const tile = tileAt(idx);
  if(!tile) return;
  tile.classList.add('lit');
  timers.push(setTimeout(() => tile.classList.remove('lit'), duration));
}

function tileAt(idx){
  return vault.querySelector(`.tile[data-index="${idx}"]`);
}

function clearTileStates(){
  vault.querySelectorAll('.tile').forEach(tile => tile.classList.remove('lit','good','bad'));
}

function handleTile(idx){
  if(!accepting || showing) return;
  const tile = tileAt(idx);
  lightTile(idx, 160);
  if(idx !== sequence[inputIndex]){
    tile.classList.add('bad');
    gameOver();
    return;
  }
  tile.classList.add('good');
  timers.push(setTimeout(() => tile.classList.remove('good'), 180));
  inputIndex++;
  score++;
  updateHud();
  if(inputIndex >= sequence.length){
    accepting = false;
    round++;
    saveBest();
    hudState.textContent = t('echoVaultGood');
    timers.push(setTimeout(() => {
      addStep();
      updateHud();
      showSequence();
    }, 620));
  }
}

function gameOver(){
  accepting = false;
  showing = false;
  saveBest();
  updateHud();
  ovTitle.textContent = t('echoVaultOver');
  ovHint.textContent = `${t('echoVaultScore')}: ${score}`;
  ovBtn.textContent = t('echoVaultAgain');
  timers.push(setTimeout(() => overlay.classList.remove('hidden'), 420));
}

function saveBest(){
  const best = Number(localStorage.getItem(STORAGE) || 0);
  if(score > best) localStorage.setItem(STORAGE, String(score));
}

function updateHud(){
  hudRound.textContent = round;
  hudScore.textContent = score;
  hudBest.textContent = localStorage.getItem(STORAGE) || '0';
}

vault.addEventListener('click', e => {
  const tile = e.target.closest('.tile');
  if(!tile) return;
  handleTile(Number(tile.dataset.index));
});
btnReset.addEventListener('click', resetGame);
ovBtn.addEventListener('click', resetGame);
window.addEventListener('resize', sizeVault);
window.addEventListener('orientationchange', () => setTimeout(sizeVault, 250));

applyLabels();
sizeVault();
buildVault();
updateHud();
</script>
</body>
</html>
