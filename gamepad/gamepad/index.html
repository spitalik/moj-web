<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#050507">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GamePad">
<title>GamePad</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:      #050507;
  --bg1:     #0c0c10;
  --bg2:     #111116;
  --bg3:     #18181f;
  --border:  rgba(255,255,255,0.07);
  --border-h:rgba(255,255,255,0.14);
  --text:    #f0eeff;
  --muted:   rgba(240,238,255,0.38);
  --dim:     rgba(240,238,255,0.18);
}

html { background: var(--bg); }
body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.bg-glow {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.bg-glow::before {
  content: '';
  position: absolute;
  width: 700px; height: 700px;
  top: -250px; left: -150px;
  background: radial-gradient(circle, rgba(90,65,255,0.1) 0%, transparent 65%);
  border-radius: 50%;
}
.bg-glow::after {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  top: 50px; right: -200px;
  background: radial-gradient(circle, rgba(0,200,255,0.07) 0%, transparent 65%);
  border-radius: 50%;
}

.container {
  position: relative; z-index: 1;
  max-width: 780px; margin: 0 auto; padding: 0 20px;
}

/* HEADER */
header { padding: 52px 0 0; }

.wordmark {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(38px, 9vw, 66px);
  letter-spacing: -2px;
  line-height: 1;
  background: linear-gradient(140deg, #ffffff 25%, rgba(2, 243, 143, 0.85) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  margin-top: 6px;
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
}

/* TOOLBAR */
.toolbar { margin-top: 40px; display: flex; flex-direction: column; gap: 10px; }

.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 15px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted); pointer-events: none; display: flex;
}
#search {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  padding: 13px 16px 13px 44px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 400;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
}
#search::placeholder { color: var(--dim); }
#search:focus { border-color: var(--border-h); background: var(--bg3); }

.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 7px 16px;
  border-radius: 100px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--border-h); color: var(--text); }
.filter-btn.active {
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.18);
  color: var(--text);
}

/* SECTION HEAD */
.section-head {
  margin-top: 40px; margin-bottom: 14px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.section-label {
  font-size: 11px; font-weight: 500;
  letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase;
}
#count-label { font-size: 11px; color: var(--dim); }

/* GRID */
#games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  padding-bottom: 60px;
}

/* CARD */
.game-card {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: flex; flex-direction: column;
  transition: border-color 0.22s, transform 0.22s;
  position: relative;
  animation: fadeUp 0.35s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.game-card:hover { border-color: var(--border-h); transform: translateY(-3px); }
.game-card:active { transform: scale(0.98); }

.card-hero {
  height: 120px;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; font-size: 52px;
}
.card-hero::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 45%, var(--bg1) 100%);
}
.card-hero::before {
  content: '';
  position: absolute; inset: 0; z-index: 1;
  background: repeating-linear-gradient(
    -45deg, transparent, transparent 3px,
    rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 6px
  );
}
.card-emoji { position: relative; z-index: 2; filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5)); }

.badge-new {
  position: absolute; top: 10px; right: 10px; z-index: 3;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff;
  font-size: 9px; font-weight: 500;
  letter-spacing: 1.5px; padding: 3px 9px;
  border-radius: 100px; text-transform: uppercase;
}

.card-body {
  padding: 14px 16px 16px; flex: 1;
  display: flex; flex-direction: column; gap: 5px;
}
.card-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 16px;
  letter-spacing: -0.3px; color: var(--text);
}
.card-desc {
  font-size: 12px; font-weight: 300;
  color: var(--muted); line-height: 1.6; flex: 1;
}
.card-footer {
  margin-top: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.card-tag {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.3px; padding: 3px 9px;
  border-radius: 100px; border: 1px solid;
}
.tag-arcade   { color:#4dff91; border-color:rgba(77,255,145,0.22); background:rgba(77,255,145,0.06); }
.tag-puzzle   { color:#ffd166; border-color:rgba(255,209,102,0.22); background:rgba(255,209,102,0.06); }
.tag-action   { color:#ff6b6b; border-color:rgba(255,107,107,0.22); background:rgba(255,107,107,0.06); }
.tag-strategy { color:#4dc9ff; border-color:rgba(77,201,255,0.22); background:rgba(77,201,255,0.06); }

.play-arrow {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid var(--border-h);
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 11px; flex-shrink: 0;
  transition: all 0.18s;
}
.game-card:hover .play-arrow {
  background: rgba(255,255,255,0.06);
  color: var(--text);
  border-color: rgba(255,255,255,0.25);
}

/* EMPTY */
.empty {
  grid-column: 1/-1; text-align: center; padding: 80px 20px;
}
.empty p { font-size: 13px; color: var(--dim); }

/* PWA BANNER */
#install-banner {
  display: none;
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: rgba(16,16,22,0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-h);
  border-radius: 16px;
  padding: 16px 20px;
  align-items: center; gap: 16px;
  z-index: 500; max-width: 360px; width: calc(100% - 40px);
}
.banner-text { flex: 1; }
.banner-text strong { display: block; font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.banner-text span   { font-size: 12px; color: var(--muted); font-weight: 300; }
.banner-btns { display: flex; gap: 8px; flex-shrink: 0; }
.btn-install {
  background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff; padding: 8px 16px; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; white-space: nowrap; transition: background 0.18s;
}
.btn-install:hover { background: rgba(255,255,255,0.14); }
.btn-dismiss {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); width: 34px; height: 34px; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.18s;
}
.btn-dismiss:hover { border-color: var(--border-h); color: var(--text); }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
  <header>
    <div class="wordmark">SSP GAMES</div>
    <div class="subtitle">Herná knižnica</div>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input type="text" id="search" placeholder="Hľadaj hru…" autocomplete="off" spellcheck="false">
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-tag="all">Všetky</button>
      <button class="filter-btn" data-tag="arcade">Arkáda</button>
      <button class="filter-btn" data-tag="pexeso">Pexeso</button>
      <button class="filter-btn" data-tag="puzzle">Puzzle</button>
      <button class="filter-btn" data-tag="action">Akcia</button>
      <button class="filter-btn" data-tag="strategy">Stratégia</button>
    </div>
  </div>

  <div class="section-head">
    <span class="section-label">Hry</span>
    <span id="count-label"></span>
  </div>

  <div id="games-grid"></div>
</div>

<div id="install-banner">
  <div class="banner-text">
    <strong>Pridaj na plochu</strong>
    <span>Hraj offline ako natívna app</span>
  </div>
  <div class="banner-btns">
    <button class="btn-install" id="btn-install">Inštalovať</button>
    <button class="btn-dismiss" id="btn-dismiss">×</button>
  </div>
</div>

<script>
// ── DATABÁZA HIER ────────────────────────────────────────────────────────────
// Ako pridať novú hru:
//   1. Vlož html súbor do priečinka games/
//   2. Pridaj objekt nižšie do poľa GAMES
// ─────────────────────────────────────────────────────────────────────────────
const GAMES = [
  {
    id: 'snake',
    title: 'Snake',
    desc: 'Zbieraj jedlo, vyhýbaj sa stenám aj sebe. Klasika, ktorá nikdy nezastará.',
    emoji: '🐍',
    tags: ['arcade'],
    heroColor: '#071a0b',
    file: 'games/snake.html',
    isNew: false,
  },
  {
    id: 'pexeso',
    title: 'Pexeso',
    desc: 'Precvič si svoju pamäť.',
    emoji: '🙈',
    tags: ['pexeso'],
    heroColor: '#071a0b',
    file: 'games/pexeso-pwa/pexeso/index.html',
    isNew: false,
  },
  {
    id: 'click',
    title: 'Click Rush',
    desc: 'Precvičovanie reflexov.',
    emoji: '🌕',
    tags: ['pexeso'],
    heroColor: '#071a0b',
    file: 'games/clickrush-pwa/clickrush/index.html',
    isNew: false,
  },
  // ── ŠABLÓNA PRE ĎALŠIU HRU (odkomentuj a vyplň) ──
  // {
  //   id: 'nazov-hry',
  //   title: 'Názov Hry',
  //   desc: 'Krátky popis hry, 1–2 vety.',
  //   emoji: '🎮',
  //   tags: ['arcade'],        // arcade | puzzle | action | strategy
  //   heroColor: '#0f0a00',    // tmavá farba pozadia obrázka na karte
  //   file: 'games/nazov.html',
  //   isNew: true,
  // },
];

const TAG_LABELS  = { arcade:'Arkáda', puzzle:'Puzzle', action:'Akcia', strategy:'Stratégia' };
const TAG_CLASSES = { arcade:'tag-arcade', puzzle:'tag-puzzle', action:'tag-action', strategy:'tag-strategy' };

let activeTag = 'all';
let searchQuery = '';

function renderGames() {
  const grid = document.getElementById('games-grid');
  const q = searchQuery.toLowerCase().trim();

  const filtered = GAMES.filter(g => {
    const tagOk    = activeTag === 'all' || g.tags.includes(activeTag);
    const searchOk = !q || g.title.toLowerCase().includes(q) || g.desc.toLowerCase().includes(q);
    return tagOk && searchOk;
  });

  document.getElementById('count-label').textContent =
    filtered.length === GAMES.length
      ? `${GAMES.length} hier`
      : `${filtered.length} z ${GAMES.length}`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><p>Žiadna hra nezodpovedá hľadaniu.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map((g, i) => `
    <a class="game-card" href="${g.file}" style="animation-delay:${i * 0.06}s">
      ${g.isNew ? '<div class="badge-new">Nová</div>' : ''}
      <div class="card-hero" style="background:${g.heroColor}">
        <span class="card-emoji">${g.emoji}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${g.title}</div>
        <div class="card-desc">${g.desc}</div>
        <div class="card-footer">
          <div class="card-tags">
            ${g.tags.map(t => `<span class="card-tag ${TAG_CLASSES[t]||'tag-arcade'}">${TAG_LABELS[t]||t}</span>`).join('')}
          </div>
          <div class="play-arrow">▶</div>
        </div>
      </div>
    </a>
  `).join('');
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTag = btn.dataset.tag;
  renderGames();
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGames();
});

// PWA install
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
document.getElementById('btn-install').addEventListener('click', () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner').style.display = 'none';
  });
});
document.getElementById('btn-dismiss').addEventListener('click', () => {
  document.getElementById('install-banner').style.display = 'none';
});

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}

renderGames();
</script>
</body>
</html>
