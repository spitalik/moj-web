<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#050507;--bg2:#111116;--text:#f0eeff;--muted:rgba(240,238,255,0.38);--border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);}
html,body{background:var(--bg);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;user-select:none;}
body::before{content:'';position:fixed;width:500px;height:500px;top:-150px;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(167,139,250,0.07) 0%,transparent 65%);border-radius:50%;pointer-events:none;z-index:0;}
#back-btn{position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:all .18s;}
#back-btn:hover{border-color:var(--border-h);color:var(--text);}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px 30px;gap:24px;}
.top-bar{display:flex;align-items:center;gap:12px;}
.game-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px;background:linear-gradient(135deg,#fff 30%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-pill{background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:6px;}
.stat-pill span{color:#a78bfa;font-variant-numeric:tabular-nums;}
.simon-board{position:relative;width:280px;height:280px;}
.btn-seg{position:absolute;width:128px;height:128px;cursor:pointer;border:3px solid rgba(255,255,255,0.06);transition:filter .1s,opacity .1s;-webkit-tap-highlight-color:transparent;}
.btn-seg.dim{opacity:.25;}
.btn-seg.lit{opacity:1;filter:brightness(1.6);}
.btn-seg:active,.btn-seg.pressed{filter:brightness(2)!important;opacity:1!important;}
#b0{top:0;left:0;background:#ff6b6b;border-radius:100% 4px 4px 4px/100% 4px 4px 4px;clip-path:inset(0 0 0 0 round 100% 6px 6px 6px);}
#b1{top:0;right:0;background:#ffd166;border-radius:4px 100% 4px 4px/4px 100% 4px 4px;clip-path:inset(0 0 0 0 round 6px 100% 6px 6px);}
#b2{bottom:0;left:0;background:#54a0ff;border-radius:4px 4px 4px 100%/4px 4px 4px 100%;clip-path:inset(0 0 0 0 round 6px 6px 6px 100%);}
#b3{bottom:0;right:0;background:#4dff91;border-radius:4px 4px 100% 4px/4px 4px 100% 4px;clip-path:inset(0 0 0 0 round 6px 6px 100% 6px);}
.center-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:52px;height:52px;background:var(--bg);border-radius:50%;border:3px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;}
.center-icon{font-size:20px;}
.status-text{font-size:14px;color:var(--muted);font-weight:300;text-align:center;min-height:20px;}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(5,5,7,.88);backdrop-filter:blur(10px);z-index:20;}
#overlay h2{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;}
.hint{font-size:12px;color:var(--muted);}
.play-btn{margin-top:6px;background:rgba(167,139,250,0.14);border:1px solid rgba(167,139,250,.3);color:#a78bfa;padding:11px 32px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .18s;}
.play-btn:hover{background:rgba(167,139,250,.25);}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>
<div id="overlay">
  <div style="font-size:44px">🧠</div>
  <h2 id="ov-title"></h2>
  <div class="hint" id="ov-hint"></div>
  <div class="diff-row" id="diff-row" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:2px;"></div>
  <button class="play-btn" id="ov-play" onclick="startGame()"></button>
</div>
<div class="page">
  <div class="top-bar">
    <div class="game-title" id="lbl-title"></div>
    <div class="stat-pill"><span id="lbl-round-txt"></span>&nbsp;<span id="round-num">0</span></div>
    <div class="stat-pill"><span id="lbl-best-txt"></span>&nbsp;<span id="best-num">0</span></div>
  </div>
  <div class="simon-board">
    <div class="btn-seg dim" id="b0" onclick="press(0)"></div>
    <div class="btn-seg dim" id="b1" onclick="press(1)"></div>
    <div class="btn-seg dim" id="b2" onclick="press(2)"></div>
    <div class="btn-seg dim" id="b3" onclick="press(3)"></div>
    <div class="center-circle"><span class="center-icon" id="center-icon">▶</span></div>
  </div>
  <div class="status-text" id="status"></div>
</div>
<script>
document.getElementById('lbl-back').textContent     = t('back');
document.getElementById('lbl-title').textContent    = t('simonTitle');
document.getElementById('ov-title').textContent     = t('simonTitle');
document.getElementById('ov-hint').textContent      = t('simonHint');
document.getElementById('ov-play').textContent      = t('simonPlay');
document.getElementById('lbl-round-txt').textContent= t('simonRound');
document.getElementById('lbl-best-txt').textContent = t('simonBest');

const DIFFS = [
  { label:'diffEasy',   flashMs:500, gapMs:300 },
  { label:'diffMedium', flashMs:380, gapMs:200 },
  { label:'diffHard',   flashMs:220, gapMs:120 },
];
let diffIdx = 1;

function buildDiffRow(id) {
  const dr = document.getElementById(id);
  if (!dr) return;
  dr.innerHTML = '';
  DIFFS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.style.cssText = 'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:rgba(240,238,255,0.38);padding:6px 14px;border-radius:100px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .18s;white-space:nowrap;';
    if (i === diffIdx) Object.assign(btn.style, { borderColor:'rgba(167,139,250,0.4)', color:'#a78bfa', background:'rgba(167,139,250,0.12)' });
    btn.textContent = t(d.label);
    btn.onclick = () => { diffIdx = i; buildDiffRow(id); };
    dr.appendChild(btn);
  });
}
buildDiffRow('diff-row');

let seq, playerSeq, round, best = 0, accepting;

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  seq = []; round = 0;
  best = parseInt(document.getElementById('best-num').textContent) || 0;
  nextRound();
}

function nextRound() {
  round++;
  accepting = false;
  seq.push(Math.floor(Math.random() * 4));
  document.getElementById('round-num').textContent = round;
  document.getElementById('center-icon').textContent = '👁';
  setStatus(t('simonWatch'));
  [0,1,2,3].forEach(i => document.getElementById(`b${i}`).className = 'btn-seg dim');
  setTimeout(() => playSeq(0), 600);
}

function playSeq(i) {
  if (i >= seq.length) {
    setTimeout(() => {
      accepting = true;
      playerSeq = [];
      [0,1,2,3].forEach(j => document.getElementById(`b${j}`).className = 'btn-seg');
      document.getElementById('center-icon').textContent = '✋';
      setStatus(t('simonRepeat'));
    }, 300);
    return;
  }
  const d = DIFFS[diffIdx];
  const stepDelay = i === 0 ? 0 : d.flashMs + d.gapMs;
  setTimeout(() => flashBtn(seq[i], () => playSeq(i + 1)), stepDelay);
}

function flashBtn(id, cb) {
  const el = document.getElementById(`b${id}`);
  const d = DIFFS[diffIdx];
  el.classList.remove('dim');
  el.classList.add('lit');
  setTimeout(() => {
    el.classList.remove('lit');
    el.classList.add('dim');
    if (cb) setTimeout(cb, d.gapMs);
  }, d.flashMs);
}

function press(id) {
  if (!accepting) return;
  const el = document.getElementById(`b${id}`);
  el.classList.add('pressed');
  setTimeout(() => el.classList.remove('pressed'), 150);
  playerSeq.push(id);
  const i = playerSeq.length - 1;
  if (playerSeq[i] !== seq[i]) { wrong(); return; }
  if (playerSeq.length === seq.length) {
    accepting = false;
    [0,1,2,3].forEach(j => document.getElementById(`b${j}`).className = 'btn-seg dim');
    document.getElementById('center-icon').textContent = '✅';
    setStatus(t('simonGood'));
    setTimeout(nextRound, 900);
  }
}

function wrong() {
  accepting = false;
  [0,1,2,3].forEach(i => {
    const el = document.getElementById(`b${i}`);
    el.className = 'btn-seg lit';
    setTimeout(() => el.className = 'btn-seg dim', 300);
  });
  const finalRound = round - 1;
  if (finalRound > best) { best = finalRound; document.getElementById('best-num').textContent = best; }
  setTimeout(() => {
    const ov = document.getElementById('overlay');
    ov.innerHTML = `
      <div style="font-size:44px">❌</div>
      <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:28px">${t('simonOver')}</h2>
      <div style="font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:#a78bfa;letter-spacing:-2px">${finalRound}</div>
      <div style="font-size:12px;color:var(--muted)">${t('simonBest')}: ${best}</div>
      <button class="play-btn" onclick="startGame()" style="margin-top:8px">${t('simonAgain')}</button>`;
    ov.style.display = 'flex';
  }, 600);
}

function setStatus(txt) { document.getElementById('status').textContent = txt; }
</script>
</body>
</html>
