<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zbieranie hviezd - Hra</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Arial', sans-serif;
            box-sizing: border-box;
        }
        
        #gameContainer {
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 650px;
        }
        
        canvas {
            border: 3px solid #e94560;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
            background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 100%);
            width: 100%;
            height: auto;
            touch-action: none;
        }
        
        #score, #lives {
            color: white;
            font-size: 22px;
            margin: 5px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #lives {
            color: #e94560;
            font-weight: bold;
        }
        
        #controls {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 20px;
            z-index: 10;
            width: 80%;
            max-width: 400px;
            border: 2px solid #e94560;
        }
        
        #milestone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
            pointer-events: none;
            z-index: 5;
            animation: milestoneAnimation 2s ease-out forwards;
        }
        
        @keyframes milestoneAnimation {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }
        
        button {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 18px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        button:hover {
            transform: scale(1.05);
            background: #ff6b6b;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">⭐ Skóre: 0</div>
        <div id="lives">❤️ Životy: 3</div>
        <div id="controls">🎮 Ovládanie: šípky ← → alebo A/D | 📱 Mobil: dotykom | 🖱️ Myš: ťahaním</div>
        <canvas id="gameCanvas" width="600" height="500"></canvas>
        <div id="gameOver">
            <div style="font-size: 48px;">😢 Koniec hry!</div>
            <div style="font-size: 24px; margin-top: 10px;" id="finalScore"></div>
            <div style="font-size: 18px; margin-top: 10px; color: #ffd700;" id="milestonesReached"></div>
            <button onclick="restartGame()">🔄 Hrať znova</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const milestonesReachedElement = document.getElementById('milestonesReached');
        
        // Herné premenné
        let player = {
            x: canvas.width / 2 - 30,
            y: canvas.height - 70,
            width: 60,
            height: 60,
            speed: 8
        };
        
        let stars = [];
        let specialStar = null;
        let score = 0;
        let lives = 3;
        let gameRunning = true;
        let spawnTimer = 0;
        let specialStarTimer = 0;
        let difficulty = 1;
        let starsCollected = 0;
        let invulnerable = false;
        let invulnerableTimer = 0;
        let milestones = []; // Dosiahnuté míľniky
        let currentMilestone = 1000; // Aktuálny míľnik
        
        const MAX_LIVES = 5;
        const STARS_FOR_EXTRA_LIFE = 10;
        const BASE_SPAWN_RATE = 60;
        const SPECIAL_STAR_INTERVAL = 600;
        
        // Vylepšené ovládanie
        const keys = {
            'ArrowLeft': false,
            'ArrowRight': false,
            'KeyA': false,
            'KeyD': false
        };
        
        // Event listener pre klávesnicu
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || 
                e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault();
            }
            
            if (e.key === 'ArrowLeft') keys['ArrowLeft'] = true;
            if (e.key === 'ArrowRight') keys['ArrowRight'] = true;
            if (e.key === 'a' || e.key === 'A') keys['KeyA'] = true;
            if (e.key === 'd' || e.key === 'D') keys['KeyD'] = true;
            
            if ((e.key === 'r' || e.key === 'R') && !gameRunning) {
                restartGame();
            }
        });
        
        document.addEventListener('keyup', function(e) {
            if (e.key === 'ArrowLeft') keys['ArrowLeft'] = false;
            if (e.key === 'ArrowRight') keys['ArrowRight'] = false;
            if (e.key === 'a' || e.key === 'A') keys['KeyA'] = false;
            if (e.key === 'd' || e.key === 'D') keys['KeyD'] = false;
        });
        
        // Dotykové ovládanie
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleTouch(e);
        });
        
        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            handleTouch(e);
        });
        
        function handleTouch(e) {
            if (!gameRunning) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const touchX = (touch.clientX - rect.left) * scaleX;
            
            player.x = touchX - player.width / 2;
            player.x = Math.max(0, Math.min(player.x, canvas.width - player.width));
        }
        
        // Ovládanie myšou
        canvas.addEventListener('mousemove', function(e) {
            if (e.buttons === 1 && gameRunning) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const mouseX = (e.clientX - rect.left) * scaleX;
                
                player.x = mouseX - player.width / 2;
                player.x = Math.max(0, Math.min(player.x, canvas.width - player.width));
            }
        });
        
        // Funkcia na vytvorenie hviezdy
        function createStar() {
            const minDistance = 80;
            let x, tooClose;
            let attempts = 0;
            
            do {
                tooClose = false;
                x = Math.random() * (canvas.width - 30);
                
                for (let star of stars) {
                    if (Math.abs(star.x - x) < minDistance && star.y < 50) {
                        tooClose = true;
                        break;
                    }
                }
                if (specialStar && Math.abs(specialStar.x - x) < minDistance && specialStar.y < 50) {
                    tooClose = true;
                }
                attempts++;
            } while (tooClose && attempts < 10);
            
            return {
                x: x,
                y: -30,
                size: 25 + Math.random() * 10,
                speed: 1.5 + Math.random() * 1.5 + difficulty * 0.3,
                color: `hsl(${40 + Math.random() * 20}, 100%, ${60 + Math.random() * 20}%)`,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.08,
                isSpecial: false
            };
        }
        
        // Funkcia na vytvorenie špeciálnej červenej hviezdy
        function createSpecialStar() {
            return {
                x: Math.random() * (canvas.width - 60),
                y: -40,
                size: 45,
                speed: 1.2,
                color: '#ff1744',
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: 0.1,
                isSpecial: true,
                glowIntensity: 0,
                glowDirection: 1
            };
        }
        
        // Kreslenie špeciálnej hviezdy
        function drawSpecialStar(star) {
            ctx.save();
            ctx.translate(star.x + star.size/2, star.y + star.size/2);
            ctx.rotate(star.rotation);
            
            star.glowIntensity += 0.05 * star.glowDirection;
            if (star.glowIntensity >= 1) star.glowDirection = -1;
            if (star.glowIntensity <= 0) star.glowDirection = 1;
            
            const glowSize = star.size * (1.5 + star.glowIntensity * 0.5);
            const outerGlow = ctx.createRadialGradient(0, 0, star.size/2, 0, 0, glowSize);
            outerGlow.addColorStop(0, 'rgba(255, 23, 68, 0.8)');
            outerGlow.addColorStop(0.5, 'rgba(255, 23, 68, 0.3)');
            outerGlow.addColorStop(1, 'rgba(255, 23, 68, 0)');
            ctx.fillStyle = outerGlow;
            ctx.fillRect(-glowSize, -glowSize, glowSize * 2, glowSize * 2);
            
            ctx.beginPath();
            const spikes = 5;
            const outerRadius = star.size/2;
            const innerRadius = star.size/3;
            
            for (let i = 0; i < spikes * 2; i++) {
                const radius = i % 2 === 0 ? outerRadius : innerRadius;
                const angle = (i * Math.PI) / spikes - Math.PI/2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            
            ctx.closePath();
            
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, outerRadius);
            gradient.addColorStop(0, '#FFFFFF');
            gradient.addColorStop(0.3, '#FF5252');
            gradient.addColorStop(0.7, '#D50000');
            gradient.addColorStop(1, '#8B0000');
            
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('❤️', 0, 0);
            
            ctx.restore();
        }
        
        // Kreslenie obyčajnej hviezdy
        function drawStar(star) {
            ctx.save();
            ctx.translate(star.x + star.size/2, star.y + star.size/2);
            ctx.rotate(star.rotation);
            
            const glowGradient = ctx.createRadialGradient(0, 0, star.size/2, 0, 0, star.size);
            glowGradient.addColorStop(0, 'rgba(255, 255, 200, 0.3)');
            glowGradient.addColorStop(1, 'rgba(255, 255, 200, 0)');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(-star.size, -star.size, star.size * 2, star.size * 2);
            
            ctx.beginPath();
            const spikes = 5;
            const outerRadius = star.size/2;
            const innerRadius = star.size/4;
            
            for (let i = 0; i < spikes * 2; i++) {
                const radius = i % 2 === 0 ? outerRadius : innerRadius;
                const angle = (i * Math.PI) / spikes - Math.PI/2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            
            ctx.closePath();
            
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, outerRadius);
            gradient.addColorStop(0, '#FFFFFF');
            gradient.addColorStop(0.4, star.color);
            gradient.addColorStop(1, '#FFA500');
            
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = '#FFF';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.restore();
        }
        
        // Kreslenie hráča
        function drawPlayer() {
            ctx.save();
            
            if (invulnerable && Math.floor(Date.now() / 100) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }
            
            const gradient = ctx.createLinearGradient(player.x, player.y, player.x + player.width, player.y);
            gradient.addColorStop(0, '#8B4513');
            gradient.addColorStop(0.5, '#A0522D');
            gradient.addColorStop(1, '#6B3410');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(player.x + 5, player.y + 20);
            ctx.lineTo(player.x + 15, player.y + player.height);
            ctx.lineTo(player.x + player.width - 15, player.y + player.height);
            ctx.lineTo(player.x + player.width - 5, player.y + 20);
            ctx.closePath();
            ctx.fill();
            
            ctx.strokeStyle = '#4A2500';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.strokeStyle = '#D2691E';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(player.x + player.width/2, player.y + 20, 20, Math.PI, 0);
            ctx.stroke();
            
            ctx.fillStyle = '#654321';
            ctx.fillRect(player.x + 15, player.y + 35, player.width - 30, 3);
            ctx.fillRect(player.x + 15, player.y + 45, player.width - 30, 3);
            
            ctx.restore();
        }
        
        // Detekcia kolízie
        function checkCollision(player, star) {
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + 30;
            const starCenterX = star.x + star.size / 2;
            const starCenterY = star.y + star.size / 2;
            
            const distance = Math.sqrt(
                Math.pow(playerCenterX - starCenterX, 2) + 
                Math.pow(playerCenterY - starCenterY, 2)
            );
            
            const collisionDistance = star.isSpecial ? 
                (player.width/2 + star.size/2) * 0.7 : 
                (player.width/2 + star.size/2) * 0.65;
            
            return distance < collisionDistance;
        }
        
        // Zobrazenie míľnika
        function showMilestone(milestone) {
            const milestoneDiv = document.createElement('div');
            milestoneDiv.id = 'milestone';
            milestoneDiv.textContent = `🎉 ${milestone} BODOV! 🎉`;
            document.getElementById('gameContainer').appendChild(milestoneDiv);
            
            setTimeout(() => {
                if (milestoneDiv.parentNode) {
                    milestoneDiv.parentNode.removeChild(milestoneDiv);
                }
            }, 2000);
            
            // Extra odmena za míľnik
            if (milestone % 2000 === 0) {
                // Extra špeciálna hviezda pri veľkých míľnikoch
                if (!specialStar) {
                    specialStar = createSpecialStar();
                    showFloatingText(canvas.width/2, 50, '🌟 BONUSOVÁ HVIEZDA! 🌟', '#ff1744');
                }
            }
        }
        
        // Strata života
        function loseLife() {
            if (invulnerable) return;
            
            lives--;
            livesElement.innerHTML = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, 3 - lives));
            
            if (lives <= 0) {
                gameOver();
            } else {
                invulnerable = true;
                invulnerableTimer = 120;
                createExplosion(player.x + player.width/2, player.y + player.height/2, '#ff0000');
            }
        }
        
        // Pridanie života
        function addLife() {
            if (lives < MAX_LIVES) {
                lives++;
                livesElement.innerHTML = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, 3 - lives));
                createExplosion(player.x + player.width/2, player.y, '#00ff00');
                showFloatingText(player.x + player.width/2, player.y, '+1 ❤️', '#00ff00');
            } else {
                showFloatingText(player.x + player.width/2, player.y, 'MAX ❤️', '#ffd700');
            }
        }
        
        // Doplnenie všetkých životov
        function refillAllLives() {
            const livesToAdd = MAX_LIVES - lives;
            lives = MAX_LIVES;
            livesElement.innerHTML = '❤️'.repeat(lives);
            
            createExplosion(player.x + player.width/2, player.y, '#ffd700');
            showFloatingText(player.x + player.width/2, player.y, 'PLNÉ ŽIVOTY! ❤️❤️❤️❤️❤️', '#ffd700');
            
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: player.x + player.width/2,
                    y: player.y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    size: Math.random() * 8 + 3,
                    color: Math.random() > 0.5 ? '#ffd700' : '#ff1744'
                });
            }
        }
        
        // Plávajúci text
        let floatingTexts = [];
        
        function showFloatingText(x, y, text, color) {
            floatingTexts.push({
                x: x,
                y: y,
                text: text,
                color: color,
                life: 90,
                vy: -2
            });
        }
        
        // Systém častíc
        let particles = [];
        
        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1,
                    size: Math.random() * 5 + 2,
                    color: color
                });
            }
        }
        
        function createParticles(x, y) {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 3,
                    vy: (Math.random() - 0.5) * 3,
                    life: 1,
                    size: Math.random() * 3 + 1,
                    color: '#ffd700'
                });
            }
        }
        
        // Game Over
        function gameOver() {
            gameRunning = false;
            gameOverElement.style.display = 'block';
            finalScoreElement.textContent = `⭐ Konečné skóre: ${score}`;
            
            // Zobrazenie dosiahnutých míľnikov
            if (milestones.length > 0) {
                milestonesReachedElement.textContent = `🏆 Dosiahnuté míľniky: ${milestones.join(', ')}`;
            } else {
                milestonesReachedElement.textContent = '';
            }
        }
        
        // Kontrola míľnikov
        function checkMilestones() {
            if (score >= currentMilestone) {
                milestones.push(currentMilestone);
                showMilestone(currentMilestone);
                currentMilestone += 1000; // Ďalší míľnik o 1000 bodov
            }
        }
        
        // Aktualizácia hry
        function update() {
            if (!gameRunning) return;
            
            // Aktualizácia nesmrteľnosti
            if (invulnerable) {
                invulnerableTimer--;
                if (invulnerableTimer <= 0) {
                    invulnerable = false;
                }
            }
            
            // Pohyb hráča
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] || keys['KeyD']) {
                player.x += player.speed;
            }
            
            player.x = Math.max(0, Math.min(player.x, canvas.width - player.width));
            
            // Vytváranie špeciálnej hviezdy
            specialStarTimer++;
            if (!specialStar && specialStarTimer >= SPECIAL_STAR_INTERVAL) {
                specialStar = createSpecialStar();
                specialStarTimer = 0;
                showFloatingText(canvas.width/2, 50, '🌟 ŠPECIÁLNA HVIEZDA! 🌟', '#ff1744');
            }
            
            // Vytváranie obyčajných hviezd
            spawnTimer++;
            const spawnRate = Math.max(BASE_SPAWN_RATE - difficulty * 5, 20);
            
            if (spawnTimer > spawnRate) {
                if (stars.length < 3 + Math.floor(difficulty)) {
                    stars.push(createStar());
                }
                spawnTimer = 0;
            }
            
            // Aktualizácia špeciálnej hviezdy
            if (specialStar) {
                specialStar.y += specialStar.speed;
                specialStar.rotation += specialStar.rotationSpeed;
                
                if (checkCollision(player, specialStar)) {
                    score += 50;
                    refillAllLives();
                    scoreElement.textContent = `⭐ Skóre: ${score}`;
                    
                    createParticles(specialStar.x + specialStar.size/2, specialStar.y + specialStar.size/2);
                    specialStar = null;
                    
                    checkMilestones();
                } else if (specialStar.y > canvas.height + 50) {
                    specialStar = null;
                    showFloatingText(canvas.width/2, canvas.height/2, 'Ušla ti špeciálna hviezda! 😢', '#ff1744');
                }
            }
            
            // Aktualizácia obyčajných hviezd
            for (let i = stars.length - 1; i >= 0; i--) {
                stars[i].y += stars[i].speed;
                stars[i].rotation += stars[i].rotationSpeed;
                
                if (checkCollision(player, stars[i])) {
                    score += 10;
                    starsCollected++;
                    scoreElement.textContent = `⭐ Skóre: ${score}`;
                    
                    createParticles(stars[i].x + stars[i].size/2, stars[i].y + stars[i].size/2);
                    showFloatingText(stars[i].x + stars[i].size/2, stars[i].y, '+10', '#ffd700');
                    
                    if (starsCollected >= STARS_FOR_EXTRA_LIFE) {
                        addLife();
                        starsCollected = 0;
                    }
                    
                    stars.splice(i, 1);
                    
                    // Zvýšenie obtiažnosti
                    if (score % 200 === 0 && score > 0 && score % 1000 !== 0) {
                        difficulty = Math.min(difficulty + 0.5, 10);
                        showFloatingText(canvas.width/2, canvas.height/2, 
                                       `Úroveň ${Math.floor(difficulty)}!`, '#ffd700');
                    }
                    
                    checkMilestones();
                    continue;
                }
                
                if (stars[i].y > canvas.height + 50) {
                    stars.splice(i, 1);
                    loseLife();
                }
            }
            
            // Aktualizácia častíc a textov
            updateParticles();
            updateFloatingTexts();
        }
        
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life -= 0.03;
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }
        
        function updateFloatingTexts() {
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].y += floatingTexts[i].vy;
                floatingTexts[i].life--;
                
                if (floatingTexts[i].life <= 0) {
                    floatingTexts.splice(i, 1);
                }
            }
        }
        
        // Vykreslenie
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Nočná obloha
            for (let i = 0; i < 80; i++) {
                const x = (i * 89) % canvas.width;
                const y = (i * 37) % canvas.height;
                const brightness = 0.2 + Math.sin(Date.now() * 0.0005 + i) * 0.15;
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.fillRect(x, y, 2, 2);
            }
            
            // Kreslenie obyčajných hviezd
            stars.forEach(star => drawStar(star));
            
            // Kreslenie špeciálnej hviezdy
            if (specialStar) {
                drawSpecialStar(specialStar);
            }
            
            // Kreslenie hráča
            drawPlayer();
            
            // Kreslenie častíc
            particles.forEach(particle => {
                let color;
                switch(particle.color) {
                    case '#ffd700': color = '255, 215, 0'; break;
                    case '#ff0000': color = '255, 0, 0'; break;
                    case '#00ff00': color = '0, 255, 0'; break;
                    case '#ff1744': color = '255, 23, 68'; break;
                    default: color = '255, 255, 255';
                }
                ctx.fillStyle = `rgba(${color}, ${particle.life})`;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Kreslenie plávajúcich textov
            floatingTexts.forEach(text => {
                let color;
                switch(text.color) {
                    case '#ffd700': color = '255, 215, 0'; break;
                    case '#00ff00': color = '0, 255, 0'; break;
                    case '#ff1744': color = '255, 23, 68'; break;
                    default: color = '255, 255, 255';
                }
                ctx.fillStyle = `rgba(${color}, ${text.life / 90})`;
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(text.text, text.x, text.y);
            });
            
            // UI prvky
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.font = '12px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`Úroveň: ${Math.floor(difficulty)}`, 10, 20);
            ctx.fillText(`Ďalší míľnik: ${currentMilestone} bodov`, 10, 40);
            ctx.fillText(`Ďalší život za: ${STARS_FOR_EXTRA_LIFE - starsCollected} ⭐`, 10, 60);
            
            if (invulnerable) {
                ctx.fillStyle = 'rgba(255, 255, 0, 0.7)';
                ctx.fillText(`🛡️ Nezraniteľný: ${Math.ceil(invulnerableTimer / 60)}s`, 10, 80);
            }
            
            // Indikátor špeciálnej hviezdy
            if (!specialStar) {
                const timeUntilSpecial = Math.ceil((SPECIAL_STAR_INTERVAL - specialStarTimer) / 60);
                ctx.fillStyle = 'rgba(255, 23, 68, 0.7)';
                ctx.fillText(`🌟 Špeciálna hviezda za: ${timeUntilSpecial}s`, 10, 100);
            } else {
                ctx.fillStyle = 'rgba(255, 23, 68, 0.9)';
                ctx.fillText('🌟 ŠPECIÁLNA HVIEZDA NA OBRAZOVKE!', 10, 100);
            }
            
            // Zobrazenie dosiahnutých míľnikov
            if (milestones.length > 0) {
                ctx.fillStyle = 'rgba(255, 215, 0, 0.7)';
                ctx.fillText(`🏆 Míľniky: ${milestones.length}x`, 10, 120);
            }
        }
        
        // Herná slučka
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Reštart hry
        function restartGame() {
            stars = [];
            specialStar = null;
            particles = [];
            floatingTexts = [];
            score = 0;
            lives = 3;
            starsCollected = 0;
            gameRunning = true;
            difficulty = 1;
            spawnTimer = 0;
            specialStarTimer = 0;
            invulnerable = false;
            invulnerableTimer = 0;
            milestones = [];
            currentMilestone = 1000;
            player.x = canvas.width / 2 - player.width/2;
            
            scoreElement.textContent = '⭐ Skóre: 0';
            livesElement.innerHTML = '❤️❤️❤️';
            gameOverElement.style.display = 'none';
        }
        
        // Spustenie hry
        gameLoop();
        
        console.log('🎮 Hra spustená!');
        console.log('🏆 Hra pokračuje aj po 1000 bodoch!');
        console.log('🎯 Míľniky každých 1000 bodov s extra odmenami!');
    </script>
</body>
</html>
