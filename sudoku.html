<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Sudoku</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }

    h1 {
        margin-bottom: 10px;
    }

    #sudoku {
        display: grid;
        grid-template-columns: repeat(9, 50px);
        grid-template-rows: repeat(9, 50px);
        border: 4px solid #111;
    }

    input {
        width: 50px;
        height: 50px;
        text-align: center;
        font-size: 22px;
        border: 1px solid #999;
        box-sizing: border-box;
        outline: none;
    }

    input:focus {
        background: #dbeafe;
    }

    .fixed {
        background: #e5e7eb;
        font-weight: bold;
    }

    .wrong {
        background: #fecaca !important;
    }

    .correct {
        background: #bbf7d0 !important;
    }

    /* Hrubé vertikálne čiary */
    input:nth-child(3n) {
        border-right: 3px solid black;
    }

    input:nth-child(9n) {
        border-right: 1px solid #999;
    }

    .row-end {
        border-bottom: 3px solid black !important;
    }

    .buttons {
        margin-top: 20px;
        display: flex;
        gap: 10px;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        color: white;
    }

    .check-btn {
        background: #2563eb;
    }

    .new-btn {
        background: #16a34a;
    }

    button:hover {
        opacity: 0.9;
    }

    #message {
        margin-top: 15px;
        font-size: 18px;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>Sudoku</h1>

<div id="sudoku"></div>

<div class="buttons">
    <button class="check-btn" onclick="checkSudoku()">Skontrolovať</button>
    <button class="new-btn" onclick="newGame()">Nová hra</button>
</div>

<div id="message"></div>

<script>
const sudoku = document.getElementById("sudoku");

let currentPuzzle = [];
let currentSolution = [];

/* Základ vyriešeného sudoku */
const baseSolution = [
    [1,2,3,4,5,6,7,8,9],
    [4,5,6,7,8,9,1,2,3],
    [7,8,9,1,2,3,4,5,6],

    [2,3,4,5,6,7,8,9,1],
    [5,6,7,8,9,1,2,3,4],
    [8,9,1,2,3,4,5,6,7],

    [3,4,5,6,7,8,9,1,2],
    [6,7,8,9,1,2,3,4,5],
    [9,1,2,3,4,5,6,7,8]
];

/* Zamiešanie poľa */
function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

/* Generovanie novej vyriešenej dosky */
function generateSolution() {
    let nums = shuffle([1,2,3,4,5,6,7,8,9]);

    let map = {};
    for (let i = 0; i < 9; i++) {
        map[i + 1] = nums[i];
    }

    return baseSolution.map(row =>
        row.map(num => map[num])
    );
}

/* Vytvor puzzle odstránením čísel */
function generatePuzzle(solution) {
    let puzzle = solution.map(row => [...row]);

    let cellsToRemove = 45;

    while (cellsToRemove > 0) {
        let row = Math.floor(Math.random() * 9);
        let col = Math.floor(Math.random() * 9);

        if (puzzle[row][col] !== 0) {
            puzzle[row][col] = 0;
            cellsToRemove--;
        }
    }

    return puzzle;
}

/* Vykreslenie dosky */
function renderBoard() {
    sudoku.innerHTML = "";

    for (let row = 0; row < 9; row++) {
        for (let col = 0; col < 9; col++) {

            const input = document.createElement("input");

            input.type = "text";
            input.maxLength = 1;

            if (currentPuzzle[row][col] !== 0) {
                input.value = currentPuzzle[row][col];
                input.disabled = true;
                input.classList.add("fixed");
            }

            input.dataset.row = row;
            input.dataset.col = col;

            input.addEventListener("input", () => {
                input.value = input.value.replace(/[^1-9]/g, "");
            });

            if ((row + 1) % 3 === 0 && row !== 8) {
                input.classList.add("row-end");
            }

            sudoku.appendChild(input);
        }
    }

    document.getElementById("message").textContent = "";
}

/* Kontrola sudoku */
function checkSudoku() {

    const inputs = sudoku.querySelectorAll("input");

    let correct = true;

    inputs.forEach(input => {

        input.classList.remove("wrong");
        input.classList.remove("correct");

        let row = input.dataset.row;
        let col = input.dataset.col;

        let value = parseInt(input.value);

        if (value !== currentSolution[row][col]) {
            if (!input.disabled) {
                input.classList.add("wrong");
            }
            correct = false;
        } else {
            if (!input.disabled) {
                input.classList.add("correct");
            }
        }
    });

    const message = document.getElementById("message");

    if (correct) {
        message.textContent = "🎉 Sudoku je správne!";
        message.style.color = "green";
    } else {
        message.textContent = "❌ Niektoré čísla sú nesprávne.";
        message.style.color = "red";
    }
}

/* Nová hra */
function newGame() {

    currentSolution = generateSolution();

    currentPuzzle = generatePuzzle(currentSolution);

    renderBoard();
}

/* Spustenie hry */
newGame();

</script>

</body>
</html>
