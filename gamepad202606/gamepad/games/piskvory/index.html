<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piškvorky · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#050507;--bg1:#0c0c10;--bg2:#111116;--bg3:#18181f;
  --text:#f0eeff;--muted:rgba(240,238,255,0.38);--dim:rgba(240,238,255,0.18);
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);
  --x:#ff6b6b;--o:#4dff91;
}
html,body{background:var(--bg);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;user-select:none;}
body::before{content:'';position:fixed;width:600px;height:600px;top:-200px;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(100,80,255,0.08) 0%,transparent 65%);border-radius:50%;pointer-events:none;z-index:0;}

#back-btn{position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:border-color .18s,color .18s;}
#back-btn:hover{border-color:var(--border-h);color:var(--text);}

.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:60px 16px 30px;gap:12px;}

.game-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px;background:linear-gradient(135deg,#fff 30%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:4px;}

/* mode toggle */
.mode-row{display:flex;gap:6px;}
.mode-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:6px 16px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;}
.mode-btn:hover{border-color:var(--border-h);color:var(--text);}
.mode-btn.active{background:rgba(167,139,250,0.12);border-color:rgba(167,139,250,0.4);color:#a78bfa;}

/* scoreboard */
.score-row{display:flex;align-items:center;gap:20px;}
.sc{display:flex;flex-direction:column;align-items:center;gap:2px;}
.sc .lbl{font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;}
.sc .val{font-size:24px;font-weight:700;font-family:'Syne',sans-serif;font-variant-numeric:tabular-nums;}
.sep{font-size:16px;color:var(--dim);}

/* status */
#status{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;height:18px;text-align:center;}

/* canvas */
#canvas-wrap{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--bg1);}
canvas{display:block;cursor:pointer;}

/* controls */
.ctrl-row{display:flex;gap:8px;}
.ctrl-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:8px 18px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;}
.ctrl-btn:hover{border-color:var(--border-h);color:var(--text);}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>

<div class="page">
  <div class="game-title" id="lbl-title"></div>

  <div class="mode-row">
    <button class="mode-btn active" id="pvp-btn" onclick="setMode('pvp')" id="lbl-pvp"></button>
    <button class="mode-btn"        id="ai-btn"  onclick="setMode('ai')"  id="lbl-ai"></button>
  </div>

  <div class="score-row">
    <div class="sc">
      <span class="lbl" id="lbl-x-name"></span>
      <span class="val" style="color:var(--x)" id="sx">0</span>
    </div>
    <span class="sep">:</span>
    <div class="sc">
      <span class="lbl" id="o-label"></span>
      <span class="val" style="color:var(--o)" id="so">0</span>
    </div>
  </div>

  <div id="status"></div>

  <div id="canvas-wrap"><canvas id="c"></canvas></div>

  <div class="ctrl-row">
    <button class="ctrl-btn" id="btn-new"   onclick="resetGame()"></button>
    <button class="ctrl-btn" id="btn-reset" onclick="resetScore()"></button>
  </div>
</div>

<script>
// ── i18n ──────────────────────────────────────────────────────────────────
function applyLang() {
  document.getElementById('lbl-back').textContent    = t('back');
  document.getElementById('lbl-title').textContent   = t('piskTitle');
  document.getElementById('pvp-btn').textContent     = t('pisk2P');
  document.getElementById('ai-btn').textContent      = t('piskVsAI');
  document.getElementById('lbl-x-name').textContent  = t('piskP1');
  document.getElementById('o-label').textContent     = mode === 'ai' ? t('piskAI') : t('piskP2');
  document.getElementById('btn-new').textContent     = t('piskNew');
  document.getElementById('btn-reset').textContent   = t('piskReset');
  updateStatus();
}

// ── GAME ──────────────────────────────────────────────────────────────────
const N = 15, WIN = 5;
const SIZE = Math.min(420, Math.floor(window.innerWidth * 0.92));
const CELL = Math.floor(SIZE / N);

let board = [], cur = 'X', over = false, scores = {X:0, O:0}, mode = 'pvp', winCells = [];

const canvas = document.getElementById('c');
canvas.width = canvas.height = CELL * N;
const ctx = canvas.getContext('2d');

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0c0c10';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      const x = c * CELL, y = r * CELL, i = r * N + c;
      if (winCells.includes(i)) {
        ctx.fillStyle = 'rgba(167,139,250,0.12)';
        ctx.fillRect(x, y, CELL, CELL);
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x + 0.5, y + 0.5, CELL - 1, CELL - 1);
      const v = board[i];
      if (v) {
        ctx.fillStyle = v === 'X' ? 'rgba(255,107,107,0.15)' : 'rgba(77,255,145,0.12)';
        ctx.fillRect(x, y, CELL, CELL);
        ctx.fillStyle = v === 'X' ? '#ff6b6b' : '#4dff91';
        ctx.font = `bold ${Math.floor(CELL * 0.52)}px 'Syne', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = v === 'X' ? '#ff6b6b' : '#4dff91';
        ctx.shadowBlur = 6;
        ctx.fillText(v, x + CELL / 2, y + CELL / 2);
        ctx.shadowBlur = 0;
      }
    }
  }
}

function getCell(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * scaleX, cy = (e.clientY - rect.top) * scaleY;
  const c = Math.floor(cx / CELL), r = Math.floor(cy / CELL);
  if (r < 0 || r >= N || c < 0 || c >= N) return -1;
  return r * N + c;
}

canvas.onclick = e => { const i = getCell(e); if (i >= 0) play(i); };

function play(i) {
  if (over || i < 0 || board[i]) return;
  board[i] = cur;
  const w = checkWin(board, i, cur);
  if (w) { winCells = w; draw(); endGame(cur); return; }
  if (board.every(x => x)) { draw(); document.getElementById('status').textContent = t('piskDraw'); over = true; return; }
  cur = cur === 'X' ? 'O' : 'X';
  updateStatus();
  draw();
  if (mode === 'ai' && cur === 'O' && !over) setTimeout(aiMove, 250);
}

function updateStatus() {
  if (over) return;
  const who = cur === 'X' ? t('piskP1') : (mode === 'ai' ? t('piskAI') : t('piskP2'));
  document.getElementById('status').textContent = t('piskTurn') + ' ' + who;
}

function checkWin(b, idx, p) {
  const r = Math.floor(idx / N), c = idx % N;
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let cells = [idx];
    for (let s = 1; s < WIN; s++) { const nr = r+dr*s, nc = c+dc*s; if (nr<0||nr>=N||nc<0||nc>=N||b[nr*N+nc]!==p) break; cells.push(nr*N+nc); }
    for (let s = 1; s < WIN; s++) { const nr = r-dr*s, nc = c-dc*s; if (nr<0||nr>=N||nc<0||nc>=N||b[nr*N+nc]!==p) break; cells.push(nr*N+nc); }
    if (cells.length >= WIN) return cells;
  }
  return null;
}

function endGame(p) {
  over = true; scores[p]++;
  document.getElementById('s' + p.toLowerCase()).textContent = scores[p];
  const winner = p === 'X' ? t('piskP1') : (mode === 'ai' ? t('piskAI') : t('piskP2'));
  document.getElementById('status').textContent = t('piskWon') + ' ' + winner + '!';
}

function scoreBoard(b, p) {
  let s = 0;
  for (let i = 0; i < N*N; i++) {
    if (!b[i]) continue;
    const r = Math.floor(i/N), c = i%N;
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      let cnt = 1, open = 0, blocked = 0;
      for (let s2=1;s2<WIN;s2++){const nr=r+dr*s2,nc=c+dc*s2;if(nr<0||nr>=N||nc<0||nc>=N){blocked++;break;}if(b[nr*N+nc]===b[i])cnt++;else if(!b[nr*N+nc]){open++;break;}else{blocked++;break;}}
      for (let s2=1;s2<WIN;s2++){const nr=r-dr*s2,nc=c-dc*s2;if(nr<0||nr>=N||nc<0||nc>=N){blocked++;break;}if(b[nr*N+nc]===b[i])cnt++;else if(!b[nr*N+nc]){open++;break;}else{blocked++;break;}}
      if(cnt>=WIN){s+=b[i]===p?1e8:-1e8;}
      else if(cnt===4&&open>0){s+=b[i]===p?1e5:-1e5;}
      else if(cnt===3&&open>1){s+=b[i]===p?1e3:-1e3;}
      else if(cnt===2&&open>1){s+=b[i]===p?10:-10;}
    }
  }
  return s;
}

function aiMove() {
  if (over) return;
  let best = -Infinity, bestI = -1;
  const cands = getCandidates(board);
  for (const i of cands) {
    board[i] = 'O'; let s = scoreBoard(board, 'O');
    board[i] = 'X'; let s2 = scoreBoard(board, 'O');
    board[i] = '';
    const f = s - s2; if (f > best) { best = f; bestI = i; }
  }
  if (bestI < 0) for (let i = 0; i < N*N; i++) { if (!board[i]) { bestI = i; break; } }
  play(bestI);
}

function getCandidates(b) {
  const set = new Set();
  for (let i = 0; i < N*N; i++) {
    if (!b[i]) continue;
    const r = Math.floor(i/N), c = i%N;
    for (let dr=-2;dr<=2;dr++) for (let dc=-2;dc<=2;dc++) {
      const nr=r+dr,nc=c+dc;
      if (nr>=0&&nr<N&&nc>=0&&nc<N&&!b[nr*N+nc]) set.add(nr*N+nc);
    }
  }
  if (!set.size) { const mid = Math.floor(N/2); set.add(mid*N+mid); }
  return [...set];
}

function setMode(m) {
  mode = m;
  document.getElementById('pvp-btn').className = 'mode-btn' + (m==='pvp'?' active':'');
  document.getElementById('ai-btn').className  = 'mode-btn' + (m==='ai' ?' active':'');
  document.getElementById('o-label').textContent = m === 'ai' ? t('piskAI') : t('piskP2');
  resetGame();
}

function resetGame() {
  board = Array(N*N).fill(''); cur = 'X'; over = false; winCells = [];
  draw(); updateStatus();
}

function resetScore() {
  scores = {X:0, O:0};
  document.getElementById('sx').textContent = 0;
  document.getElementById('so').textContent = 0;
  resetGame();
}

applyLang();
resetGame();
</script>
</body>
</html>
