<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteroids · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#050507;--bg2:#111116;--text:#f0eeff;--muted:rgba(240,238,255,0.38);--border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);--c:#ff6b6b;--cdim:rgba(255,107,107,0.15);}
html,body{background:var(--bg);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;user-select:none;overflow:hidden;}
body::before{content:'';position:fixed;width:600px;height:600px;top:-200px;left:-150px;background:radial-gradient(circle,rgba(255,107,107,0.07) 0%,transparent 65%);border-radius:50%;pointer-events:none;z-index:0;}
#back-btn{position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:all .18s;}
#back-btn:hover{border-color:var(--border-h);color:var(--text);}
.top-hud{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:10px;}
.stat-pill{background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap;}
.stat-pill span{color:var(--c);font-variant-numeric:tabular-nums;}
canvas{display:block;position:fixed;inset:0;width:100%;height:100%;}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(5,5,7,.88);backdrop-filter:blur(8px);z-index:20;}
#overlay h2{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;}
.score-big{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--c);letter-spacing:-2px;}
.hint{font-size:12px;color:var(--muted);text-align:center;padding:0 20px;}
.play-btn{margin-top:6px;background:var(--cdim);border:1px solid rgba(255,107,107,.3);color:var(--c);padding:11px 32px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .18s;}
.play-btn:hover{background:rgba(255,107,107,.25);}
.ctrl-row{display:flex;gap:8px;margin-top:8px;}
.ctrl-btn{width:52px;height:52px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .12s;}
.ctrl-btn:active{background:var(--cdim);border-color:rgba(255,107,107,.3);color:var(--c);}
#ctrl-area{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:repeat(4,52px);gap:6px;z-index:10;}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>
<div class="top-hud">
  <div class="stat-pill"><span id="lbl-score-txt"></span> <span id="score">0</span></div>
  <div class="stat-pill"><span id="lbl-lives-txt"></span> <span id="lives">3</span></div>
  <div class="stat-pill"><span id="lbl-wave-txt"></span> <span id="wave">1</span></div>
</div>
<canvas id="c"></canvas>
<div id="ctrl-area">
  <button class="ctrl-btn" id="btn-left">◄</button>
  <button class="ctrl-btn" id="btn-thrust">▲</button>
  <button class="ctrl-btn" id="btn-right">►</button>
  <button class="ctrl-btn" id="btn-fire">🔥</button>
</div>
<div id="overlay">
  <div style="font-size:44px">🚀</div>
  <h2 id="ov-title"></h2>
  <div class="hint" id="ov-hint"></div>
  <div class="diff-row" id="diff-row" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:2px;"></div>
      <button class="play-btn" id="ov-play" onclick="startGame()"></button>
</div>
<script>
document.getElementById('lbl-back').textContent=t('back');
document.getElementById('lbl-score-txt').textContent=t('astScore');
document.getElementById('lbl-lives-txt').textContent=t('astLives');
document.getElementById('lbl-wave-txt').textContent=t('astWave');
document.getElementById('ov-title').textContent=t('astTitle');
document.getElementById('ov-hint').textContent=t('astHint');
document.getElementById('ov-play').textContent=t('astPlay');

const DIFFS=[
  {label:'diffEasy', astBase:4, astExtra:1, speedMult:0.75},
  {label:'diffMedium', astBase:5, astExtra:2, speedMult:1.0},
  {label:'diffHard', astBase:7, astExtra:3, speedMult:1.4},
];
let diffIdx=1;
function buildDiffRow(id){
  const dr=document.getElementById(id);if(!dr)return;dr.innerHTML='';
  DIFFS.forEach((d,i)=>{
    const btn=document.createElement('button');
    btn.style.cssText='background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:rgba(240,238,255,0.38);padding:6px 14px;border-radius:100px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .18s;white-space:nowrap;';
    if(i===diffIdx)Object.assign(btn.style,{borderColor:'rgba(255,107,107,0.4)',color:'#ff6b6b',background:'rgba(255,107,107,0.12)'});
    btn.textContent=t(d.label);btn.onclick=()=>{diffIdx=i;buildDiffRow(id);};dr.appendChild(btn);
  });
}
buildDiffRow('diff-row');


const C=document.getElementById('c'),ctx=C.getContext('2d');
let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

let ship,asteroids,bullets,particles,score,lives,wave,running,animId,invincible;
const keys={};

function startGame(){
  document.getElementById('overlay').style.display='none';
  score=0;lives=3;wave=1;running=true;invincible=0;
  ship={x:W/2,y:H/2,angle:-Math.PI/2,vx:0,vy:0,dead:false};
  bullets=[];particles=[];
  spawnWave();
  updateHUD();
  cancelAnimationFrame(animId);loop();
}

function spawnWave(){
  asteroids=[];
  const d=DIFFS[diffIdx];
  const n=d.astBase+wave*d.astExtra;
  for(let i=0;i<n;i++){
    let x,y;
    do{x=Math.random()*W;y=Math.random()*H;}
    while(dist(x,y,ship.x,ship.y)<120);
    spawnAsteroid(x,y,35+Math.random()*10,3);
  }
}

function spawnAsteroid(x,y,r,tier){
  const angle=Math.random()*Math.PI*2;
  const speed=(1+Math.random())*(4-tier)*0.6;
  const pts=[];
  const n=7+Math.floor(Math.random()*4);
  for(let i=0;i<n;i++){
    const a=i/n*Math.PI*2;
    const rr=r*(0.7+Math.random()*0.5);
    pts.push({x:Math.cos(a)*rr,y:Math.sin(a)*rr});
  }
  asteroids.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,r,tier,pts,angle:0,spin:(Math.random()-.5)*.04});
}

function dist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1);}

function loop(){
  if(!running)return;
  update();draw();
  animId=requestAnimationFrame(loop);
}

function update(){
  if(invincible>0)invincible--;
  // ship
  if((keys['ArrowLeft']||keys['KeyA']))ship.angle-=0.06;
  if((keys['ArrowRight']||keys['KeyD']))ship.angle+=0.06;
  if((keys['ArrowUp']||keys['KeyW']||keys['Space'])){
    ship.vx+=Math.cos(ship.angle)*0.3;
    ship.vy+=Math.sin(ship.angle)*0.3;
    // thruster particles
    if(Math.random()<0.5)particles.push({x:ship.x-Math.cos(ship.angle)*14,y:ship.y-Math.sin(ship.angle)*14,vx:(Math.random()-.5)*2-Math.cos(ship.angle)*2,vy:(Math.random()-.5)*2-Math.sin(ship.angle)*2,life:15,maxLife:15,color:'#ff9f43'});
  }
  ship.vx*=0.99;ship.vy*=0.99;
  ship.x=(ship.x+ship.vx+W)%W;ship.y=(ship.y+ship.vy+H)%H;

  // bullets
  bullets=bullets.filter(b=>b.life>0);
  bullets.forEach(b=>{b.x=(b.x+b.vx+W)%W;b.y=(b.y+b.vy+H)%H;b.life--;});

  // asteroids
  asteroids.forEach(a=>{a.x=(a.x+a.vx+W)%W;a.y=(a.y+a.vy+H)%H;a.angle+=a.spin;});

  // particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});

  // bullet-asteroid collision
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    for(let j=asteroids.length-1;j>=0;j--){
      const a=asteroids[j];
      if(dist(b.x,b.y,a.x,a.y)<a.r){
        bullets.splice(i,1);
        // explosion particles
        for(let k=0;k<10;k++)particles.push({x:a.x,y:a.y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:30,maxLife:30,color:'#ff9f43'});
        if(a.tier>1){
          spawnAsteroid(a.x,a.y,a.r*0.55,a.tier-1);
          spawnAsteroid(a.x,a.y,a.r*0.55,a.tier-1);
        }
        score+=a.tier===3?20:a.tier===2?50:100;
        updateHUD();
        asteroids.splice(j,1);
        break;
      }
    }
  }

  // ship-asteroid collision
  if(invincible===0){
    for(const a of asteroids){
      if(dist(ship.x,ship.y,a.x,a.y)<a.r-4){
        lives--;updateHUD();
        invincible=120;
        for(let k=0;k<20;k++)particles.push({x:ship.x,y:ship.y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:40,maxLife:40,color:'#fff'});
        ship.vx=0;ship.vy=0;
        if(lives<=0){gameOver();return;}
        break;
      }
    }
  }

  if(asteroids.length===0){wave++;spawnWave();updateHUD();}
}

function draw(){
  ctx.fillStyle='#050507';ctx.fillRect(0,0,W,H);
  // stars (static via seed)
  ctx.fillStyle='rgba(255,255,255,0.3)';
  for(let i=0;i<80;i++){
    const sx=((i*137+31)%W),sy=((i*97+71)%H);
    ctx.fillRect(sx,sy,1,1);
  }
  // particles
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,2*a,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  // asteroids
  asteroids.forEach(a=>{
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.angle);
    ctx.strokeStyle='rgba(180,160,255,0.7)';ctx.lineWidth=1.5;
    ctx.fillStyle='rgba(120,100,200,0.1)';
    ctx.beginPath();ctx.moveTo(a.pts[0].x,a.pts[0].y);
    a.pts.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.restore();
  });
  // bullets
  ctx.fillStyle='#ffd166';ctx.shadowColor='#ffd166';ctx.shadowBlur=8;
  bullets.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();});
  ctx.shadowBlur=0;
  // ship
  if(invincible===0||Math.floor(invincible/6)%2===0){
    ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle);
    ctx.strokeStyle='#fff';ctx.lineWidth=2;
    ctx.shadowColor='rgba(255,255,255,0.5)';ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(14,0);ctx.lineTo(-10,8);ctx.lineTo(-6,0);ctx.lineTo(-10,-8);ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;ctx.restore();
  }
}

function updateHUD(){
  document.getElementById('score').textContent=score;
  document.getElementById('lives').textContent=lives;
  document.getElementById('wave').textContent=wave;
}

function gameOver(){
  cancelAnimationFrame(animId);running=false;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div style="font-size:44px">💥</div>
    <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:28px">${t('astOver')}</h2>
    <div style="font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--c);letter-spacing:-2px">${score}</div>
    <div style="font-size:12px;color:var(--muted)">${t('astWave')} ${wave}</div>
    <button class="play-btn" onclick="startGame()" style="margin-top:8px">${t('astAgain')}</button>`;
  ov.style.display='flex';
}

// keyboard
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='KeyF'||e.code==='ControlLeft'||e.code==='ShiftLeft')fireBullet();
  e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

function fireBullet(){
  if(!running)return;
  bullets.push({x:ship.x+Math.cos(ship.angle)*16,y:ship.y+Math.sin(ship.angle)*16,vx:Math.cos(ship.angle)*10+ship.vx,vy:Math.sin(ship.angle)*10+ship.vy,life:55});
}

// mobile controls
const btnMap={
  'btn-left':{code:'ArrowLeft'},'btn-right':{code:'ArrowRight'},
  'btn-thrust':{code:'ArrowUp'},'btn-fire':null
};
['btn-left','btn-right','btn-thrust','btn-fire'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('pointerdown',()=>{
    if(id==='btn-fire')fireBullet();
    else keys[btnMap[id].code]=true;
  });
  el.addEventListener('pointerup',()=>{if(btnMap[id])keys[btnMap[id].code]=false;});
  el.addEventListener('pointerleave',()=>{if(btnMap[id])keys[btnMap[id].code]=false;});
});

draw();
</script>
</body>
</html>
