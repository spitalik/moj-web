<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="100 free mobile games - no license restrictions">
    <meta name="theme-color" content="#0f172a">
    <title>🎮 GameHub | 100 Free Games</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.7);
            --bg-card-hover: rgba(51, 65, 85, 0.8);
            --bg-input: rgba(15, 23, 42, 0.8);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6, #d946ef);
            --border-color: rgba(148, 163, 184, 0.1);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.3);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --bg-card-hover: rgba(255, 255, 255, 1);
            --bg-input: rgba(241, 245, 249, 0.9);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s;
            -webkit-font-smoothing: antialiased;
        }
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .particle {
            position: absolute; border-radius: 50%; background: var(--accent);
            opacity: 0.15; animation: float-up linear infinite;
        }
        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .app-container {
            position: relative; z-index: 1; max-width: 600px;
            margin: 0 auto; padding: 16px; min-height: 100vh;
        }
        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; gap: 8px;
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 2rem; animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .logo-text {
            font-size: 1.5rem; font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
        .theme-toggle {
            width: 38px; height: 38px; border-radius: 50%;
            border: 1px solid var(--border-color); background: var(--bg-card);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--text-primary); transition: all 0.15s; backdrop-filter: blur(10px);
        }
        .theme-toggle:hover { background: var(--bg-card-hover); }
        [data-theme="dark"] .sun-icon { display: block; }
        [data-theme="dark"] .moon-icon { display: none; }
        [data-theme="light"] .sun-icon { display: none; }
        [data-theme="light"] .moon-icon { display: block; }
        .language-selector { position: relative; }
        .lang-btn {
            display: flex; align-items: center; gap: 4px;
            padding: 8px 12px; border-radius: 20px;
            border: 1px solid var(--border-color); background: var(--bg-card);
            cursor: pointer; color: var(--text-primary); font-size: 0.85rem;
            font-weight: 500; backdrop-filter: blur(10px); white-space: nowrap;
            font-family: var(--font-family);
        }
        .lang-btn:hover { background: var(--bg-card-hover); }
        .current-flag { font-size: 1.1rem; }
        .chevron { transition: transform 0.15s; }
        .lang-btn.active .chevron { transform: rotate(180deg); }
        .language-dropdown {
            position: absolute; top: calc(100% + 8px); right: 0;
            width: 260px; background: var(--bg-secondary);
            border: 1px solid var(--border-color); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg); backdrop-filter: blur(20px);
            z-index: 1000; opacity: 0; visibility: hidden;
            transform: translateY(-10px); transition: all 0.15s; overflow: hidden;
        }
        .language-dropdown.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .lang-search { padding: 10px; border-bottom: 1px solid var(--border-color); }
        .lang-search input {
            width: 100%; padding: 8px 12px; border-radius: var(--radius-md);
            border: 1px solid var(--border-color); background: var(--bg-input);
            color: var(--text-primary); font-size: 0.85rem; outline: none;
            font-family: var(--font-family);
        }
        .lang-list { max-height: 280px; overflow-y: auto; padding: 6px; }
        .lang-option {
            display: flex; align-items: center; gap: 10px;
            width: 100%; padding: 10px 12px; border: none;
            background: transparent; color: var(--text-primary);
            cursor: pointer; border-radius: var(--radius-md);
            font-size: 0.9rem; transition: all 0.15s; font-family: var(--font-family);
        }
        .lang-option:hover { background: var(--bg-card); }
        .lang-option.active {
            background: rgba(99, 102, 241, 0.2); color: var(--accent); font-weight: 600;
        }
        .lang-option .flag { font-size: 1.2rem; }
        .lang-option .native { margin-left: auto; font-size: 0.8rem; color: var(--text-tertiary); }
        .hero { text-align: center; padding: 15px 0; }
        .hero-title { font-size: 2.2rem; font-weight: 900; margin-bottom: 6px; }
        .gradient-text {
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-subtitle { font-size: 1rem; color: var(--text-secondary); margin-bottom: 20px; }
        .hero-stats { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
        .stat {
            display: flex; flex-direction: column; align-items: center;
            padding: 10px 18px; background: var(--bg-card);
            border-radius: var(--radius-lg); border: 1px solid var(--border-color);
            backdrop-filter: blur(10px); min-width: 70px;
        }
        .stat-number {
            font-size: 1.2rem; font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; }
        .search-container { position: relative; margin-bottom: 10px; }
        .search-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-tertiary); pointer-events: none; z-index: 1;
        }
        .search-input {
            width: 100%; padding: 13px 40px 13px 44px; border-radius: 25px;
            border: 2px solid var(--border-color); background: var(--bg-card);
            color: var(--text-primary); font-size: 1rem; font-family: var(--font-family);
            backdrop-filter: blur(10px); transition: all 0.15s; outline: none;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: var(--shadow-glow); }
        .clear-search {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            width: 30px; height: 30px; border-radius: 50%; border: none;
            background: var(--bg-input); cursor: pointer; display: flex;
            align-items: center; justify-content: center; color: var(--text-tertiary);
            opacity: 0; transition: all 0.15s; pointer-events: none;
        }
        .clear-search.visible { opacity: 1; pointer-events: auto; }
        .categories-scroll {
            overflow-x: auto; scrollbar-width: none;
            -ms-overflow-style: none; -webkit-overflow-scrolling: touch;
            margin-bottom: 10px;
        }
        .categories-scroll::-webkit-scrollbar { display: none; }
        .categories { display: flex; gap: 6px; padding: 4px 0; }
        .category-pill {
            display: flex; align-items: center; gap: 5px;
            padding: 7px 14px; border-radius: 20px;
            border: 1px solid var(--border-color); background: var(--bg-card);
            color: var(--text-secondary); cursor: pointer; font-size: 0.8rem;
            font-weight: 500; white-space: nowrap; font-family: var(--font-family);
            backdrop-filter: blur(10px);
        }
        .category-pill:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .category-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .sort-section { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
        .sort-label { font-size: 0.8rem; color: var(--text-tertiary); }
        .sort-btn {
            padding: 5px 12px; border-radius: 16px; border: 1px solid var(--border-color);
            background: var(--bg-card); color: var(--text-secondary);
            cursor: pointer; font-size: 0.78rem; font-family: var(--font-family);
        }
        .sort-btn:hover { background: var(--bg-card-hover); }
        .sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .games-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            margin-bottom: 20px;
        }
        @media (min-width: 480px) {
            .games-grid { grid-template-columns: repeat(3, 1fr); }
        }
        .game-card {
            background: var(--bg-card); border-radius: var(--radius-lg);
            border: 1px solid var(--border-color); cursor: pointer;
            overflow: hidden; backdrop-filter: blur(10px);
            animation: cardIn 0.4s ease-out backwards;
            -webkit-tap-highlight-color: transparent;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .game-card:active { transform: scale(0.96); }
        .game-card-image {
            width: 100%; aspect-ratio: 1/0.8; background: var(--bg-input);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; position: relative;
        }
        .game-card-badge {
            position: absolute; top: 8px; right: 8px;
            padding: 3px 8px; border-radius: 10px;
            background: var(--accent); color: #fff;
            font-size: 0.6rem; font-weight: 600; z-index: 1;
        }
        .game-card-info { padding: 10px 12px; }
        .game-card-title {
            font-size: 0.85rem; font-weight: 600; color: var(--text-primary);
            margin-bottom: 3px; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .game-card-category {
            font-size: 0.68rem; color: var(--text-tertiary); text-transform: uppercase;
        }
        .game-card-rating {
            display: flex; align-items: center; gap: 3px;
            margin-top: 5px; font-size: 0.7rem; color: #f59e0b;
        }
        .load-more-container { text-align: center; margin-bottom: 24px; }
        .load-more-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 22px; border-radius: 25px;
            border: 2px solid var(--accent); background: transparent;
            color: var(--accent); cursor: pointer; font-size: 0.85rem;
            font-weight: 600; font-family: var(--font-family);
        }
        .load-more-btn:active { background: var(--accent); color: #fff; }
        .no-results { text-align: center; padding: 40px 20px; display: none; }
        .no-results.show { display: block; }
        .no-results-icon { font-size: 3rem; margin-bottom: 12px; }
        .no-results h3 { font-size: 1.1rem; margin-bottom: 6px; }
        .no-results p { color: var(--text-secondary); font-size: 0.9rem; }
        .footer {
            text-align: center; padding: 20px 0; border-top: 1px solid var(--border-color);
            font-size: 0.75rem; color: var(--text-tertiary);
        }
        .footer-links { display: flex; justify-content: center; gap: 14px; margin-top: 8px; }
        .footer-links a { color: var(--text-secondary); text-decoration: none; }
        /* MODAL */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            padding: 16px; opacity: 0; visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal {
            background: var(--bg-secondary); border-radius: var(--radius-2xl);
            border: 1px solid var(--border-color); width: 100%;
            max-width: 500px; max-height: 85vh; overflow: hidden;
            position: relative; box-shadow: var(--shadow-lg);
            display: flex; flex-direction: column;
        }
        .modal-close-btn {
            position: absolute; top: 10px; right: 10px; z-index: 10;
            width: 34px; height: 34px; border-radius: 50%;
            border: none; background: rgba(0,0,0,0.5); color: #fff;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 1.1rem;
        }
        .modal-close-btn:hover { background: rgba(0,0,0,0.7); }
        .modal-header {
            padding: 14px 16px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .modal-header h3 { font-size: 1rem; font-weight: 600; }
        .modal-body {
            flex: 1; min-height: 55vh; position: relative;
        }
        .modal-body iframe {
            width: 100%; height: 100%; border: none; background: #0a0a2a;
        }
        @media (max-width: 480px) {
            .hero-title { font-size: 1.8rem; }
            .hero-stats { gap: 8px; }
            .stat { padding: 8px 12px; min-width: 55px; }
            .stat-number { font-size: 1rem; }
            .games-grid { gap: 8px; }
            .game-card-image { font-size: 2.2rem; }
            .game-card-info { padding: 8px 10px; }
            .game-card-title { font-size: 0.78rem; }
            .modal { max-height: 90vh; }
        }
    </style>
</head>
<body>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- App -->
    <div class="app-container">
        <!-- Header -->
        <div class="header-top">
            <div class="logo">
                <span class="logo-icon">🎮</span>
                <span class="logo-text" data-translate="app_title">GameHub</span>
            </div>
            <div class="header-actions">
                <div class="language-selector">
                    <button class="lang-btn" id="langToggle">
                        <span class="current-flag">🇺🇸</span>
                        <span class="current-lang">EN</span>
                        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                    <div class="language-dropdown" id="langDropdown">
                        <div class="lang-search">
                            <input type="text" id="langSearch" placeholder="Search language...">
                        </div>
                        <div class="lang-list" id="langList"></div>
                    </div>
                </div>
                <button class="theme-toggle" id="themeToggle">
                    <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Hero -->
        <div class="hero">
            <h2 class="hero-title"><span class="gradient-text" data-translate="hero_title">100 Free Games</span></h2>
            <p class="hero-subtitle" data-translate="hero_subtitle">No ads. No licenses. Just pure fun.</p>
            <div class="hero-stats">
                <div class="stat"><span class="stat-number">100</span><span class="stat-label" data-translate="stat_games">Games</span></div>
                <div class="stat"><span class="stat-number">11</span><span class="stat-label" data-translate="stat_languages">Languages</span></div>
                <div class="stat"><span class="stat-number">∞</span><span class="stat-label" data-translate="stat_free">Free</span></div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-container">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="searchInput" class="search-input" data-translate="search_placeholder" placeholder="Search games..." autocomplete="off">
            <button class="clear-search" id="clearSearch">✕</button>
        </div>

        <!-- Categories -->
        <div class="categories-scroll">
            <div class="categories" id="categories">
                <button class="category-pill active" data-category="all">🌈 <span data-translate="category_all">All</span></button>
                <button class="category-pill" data-category="action">⚡ <span data-translate="category_action">Action</span></button>
                <button class="category-pill" data-category="puzzle">🧩 <span data-translate="category_puzzle">Puzzle</span></button>
                <button class="category-pill" data-category="arcade">🕹️ <span data-translate="category_arcade">Arcade</span></button>
                <button class="category-pill" data-category="strategy">♟️ <span data-translate="category_strategy">Strategy</span></button>
                <button class="category-pill" data-category="word">📝 <span data-translate="category_word">Word</span></button>
                <button class="category-pill" data-category="card">🃏 <span data-translate="category_card">Card</span></button>
                <button class="category-pill" data-category="reflex">🎯 <span data-translate="category_reflex">Reflex</span></button>
            </div>
        </div>

        <!-- Sort -->
        <div class="sort-section">
            <span class="sort-label" data-translate="sort_by">Sort:</span>
            <button class="sort-btn active" data-sort="popular" data-translate="sort_popular">Popular</button>
            <button class="sort-btn" data-sort="newest" data-translate="sort_newest">Newest</button>
            <button class="sort-btn" data-sort="name" data-translate="sort_name">Name</button>
            <button class="sort-btn" data-sort="rating" data-translate="sort_rating">Rating</button>
        </div>

        <!-- Games Grid -->
        <div class="games-grid" id="gamesGrid"></div>

        <!-- Load More -->
        <div class="load-more-container" id="loadMoreContainer" style="display:none;">
            <button class="load-more-btn" id="loadMoreBtn">
                <span data-translate="load_more">Load More</span>
                <span id="remainingCount">0</span>
            </button>
        </div>

        <!-- No Results -->
        <div class="no-results" id="noResults">
            <div class="no-results-icon">🔍</div>
            <h3 data-translate="no_games_found">No games found</h3>
            <p data-translate="try_different_search">Try different keywords</p>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p data-translate="footer_text">All games are open source and free. No license restrictions.</p>
            <div class="footer-links">
                <a href="#" data-translate="about">About</a>
                <a href="#" data-translate="privacy">Privacy</a>
            </div>
        </div>
    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="gameModal">
        <div class="modal">
            <button class="modal-close-btn" id="modalCloseBtn">✕</button>
            <div class="modal-header">
                <h3 id="modalGameTitle">Game</h3>
                <span id="modalGameCategory" style="font-size:0.75rem;color:var(--text-tertiary)"></span>
            </div>
            <div class="modal-body">
                <iframe id="modalIframe" src="" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // ==================== TRANSLATIONS ====================
        const translations = {

        // ==================== PARTICLES ====================
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            const colors = ['#6366f1', '#8b5cf6', '#d946ef', '#06b6d4', '#10b981'];
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');

                p.style.width = s + 'px';

                p.style.left = Math.random() * 100 + '%';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];

        // ==================== APP ====================
        let currentCategory = 'all';
        let currentSort = 'popular';
        let displayCount = 15;
        let filteredGames = [...gamesData];

        function filterAndRender() {
            let games = [...gamesData];
            const q = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';

            if (q) {
                games = games.filter(g => g.title.toLowerCase().includes(q) || g.cat.toLowerCase().includes(q));
            }
            if (currentCategory !== 'all') {
                games = games.filter(g => g.cat === currentCategory);
            }

            switch (currentSort) {
                case 'popular': games.sort((a, b) => b.plays - a.plays); break;
                case 'newest': games.sort((a, b) => b.id - a.id); break;
                case 'name': games.sort((a, b) => a.title.localeCompare(b.title)); break;
                case 'rating': games.sort((a, b) => b.rating - a.rating); break;
            }

            filteredGames = games;
            renderGames();
        }

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            const noResults = document.getElementById('noResults');
            const loadMore = document.getElementById('loadMoreContainer');

            if (!grid) return;

            const games = filteredGames.slice(0, displayCount);
            const rem = filteredGames.length - displayCount;

            grid.innerHTML = '';

            if (games.length === 0) {
                if (noResults) noResults.classList.add('show');
                if (loadMore) loadMore.style.display = 'none';
            } else {
                if (noResults) noResults.classList.remove('show');

                games.forEach((g, i) => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.style.animationDelay = (i * 0.04) + 's';
                    card.setAttribute('data-game-id', g.id);
                    card.setAttribute('data-game-path', g.path);

                    const badgeHTML = g.badge ? `<span class="game-card-badge">${g.badge.toUpperCase()}</span>` : '';

                    card.innerHTML = `
                        <div class="game-card-image">
                            ${badgeHTML}
                            <span style="font-size:2.5rem;">${g.icon}</span>
                        </div>
                        <div class="game-card-info">
                            <div class="game-card-title">${g.title}</div>
                            <div class="game-card-category">${t('category_' + g.cat) || g.cat}</div>
                            <div class="game-card-rating">⭐ ${g.rating}</div>
                        </div>
                    `;

                    // Click event - OTVORENIE MODALU
                    card.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        openGameModal(g);
                    });

                    // Touch event pre mobil
                    card.addEventListener('touchend', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        openGameModal(g);
                    });

                    grid.appendChild(card);
                });

                if (rem > 0) {
                    if (loadMore) loadMore.style.display = 'block';
                    const rc = document.getElementById('remainingCount');
                    if (rc) rc.textContent = rem;
                } else {
                    if (loadMore) loadMore.style.display = 'none';
                }
            }
        }

            const url = getGameUrl(game);
            console.log('📺 Loading URL:', url);
            
            if (iframe) {
                iframe.src = url;

                console.error('❌ Iframe not found!');

            modal.classList.add('show');
            document.body.style.overflow = 'hidden';

            if (langToggle && langDropdown) {
                langToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    langDropdown.classList.toggle('show');
                    this.classList.toggle('active');
                });
            }

            // Language selection (delegated)
            if (langDropdown) {
                langDropdown.addEventListener('click', function(e) {
                    const opt = e.target.closest('.lang-option');
                    if (opt) {
                        setLanguage(opt.dataset.lang);
                        langDropdown.classList.remove('show');
                        if (langToggle) langToggle.classList.remove('active');
                        filterAndRender();
                    }
                });
            }

            // Language search
            document.getElementById('langSearch')?.addEventListener('input', function() {
                const q = this.value.toLowerCase();
                document.querySelectorAll('.lang-option').forEach(o => {
                    o.style.display = o.textContent.toLowerCase().includes(q) ? 'flex' : 'none';
                });
            });

            // Close dropdown on outside click
            document.addEventListener('click', function(e) {
                if (langDropdown && !e.target.closest('#langToggle') && !e.target.closest('#langDropdown')) {
                    langDropdown.classList.remove('show');
                    if (langToggle) langToggle.classList.remove('active');
                }
            });

            // Modal close
            document.getElementById('modalCloseBtn')?.addEventListener('click', closeModal);
            
            const gameModal = document.getElementById('gameModal');
            if (gameModal) {
                gameModal.addEventListener('click', function(e) {
                    if (e.target === gameModal) closeModal();
                });
            }

            // Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeModal();
            });

            console.log('✅ GameHub ready!');
            console.log('📦 Games loaded:', gamesData.length);
            console.log('🔍 Modal element:', !!document.getElementById('gameModal'));
        });
    </script>
</body>
</html>
