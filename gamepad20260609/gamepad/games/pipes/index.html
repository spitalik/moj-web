<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipes · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#050507;--bg1:#0c0c10;--bg2:#111116;--bg3:#18181f;
  --text:#f0eeff;--muted:rgba(240,238,255,0.38);--dim:rgba(240,238,255,0.18);
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);
  --c:#00d4ff;--cdim:rgba(0,212,255,0.14);
}
html,body{background:var(--bg);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;user-select:none;overflow:hidden;}
body::before{content:'';position:fixed;width:500px;height:500px;top:-150px;right:-150px;background:radial-gradient(circle,rgba(0,212,255,0.07) 0%,transparent 65%);border-radius:50%;pointer-events:none;z-index:0;}

#back-btn{position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:all .18s;}
#back-btn:hover{border-color:var(--border-h);color:var(--text);}

.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 16px 20px;gap:12px;}

.game-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px;background:linear-gradient(135deg,#fff 30%,var(--c) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

.hud{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;}
.stat-pill{background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap;}
.stat-pill span{color:var(--c);font-variant-numeric:tabular-nums;}
.ctrl-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .18s;}
.ctrl-btn:hover{border-color:var(--border-h);color:var(--text);}

#canvas-wrap{position:relative;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--bg1);}
canvas{display:block;}

/* overlay */
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(5,5,7,.9);backdrop-filter:blur(10px);}
#overlay h2{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;}
.hint{font-size:12px;color:var(--muted);text-align:center;padding:0 16px;}
.play-btn{margin-top:4px;background:var(--cdim);border:1px solid rgba(0,212,255,.3);color:var(--c);padding:10px 30px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .18s;}
.play-btn:hover{background:rgba(0,212,255,.2);}
.diff-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.diff-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);padding:6px 16px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .18s;}
.diff-btn:hover,.diff-btn.active{border-color:rgba(0,212,255,.4);color:var(--c);background:var(--cdim);}
</style>
</head>
<body>

<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>

<div class="page">
  <div class="game-title" id="lbl-title"></div>

  <div class="hud">
    <div class="stat-pill"><span id="lbl-moves-txt"></span>&nbsp;<span id="hud-moves">0</span></div>
    <div class="stat-pill">⏱&nbsp;<span id="hud-time">0</span>s</div>
    <button class="ctrl-btn" id="btn-new" onclick="newGame()"></button>
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="overlay">
      <div style="font-size:42px">🔧</div>
      <h2 id="ov-title"></h2>
      <div class="hint" id="ov-hint"></div>
      <div class="diff-row" id="diff-row"></div>
      <button class="play-btn" id="ov-btn" onclick="startGame()"></button>
    </div>
  </div>
</div>

<script>
// ── i18n ──────────────────────────────────────────────────────────────────
document.getElementById('lbl-back').textContent     = t('back');
document.getElementById('lbl-title').textContent    = t('pipesTitle');
document.getElementById('lbl-moves-txt').textContent= t('pipesMoves');
document.getElementById('btn-new').textContent      = t('pipesNew');
document.getElementById('ov-title').textContent     = t('pipesTitle');
document.getElementById('ov-hint').textContent      = t('pipesHint');
document.getElementById('ov-btn').textContent       = t('pipesPlay');

// ── DIFFICULTY ────────────────────────────────────────────────────────────
const DIFFS = [
  { key:'easy',   size:4 },
  { key:'medium', size:6 },
  { key:'hard',   size:8 },
];
let diffIdx = 1;
const diffRow = document.getElementById('diff-row');
DIFFS.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'diff-btn' + (i === diffIdx ? ' active' : '');
  btn.textContent = `${t('diff'+d.key.charAt(0).toUpperCase()+d.key.slice(1))} (${d.size}×${d.size})`;
  btn.onclick = () => { diffIdx = i; diffRow.querySelectorAll('.diff-btn').forEach((b,j)=>b.classList.toggle('active',j===i)); };
  diffRow.appendChild(btn);
});

// ── CANVAS ────────────────────────────────────────────────────────────────
const C  = document.getElementById('c');
const cx = C.getContext('2d');
const MAX = Math.min(window.innerWidth - 40, window.innerHeight - 220, 440);

// ── PIPE DIRECTIONS (bitmask) ─────────────────────────────────────────────
// N=1, E=2, S=4, W=8
const N=1, E=2, S=4, W=8;
const ALL_DIRS = [N,E,S,W];
const OPPOSITE = {[N]:S,[S]:N,[E]:W,[W]:E};
const DR = {[N]:-1,[S]:1,[E]:0,[W]:0};
const DC = {[N]:0,[S]:0,[E]:1,[W]:-1};

// Pipe types by open sides (bitmask)
// We'll use: straight (NS=5, EW=10), elbow (NE=3,SE=6,SW=9,NW=12), T (NSE=7,NSW=13,NEW=11,SEW=14), cross (NSEW=15), end (N=1,E=2,S=4,W=8)
const PIPE_SHAPES = [1,2,4,8,3,6,9,12,5,10,7,11,13,14,15];

// ── GAME STATE ────────────────────────────────────────────────────────────
let grid, size, cs, moves, timerVal, timerInt, running;

// grid[r][c] = { shape, rotation }  → open = rotate(shape, rotation)
// We store the canonical shape (open sides) after rotation directly as `open` bitmask

function rotateShape(shape, times) {
  let s = shape;
  for (let i = 0; i < times; i++) {
    // rotate CW: N→E→S→W→N
    let ns = 0;
    if (s & N) ns |= E;
    if (s & E) ns |= S;
    if (s & S) ns |= W;
    if (s & W) ns |= N;
    s = ns;
  }
  return s;
}

function generatePuzzle(sz) {
  // Build a spanning tree of the grid to ensure a solvable puzzle
  const cells = Array.from({length:sz}, (_,r) => Array.from({length:sz}, (_,c) => ({r,c,open:0})));

  // DFS spanning tree
  const visited = Array.from({length:sz}, ()=>Array(sz).fill(false));
  function carve(r, c) {
    visited[r][c] = true;
    const dirs = [N,E,S,W].sort(()=>Math.random()-.5);
    for (const d of dirs) {
      const nr = r+DR[d], nc = c+DC[d];
      if (nr<0||nr>=sz||nc<0||nc>=sz||visited[nr][nc]) continue;
      cells[r][c].open |= d;
      cells[nr][nc].open |= OPPOSITE[d];
      carve(nr, nc);
    }
  }
  carve(0, 0);

  // Now shuffle rotations — store solved open, then randomize rotation
  const puzzle = cells.map(row => row.map(cell => {
    const solved = cell.open;
    const rot = Math.floor(Math.random() * 4);
    // Store current (scrambled) open + solved for reference
    return { solved, current: rotateShape(solved, rot) };
  }));
  return puzzle;
}

function newGame() {
  document.getElementById('overlay').style.display = 'none';
  startGame();
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  size = DIFFS[diffIdx].size;
  cs   = Math.floor(MAX / size);
  C.width = C.height = size * cs;
  document.getElementById('canvas-wrap').style.width  = C.width  + 'px';
  document.getElementById('canvas-wrap').style.height = C.height + 'px';

  grid = generatePuzzle(size);
  moves = 0; timerVal = 0;
  document.getElementById('hud-moves').textContent = '0';
  document.getElementById('hud-time').textContent  = '0';
  clearInterval(timerInt);
  timerInt = setInterval(() => {
    timerVal++;
    document.getElementById('hud-time').textContent = timerVal;
  }, 1000);
  running = true;
  render();
}

// ── FLOOD FILL to check connectivity ─────────────────────────────────────
function computeConnected() {
  const connected = Array.from({length:size}, ()=>Array(size).fill(false));
  const stack = [[0,0]];
  connected[0][0] = true;
  while (stack.length) {
    const [r,c] = stack.pop();
    const open = grid[r][c].current;
    for (const d of ALL_DIRS) {
      if (!(open & d)) continue;
      const nr = r+DR[d], nc = c+DC[d];
      if (nr<0||nr>=size||nc<0||nc>=size) continue;
      // Neighbour must also open toward us
      if (!(grid[nr][nc].current & OPPOSITE[d])) continue;
      if (connected[nr][nc]) continue;
      connected[nr][nc] = true;
      stack.push([nr,nc]);
    }
  }
  return connected;
}

function isSolved() {
  const conn = computeConnected();
  return conn.every(row => row.every(v => v));
}

// ── RENDER ────────────────────────────────────────────────────────────────
const PIPE_COLOR     = '#00d4ff';
const PIPE_COLOR_OFF = 'rgba(255,255,255,0.2)';
const PIPE_W_RATIO   = 0.22;  // pipe width as fraction of cell

function render() {
  cx.clearRect(0, 0, C.width, C.height);
  cx.fillStyle = '#0c0c10';
  cx.fillRect(0, 0, C.width, C.height);

  // Grid lines
  cx.strokeStyle = 'rgba(255,255,255,0.04)';
  cx.lineWidth = 1;
  for (let i = 0; i <= size; i++) {
    cx.beginPath(); cx.moveTo(i*cs, 0); cx.lineTo(i*cs, C.height); cx.stroke();
    cx.beginPath(); cx.moveTo(0, i*cs); cx.lineTo(C.width, i*cs); cx.stroke();
  }

  const conn = computeConnected();
  const pw   = Math.max(4, Math.floor(cs * PIPE_W_RATIO));
  const half = cs / 2;

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const x  = c * cs;
      const y  = r * cs;
      const cx_ = x + half;
      const cy_ = y + half;
      const open = grid[r][c].current;
      const lit  = conn[r][c];
      const col  = lit ? PIPE_COLOR : PIPE_COLOR_OFF;

      // Cell background
      cx.fillStyle = lit ? 'rgba(0,212,255,0.05)' : 'rgba(255,255,255,0.01)';
      cx.fillRect(x+1, y+1, cs-2, cs-2);

      // Draw pipe segments
      cx.lineCap  = 'round';
      cx.lineWidth = pw;

      // Center dot
      cx.fillStyle = col;
      cx.shadowColor = lit ? PIPE_COLOR : 'transparent';
      cx.shadowBlur  = lit ? 8 : 0;
      cx.beginPath();
      cx.arc(cx_, cy_, pw*0.6, 0, Math.PI*2);
      cx.fill();
      cx.shadowBlur = 0;

      // Segments
      cx.strokeStyle = col;
      cx.shadowColor = lit ? PIPE_COLOR : 'transparent';
      cx.shadowBlur  = lit ? 6 : 0;

      if (open & N) { cx.beginPath(); cx.moveTo(cx_, cy_); cx.lineTo(cx_, y+2);    cx.stroke(); }
      if (open & S) { cx.beginPath(); cx.moveTo(cx_, cy_); cx.lineTo(cx_, y+cs-2); cx.stroke(); }
      if (open & E) { cx.beginPath(); cx.moveTo(cx_, cy_); cx.lineTo(x+cs-2, cy_); cx.stroke(); }
      if (open & W) { cx.beginPath(); cx.moveTo(cx_, cy_); cx.lineTo(x+2, cy_);    cx.stroke(); }

      cx.shadowBlur = 0;
    }
  }
}

// ── INPUT ─────────────────────────────────────────────────────────────────
function cellFromXY(clientX, clientY) {
  const rect = C.getBoundingClientRect();
  const scaleX = C.width  / rect.width;
  const scaleY = C.height / rect.height;
  const x = (clientX - rect.left) * scaleX;
  const y = (clientY - rect.top)  * scaleY;
  const c = Math.floor(x / cs);
  const r = Math.floor(y / cs);
  if (r < 0 || r >= size || c < 0 || c >= size) return null;
  return {r, c};
}

function rotateCellCW(r, c) {
  const cell = grid[r][c];
  cell.current = rotateShape(cell.current, 1);
  moves++;
  document.getElementById('hud-moves').textContent = moves;
  render();
  if (isSolved()) setTimeout(winGame, 200);
}

function handleClick(clientX, clientY) {
  if (!running) return;
  const cell = cellFromXY(clientX, clientY);
  if (!cell) return;
  rotateCellCW(cell.r, cell.c);
}

C.addEventListener('click',      e => handleClick(e.clientX, e.clientY));
C.addEventListener('touchstart', e => { e.preventDefault(); handleClick(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});

// ── WIN ───────────────────────────────────────────────────────────────────
function winGame() {
  clearInterval(timerInt);
  running = false;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <div style="font-size:42px">🏆</div>
    <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:24px">${t('pipesWin')}</h2>
    <div style="font-family:'Syne',sans-serif;font-size:42px;font-weight:800;color:var(--c);letter-spacing:-2px">${timerVal}s</div>
    <div style="font-size:12px;color:var(--muted)">${t('pipesMoves')}: ${moves}</div>
    <div class="diff-row" id="diff-row2" style="margin-top:4px"></div>
    <button class="play-btn" onclick="startGame()" style="margin-top:4px">${t('pipesAgain')}</button>`;
  ov.style.display = 'flex';
  const dr2 = document.getElementById('diff-row2');
  DIFFS.forEach((d,i) => {
    const btn = document.createElement('button');
    btn.className = 'diff-btn' + (i===diffIdx?' active':'');
    btn.textContent = `${t('diff'+d.key.charAt(0).toUpperCase()+d.key.slice(1))} (${d.size}×${d.size})`;
    btn.onclick = () => { diffIdx=i; dr2.querySelectorAll('.diff-btn').forEach((b,j)=>b.classList.toggle('active',j===i)); };
    dr2.appendChild(btn);
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────
// Draw empty canvas behind overlay
size = DIFFS[diffIdx].size;
cs   = Math.floor(MAX / size);
C.width = C.height = size * cs;
cx.fillStyle = '#0c0c10'; cx.fillRect(0,0,C.width,C.height);
</script>
</body>
</html>
