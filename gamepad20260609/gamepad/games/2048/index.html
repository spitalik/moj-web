<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#050507;--bg1:#0c0c10;--bg2:#111116;--bg3:#18181f;--text:#f0eeff;--muted:rgba(240,238,255,0.38);--border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);--c:#ffd166;--cdim:rgba(255,209,102,0.15);}
html,body{background:var(--bg);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;user-select:none;}
body::before{content:'';position:fixed;width:500px;height:500px;top:-150px;left:-100px;background:radial-gradient(circle,rgba(255,209,102,0.08) 0%,transparent 65%);border-radius:50%;pointer-events:none;z-index:0;}
#back-btn{position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:border-color .18s,color .18s;}
#back-btn:hover{border-color:var(--border-h);color:var(--text);}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px 30px;gap:16px;}
.top-bar{display:flex;align-items:center;gap:10px;width:100%;max-width:340px;}
.game-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px;background:linear-gradient(135deg,#fff 30%,var(--c) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1;}
.stat-pill{background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap;}
.stat-pill span{color:var(--c);font-variant-numeric:tabular-nums;min-width:30px;}
.board{display:grid;grid-template-columns:repeat(4,76px);grid-template-rows:repeat(4,76px);gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:10px;}
.cell{width:76px;height:76px;border-radius:10px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:22px;transition:background .1s,transform .08s;border:1px solid rgba(255,255,255,0.04);}
.cell.pop{animation:pop .12s ease;}
@keyframes pop{0%{transform:scale(0.85);}60%{transform:scale(1.08);}100%{transform:scale(1);}}
#overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(5,5,7,.88);backdrop-filter:blur(10px);z-index:20;}
#overlay h2{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;}
.score-big{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--c);letter-spacing:-2px;line-height:1;}
.hint{font-size:12px;color:var(--muted);}
.play-btn{margin-top:6px;background:var(--cdim);border:1px solid rgba(255,209,102,.3);color:var(--c);padding:11px 32px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .18s;}
.play-btn:hover{background:rgba(255,209,102,.25);}
.new-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .18s;white-space:nowrap;}
.new-btn:hover{border-color:var(--border-h);color:var(--text);}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>
<div id="overlay">
  <div style="font-size:44px">🔢</div>
  <h2 id="ov-h"></h2>
  <div class="score-big" id="ov-score" style="display:none"></div>
  <div class="hint" id="ov-hint"></div>
  <button class="play-btn" id="ov-btn" onclick="newGame()"></button>
</div>
<div class="page">
  <div class="top-bar">
    <div class="game-title">2048</div>
    <div class="stat-pill"><span id="lbl-score-txt"></span> <span id="score">0</span></div>
    <div class="stat-pill"><span id="lbl-best-txt"></span> <span id="best">0</span></div>
    <button class="new-btn" id="lbl-new" onclick="newGame()"></button>
  </div>
  <div class="board" id="board"></div>
</div>
<script>
document.getElementById('lbl-back').textContent=t('back');
document.getElementById('lbl-score-txt').textContent=t('g2048Score');
document.getElementById('lbl-best-txt').textContent=t('g2048Best');
document.getElementById('lbl-new').textContent=t('g2048New');
document.getElementById('ov-h').textContent='2048';
document.getElementById('ov-hint').textContent=t('g2048Hint');
document.getElementById('ov-btn').textContent=t('g2048Play');

const TILE_COLORS={
  0:'rgba(255,255,255,0.03)',2:'#1e1e2e',4:'#26263a',8:'#7c3d0a',16:'#a34e08',
  32:'#c45e08',64:'#e06b08',128:'#c8960a',256:'#d4a00c',512:'#daa90e',
  1024:'#7c3d9a',2048:'#9d50bb',
};
const TILE_TEXT_COLOR={0:'transparent',2:'rgba(240,238,255,0.4)',4:'rgba(240,238,255,0.5)',8:'#fff',16:'#fff',32:'#fff',64:'#fff',128:'#fff',256:'#fff',512:'#fff',1024:'#fff',2048:'#fff'};

let grid,score,best=0,won=false;

function newGame(){
  document.getElementById('overlay').style.display='none';
  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0;won=false;
  addRandom();addRandom();
  updateScore();render();
}

function addRandom(){
  const empty=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(!grid[r][c])empty.push([r,c]);
  if(!empty.length)return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}

function compress(row){
  const f=row.filter(v=>v);
  const merged=[];
  let i=0;
  while(i<f.length){
    if(i+1<f.length&&f[i]===f[i+1]){merged.push(f[i]*2);score+=f[i]*2;i+=2;}
    else{merged.push(f[i]);i++;}
  }
  while(merged.length<4)merged.push(0);
  return merged;
}

function move(dir){
  let moved=false;
  let newGrid=grid.map(r=>[...r]);
  function processRows(g){
    return g.map(row=>{const n=compress(row);if(n.join()!==row.join())moved=true;return n;});
  }
  function transpose(g){return g[0].map((_,i)=>g.map(r=>r[i]));}
  function flipH(g){return g.map(r=>[...r].reverse());}

  if(dir==='left')newGrid=processRows(newGrid);
  else if(dir==='right'){newGrid=flipH(processRows(flipH(newGrid)));}
  else if(dir==='up'){newGrid=transpose(processRows(transpose(newGrid)));}
  else if(dir==='down'){newGrid=transpose(flipH(processRows(flipH(transpose(newGrid)))));}

  if(moved){grid=newGrid;addRandom();updateScore();render();checkEnd();}
}

function updateScore(){
  document.getElementById('score').textContent=score;
  if(score>best){best=score;document.getElementById('best').textContent=best;}
}

function checkEnd(){
  if(!won&&grid.some(r=>r.some(v=>v===2048))){won=true;showOver('win');}
  else if(!canMove())showOver('lose');
}

function canMove(){
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(!grid[r][c])return true;
    if(c<3&&grid[r][c]===grid[r][c+1])return true;
    if(r<3&&grid[r][c]===grid[r+1][c])return true;
  }
  return false;
}

function showOver(type){
  const ov=document.getElementById('overlay');
  document.getElementById('ov-h').textContent=type==='win'?t('g2048Win'):t('g2048Over');
  const sc=document.getElementById('ov-score');sc.style.display='block';sc.textContent=score;
  document.getElementById('ov-hint').textContent='';
  document.getElementById('ov-btn').textContent=t('g2048Again');
  ov.style.display='flex';
}

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    const v=grid[r][c];
    const cell=document.createElement('div');
    cell.className='cell'+(v?` pop`:'');
    cell.style.background=TILE_COLORS[v]||'#6a3fa0';
    cell.style.color=TILE_TEXT_COLOR[v]||'#fff';
    cell.style.fontSize=v>=1024?'18px':v>=128?'22px':'26px';
    cell.style.border=v?'1px solid rgba(255,255,255,0.08)':'1px solid rgba(255,255,255,0.04)';
    if(v)cell.textContent=v;
    board.appendChild(cell);
  }
}

document.addEventListener('keydown',e=>{
  const map={'ArrowLeft':'left','ArrowRight':'right','ArrowUp':'up','ArrowDown':'down','KeyA':'left','KeyD':'right','KeyW':'up','KeyS':'down'};
  if(map[e.code]){e.preventDefault();move(map[e.code]);}
});
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>30)move(dx>0?'right':'left');
  else if(Math.abs(dy)>30)move(dy>0?'down':'up');
},{passive:true});

newGame();
</script>
</body>
</html>
