<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout · GamePad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="../../i18n.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#050507;--bg1:#0c0c10;--bg2:#111116;--text:#f0eeff;--muted:rgba(240,238,255,0.38);--border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);--c:#ff9f43;--cdim:rgba(255,159,67,0.15);}
html,body{background:var(--bg);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;user-select:none;overflow:hidden;}
body::before{content:'';position:fixed;width:600px;height:600px;top:-200px;right:-100px;background:radial-gradient(circle,rgba(255,159,67,0.08) 0%,transparent 65%);border-radius:50%;pointer-events:none;z-index:0;}
#back-btn{position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;text-decoration:none;font-size:12px;font-weight:500;transition:border-color .18s,color .18s;}
#back-btn:hover{border-color:var(--border-h);color:var(--text);}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px 20px;gap:14px;}
.top-bar{display:flex;align-items:center;gap:12px;width:100%;max-width:402px;}
.game-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px;background:linear-gradient(135deg,#fff 30%,var(--c) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1;}
.stat-pill{background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap;}
.stat-pill span{color:var(--c);font-variant-numeric:tabular-nums;}
.canvas-wrap{position:relative;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--bg1);}
canvas{display:block;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(5,5,7,.84);backdrop-filter:blur(8px);}
#overlay h2{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.5px;}
.hint{font-size:12px;color:var(--muted);font-weight:300;text-align:center;}
.score-big{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:var(--c);letter-spacing:-2px;line-height:1;}
.play-btn{margin-top:6px;background:var(--cdim);border:1px solid rgba(255,159,67,.3);color:var(--c);padding:11px 32px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .18s;}
.play-btn:hover{background:rgba(255,159,67,.25);}
.lives{display:flex;gap:6px;align-items:center;}
.heart{font-size:14px;}
</style>
</head>
<body>
<a href="../../index.html" id="back-btn">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  <span id="lbl-back"></span>
</a>
<div class="page">
  <div class="top-bar">
    <div class="game-title" id="lbl-title"></div>
    <div class="stat-pill" id="lbl-score-pill"><span id="lbl-score-txt"></span> <span id="score">0</span></div>
    <div class="stat-pill"><span id="lbl-level-txt"></span> <span id="hud-level">1</span></div>
    <div class="stat-pill"><div class="lives" id="lives"></div></div>
  </div>
  <div class="canvas-wrap">
    <canvas id="c" width="400" height="480"></canvas>
    <div id="overlay">
      <div style="font-size:44px;margin-bottom:4px">🧱</div>
      <h2 id="ov-title"></h2>
      <div class="hint" id="ov-hint"></div>
      <div class="diff-row" id="diff-row" style="display:flex;gap:8px;margin-top:2px;"></div>
      <button class="play-btn" id="ov-play" onclick="startGame()"></button>
    </div>
  </div>
</div>
<script>
function T(k){return t(k);}
document.getElementById('lbl-back').textContent=T('back');
document.getElementById('lbl-title').textContent=T('breakoutTitle');
document.getElementById('lbl-score-txt').textContent=T('breakoutScore');
document.getElementById('ov-title').textContent=T('breakoutTitle');
document.getElementById('ov-hint').textContent=T('breakoutHint');
document.getElementById('ov-play').textContent=T('breakoutPlay');
if(document.getElementById('lbl-level-txt'))document.getElementById('lbl-level-txt').textContent=T('breakoutLevelLbl');

const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=400,H=480;let PAD_W=70;const PAD_H=10,BALL_R=7,ROWS=6,COLS=8,BRICK_W=42,BRICK_H=16,BRICK_GAP=4;
const COLORS=['#ff6b6b','#ff9f43','#ffd166','#4dff91','#54a0ff','#a78bfa'];
let px,ball,bricks,score,lives,running,animId,mouseX=W/2,level=1;

function makeBricks(){
  const b=[];
  const startX=(W-COLS*(BRICK_W+BRICK_GAP)+BRICK_GAP)/2;
  const startY=60;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    b.push({x:startX+c*(BRICK_W+BRICK_GAP),y:startY+r*(BRICK_H+BRICK_GAP),alive:true,color:COLORS[r%COLORS.length]});
  }
  return b;
}

const DIFFS=[
  {key:'easy',  ballSpeed:3.5, padW:90,  label:'diffEasy'},
  {key:'medium',ballSpeed:4.5, padW:70,  label:'diffMedium'},
  {key:'hard',  ballSpeed:6.0, padW:52,  label:'diffHard'},
];
let diffIdx=1;
function buildDiffRow(id){
  const dr=document.getElementById(id);if(!dr)return;dr.innerHTML='';
  DIFFS.forEach((d,i)=>{
    const btn=document.createElement('button');
    btn.style.cssText='background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:rgba(240,238,255,0.38);padding:6px 14px;border-radius:100px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .18s;';
    if(i===diffIdx)Object.assign(btn.style,{borderColor:'rgba(255,159,67,0.4)',color:'#ff9f43',background:'rgba(255,159,67,0.1)'});
    btn.textContent=t(d.label);btn.onclick=()=>{diffIdx=i;buildDiffRow(id);};dr.appendChild(btn);
  });
}
buildDiffRow('diff-row');
function startGame(){
  document.getElementById('overlay').style.display='none';
  level=1;
  startLevel();
}

function startLevel(){
  const d=DIFFS[diffIdx];PAD_W=d.padW;
  // Každý level: rýchlejšia loptička + užšie pádlo
  const speedBoost = 1 + (level-1)*0.15;
  const padShrink  = Math.max(36, PAD_W - (level-1)*6);
  PAD_W = padShrink;
  px=W/2-PAD_W/2;
  const spd = d.ballSpeed * speedBoost;
  ball={x:W/2,y:H-80,vx:spd*(Math.random()<.5?1:-1),vy:-spd};
  bricks=makeBricks();
  if(level===1){ score=0; lives=3; }
  running=true;
  document.getElementById('overlay').style.display='none';
  updateLives();
  document.getElementById('score').textContent=score;
  document.getElementById('hud-level').textContent=level;
  cancelAnimationFrame(animId);
  loop();
}

function updateLives(){
  document.getElementById('lives').innerHTML='❤️'.repeat(lives);
}

function loop(){
  if(!running)return;
  update();draw();
  animId=requestAnimationFrame(loop);
}

function update(){
  // paddle follow mouse/touch
  const target=mouseX-PAD_W/2;
  px=Math.max(0,Math.min(W-PAD_W,target));

  ball.x+=ball.vx; ball.y+=ball.vy;
  // walls
  if(ball.x-BALL_R<0){ball.x=BALL_R;ball.vx*=-1;}
  if(ball.x+BALL_R>W){ball.x=W-BALL_R;ball.vx*=-1;}
  if(ball.y-BALL_R<0){ball.y=BALL_R;ball.vy*=-1;}
  // paddle
  if(ball.y+BALL_R>H-40&&ball.y+BALL_R<H-40+PAD_H&&ball.x>px&&ball.x<px+PAD_W){
    ball.vy=-Math.abs(ball.vy);
    const hit=(ball.x-(px+PAD_W/2))/(PAD_W/2);
    ball.vx=hit*5;
  }
  // bottom
  if(ball.y>H+20){
    lives--;updateLives();
    if(lives<=0){gameOver();return;}
    ball={x:W/2,y:H-80,vx:3*(Math.random()<.5?1:-1),vy:-4};
  }
  // bricks
  for(const b of bricks){
    if(!b.alive)continue;
    if(ball.x+BALL_R>b.x&&ball.x-BALL_R<b.x+BRICK_W&&ball.y+BALL_R>b.y&&ball.y-BALL_R<b.y+BRICK_H){
      b.alive=false;score+=10;
      document.getElementById('score').textContent=score;
  document.getElementById('hud-level').textContent=level;
      const overlapX=Math.min(ball.x+BALL_R-b.x,b.x+BRICK_W-(ball.x-BALL_R));
      const overlapY=Math.min(ball.y+BALL_R-b.y,b.y+BRICK_H-(ball.y-BALL_R));
      if(overlapX<overlapY)ball.vx*=-1;else ball.vy*=-1;
      break;
    }
  }
  if(bricks.every(b=>!b.alive))gameWin();
}

function draw(){
  ctx.fillStyle='#0c0c10';ctx.fillRect(0,0,W,H);
  // bricks
  bricks.forEach(b=>{
    if(!b.alive)return;
    ctx.fillStyle=b.color+'22';ctx.fillRect(b.x,b.y,BRICK_W,BRICK_H);
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.roundRect(b.x+1,b.y+1,BRICK_W-2,BRICK_H-2,3);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(b.x+2,b.y+2,BRICK_W-4,3);
  });
  // paddle
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(px,H-40,PAD_W,PAD_H);
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.roundRect(px,H-40,PAD_W,PAD_H,5);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillRect(px+4,H-40,PAD_W-8,3);
  // ball
  ctx.fillStyle='#fff';ctx.shadowColor='rgba(255,255,255,0.6)';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}

function showOver(title,sub,btnText){
  cancelAnimationFrame(animId);running=false;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div style="font-size:44px;margin-bottom:4px">${title==='win'?'🏆':'💥'}</div>
    <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:26px">${sub}</h2>
    <div style="font-size:12px;color:var(--muted)">${T('breakoutScore')}: ${score}</div>
    <button class="play-btn" onclick="startGame()" style="margin-top:10px">${T('breakoutAgain')}</button>`;
  ov.style.display='flex';
}
function gameOver(){showOver('lose',T('breakoutOver'));}
function gameWin(){
  cancelAnimationFrame(animId);running=false;
  level++;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div style="font-size:44px;margin-bottom:4px">🏆</div>
    <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:24px">${T('breakoutWin')}</h2>
    <div style="font-size:13px;color:var(--muted)">${T('breakoutLevel')} ${level} — ${T('breakoutFaster')}</div>
    <button class="play-btn" onclick="startLevel()" style="margin-top:10px">${T('breakoutNext')}</button>
    <button onclick="startGame()" style="background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(240,238,255,0.38);padding:7px 18px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:2px">${T('breakoutRestart')}</button>`;
  ov.style.display='flex';
}

C.addEventListener('mousemove',e=>{const r=C.getBoundingClientRect();mouseX=e.clientX-r.left;});
C.addEventListener('touchmove',e=>{e.preventDefault();const r=C.getBoundingClientRect();mouseX=e.touches[0].clientX-r.left;},{passive:false});
document.addEventListener('keydown',e=>{
  if(!running){if(e.code==='Space'||e.code==='Enter')startGame();return;}
  if(e.code==='ArrowLeft')mouseX-=20;
  if(e.code==='ArrowRight')mouseX+=20;
});
draw();
</script>
</body>
</html>
