<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌌 Gravity Shift</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000010;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #orientation-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            letter-spacing: 1px;
            pointer-events: none;
            transition: opacity 0.5s;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="orientation-hint">🔄 Otoč obrazovku a zmeň smer hry</div>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const hint = document.getElementById('orientation-hint');

            // ==================== AUDIO ====================
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playSound(freq, duration, type = 'square', vol = 0.08, glideTo = null) {
                if (!audioCtx) return;
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, t);
                if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, t + duration);
                gain.gain.setValueAtTime(vol, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(t);
                osc.stop(t + duration);
            }

            function sfxCollect() { playSound(800, 0.1, 'square', 0.06);
                playSound(1200, 0.12, 'square', 0.04, 1600); }

            function sfxHit() { playSound(50, 0.4, 'sawtooth', 0.15, 20);
                playSound(30, 0.5, 'triangle', 0.1, 10); }

            function sfxShield() { playSound(400, 0.15, 'square', 0.06);
                playSound(600, 0.2, 'square', 0.05, 900); }

            function sfxDestroy() { playSound(200, 0.2, 'sawtooth', 0.1);
                playSound(500, 0.25, 'square', 0.06, 700); }

            function sfxGameOver() { playSound(80, 0.6, 'sawtooth', 0.12, 30);
                playSound(40, 0.8, 'triangle', 0.1, 15); }

            // ==================== GAME STATE ====================
            let W, H, isLandscape;
            let score = 0;
            let gameOver = false;
            let gameStarted = false;
            let scrollSpeed = 2.2;
            const MAX_SPEED = 9;
            const BASE_SPEED = 2.2;
            let difficultyLevel = 1;

            // Player
            const player = {
                size: 18,
                x: 0,
                y: 0,
                targetX: 0,
                targetY: 0,
                lerp: 0.18,
                shieldActive: false,
                shieldTimer: 0,
                shieldMax: 300, // 5 sekúnd pri 60fps
                trail: [],
                maxTrail: 8,
            };

            // Arrays
            let obstacles = [];
            let stars = [];
            let shields = [];
            let particles = [];
            let bgStars = [];

            // Timers
            let obstacleTimer = 0;
            let obstacleInterval = 55; // frames
            let starTimer = 0;
            let starInterval = 40;
            let shieldTimer = 0;
            let shieldInterval = 350; // ~6 sekúnd
            let frameCount = 0;

            // ==================== RESIZE & ORIENTATION ====================
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                W = canvas.width;
                H = canvas.height;
                const wasLandscape = isLandscape;
                isLandscape = W > H;
                initPlayerPosition();
                generateBgStars();
                // Ak sa orientácia zmenila počas hry
                if (wasLandscape !== undefined && wasLandscape !== isLandscape && gameStarted && !gameOver) {
                    obstacles = [];
                    stars = [];
                    shields = [];
                    particles = [];
                    obstacleTimer = 0;
                    starTimer = 0;
                    shieldTimer = 0;
                    // jemné vizuálne echo
                    for (let i = 0; i < 20; i++) {
                        particles.push({
                            x: player.x,
                            y: player.y,
                            vx: (Math.random() - 0.5) * 6,
                            vy: (Math.random() - 0.5) * 6,
                            life: 30 + Math.random() * 20,
                            maxLife: 50,
                            color: '#88ccff',
                            radius: 2 + Math.random() * 4,
                        });
                    }
                }
            }

            function initPlayerPosition() {
                if (isLandscape) {
                    player.x = 70;
                    player.y = H / 2;
                    player.targetY = player.y;
                    player.targetX = player.x;
                } else {
                    player.x = W / 2;
                    player.y = H - 70;
                    player.targetX = player.x;
                    player.targetY = player.y;
                }
                player.trail = [];
            }

            function generateBgStars() {
                bgStars = [];
                const count = Math.floor((W * H) / 3500);
                for (let i = 0; i < count; i++) {
                    bgStars.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        radius: 0.4 + Math.random() * 1.8,
                        twinkle: Math.random() * Math.PI * 2,
                        twinkleSpeed: 0.01 + Math.random() * 0.04,
                        opacity: 0.3 + Math.random() * 0.7,
                    });
                }
            }

            // ==================== RESET ====================
            function restartGame() {
                score = 0;
                gameOver = false;
                gameStarted = true;
                scrollSpeed = BASE_SPEED;
                difficultyLevel = 1;
                obstacles = [];
                stars = [];
                shields = [];
                particles = [];
                obstacleTimer = 0;
                starTimer = 0;
                shieldTimer = 0;
                player.shieldActive = false;
                player.shieldTimer = 0;
                player.trail = [];
                initPlayerPosition();
                obstacleInterval = 55;
                starInterval = 40;
                shieldInterval = 350;
                hint.style.opacity = '0';
                setTimeout(() => { hint.style.opacity = '1'; }, 2000);
            }

            // ==================== SPAWN ====================
            function spawnObstacle() {
                const r = 12 + Math.random() * 22;
                if (isLandscape) {
                    obstacles.push({
                        x: W + r + 20,
                        y: Math.random() * (H - r * 2) + r,
                        radius: r,
                        rotation: Math.random() * Math.PI * 2,
                        rotSpeed: (Math.random() - 0.5) * 0.06,
                        color: `hsl(${0 + Math.random()*20}, 70%, ${30 + Math.random()*25}%)`,
                        craterCount: Math.floor(Math.random() * 4) + 3,
                    });
                } else {
                    obstacles.push({
                        x: Math.random() * (W - r * 2) + r,
                        y: -r - 20,
                        radius: r,
                        rotation: Math.random() * Math.PI * 2,
                        rotSpeed: (Math.random() - 0.5) * 0.06,
                        color: `hsl(${0 + Math.random()*20}, 70%, ${30 + Math.random()*25}%)`,
                        craterCount: Math.floor(Math.random() * 4) + 3,
                    });
                }
            }

            function spawnStar() {
                const r = 7;
                if (isLandscape) {
                    stars.push({
                        x: W + r + 30,
                        y: Math.random() * (H - r * 2) + r,
                        radius: r,
                        glow: 0,
                        glowDir: 1,
                    });
                } else {
                    stars.push({
                        x: Math.random() * (W - r * 2) + r,
                        y: -r - 30,
                        radius: r,
                        glow: 0,
                        glowDir: 1,
                    });
                }
            }

            function spawnShield() {
                const r = 13;
                if (isLandscape) {
                    shields.push({
                        x: W + r + 20,
                        y: Math.random() * (H - r * 2) + r,
                        radius: r,
                        pulse: 0,
                    });
                } else {
                    shields.push({
                        x: Math.random() * (W - r * 2) + r,
                        y: -r - 20,
                        radius: r,
                        pulse: 0,
                    });
                }
            }

            function spawnParticles(x, y, count, color, spread = 4, life = 25) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * spread;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: life + Math.random() * 15,
                        maxLife: life + 15,
                        color: color,
                        radius: 1.5 + Math.random() * 3.5,
                    });
                }
            }

            // ==================== UPDATE ====================
            function update() {
                if (!gameStarted || gameOver) return;
                frameCount++;

                // Zvyšovanie obtiažnosti
                if (frameCount % 300 === 0) {
                    difficultyLevel++;
                    scrollSpeed = Math.min(MAX_SPEED, BASE_SPEED + difficultyLevel * 0.4);
                    obstacleInterval = Math.max(18, 55 - difficultyLevel * 2);
                    starInterval = Math.max(20, 40 - difficultyLevel * 1);
                    shieldInterval = Math.max(200, 350 - difficultyLevel * 8);
                }

                // Shield timer
                if (player.shieldActive) {
                    player.shieldTimer--;
                    if (player.shieldTimer <= 0) {
                        player.shieldActive = false;
                        spawnParticles(player.x, player.y, 15, '#88ccff', 3, 20);
                    }
                }

                // Lerp player position
                if (isLandscape) {
                    player.targetY = Math.max(player.size, Math.min(H - player.size, player.targetY));
                    player.y += (player.targetY - player.y) * player.lerp;
                    player.x = 70;
                } else {
                    player.targetX = Math.max(player.size, Math.min(W - player.size, player.targetX));
                    player.x += (player.targetX - player.x) * player.lerp;
                    player.y = H - 70;
                }

                // Trail
                player.trail.push({ x: player.x, y: player.y, life: 8 });
                if (player.trail.length > player.maxTrail) player.trail.shift();
                for (let t of player.trail) t.life--;

                // Spawn obstacles
                obstacleTimer++;
                if (obstacleTimer >= obstacleInterval) {
                    obstacleTimer = 0;
                    spawnObstacle();
                }

                // Spawn stars
                starTimer++;
                if (starTimer >= starInterval) {
                    starTimer = 0;
                    spawnStar();
                }

                // Spawn shields
                shieldTimer++;
                if (shieldTimer >= shieldInterval && !player.shieldActive) {
                    shieldTimer = 0;
                    spawnShield();
                }

                // Move obstacles
                for (let obs of obstacles) {
                    if (isLandscape) {
                        obs.x -= scrollSpeed;
                    } else {
                        obs.y += scrollSpeed;
                    }
                    obs.rotation += obs.rotSpeed;
                }

                // Move stars
                for (let s of stars) {
                    if (isLandscape) {
                        s.x -= scrollSpeed;
                    } else {
                        s.y += scrollSpeed;
                    }
                    s.glow += 0.08 * s.glowDir;
                    if (s.glow > 1) s.glowDir = -1;
                    if (s.glow < 0) s.glowDir = 1;
                }

                // Move shields
                for (let sh of shields) {
                    if (isLandscape) {
                        sh.x -= scrollSpeed;
                    } else {
                        sh.y += scrollSpeed;
                    }
                    sh.pulse += 0.07;
                }

                // Update particles
                for (let p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                }

                // Update BG stars
                for (let bg of bgStars) {
                    bg.twinkle += bg.twinkleSpeed;
                    if (isLandscape) {
                        bg.x -= scrollSpeed * 0.15;
                        if (bg.x < -5) { bg.x = W + 5;
                            bg.y = Math.random() * H; }
                    } else {
                        bg.y += scrollSpeed * 0.15;
                        if (bg.y > H + 5) { bg.y = -5;
                            bg.x = Math.random() * W; }
                    }
                }

                // Check collisions
                const px = player.x;
                const py = player.y;
                const ps = player.size;

                // Obstacles
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    const dx = px - obs.x;
                    const dy = py - obs.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < ps + obs.radius) {
                        if (player.shieldActive) {
                            // Znič prekážku
                            spawnParticles(obs.x, obs.y, 20, '#ffaa00', 5, 30);
                            sfxDestroy();
                            score += 3;
                            obstacles.splice(i, 1);
                        } else {
                            // Game over
                            gameOver = true;
                            spawnParticles(px, py, 50, '#ff4444', 7, 40);
                            spawnParticles(px, py, 30, '#ff8800', 5, 35);
                            sfxGameOver();
                            hint.style.opacity = '1';
                            break;
                        }
                    }
                }

                // Stars
                for (let i = stars.length - 1; i >= 0; i--) {
                    const s = stars[i];
                    const dx = px - s.x;
                    const dy = py - s.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < ps + s.radius + 6) {
                        spawnParticles(s.x, s.y, 12, '#ffdd44', 3, 20);
                        sfxCollect();
                        score += 5;
                        stars.splice(i, 1);
                    }
                }

                // Shields
                for (let i = shields.length - 1; i >= 0; i--) {
                    const sh = shields[i];
                    const dx = px - sh.x;
                    const dy = py - sh.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < ps + sh.radius + 6) {
                        player.shieldActive = true;
                        player.shieldTimer = player.shieldMax;
                        spawnParticles(sh.x, sh.y, 20, '#88ccff', 4, 25);
                        sfxShield();
                        shields.splice(i, 1);
                    }
                }

                // Cleanup offscreen
                obstacles = obstacles.filter(o => (isLandscape ? o.x > -o.radius - 30 : o.y < H + o.radius + 30));
                stars = stars.filter(s => (isLandscape ? s.x > -s.radius - 30 : s.y < H + s.radius + 30));
                shields = shields.filter(sh => (isLandscape ? sh.x > -sh.radius - 30 : sh.y < H + sh.radius + 30));
                particles = particles.filter(p => p.life > 0);
                player.trail = player.trail.filter(t => t.life > 0);

                // Score za prežitie
                if (frameCount % 30 === 0) score++;
            }

            // ==================== RENDER ====================
            function drawBgStars() {
                for (let bg of bgStars) {
                    const alpha = bg.opacity * (0.5 + 0.5 * Math.sin(bg.twinkle));
                    ctx.fillStyle = `rgba(200,220,255,${alpha})`;
                    ctx.beginPath();
                    ctx.arc(bg.x, bg.y, bg.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawAsteroid(obs) {
                ctx.save();
                ctx.translate(obs.x, obs.y);
                ctx.rotate(obs.rotation);
                // Hlavné telo
                const r = obs.radius;
                ctx.fillStyle = obs.color;
                ctx.beginPath();
                // Nepravidelný tvar
                const points = 10;
                for (let i = 0; i < points; i++) {
                    const angle = (i / points) * Math.PI * 2;
                    const variation = 0.75 + Math.sin(i * 3.7) * 0.2 + Math.cos(i * 5.1) * 0.15;
                    const cr = r * variation;
                    const cx = Math.cos(angle) * cr;
                    const cy = Math.sin(angle) * cr;
                    if (i === 0) ctx.moveTo(cx, cy);
                    else ctx.lineTo(cx, cy);
                }
                ctx.closePath();
                ctx.fill();
                // Okraj
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 2;
                ctx.stroke();
                // Krátery
                for (let i = 0; i < obs.craterCount; i++) {
                    const ca = (i / obs.craterCount) * Math.PI * 2 + obs.rotation * 0.3;
                    const cd = r * (0.3 + Math.random() * 0.4);
                    const cx = Math.cos(ca) * cd;
                    const cy = Math.sin(ca) * cd;
                    ctx.fillStyle = 'rgba(0,0,0,0.35)';
                    ctx.beginPath();
                    ctx.arc(cx, cy, r * 0.12, 0, Math.PI * 2);
                    ctx.fill();
                }
                // Highlight
                const hlAngle = -0.7;
                const hlX = Math.cos(hlAngle) * r * 0.5;
                const hlY = Math.sin(hlAngle) * r * 0.5;
                const hlGrad = ctx.createRadialGradient(hlX, hlY, r * 0.05, hlX, hlY, r * 0.7);
                hlGrad.addColorStop(0, 'rgba(255,255,255,0.25)');
                hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = hlGrad;
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            function drawStar(s) {
                ctx.save();
                ctx.translate(s.x, s.y);
                const glowAlpha = 0.5 + s.glow * 0.5;
                // Vonkajšia žiara
                const outerGlow = ctx.createRadialGradient(0, 0, s.radius * 0.3, 0, 0, s.radius * 2.5);
                outerGlow.addColorStop(0, `rgba(255,220,100,${glowAlpha})`);
                outerGlow.addColorStop(0.4, `rgba(255,200,50,${glowAlpha * 0.6})`);
                outerGlow.addColorStop(1, 'rgba(255,180,20,0)');
                ctx.fillStyle = outerGlow;
                ctx.beginPath();
                ctx.arc(0, 0, s.radius * 2.5, 0, Math.PI * 2);
                ctx.fill();
                // Telo hviezdy
                ctx.fillStyle = '#ffdd44';
                ctx.beginPath();
                const spikes = 5;
                for (let i = 0; i < spikes * 2; i++) {
                    const angle = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
                    const cr = i % 2 === 0 ? s.radius : s.radius * 0.45;
                    const cx = Math.cos(angle) * cr;
                    const cy = Math.sin(angle) * cr;
                    if (i === 0) ctx.moveTo(cx, cy);
                    else ctx.lineTo(cx, cy);
                }
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#fffde0';
                ctx.beginPath();
                ctx.arc(0, 0, s.radius * 0.35, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            function drawShieldPU(sh) {
                ctx.save();
                ctx.translate(sh.x, sh.y);
                const pulse = 1 + Math.sin(sh.pulse) * 0.2;
                // Vonkajšia žiara
                const glow = ctx.createRadialGradient(0, 0, sh.radius * 0.4 * pulse, 0, 0, sh.radius * 2 * pulse);
                glow.addColorStop(0, 'rgba(120,200,255,0.8)');
                glow.addColorStop(0.5, 'rgba(60,150,255,0.35)');
                glow.addColorStop(1, 'rgba(30,80,255,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(0, 0, sh.radius * 2 * pulse, 0, Math.PI * 2);
                ctx.fill();
                // Kruh
                ctx.strokeStyle = 'rgba(180,230,255,0.9)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, sh.radius * pulse, 0, Math.PI * 2);
                ctx.stroke();
                // Vnútro
                ctx.fillStyle = 'rgba(200,240,255,0.7)';
                ctx.beginPath();
                ctx.arc(0, 0, sh.radius * 0.5 * pulse, 0, Math.PI * 2);
                ctx.fill();
                // Symbol blesku
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                const s = sh.radius * 0.45;
                ctx.moveTo(-s * 0.3, -s);
                ctx.lineTo(s * 0.5, -s * 0.2);
                ctx.lineTo(s * 0.1, s * 0.1);
                ctx.lineTo(s * 0.7, s);
                ctx.lineTo(-s * 0.1, s * 0.2);
                ctx.lineTo(s * 0.15, -s * 0.1);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            function drawPlayer() {
                ctx.save();
                ctx.translate(player.x, player.y);

                // Shield glow
                if (player.shieldActive) {
                    const shieldPulse = 1 + Math.sin(frameCount * 0.15) * 0.15;
                    const shieldGlow = ctx.createRadialGradient(0, 0, player.size * 0.5, 0, 0, player.size * 2.2 *
                        shieldPulse);
                    shieldGlow.addColorStop(0, 'rgba(100,200,255,0.6)');
                    shieldGlow.addColorStop(0.6, 'rgba(40,130,255,0.2)');
                    shieldGlow.addColorStop(1, 'rgba(20,60,255,0)');
                    ctx.fillStyle = shieldGlow;
                    ctx.beginPath();
                    ctx.arc(0, 0, player.size * 2.2 * shieldPulse, 0, Math.PI * 2);
                    ctx.fill();
                    // Kruh okolo
                    ctx.strokeStyle = `rgba(180,230,255,${0.7 + Math.sin(frameCount*0.2)*0.3})`;
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, player.size * 1.6 * shieldPulse, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Loď - trojuholník
                const s = player.size;
                if (isLandscape) {
                    // Smeruje doprava
                    ctx.fillStyle = player.shieldActive ? '#c0e8ff' : '#e8f4ff';
                    ctx.beginPath();
                    ctx.moveTo(s * 1.2, 0);
                    ctx.lineTo(-s * 0.7, -s * 0.9);
                    ctx.lineTo(-s * 0.3, 0);
                    ctx.lineTo(-s * 0.7, s * 0.9);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // Motorový plameň
                    ctx.fillStyle = '#ff8844';
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.65, -s * 0.35);
                    ctx.lineTo(-s * 1.3 - Math.random() * s * 0.4, 0);
                    ctx.lineTo(-s * 0.65, s * 0.35);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#ffcc66';
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.55, -s * 0.2);
                    ctx.lineTo(-s * 1.0 - Math.random() * s * 0.3, 0);
                    ctx.lineTo(-s * 0.55, s * 0.2);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // Smeruje nahor
                    ctx.fillStyle = player.shieldActive ? '#c0e8ff' : '#e8f4ff';
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 1.2);
                    ctx.lineTo(-s * 0.9, s * 0.7);
                    ctx.lineTo(0, s * 0.3);
                    ctx.lineTo(s * 0.9, s * 0.7);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // Motorový plameň
                    ctx.fillStyle = '#ff8844';
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.35, s * 0.6);
                    ctx.lineTo(0, s * 1.3 + Math.random() * s * 0.4);
                    ctx.lineTo(s * 0.35, s * 0.6);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#ffcc66';
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.2, s * 0.5);
                    ctx.lineTo(0, s * 1.0 + Math.random() * s * 0.3);
                    ctx.lineTo(s * 0.2, s * 0.5);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            }

            function drawParticles() {
                for (let p of particles) {
                    const alpha = p.life / p.maxLife;
                    ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb',
                        'rgba').replace('hsl', 'hsla');
                    if (p.color.startsWith('#')) {
                        const hex = p.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawUI() {
                // Skóre
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(`⭐ ${score}`, W - 20, 40);

                // Shield indikátor
                if (player.shieldActive) {
                    const remaining = player.shieldTimer / player.shieldMax;
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.font = '12px "Segoe UI", system-ui, sans-serif';
                    ctx.textAlign = 'right';
                    ctx.fillText(`🛡️ ${(remaining * 100).toFixed(0)}%`, W - 20, 65);

                    // Progress bar
                    const barW = 60;
                    const barH = 4;
                    const barX = W - 20 - barW;
                    const barY = 72;
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(barX, barY, barW, barH);
                    ctx.fillStyle = '#88ccff';
                    ctx.fillRect(barX, barY, barW * remaining, barH);
                }

                // Rýchlosť / level
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '11px "Segoe UI", system-ui, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`rýchlosť: ${scrollSpeed.toFixed(1)} | level: ${difficultyLevel}`, 20, H - 15);

                // Indikátor orientácie
                const orientText = isLandscape ? '↔ šírka' : '↕ výška';
                ctx.fillText(`mód: ${orientText}`, 20, H - 35);
            }

            function drawStartScreen() {
                // Polopriehľadné pozadie
                ctx.fillStyle = 'rgba(0,0,20,0.6)';
                ctx.fillRect(0, 0, W, H);

                // Názov
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${Math.min(W,H)*0.07}px "Segoe UI", system-ui, sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('🌌 GRAVITY SHIFT', W / 2, H / 2 - 40);

                // Podnadpis
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = `${Math.min(W,H)*0.035}px "Segoe UI", system-ui, sans-serif`;
                ctx.fillText('Otoč obrazovku a zmeň smer!', W / 2, H / 2 + 10);

                // Tlačidlo
                const btnW = Math.min(220, W * 0.6);
                const btnH = 55;
                const btnX = W / 2 - btnW / 2;
                const btnY = H / 2 + 40;
                const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
                btnGrad.addColorStop(0, '#4466cc');
                btnGrad.addColorStop(1, '#2233aa');
                ctx.fillStyle = btnGrad;
                ctx.beginPath();
                ctx.roundRect(btnX, btnY, btnW, btnH, 28);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.font = `bold ${Math.min(W,H)*0.035}px "Segoe UI", system-ui, sans-serif`;
                ctx.fillText('▶  ŠTART', W / 2, btnY + btnH / 2 + 6);

                // Uloženie tlačidla pre detekciu kliku
                player._startBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
            }

            function drawGameOverScreen() {
                // Tmavý overlay
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);

                // Game Over text
                ctx.fillStyle = '#ff4444';
                ctx.font = `bold ${Math.min(W,H)*0.08}px "Segoe UI", system-ui, sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', W / 2, H / 2 - 50);

                // Skóre
                ctx.fillStyle = '#fff';
                ctx.font = `${Math.min(W,H)*0.04}px "Segoe UI", system-ui, sans-serif`;
                ctx.fillText(`Konečné skóre: ⭐ ${score}`, W / 2, H / 2);

                ctx.fillText(`Level: ${difficultyLevel}`, W / 2, H / 2 + 35);

                // Tlačidlo reštart
                const btnW = Math.min(240, W * 0.65);
                const btnH = 55;
                const btnX = W / 2 - btnW / 2;
                const btnY = H / 2 + 60;
                const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
                btnGrad.addColorStop(0, '#cc4444');
                btnGrad.addColorStop(1, '#aa2222');
                ctx.fillStyle = btnGrad;
                ctx.beginPath();
                ctx.roundRect(btnX, btnY, btnW, btnH, 28);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.font = `bold ${Math.min(W,H)*0.035}px "Segoe UI", system-ui, sans-serif`;
                ctx.fillText('🔄 HRAJ ZNOVA', W / 2, btnY + btnH / 2 + 6);

                // Uloženie tlačidla
                player._restartBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
            }

            function render() {
                // Vyčistenie
                ctx.clearRect(0, 0, W, H);

                // Pozadie - gradient
                const bgGrad = ctx.createLinearGradient(0, 0, isLandscape ? W : 0, isLandscape ? 0 : H);
                bgGrad.addColorStop(0, '#000020');
                bgGrad.addColorStop(0.5, '#000a30');
                bgGrad.addColorStop(1, '#001040');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                // BG hviezdy
                drawBgStars();

                // Shield power-upy
                for (let sh of shields) drawShieldPU(sh);

                // Hviezdy
                for (let s of stars) drawStar(s);

                // Prekážky
                for (let obs of obstacles) drawAsteroid(obs);

                // Trail hráča
                for (let i = 0; i < player.trail.length; i++) {
                    const t = player.trail[i];
                    const alpha = (t.life / 8) * 0.4;
                    ctx.fillStyle = `rgba(150,200,255,${alpha})`;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, player.size * 0.35 * (t.life / 8), 0, Math.PI * 2);
                    ctx.fill();
                }

                // Hráč
                drawPlayer();

                // Častice
                drawParticles();

                // UI
                if (gameStarted && !gameOver) {
                    drawUI();
                }

                // Štartovacia obrazovka
                if (!gameStarted && !gameOver) {
                    drawStartScreen();
                }

                // Game over
                if (gameOver) {
                    drawGameOverScreen();
                }
            }

            // ==================== GAME LOOP ====================
            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }

            // ==================== INPUT ====================
            function handlePointer(x, y) {
                if (gameOver) return;
                if (!gameStarted) {
                    gameStarted = true;
                    hint.style.opacity = '0';
                }
                if (isLandscape) {
                    player.targetY = y;
                } else {
                    player.targetX = x;
                }
            }

            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                initAudio();
                const mx = e.clientX;
                const my = e.clientY;

                if (gameOver && player._restartBtn) {
                    const b = player._restartBtn;
                    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
                        restartGame();
                        return;
                    }
                }
                if (!gameStarted && player._startBtn) {
                    const b = player._startBtn;
                    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
                        gameStarted = true;
                        hint.style.opacity = '0';
                        return;
                    }
                }
                if (!gameOver) {
                    handlePointer(mx, my);
                }
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!gameOver && gameStarted) {
                    handlePointer(e.clientX, e.clientY);
                }
            });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                const tx = e.touches[0].clientX;
                const ty = e.touches[0].clientY;

                if (gameOver && player._restartBtn) {
                    const b = player._restartBtn;
                    if (tx >= b.x && tx <= b.x + b.w && ty >= b.y && ty <= b.y + b.h) {
                        restartGame();
                        return;
                    }
                }
                if (!gameStarted && player._startBtn) {
                    const b = player._startBtn;
                    if (tx >= b.x && tx <= b.x + b.w && ty >= b.y && ty <= b.y + b.h) {
                        gameStarted = true;
                        hint.style.opacity = '0';
                        return;
                    }
                }
                if (!gameOver) {
                    handlePointer(tx, ty);
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!gameOver && gameStarted) {
                    handlePointer(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
            });

            document.addEventListener('keydown', (e) => {
                initAudio();
                if (gameOver) {
                    if (e.key === ' ' || e.key === 'Enter') {
                        restartGame();
                    }
                    return;
                }
                if (!gameStarted) {
                    if (e.key === ' ' || e.key === 'Enter') {
                        gameStarted = true;
                        hint.style.opacity = '0';
                        return;
                    }
                }
                const moveAmount = 12;
                if (isLandscape) {
                    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') player.targetY -= moveAmount;
                    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') player.targetY += moveAmount;
                } else {
                    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') player.targetX -= moveAmount;
                    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') player.targetX += moveAmount;
                }
                // Univerzálne šípky pre oba módy
                if (e.key === 'ArrowLeft' || e.key === 'a') player.targetX -= moveAmount;
                if (e.key === 'ArrowRight' || e.key === 'd') player.targetX += moveAmount;
                if (e.key === 'ArrowUp' || e.key === 'w') player.targetY -= moveAmount;
                if (e.key === 'ArrowDown' || e.key === 's') player.targetY += moveAmount;
            });

            // ==================== RESIZE EVENT ====================
            window.addEventListener('resize', () => {
                resize();
            });

            window.addEventListener('orientationchange', () => {
                setTimeout(resize, 150);
            });

            // ==================== INIT ====================
            resize();
            initPlayerPosition();
            generateBgStars();
            player._startBtn = null;
            player._restartBtn = null;
            gameLoop();

            // Skrytie hintu po niekoľkých sekundách ak hráč začne
            setTimeout(() => {
                if (gameStarted) hint.style.opacity = '0';
            }, 4000);

            console.log('🚀 Gravity Shift pripravený!');
            console.log('📱 Otoč obrazovku a zmeň smer hry.');
            console.log('🖱️  Desktop: myš / šípky / WASD');
            console.log('👆 Mobile: dotyk / ťahanie');
            console.log('🛡️  Zbieraj modré štíty pre dočasnú nesmrteľnosť!');
            console.log('⭐ Zbieraj hviezdy pre extra body!');
        })();
    </script>
</body>
</html>
