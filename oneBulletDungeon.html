<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>One Bullet Dungeon - pohybliví nepriatelia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
        }
        .game-wrapper {
            background: #1a1f2a;
            padding: 20px 20px 25px;
            border-radius: 40px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.7);
        }
        canvas {
            display: block;
            width: 100%;
            max-width: 500px;
            height: auto;
            aspect-ratio: 1 / 1;
            background: #10141c;
            border-radius: 28px;
            box-shadow: inset 0 0 0 2px #2f3848, 0 10px 20px rgba(0,0,0,0.6);
            touch-action: none;
            cursor: crosshair;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 14px 6px 0;
            color: #c8d0e0;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
            text-shadow: 0 2px 3px black;
            flex-wrap: wrap;
            gap: 8px;
        }
        .status-bar span {
            background: #0f131c;
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid #384052;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
        }
        #resetBtn {
            background: #2f3a4e;
            border: none;
            color: #dbe2f0;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 6px 22px;
            border-radius: 40px;
            border: 1px solid #4a5670;
            box-shadow: 0 4px 0 #0b0f16;
            transition: 0.08s linear;
            touch-action: manipulation;
            cursor: pointer;
        }
        #resetBtn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #0b0f16;
        }
        .info-hint {
            color: #7e8aa3;
            text-align: center;
            margin-top: 10px;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }
        .lives-display {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 1.2rem;
            padding: 4px 14px;
        }
        .life-heart {
            color: #ff4757;
            font-size: 1.4rem;
            line-height: 1;
            transition: all 0.3s ease;
        }
        .life-heart.lost {
            color: #2a2a3a;
            text-shadow: none;
            filter: grayscale(1) brightness(0.4);
            transform: scale(0.85);
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <div class="status-bar">
        <span id="bulletStatus">⚫ 1</span>
        <span id="livesDisplay" class="lives-display">❤️❤️❤️</span>
        <span id="scoreDisplay">🏆 0</span>
        <button id="resetBtn">↺</button>
    </div>
    <div class="info-hint">klik / ťahaj → strela sa vráti · odrazí · alebo chyť</div>
</div>
<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bulletStatus = document.getElementById('bulletStatus');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const livesDisplay = document.getElementById('livesDisplay');

        // ---- konfigurácia ----
        const SIZE = 600;
        const PLAYER_RADIUS = 18;
        const BULLET_RADIUS = 8;
        const WALL_OFFSET = 22;
        const PLAYER_SPEED = 4.8;
        const BULLET_SPEED = 6.2;
        const ENEMY_BASE_SPEED = 0.8;
        const ENEMY_RADIUS = 18;
        const MAX_LIVES = 3;

        // ---- stav hry ----
        let player = { x: 300, y: 300 };
        let bullet = { x: 300, y: 300, active: false, vx: 0, vy: 0 };
        let enemies = [];
        let score = 0;
        let lives = MAX_LIVES;
        let gameOver = false;
        let winFlag = false;
        let waveActive = false;
        let waveEnemiesCount = 7;
        let waveTransition = false;

        // ---- dotykové / myš ----
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragEnd = { x: 0, y: 0 };

        // ---- pomocné ----
        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function randomRange(min, max) {
            return min + Math.random() * (max - min);
        }

        // ---- generovanie nepriateľov ----
        function spawnEnemies(count) {
            enemies = [];
            for (let i = 0; i < count; i++) {
                let attempts = 0;
                let x, y, overlap;
                do {
                    x = WALL_OFFSET + 20 + Math.random() * (SIZE - 2 * WALL_OFFSET - 40);
                    y = WALL_OFFSET + 20 + Math.random() * (SIZE - 2 * WALL_OFFSET - 40);
                    overlap = false;
                    const dx = x - player.x;
                    const dy = y - player.y;
                    if (Math.hypot(dx, dy) < 100) overlap = true;
                    for (let e of enemies) {
                        if (Math.hypot(x - e.x, y - e.y) < ENEMY_RADIUS * 2.5) {
                            overlap = true;
                            break;
                        }
                    }
                    attempts++;
                    if (attempts > 500) break;
                } while (overlap);
                
                const angle = Math.random() * Math.PI * 2;
                const speed = ENEMY_BASE_SPEED + Math.random() * 0.6;
                
                enemies.push({
                    x, y,
                    radius: ENEMY_RADIUS,
                    alive: true,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                });
            }
        }

        // ---- aktualizácia zobrazenia životov ----
        function updateLivesDisplay() {
            let heartsHtml = '';
            for (let i = 0; i < MAX_LIVES; i++) {
                if (i < lives) {
                    heartsHtml += '<span class="life-heart">❤️</span>';
                } else {
                    heartsHtml += '<span class="life-heart lost">❤️</span>';
                }
            }
            livesDisplay.innerHTML = heartsHtml;
        }

        // ---- začiatok vlny ----
        function startWave() {
            waveActive = true;
            winFlag = false;
            gameOver = false;
            waveTransition = false;
            lives = MAX_LIVES;
            
            updateLivesDisplay();
            updateUI();
            
            bullet.active = false;
            bullet.x = player.x;
            bullet.y = player.y;
            bullet.vx = 0;
            bullet.vy = 0;
            
            waveEnemiesCount = Math.min(7 + Math.floor(score / 5), 15);
            spawnEnemies(waveEnemiesCount);
        }

        // ---- reset hry ----
        function resetGame() {
            player.x = 300;
            player.y = 300;
            score = 0;
            lives = MAX_LIVES;
            gameOver = false;
            winFlag = false;
            waveActive = false;
            waveTransition = false;
            bullet.active = false;
            bullet.x = player.x;
            bullet.y = player.y;
            bullet.vx = 0;
            bullet.vy = 0;
            startWave();
            updateLivesDisplay();
            updateUI();
        }

        // ---- UI aktualizácia ----
        function updateUI() {
            bulletStatus.innerText = bullet.active ? '🔴 0' : '⚫ 1';
            scoreDisplay.innerText = `🏆 ${score}`;
        }

        // ---- streľba ----
        function shootBullet(targetX, targetY) {
            if (bullet.active) return false;
            if (gameOver) return false;
            if (winFlag) return false;
            if (waveTransition) return false;

            const dx = targetX - player.x;
            const dy = targetY - player.y;
            const dist = Math.hypot(dx, dy);
            if (dist < 10) return false;

            const normX = dx / dist;
            const normY = dy / dist;

            bullet.active = true;
            bullet.x = player.x + normX * (PLAYER_RADIUS + BULLET_RADIUS + 2);
            bullet.y = player.y + normY * (PLAYER_RADIUS + BULLET_RADIUS + 2);
            bullet.vx = normX * BULLET_SPEED;
            bullet.vy = normY * BULLET_SPEED;

            updateUI();
            return true;
        }

        // ---- chytenie strely ----
        function catchBullet() {
            if (!bullet.active) return false;
            const dx = bullet.x - player.x;
            const dy = bullet.y - player.y;
            const dist = Math.hypot(dx, dy);
            if (dist < PLAYER_RADIUS + BULLET_RADIUS + 2) {
                bullet.active = false;
                bullet.x = player.x;
                bullet.y = player.y;
                bullet.vx = 0;
                bullet.vy = 0;
                updateUI();
                return true;
            }
            return false;
        }

        // ---- pohyb hráča ----
        const keys = { w: false, a: false, s: false, d: false, up: false, down: false, left: false, right: false };
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 'a') keys.a = true;
            if (key === 's') keys.s = true;
            if (key === 'd') keys.d = true;
            if (key === 'arrowup') keys.up = true;
            if (key === 'arrowdown') keys.down = true;
            if (key === 'arrowleft') keys.left = true;
            if (key === 'arrowright') keys.right = true;
            if (key === 'r') resetGame();
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 'a') keys.a = false;
            if (key === 's') keys.s = false;
            if (key === 'd') keys.d = false;
            if (key === 'arrowup') keys.up = false;
            if (key === 'arrowdown') keys.down = false;
            if (key === 'arrowleft') keys.left = false;
            if (key === 'arrowright') keys.right = false;
        });

        function movePlayer() {
            if (gameOver) return;
            let dx = 0, dy = 0;
            if (keys.w || keys.up) dy = -1;
            if (keys.s || keys.down) dy = 1;
            if (keys.a || keys.left) dx = -1;
            if (keys.d || keys.right) dx = 1;
            if (dx !== 0 || dy !== 0) {
                const len = Math.hypot(dx, dy);
                dx = (dx / len) * PLAYER_SPEED;
                dy = (dy / len) * PLAYER_SPEED;
                let newX = player.x + dx;
                let newY = player.y + dy;
                newX = clamp(newX, WALL_OFFSET, SIZE - WALL_OFFSET);
                newY = clamp(newY, WALL_OFFSET, SIZE - WALL_OFFSET);
                player.x = newX;
                player.y = newY;

                if (!bullet.active && !gameOver) {
                    bullet.x = player.x;
                    bullet.y = player.y;
                }
            }
        }

        // ---- pohyb nepriateľov ----
        function moveEnemies() {
            if (gameOver || winFlag || waveTransition) return;
            
            for (let enemy of enemies) {
                if (!enemy.alive) continue;
                
                enemy.x += enemy.vx;
                enemy.y += enemy.vy;
                
                if (enemy.x < WALL_OFFSET + ENEMY_RADIUS) {
                    enemy.x = WALL_OFFSET + ENEMY_RADIUS;
                    enemy.vx = -enemy.vx;
                } else if (enemy.x > SIZE - WALL_OFFSET - ENEMY_RADIUS) {
                    enemy.x = SIZE - WALL_OFFSET - ENEMY_RADIUS;
                    enemy.vx = -enemy.vx;
                }
                if (enemy.y < WALL_OFFSET + ENEMY_RADIUS) {
                    enemy.y = WALL_OFFSET + ENEMY_RADIUS;
                    enemy.vy = -enemy.vy;
                } else if (enemy.y > SIZE - WALL_OFFSET - ENEMY_RADIUS) {
                    enemy.y = SIZE - WALL_OFFSET - ENEMY_RADIUS;
                    enemy.vy = -enemy.vy;
                }
                
                if (Math.random() < 0.01) {
                    const angle = Math.atan2(enemy.vy, enemy.vx) + (Math.random() - 0.5) * 1.2;
                    const speed = Math.hypot(enemy.vx, enemy.vy);
                    enemy.vx = Math.cos(angle) * speed;
                    enemy.vy = Math.sin(angle) * speed;
                }
                
                const speed = Math.hypot(enemy.vx, enemy.vy);
                const maxSpeed = ENEMY_BASE_SPEED + 1.0;
                if (speed > maxSpeed) {
                    enemy.vx = (enemy.vx / speed) * maxSpeed;
                    enemy.vy = (enemy.vy / speed) * maxSpeed;
                }
                if (speed < 0.3 && Math.random() < 0.02) {
                    const angle = Math.random() * Math.PI * 2;
                    enemy.vx += Math.cos(angle) * 0.5;
                    enemy.vy += Math.sin(angle) * 0.5;
                }
            }
        }

        // ---- aktualizácia strely ----
        function updateBullet() {
            if (!bullet.active) return;
            if (gameOver) return;

            bullet.x += bullet.vx;
            bullet.y += bullet.vy;

            if (bullet.x < WALL_OFFSET) {
                bullet.x = WALL_OFFSET;
                bullet.vx = -bullet.vx;
            } else if (bullet.x > SIZE - WALL_OFFSET) {
                bullet.x = SIZE - WALL_OFFSET;
                bullet.vx = -bullet.vx;
            }
            if (bullet.y < WALL_OFFSET) {
                bullet.y = WALL_OFFSET;
                bullet.vy = -bullet.vy;
            } else if (bullet.y > SIZE - WALL_OFFSET) {
                bullet.y = SIZE - WALL_OFFSET;
                bullet.vy = -bullet.vy;
            }

            if (catchBullet()) {
                return;
            }

            for (let enemy of enemies) {
                if (!enemy.alive) continue;
                const dx = bullet.x - enemy.x;
                const dy = bullet.y - enemy.y;
                const dist = Math.hypot(dx, dy);
                if (dist < ENEMY_RADIUS + BULLET_RADIUS) {
                    enemy.alive = false;
                    score++;
                    
                    if (dist > 0.1) {
                        const normX = dx / dist;
                        const normY = dy / dist;
                        const dot = bullet.vx * normX + bullet.vy * normY;
                        bullet.vx -= 2 * dot * normX;
                        bullet.vy -= 2 * dot * normY;
                        bullet.x = enemy.x + normX * (ENEMY_RADIUS + BULLET_RADIUS + 1);
                        bullet.y = enemy.y + normY * (ENEMY_RADIUS + BULLET_RADIUS + 1);
                    } else {
                        bullet.vx = -bullet.vx + (Math.random() - 0.5) * 2;
                        bullet.vy = -bullet.vy + (Math.random() - 0.5) * 2;
                    }
                    
                    updateUI();
                    
                    const allDead = enemies.every(e => !e.alive);
                    if (allDead) {
                        winFlag = true;
                        waveActive = false;
                        waveTransition = true;
                        bullet.active = false;
                        setTimeout(() => {
                            if (!gameOver) {
                                startWave();
                            }
                            waveTransition = false;
                        }, 1500);
                    }
                    break;
                }
            }

            const distToPlayer = Math.hypot(bullet.x - player.x, bullet.y - player.y);
            if (distToPlayer > 350 && bullet.active) {
                const angle = Math.atan2(player.y - bullet.y, player.x - bullet.x);
                bullet.vx += Math.cos(angle) * 0.3;
                bullet.vy += Math.sin(angle) * 0.3;
                const speed = Math.hypot(bullet.vx, bullet.vy);
                if (speed > BULLET_SPEED * 1.5) {
                    bullet.vx = (bullet.vx / speed) * BULLET_SPEED * 1.2;
                    bullet.vy = (bullet.vy / speed) * BULLET_SPEED * 1.2;
                }
            }

            if (bullet.x < -100 || bullet.x > SIZE + 100 || bullet.y < -100 || bullet.y > SIZE + 100) {
                bullet.active = false;
                bullet.x = player.x;
                bullet.y = player.y;
                bullet.vx = 0;
                bullet.vy = 0;
                updateUI();
            }
        }

        // ---- kolízia hráča s nepriateľmi ----
        function checkPlayerCollision() {
            if (gameOver || winFlag || waveTransition) return;
            
            for (let enemy of enemies) {
                if (!enemy.alive) continue;
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                if (Math.hypot(dx, dy) < PLAYER_RADIUS + ENEMY_RADIUS - 4) {
                    if (bullet.active) {
                        enemy.alive = false;
                        score++;
                        const dist = Math.hypot(dx, dy);
                        if (dist > 0.1) {
                            const normX = dx / dist;
                            const normY = dy / dist;
                            bullet.x = enemy.x + normX * (ENEMY_RADIUS + BULLET_RADIUS + 1);
                            bullet.y = enemy.y + normY * (ENEMY_RADIUS + BULLET_RADIUS + 1);
                            const dot = bullet.vx * normX + bullet.vy * normY;
                            bullet.vx -= 2 * dot * normX;
                            bullet.vy -= 2 * dot * normY;
                        }
                        updateUI();
                        
                        const allDead = enemies.every(e => !e.alive);
                        if (allDead) {
                            winFlag = true;
                            waveActive = false;
                            waveTransition = true;
                            bullet.active = false;
                            setTimeout(() => {
                                if (!gameOver) {
                                    startWave();
                                }
                                waveTransition = false;
                            }, 1500);
                        }
                    } else {
                        lives--;
                        updateLivesDisplay();
                        updateUI();
                        
                        if (lives <= 0) {
                            gameOver = true;
                            bullet.active = false;
                            updateUI();
                        } else {
                            player.x = 300;
                            player.y = 300;
                            bullet.active = false;
                            bullet.x = player.x;
                            bullet.y = player.y;
                            bullet.vx = 0;
                            bullet.vy = 0;
                            for (let e of enemies) {
                                if (e.alive) {
                                    const ang = Math.atan2(e.y - player.y, e.x - player.x);
                                    e.x += Math.cos(ang) * 40;
                                    e.y += Math.sin(ang) * 40;
                                    e.x = clamp(e.x, WALL_OFFSET + ENEMY_RADIUS, SIZE - WALL_OFFSET - ENEMY_RADIUS);
                                    e.y = clamp(e.y, WALL_OFFSET + ENEMY_RADIUS, SIZE - WALL_OFFSET - ENEMY_RADIUS);
                                }
                            }
                        }
                    }
                    break;
                }
            }
        }

        // ---- vykreslenie ----
        function draw() {
            ctx.clearRect(0, 0, SIZE, SIZE);

            const grad = ctx.createRadialGradient(300, 300, 50, 300, 300, 400);
            grad.addColorStop(0, '#202838');
            grad.addColorStop(1, '#0c1018');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, SIZE, SIZE);

            ctx.strokeStyle = '#2f3a4e';
            ctx.lineWidth = 1.2;
            for (let i = 0; i <= SIZE; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(SIZE, i);
                ctx.stroke();
            }

            ctx.strokeStyle = '#5d6e8a';
            ctx.lineWidth = 4;
            ctx.strokeRect(WALL_OFFSET-4, WALL_OFFSET-4, SIZE - 2*WALL_OFFSET + 8, SIZE - 2*WALL_OFFSET + 8);

            for (let enemy of enemies) {
                if (!enemy.alive) continue;
                ctx.shadowColor = '#9f0000';
                ctx.shadowBlur = 22;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, ENEMY_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = '#b32a2a';
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, ENEMY_RADIUS-4, 0, Math.PI * 2);
                ctx.fillStyle = '#d94a4a';
                ctx.fill();
                ctx.strokeStyle = '#ff8a8a';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = '#f0f4ff';
                ctx.beginPath();
                ctx.arc(enemy.x-7, enemy.y-5, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(enemy.x+7, enemy.y-5, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#1a1f2a';
                ctx.beginPath();
                ctx.arc(enemy.x-8, enemy.y-7, 2.5, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(enemy.x+6, enemy.y-7, 2.5, 0, Math.PI*2);
                ctx.fill();
            }

            if (bullet.active) {
                ctx.shadowColor = '#ffbb44';
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, BULLET_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = '#f5d742';
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#ffec9e';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(bullet.x-3, bullet.y-3, 3, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255,255,210,0.5)';
                ctx.fill();
            }

            ctx.shadowColor = '#5a7fff';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.arc(player.x, player.y, PLAYER_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = '#3d6eff';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#8ab0ff';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(player.x-5, player.y-6, 6, 0, Math.PI*2);
            ctx.fillStyle = '#7fa3ff';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(player.x+5, player.y-6, 6, 0, Math.PI*2);
            ctx.fillStyle = '#7fa3ff';
            ctx.fill();

            if (!gameOver && !winFlag && waveActive) {
                const alive = enemies.filter(e => e.alive).length;
                ctx.font = '16px sans-serif';
                ctx.fillStyle = '#8a9bb8';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(`Nepriatelia: ${alive}`, 16, 16);
            }

            if (gameOver) {
                ctx.font = 'bold 44px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 30;
                ctx.shadowColor = 'black';
                if (winFlag) {
                    ctx.fillStyle = '#fadf7a';
                    ctx.fillText('🏆 VÍŤAZSTVO!', 300, 200);
                    ctx.font = '22px sans-serif';
                    ctx.fillStyle = '#c8d8f0';
                    ctx.fillText('Ďalšia vlna čoskoro...', 300, 270);
                } else {
                    ctx.fillStyle = '#e06060';
                    ctx.fillText('💀 PREHRA', 300, 200);
                    ctx.font = '22px sans-serif';
                    ctx.fillStyle = '#c8d8f0';
                    ctx.fillText('Klikni Reset pre novú hru', 300, 270);
                }
                ctx.shadowBlur = 0;
            } else if (winFlag && !gameOver) {
                ctx.font = 'bold 40px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 30;
                ctx.shadowColor = 'black';
                ctx.fillStyle = '#fadf7a';
                ctx.fillText('✨ VLNA DOKONČENÁ!', 300, 200);
                ctx.font = '22px sans-serif';
                ctx.fillStyle = '#c8d8f0';
                ctx.fillText('Pripravuje sa ďalšia...', 300, 260);
                ctx.shadowBlur = 0;
            }
        }

        // ---- herný cyklus ----
        function gameLoop() {
            if (!gameOver && !winFlag) {
                movePlayer();
                moveEnemies();
                updateBullet();
                checkPlayerCollision();
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        // ---- myš / dotyk ----
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function onPointerDown(e) {
            e.preventDefault();
            const pos = getCanvasCoords(e);
            isDragging = true;
            dragStart.x = pos.x;
            dragStart.y = pos.y;
            dragEnd.x = pos.x;
            dragEnd.y = pos.y;
        }

        function onPointerMove(e) {
            e.preventDefault();
            if (!isDragging) return;
            const pos = getCanvasCoords(e);
            dragEnd.x = pos.x;
            dragEnd.y = pos.y;
        }

        function onPointerUp(e) {
            e.preventDefault();
            if (!isDragging) {
                const pos = getCanvasCoords(e);
                shootBullet(pos.x, pos.y);
                return;
            }
            isDragging = false;
            const dx = dragEnd.x - dragStart.x;
            const dy = dragEnd.y - dragStart.y;
            if (Math.hypot(dx, dy) > 12) {
                shootBullet(dragEnd.x, dragEnd.y);
            } else {
                shootBullet(dragStart.x, dragStart.y);
            }
        }

        // ---- event listenery ----
        canvas.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', (e) => {
            if (isDragging) onPointerMove(e);
        });
        window.addEventListener('mouseup', onPointerUp);

        canvas.addEventListener('touchstart', onPointerDown, { passive: false });
        window.addEventListener('touchmove', onPointerMove, { passive: false });
        window.addEventListener('touchend', onPointerUp, { passive: false });

        document.getElementById('resetBtn').addEventListener('click', resetGame);
        document.getElementById('resetBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            resetGame();
        });

        // ---- štart ----
        resetGame();
        gameLoop();
    })();
</script>
</body>
</html>
