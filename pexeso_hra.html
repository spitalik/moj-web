
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #game { padding: 1.5rem 1rem; font-family: var(--font-sans); }
  #header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
  #stats { display: flex; gap: 12px; }
  .stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 6px 14px; font-size: 13px; color: var(--color-text-secondary); }
  .stat span { font-weight: 500; color: var(--color-text-primary); font-size: 15px; }
  #grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 440px; margin: 0 auto; }
  .card { aspect-ratio: 1; cursor: pointer; perspective: 600px; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(.4,0,.2,1); border-radius: var(--border-radius-lg); }
  .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: var(--border-radius-lg); display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 0.5px solid var(--color-border-tertiary); }
  .card-front { background: var(--color-background-secondary); color: var(--color-text-tertiary); font-size: 1.4rem; }
  .card-back { background: var(--color-background-primary); transform: rotateY(180deg); }
  .card.matched .card-back { background: #EAF3DE; border-color: #C0DD97; }
  #message { text-align: center; margin-top: 1.25rem; font-size: 15px; color: var(--color-text-secondary); min-height: 22px; }
  #win-banner { display: none; text-align: center; padding: 1.5rem; background: var(--color-background-secondary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); margin-top: 1rem; }
  #win-banner h2 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  #win-banner p { color: var(--color-text-secondary); font-size: 14px; margin-bottom: 1rem; }
  button { cursor: pointer; }
</style>

<div id="game">
  <h2 class="sr-only">Hra Pexeso — otočte kartičky a nájdite dvojice</h2>
  <div id="header">
    <div style="font-size: 18px; font-weight: 500; color: var(--color-text-primary);">Pexeso</div>
    <div id="stats">
      <div class="stat">Ťahy: <span id="moves">0</span></div>
      <div class="stat">Páry: <span id="pairs">0</span>/8</div>
      <div class="stat" id="timer-box">Čas: <span id="timer">0s</span></div>
    </div>
    <button onclick="startGame()" style="font-size: 13px; padding: 6px 14px;">Nová hra</button>
  </div>

  <div id="grid"></div>
  <div id="message">Otočte dve kartičky a nájdite zhodu!</div>
  <div id="win-banner">
    <h2>Výborne! 🎉</h2>
    <p id="win-text"></p>
    <button onclick="startGame()">Hrať znova ↗</button>
  </div>
</div>

<script>
const emojis = ['🐶','🐱','🐭','🦊','🐻','🐼','🦁','🐯'];
let cards = [], flipped = [], matched = 0, moves = 0, lock = false;
let timerInterval, seconds = 0, started = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  clearInterval(timerInterval);
  flipped = []; matched = 0; moves = 0; lock = false; seconds = 0; started = false;
  document.getElementById('moves').textContent = 0;
  document.getElementById('pairs').textContent = '0';
  document.getElementById('timer').textContent = '0s';
  document.getElementById('message').textContent = 'Otočte dve kartičky a nájdite zhodu!';
  document.getElementById('win-banner').style.display = 'none';
  document.getElementById('grid').style.display = 'grid';

  const deck = shuffle([...emojis, ...emojis]);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  deck.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.emoji = emoji;
    card.dataset.index = i;
    card.innerHTML = `<div class="card-inner"><div class="card-front"><i class="ti ti-help" style="font-size:1.5rem" aria-hidden="true"></i></div><div class="card-back">${emoji}</div></div>`;
    card.addEventListener('click', () => flipCard(card));
    grid.appendChild(card);
  });
  cards = Array.from(grid.querySelectorAll('.card'));
}

function startTimer() {
  timerInterval = setInterval(() => {
    seconds++;
    document.getElementById('timer').textContent = seconds + 's';
  }, 1000);
}

function flipCard(card) {
  if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (!started) { started = true; startTimer(); }

  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    lock = true;
    const [a, b] = flipped;
    if (a.dataset.emoji === b.dataset.emoji) {
      a.classList.add('matched'); b.classList.add('matched');
      matched++;
      document.getElementById('pairs').textContent = matched;
      flipped = []; lock = false;
      document.getElementById('message').textContent = matched < 8 ? '✓ Zhoda! Pokračujte...' : '';
      if (matched === 8) endGame();
    } else {
      document.getElementById('message').textContent = 'Žiadna zhoda, skúste znova.';
      setTimeout(() => {
        a.classList.remove('flipped'); b.classList.remove('flipped');
        flipped = []; lock = false;
        document.getElementById('message').textContent = 'Otočte dve kartičky a nájdite zhodu!';
      }, 900);
    }
  }
}

function endGame() {
  clearInterval(timerInterval);
  document.getElementById('grid').style.display = 'none';
  document.getElementById('win-banner').style.display = 'block';
  document.getElementById('win-text').textContent = `Dokončili ste hru za ${moves} ťahov a ${seconds} sekúnd. Skvelý výkon!`;
}

startGame();
</script>
