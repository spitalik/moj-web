<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #33ff66;
    user-select: none;
  }
  #back-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    background: transparent;
    border: 1px solid #33ff6644;
    color: #33ff66;
    padding: 6px 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    border-radius: 4px;
    text-decoration: none;
    transition: border-color 0.2s;
    z-index: 10;
  }
  #back-btn:hover { border-color: #33ff66; }
  h1 { font-size: 28px; letter-spacing: 8px; margin-bottom: 16px; text-shadow: 0 0 20px #33ff6688; }
  #score-display { font-size: 14px; letter-spacing: 3px; color: #33ff6699; margin-bottom: 12px; }
  #canvas-wrap {
    border: 1px solid #33ff6633;
    position: relative;
  }
  canvas { display: block; }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0acc;
    gap: 12px;
  }
  #overlay h2 { font-size: 22px; letter-spacing: 4px; }
  #overlay p { font-size: 13px; color: #33ff6688; letter-spacing: 2px; }
  #start-btn {
    margin-top: 8px;
    background: transparent;
    border: 1px solid #33ff66;
    color: #33ff66;
    padding: 10px 28px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 3px;
    transition: background 0.2s;
  }
  #start-btn:hover { background: #33ff6622; }
  #controls {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(3, 48px);
    grid-template-rows: repeat(2, 48px);
    gap: 4px;
  }
  .ctrl-btn {
    background: transparent;
    border: 1px solid #33ff6633;
    color: #33ff66;
    font-size: 18px;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { background: #33ff6622; }
  #ctrl-up { grid-column: 2; grid-row: 1; }
  #ctrl-left { grid-column: 1; grid-row: 2; }
  #ctrl-down { grid-column: 2; grid-row: 2; }
  #ctrl-right { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>
<a href="../index.html" id="back-btn">← Späť</a>
<h1>SNAKE</h1>
<div id="score-display">SKÓRE: <span id="score">0</span> &nbsp;&nbsp; REKORD: <span id="best">0</span></div>
<div id="canvas-wrap">
  <canvas id="c" width="400" height="400"></canvas>
  <div id="overlay">
    <h2>SNAKE</h2>
    <p>WASD alebo šípky</p>
    <button id="start-btn" onclick="startGame()">HRAŤ</button>
  </div>
</div>
<div id="controls">
  <button class="ctrl-btn" id="ctrl-up" onclick="setDir(0,-1)">▲</button>
  <button class="ctrl-btn" id="ctrl-left" onclick="setDir(-1,0)">◄</button>
  <button class="ctrl-btn" id="ctrl-down" onclick="setDir(0,1)">▼</button>
  <button class="ctrl-btn" id="ctrl-right" onclick="setDir(1,0)">►</button>
</div>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const GRID = 20, COLS = 20, ROWS = 20;
let snake, dir, nextDir, food, score, best = 0, interval, running = false;

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  running = true;
  spawnFood();
  clearInterval(interval);
  interval = setInterval(tick, 120);
}

function spawnFood() {
  do {
    food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===food.x && s.y===food.y));
}

function tick() {
  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameOver(); return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++;
    document.getElementById('score').textContent = score;
    spawnFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0,0,400,400);
  // grid dots
  ctx.fillStyle = '#33ff660d';
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) {
    ctx.fillRect(x*GRID+9,y*GRID+9,2,2);
  }
  // food
  ctx.fillStyle = '#ff6633';
  ctx.shadowColor = '#ff6633';
  ctx.shadowBlur = 12;
  ctx.fillRect(food.x*GRID+3, food.y*GRID+3, GRID-6, GRID-6);
  ctx.shadowBlur = 0;
  // snake
  snake.forEach((s,i) => {
    const t = 1 - i/snake.length;
    ctx.fillStyle = `rgba(51, 255, 102, ${0.3 + t*0.7})`;
    ctx.fillRect(s.x*GRID+1, s.y*GRID+1, GRID-2, GRID-2);
  });
  // head
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(snake[0].x*GRID+1, snake[0].y*GRID+1, GRID-2, GRID-2);
}

function setDir(x, y) {
  if (x===1&&dir.x===-1) return;
  if (x===-1&&dir.x===1) return;
  if (y===1&&dir.y===-1) return;
  if (y===-1&&dir.y===1) return;
  nextDir = {x,y};
}

function gameOver() {
  clearInterval(interval);
  running = false;
  if (score > best) best = score;
  document.getElementById('best').textContent = best;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `<h2>KONIEC</h2><p>SKÓRE: ${score}</p><p>REKORD: ${best}</p><button id="start-btn" onclick="startGame()" style="margin-top:8px;background:transparent;border:1px solid #33ff66;color:#33ff66;padding:10px 28px;cursor:pointer;font-family:inherit;font-size:14px;letter-spacing:3px;">ZNOVA</button>`;
  ov.style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if (!running) { if(e.code==='Space'||e.code==='Enter') startGame(); return; }
  if (e.code==='ArrowUp'||e.code==='KeyW') { e.preventDefault(); setDir(0,-1); }
  if (e.code==='ArrowDown'||e.code==='KeyS') { e.preventDefault(); setDir(0,1); }
  if (e.code==='ArrowLeft'||e.code==='KeyA') { e.preventDefault(); setDir(-1,0); }
  if (e.code==='ArrowRight'||e.code==='KeyD') { e.preventDefault(); setDir(1,0); }
});

// Touch swipe
let tx=0,ty=0;
C.addEventListener('touchstart', e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
C.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0);
  else setDir(0,dy>0?1:-1);
},{passive:true});

draw();
</script>
</body>
</html>
