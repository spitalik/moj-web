<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🔮 Bludisko s loptičkou</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
      touch-action: none;
      padding: 8px;
    }
    .game-wrapper {
      background: #1e293b;
      border-radius: 48px 48px 32px 32px;
      padding: 20px 20px 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 3px rgba(255,255,255,0.08);
      max-width: 700px;
      width: 100%;
      transition: all 0.2s;
    }
    canvas {
      display: block;
      margin: 0 auto;
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      background: #0b1120;
      border-radius: 32px;
      box-shadow: inset 0 0 0 2px #334155, 0 12px 24px rgba(0,0,0,0.5);
      touch-action: none;
      cursor: grab;
    }
    canvas:active {
      cursor: grabbing;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 18px 8px 6px 8px;
      color: #e2e8f0;
      font-weight: 600;
      letter-spacing: 0.3px;
      flex-wrap: wrap;
      gap: 8px 12px;
    }
    .status-item {
      background: #0f172a;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 1rem;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #334155;
    }
    .status-item span {
      color: #facc15;
      font-size: 1.25rem;
      min-width: 2.2rem;
      text-align: center;
    }
    button {
      background: #3b82f6;
      border: none;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      padding: 8px 22px;
      border-radius: 40px;
      box-shadow: 0 6px 0 #1d4ed8, 0 4px 12px rgba(59,130,246,0.3);
      cursor: pointer;
      transition: all 0.07s ease;
      touch-action: manipulation;
      border: 1px solid #60a5fa;
      letter-spacing: 0.5px;
    }
    button:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #1d4ed8;
    }
    .rotate-hint {
      display: none;
      background: #facc15;
      color: #0f172a;
      padding: 8px 16px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.9rem;
      align-items: center;
      gap: 8px;
      border: 1px solid #fde047;
    }
    @media (orientation: landscape) and (max-height: 500px) {
      .rotate-hint {
        display: none !important;
      }
    }
    @media (orientation: portrait) and (max-width: 600px) {
      .rotate-hint {
        display: flex;
        justify-content: center;
        margin: 4px 0 8px;
      }
    }
    @media (min-width: 700px) {
      .game-wrapper {
        padding: 28px 32px 32px;
        border-radius: 56px;
      }
      .status-item {
        font-size: 1.2rem;
        padding: 10px 24px;
      }
      button {
        font-size: 1.1rem;
        padding: 10px 28px;
      }
    }
    /* drobné vylepšenie pre dotyk */
    @media (pointer: coarse) {
      canvas {
        border-radius: 28px;
      }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="gameCanvas" width="600" height="600"></canvas>

  <div class="status-bar">
    <div class="status-item">🎯 kroky <span id="moveCounter">0</span></div>
    <div class="status-item">⏱️ čas <span id="timerDisplay">0s</span></div>
    <button id="resetBtn">↺ nová hra</button>
  </div>

  <div class="rotate-hint" id="rotateHint">
    <span>📱</span> otoč na šírku pre lepší zážitok
  </div>
</div>

<script>
  (function() {
    // ----- KONFIGURÁCIA -----
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const moveSpan = document.getElementById('moveCounter');
    const timerSpan = document.getElementById('timerDisplay');
    const resetBtn = document.getElementById('resetBtn');
    const rotateHint = document.getElementById('rotateHint');

    // ----- PREMENNÉ HRY -----
    const SIZE = 15;                 // 15x15 bludisko
    const CELL_SIZE = 600 / SIZE;    // 40px
    let maze = [];                  // 2D pole: 0 = cesta, 1 = stena
    let player = { x: 1, y: 1 };
    let goal = { x: SIZE - 2, y: SIZE - 2 };
    let moves = 0;
    let gameActive = true;
    let timerInterval = null;
    let seconds = 0;
    let isGameFinished = false;

    // dotykové / myškové stavy
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let dragThreshold = 12; // minimálny ťah na rozpoznanie smeru

    // ----- GENEROVANIE BLUDISKA (DFS) -----
    function generateMaze() {
      // inicializácia: všetko steny
      const grid = Array(SIZE).fill().map(() => Array(SIZE).fill(1));

      // pomocné funkcie
      function inBounds(r, c) {
        return r >= 0 && r < SIZE && c >= 0 && c < SIZE;
      }

      // DFS na vytvorenie bludiska (priechody)
      function carve(r, c) {
        grid[r][c] = 0; // cesta
        // poradie smerov náhodne
        const dirs = [
          [0, 2], [0, -2], [2, 0], [-2, 0]
        ];
        for (let i = dirs.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
        }

        for (let [dr, dc] of dirs) {
          const nr = r + dr;
          const nc = c + dc;
          if (inBounds(nr, nc) && grid[nr][nc] === 1) {
            // odstrániť stenu medzi aktuálnou a novou bunkou
            grid[r + dr/2][c + dc/2] = 0;
            carve(nr, nc);
          }
        }
      }

      // začíname na (1,1) – vždy párne súradnice
      carve(1, 1);

      // nastavíme cieľ (SIZE-2, SIZE-2) – musí byť cesta
      grid[goal.y][goal.x] = 0;
      // uistiť sa, že cieľ je dostupný – ak náhodou nie, prepíšeme poslednú bunku
      // (DFS zaručuje prepojenie, ale pre istotu)
      if (grid[goal.y][goal.x] !== 0) grid[goal.y][goal.x] = 0;

      // malá úprava: ak je cieľ obklopený stenami, spravíme cestu
      const neighbours = [[0,1],[0,-1],[1,0],[-1,0]];
      for (let [dy, dx] of neighbours) {
        const ny = goal.y + dy;
        const nx = goal.x + dx;
        if (inBounds(ny, nx) && grid[ny][nx] === 1) {
          grid[ny][nx] = 0; // sprístupníme aspoň jednu stranu
        }
      }

      return grid;
    }

    // ----- INICIALIZÁCIA / RESET HRY -----
    function resetGame() {
      // zastaviť starý timer
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }

      maze = generateMaze();
      player = { x: 1, y: 1 };
      goal = { x: SIZE - 2, y: SIZE - 2 };
      moves = 0;
      seconds = 0;
      gameActive = true;
      isGameFinished = false;

      moveSpan.textContent = moves;
      timerSpan.textContent = '0s';
      rotateHint.style.display = (window.innerWidth < 600 && window.innerHeight > window.innerWidth) ? 'flex' : 'none';

      // spustiť timer
      timerInterval = setInterval(() => {
        if (gameActive && !isGameFinished) {
          seconds++;
          timerSpan.textContent = seconds + 's';
        }
      }, 1000);

      drawMaze();
    }

    // ----- KRESLENIE -----
    function drawMaze() {
      ctx.clearRect(0, 0, 600, 600);

      // pozadie
      ctx.fillStyle = '#0b1120';
      ctx.fillRect(0, 0, 600, 600);

      // kreslenie bludiska
      for (let row = 0; row < SIZE; row++) {
        for (let col = 0; col < SIZE; col++) {
          const x = col * CELL_SIZE;
          const y = row * CELL_SIZE;
          if (maze[row][col] === 1) {
            // stena – gradient
            const gradient = ctx.createRadialGradient(x+4, y+4, 2, x+20, y+20, 28);
            gradient.addColorStop(0, '#475569');
            gradient.addColorStop(1, '#1e293b');
            ctx.fillStyle = gradient;
            ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
            // jemný okraj
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);
          } else {
            // cesta – tmavá dlažba
            ctx.fillStyle = ( (row+col) % 2 === 0 ) ? '#1e293b' : '#0f172a';
            ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
          }
        }
      }

      // vykreslenie cieľa (brána)
      const gx = goal.x * CELL_SIZE;
      const gy = goal.y * CELL_SIZE;
      ctx.shadowColor = '#facc15';
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.arc(gx + CELL_SIZE/2, gy + CELL_SIZE/2, CELL_SIZE/3.5, 0, 2 * Math.PI);
      ctx.fillStyle = '#facc15';
      ctx.fill();
      ctx.shadowBlur = 0;
      // vnútro cieľa
      ctx.beginPath();
      ctx.arc(gx + CELL_SIZE/2, gy + CELL_SIZE/2, CELL_SIZE/6, 0, 2 * Math.PI);
      ctx.fillStyle = '#fef08a';
      ctx.fill();

      // vykreslenie hráča (loptičky)
      const px = player.x * CELL_SIZE;
      const py = player.y * CELL_SIZE;
      ctx.shadowColor = '#60a5fa';
      ctx.shadowBlur = 24;
      // loptička s odleskom
      const gradient = ctx.createRadialGradient(px+8, py+8, 4, px+20, py+20, 24);
      gradient.addColorStop(0, '#93c5fd');
      gradient.addColorStop(0.7, '#2563eb');
      gradient.addColorStop(1, '#1e3a8a');
      ctx.beginPath();
      ctx.arc(px + CELL_SIZE/2, py + CELL_SIZE/2, CELL_SIZE/3.2, 0, 2 * Math.PI);
      ctx.fillStyle = gradient;
      ctx.fill();
      // lesk
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(px + 12, py + 10, 6, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fill();
      ctx.shadowBlur = 0;

      // ak hra skončila, zobraziť správu
      if (isGameFinished) {
        ctx.font = 'bold 36px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#000000';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#facc15';
        ctx.fillText('🏆 VÍŤAZ!', 300, 120);
        ctx.shadowBlur = 0;
      }
    }

    // ----- POHYB HRÁČA (validácia) -----
    function tryMove(dx, dy) {
      if (!gameActive || isGameFinished) return false;

      const newX = player.x + dx;
      const newY = player.y + dy;

      // kontrola hraníc a steny
      if (newX < 0 || newX >= SIZE || newY < 0 || newY >= SIZE) return false;
      if (maze[newY][newX] === 1) return false;

      // vykonaj pohyb
      player.x = newX;
      player.y = newY;
      moves++;
      moveSpan.textContent = moves;

      // kontrola či sme v cieli
      if (player.x === goal.x && player.y === goal.y) {
        gameActive = false;
        isGameFinished = true;
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        drawMaze();
        return true;
      }

      drawMaze();
      return true;
    }

    // ----- OVLÁDANIE KLÁVESNICOU (WASD / ŠÍPKY) -----
    function handleKeydown(e) {
      const key = e.key;
      if (['ArrowUp', 'w', 'W', 'ArrowDown', 's', 'S', 'ArrowLeft', 'a', 'A', 'ArrowRight', 'd', 'D'].includes(key)) {
        e.preventDefault();
      }
      if (!gameActive || isGameFinished) return;

      let dx = 0, dy = 0;
      if (key === 'ArrowUp' || key === 'w' || key === 'W') dy = -1;
      if (key === 'ArrowDown' || key === 's' || key === 'S') dy = 1;
      if (key === 'ArrowLeft' || key === 'a' || key === 'A') dx = -1;
      if (key === 'ArrowRight' || key === 'd' || key === 'D') dx = 1;
      if (dx !== 0 || dy !== 0) tryMove(dx, dy);
    }

    // ----- OVLÁDANIE MYŠOU / DOTYKOM (ťahanie) -----
    function handlePointerDown(e) {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }

      const canvasX = (clientX - rect.left) * scaleX;
      const canvasY = (clientY - rect.top) * scaleY;

      // zistíme, či klikol na hráča (alebo okolo) – pre lepší UX povolíme ťahanie odkiaľkoľvek
      isDragging = true;
      dragStartX = canvasX;
      dragStartY = canvasY;
    }

    function handlePointerMove(e) {
      e.preventDefault();
      if (!isDragging || !gameActive || isGameFinished) return;

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }

      const canvasX = (clientX - rect.left) * scaleX;
      const canvasY = (clientY - rect.top) * scaleY;

      const dx = canvasX - dragStartX;
      const dy = canvasY - dragStartY;
      const dist = Math.hypot(dx, dy);

      if (dist > dragThreshold) {
        // určenie primárneho smeru
        const angle = Math.atan2(dy, dx);
        let moveX = 0, moveY = 0;
        if (Math.abs(Math.cos(angle)) > Math.abs(Math.sin(angle))) {
          moveX = Math.sign(Math.cos(angle));
        } else {
          moveY = Math.sign(Math.sin(angle));
        }
        // resetovať ťahanie aby sme generovali viac pohybov
        if (tryMove(moveX, moveY)) {
          // po úspešnom pohybe obnovíme začiatočný bod na aktuálnu pozíciu
          dragStartX = canvasX;
          dragStartY = canvasY;
        } else {
          // ak pohyb nevyšiel, tiež obnovíme aby sa dal skúsiť iný smer
          dragStartX = canvasX;
          dragStartY = canvasY;
        }
      }
    }

    function handlePointerUp(e) {
      e.preventDefault();
      isDragging = false;
    }

    function handlePointerCancel(e) {
      e.preventDefault();
      isDragging = false;
    }

    // ----- ORIENTÁCIA – ZOBRAZENIE HINTU -----
    function handleOrientationChange() {
      const isPortrait = window.innerHeight > window.innerWidth;
      const isMobile = window.innerWidth < 700;
      if (isMobile && isPortrait) {
        rotateHint.style.display = 'flex';
      } else {
        rotateHint.style.display = 'none';
      }
    }

    // ----- INICIALIZÁCIA UDALOSTÍ -----
    function initEvents() {
      // klávesnica
      window.addEventListener('keydown', handleKeydown);

      // myš
      canvas.addEventListener('mousedown', handlePointerDown);
      window.addEventListener('mousemove', handlePointerMove);
      window.addEventListener('mouseup', handlePointerUp);
      // dotyk
      canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
      window.addEventListener('touchmove', handlePointerMove, { passive: false });
      window.addEventListener('touchend', handlePointerUp, { passive: false });
      window.addEventListener('touchcancel', handlePointerCancel, { passive: false });

      // orientácia / resize
      window.addEventListener('resize', handleOrientationChange);
      window.addEventListener('orientationchange', () => {
        setTimeout(handleOrientationChange, 200);
      });
      handleOrientationChange();

      // reset tlačidlo
      resetBtn.addEventListener('click', resetGame);
      resetBtn.addEventListener('touchstart', (e) => {
        e.preventDefault(); // zabrániť double-click efektu na mobile
        resetGame();
      });
    }

    // ----- ŠTART HRY -----
    resetGame();
    initEvents();
    drawMaze();

    // prevent scroll na mobiloch
    document.addEventListener('gesturestart', (e) => e.preventDefault());
  })();
</script>
</body>
</html>
